<div class="hero">
  <h1>🔤 Word in Context</h1>
  <p>SAT-style vocabulary practice — figure out word meaning from the passage</p>
</div>

<div class="container">
  <!-- Setup -->
  <div class="card" id="setupCard">
    <div style="display:flex;flex-wrap:wrap;gap:20px;margin-bottom:18px">
      <div>
        <label>DIFFICULTY</label>
        <div class="chip-group" id="diffGroup">
          <button class="chip active" data-val="all">All</button>
          <button class="chip" data-val="elem">Grades K–5</button>
          <button class="chip" data-val="easy">Grades 6–8</button>
          <button class="chip" data-val="medium">Grades 9–10</button>
          <button class="chip" data-val="hard">SAT / AP</button>
        </div>
      </div>
      <div>
        <label>SESSION LENGTH</label>
        <div class="chip-group" id="lenGroup">
          <button class="chip" data-val="5">5 questions</button>
          <button class="chip active" data-val="10">10 questions</button>
          <button class="chip" data-val="20">20 questions</button>
          <button class="chip" data-val="all">All</button>
        </div>
      </div>
    </div>
    <button class="btn btn-primary btn-big" onclick="startSession()">🚀 Start Practice</button>
  </div>

  <!-- Practice -->
  <div id="practiceArea" style="display:none">
    <div class="card" style="padding:14px 20px;margin-bottom:12px">
      <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progFill" style="width:0%"></div></div>
      <div class="prog-label"><span id="progLabel">0 / 0</span> &nbsp;·&nbsp; Score: <span id="liveScore">0</span></div>
    </div>
    <div class="card" id="qCard">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <span style="font-size:.75rem;font-weight:700;color:var(--muted)" id="qMeta"></span>
        <button class="btn btn-outline" style="font-size:.75rem;padding:5px 12px" onclick="skipQ()">Skip →</button>
      </div>
      <div class="q-passage" id="qPassage"></div>
      <div class="q-stem" id="qStem"></div>
      <div class="options" id="qOptions"></div>
      <div class="explanation" id="qExp"></div>
      <div style="margin-top:16px;display:none" id="nextBtnWrap">
        <button class="btn btn-primary" onclick="nextQ()">Next Question →</button>
      </div>
    </div>
  </div>

  <!-- Results -->
  <div class="card" id="resultsCard" style="display:none">
    <div style="text-align:center;padding:10px 0 20px">
      <div class="score-big" id="finalScore">0/0</div>
      <div style="color:var(--muted);font-size:.9rem;margin-top:4px">Final Score</div>
    </div>
    <div class="stat-row">
      <div class="stat"><div class="stat-val" id="resPct">0%</div><div class="stat-lbl">Accuracy</div></div>
      <div class="stat"><div class="stat-val" id="resCorrect">0</div><div class="stat-lbl">Correct</div></div>
      <div class="stat"><div class="stat-val" id="resStreak">0</div><div class="stat-lbl">Best Streak</div></div>
    </div>
    <div style="display:flex;gap:10px;margin-top:8px;flex-wrap:wrap">
      <button class="btn btn-primary btn-big" onclick="startSession()">Practice Again</button>
      <button class="btn btn-outline" onclick="showSetup()">Change Settings</button>
    </div>
  </div>
</div>

<script>
const QUESTIONS = [
    // ── Elementary (K-5) ──
  {diff:'elem',passage:'The puppy was so <u>tiny</u> that it could fit inside a shoebox.',word:'tiny',stem:'As used in the passage, "tiny" most nearly means:',opts:['very loud','very small','very fast','very old'],ans:1,exp:'<strong>Tiny</strong> means very small. The clue is that the puppy could fit inside a shoebox.'},
  {diff:'elem',passage:'After running around the playground for an hour, Sam felt completely <u>exhausted</u> and just wanted to sit down.',word:'exhausted',stem:'As used in the passage, "exhausted" most nearly means:',opts:['very hungry','very excited','very tired','very confused'],ans:2,exp:'<strong>Exhausted</strong> means very tired. The clue is that Sam wanted to sit down after running for an hour.'},
  {diff:'elem',passage:'The classroom was <u>silent</u> as everyone listened carefully to the story.',word:'silent',stem:'As used in the passage, "silent" most nearly means:',opts:['very noisy','completely quiet','very colorful','extremely large'],ans:1,exp:'<strong>Silent</strong> means completely quiet. The clue is that everyone was listening carefully, with no noise.'},
  {diff:'elem',passage:'Grandma\'s cookies smelled so <u>delicious</u> that Mia could not wait to try one.',word:'delicious',stem:'As used in the passage, "delicious" most nearly means:',opts:['tasting very good','looking very strange','feeling very cold','sounding very loud'],ans:0,exp:'<strong>Delicious</strong> means tasting very good. The clue is that Mia could not wait to try the cookies.'},
  {diff:'elem',passage:'The kitten was very <u>curious</u>, sniffing and poking at every new object in the room.',word:'curious',stem:'As used in the passage, "curious" most nearly means:',opts:['sleepy and tired','eager to learn or explore','scared and hiding','angry and upset'],ans:1,exp:'<strong>Curious</strong> means eager to explore or find out about something. The clue is the kitten sniffing and poking at new things.'},
  {diff:'elem',passage:'It was so <u>chilly</u> outside that everyone put on their warmest coats.',word:'chilly',stem:'As used in the passage, "chilly" most nearly means:',opts:['very hot','somewhat cold','extremely windy','very sunny'],ans:1,exp:'<strong>Chilly</strong> means somewhat cold. The clue is that people put on their warmest coats.'},
  {diff:'elem',passage:'The magician\'s trick was truly <u>amazing</u>, and the whole audience gasped in surprise.',word:'amazing',stem:'As used in the passage, "amazing" most nearly means:',opts:['very boring','causing great wonder or surprise','very quiet','somewhat confusing'],ans:1,exp:'<strong>Amazing</strong> means causing great surprise or wonder. The clue is that the audience gasped in surprise.'},
  {diff:'elem',passage:'The little boy was <u>brave</u> when he climbed to the top of the tall slide, even though it looked scary at first.',word:'brave',stem:'As used in the passage, "brave" most nearly means:',opts:['showing no fear even when scared','feeling very tired','being extremely fast','acting very silly'],ans:0,exp:'<strong>Brave</strong> means showing courage even when something feels scary. The clue is that he climbed the slide even though it looked scary.'},

  // ── Easy (6-8) ──
  {diff:'easy',passage:'The ancient ruins were <u>desolate</u>, with no sign of life anywhere in the crumbling stone structures.',word:'desolate',stem:'As used in the passage, "desolate" most nearly means:',opts:['crowded and busy','empty and abandoned','beautifully decorated','recently constructed'],ans:1,exp:'<strong>Desolate</strong> means deserted and empty. The clue is "no sign of life" — the place is completely abandoned.'},
  {diff:'easy',passage:'She was so <u>famished</u> after the long hike that she ate three sandwiches without stopping.',word:'famished',stem:'As used in the passage, "famished" most nearly means:',opts:['exhausted','extremely hungry','slightly tired','very thirsty'],ans:1,exp:'<strong>Famished</strong> means extremely hungry. The context clue is that she "ate three sandwiches without stopping" after a long hike — clear signs of intense hunger.'},
  {diff:'easy',passage:'The coach\'s instructions were <u>concise</u>: "Run fast, turn left, score." No one was confused.',word:'concise',stem:'As used in the passage, "concise" most nearly means:',opts:['brief and clear','loud and forceful','detailed and thorough','difficult to understand'],ans:0,exp:'<strong>Concise</strong> means brief and to the point. The coach\'s three-word instruction shows the meaning — short but complete.'},
  {diff:'easy',passage:'The puppy was <u>timid</u> at first, hiding behind the couch whenever a stranger entered the room.',word:'timid',stem:'As used in the passage, "timid" most nearly means:',opts:['playful and energetic','shy and easily frightened','large and aggressive','curious and bold'],ans:1,exp:'<strong>Timid</strong> means shy or easily frightened. The clue is the puppy hiding from strangers — a sign of fearfulness.'},
  {diff:'easy',passage:'After the storm, the community came together to <u>restore</u> the damaged park, planting new trees and repainting the benches.',word:'restore',stem:'As used in the passage, "restore" most nearly means:',opts:['destroy completely','abandon permanently','bring back to its original condition','build for the first time'],ans:2,exp:'<strong>Restore</strong> means to bring something back to its original or good condition. The clues are "repainting" and "planting new trees" after damage — fixing what was broken.'},
  {diff:'easy',passage:'The scientist\'s discovery was so <u>significant</u> that it changed how researchers understood the entire field.',word:'significant',stem:'As used in the passage, "significant" most nearly means:',opts:['minor and unimportant','strange and unusual','important and meaningful','complicated and confusing'],ans:2,exp:'<strong>Significant</strong> means important or meaningful. The clue is that it "changed how researchers understood the entire field" — a major impact.'},
  {diff:'easy',passage:'The toddler was very <u>inquisitive</u>, pointing at everything and asking "why?" at least a hundred times a day.',word:'inquisitive',stem:'As used in the passage, "inquisitive" most nearly means:',opts:['stubborn and defiant','eager to learn and question','easily frightened','unusually quiet'],ans:1,exp:'<strong>Inquisitive</strong> means curious and eager to learn. The context clue is the child constantly asking "why?" — a sign of curiosity.'},
  {diff:'easy',passage:'The museum exhibit was so <u>captivating</u> that visitors lost track of time and stayed for hours.',word:'captivating',stem:'As used in the passage, "captivating" most nearly means:',opts:['boring and dull','very expensive','so interesting it holds attention','extremely crowded'],ans:2,exp:'<strong>Captivating</strong> means holding someone\'s attention completely. The clue is that visitors "lost track of time" — they were so engaged they forgot to leave.'},

  // ── Medium (9-10) ──
  {diff:'medium',passage:'The politician\'s speech was <u>eloquent</u>, weaving statistics and personal anecdotes into an argument that moved even her opponents.',word:'eloquent',stem:'As used in the passage, "eloquent" most nearly means:',opts:['extremely long','clearly and persuasively expressed','factually inaccurate','delivered in a loud voice'],ans:1,exp:'<strong>Eloquent</strong> means fluent, persuasive, and well-expressed. The passage notes it moved even opponents — a sign of compelling, well-crafted expression.'},
  {diff:'medium',passage:'Despite his <u>trepidation</u>, Marcus stepped onto the stage and began his first public speech.',word:'trepidation',stem:'As used in the passage, "trepidation" most nearly means:',opts:['overwhelming confidence','intense preparation','nervous fear','sudden excitement'],ans:2,exp:'<strong>Trepidation</strong> means nervous apprehension or fear. The contrast word "despite" signals that he had to overcome some internal obstacle — his fear of performing.'},
  {diff:'medium',passage:'The new policy was met with <u>ambivalence</u> by the staff — some welcomed the changes, while others worried about the disruption.',word:'ambivalence',stem:'As used in the passage, "ambivalence" most nearly means:',opts:['strong opposition','unanimous support','mixed or conflicting feelings','complete indifference'],ans:2,exp:'<strong>Ambivalence</strong> means having mixed or contradictory feelings. The passage directly illustrates this: some welcomed the change, others worried — two opposite reactions.'},
  {diff:'medium',passage:'The company\'s financial troubles were <u>exacerbated</u> by the unexpected rise in raw material costs.',word:'exacerbated',stem:'As used in the passage, "exacerbated" most nearly means:',opts:['solved by','made worse by','caused by','reduced by'],ans:1,exp:'<strong>Exacerbated</strong> means made worse. The company already had financial troubles; the rising costs made those troubles even more severe.'},
  {diff:'medium',passage:'Her <u>candid</u> assessment of the project surprised the team, who had expected a more diplomatic response.',word:'candid',stem:'As used in the passage, "candid" most nearly means:',opts:['overly critical and harsh','honest and direct','carefully planned','unnecessarily complex'],ans:1,exp:'<strong>Candid</strong> means honest and straightforward. The contrast with "more diplomatic" shows that her response was direct and unfiltered — the opposite of careful diplomacy.'},
  {diff:'medium',passage:'The author\'s prose was <u>labyrinthine</u>, full of long digressions and subordinate clauses that made the reader lose the thread.',word:'labyrinthine',stem:'As used in the passage, "labyrinthine" most nearly means:',opts:['beautifully poetic','extremely short','complicated and maze-like','written in a foreign language'],ans:2,exp:'<strong>Labyrinthine</strong> refers to something like a labyrinth — complex and confusing, easy to get lost in. The clues are "long digressions" and readers losing the thread.'},
  {diff:'medium',passage:'The activist remained <u>steadfast</u> in her beliefs despite years of criticism and public ridicule.',word:'steadfast',stem:'As used in the passage, "steadfast" most nearly means:',opts:['privately uncertain','firm and unwavering','gradually changing','publicly outspoken'],ans:1,exp:'<strong>Steadfast</strong> means firmly committed, not changing despite pressure. The key phrase is "despite years of criticism" — she didn\'t waver.'},
  {diff:'medium',passage:'The professor\'s tone was deliberately <u>sardonic</u>, mocking the popular belief with thinly veiled contempt.',word:'sardonic',stem:'As used in the passage, "sardonic" most nearly means:',opts:['enthusiastic and supportive','sincerely curious','grimly mocking or scornful','calm and academic'],ans:2,exp:'<strong>Sardonic</strong> means grimly mocking or cynically scornful. The clues are "mocking" and "thinly veiled contempt" — the professor is dismissing the belief with scorn.'},

  // ── Hard (SAT/AP) ──
  {diff:'hard',passage:'The committee\'s recommendations were largely <u>perfunctory</u>, offering routine suggestions rather than the bold structural reforms the crisis demanded.',word:'perfunctory',stem:'As used in the passage, "perfunctory" most nearly means:',opts:['unnecessarily harsh','done as routine with little care or thought','carefully considered','deliberately controversial'],ans:1,exp:'<strong>Perfunctory</strong> means carried out with a minimum of effort — going through the motions. The contrast with "bold structural reforms" shows these recommendations were shallow and routine.'},
  {diff:'hard',passage:'The biographer was careful to <u>contextualize</u> the subject\'s failures within the broader social constraints of the era.',word:'contextualize',stem:'As used in the passage, "contextualize" most nearly means:',opts:['exaggerate the significance of','place within a broader framework to aid understanding','minimize or dismiss','critically evaluate'],ans:1,exp:'<strong>Contextualize</strong> means to place something within its broader context — the surrounding circumstances that help explain it. The biographer understood the failures better by considering the era.'},
  {diff:'hard',passage:'Critics noted that the novel\'s satirical tone was often <u>mordant</u>, its humor leaving readers unsettled rather than simply amused.',word:'mordant',stem:'As used in the passage, "mordant" most nearly means:',opts:['broadly comic and lighthearted','biting and sharply critical','overly sentimental','politically cautious'],ans:1,exp:'<strong>Mordant</strong> means biting, sharp, or caustic in a way that\'s more cutting than funny. The clue is that readers felt "unsettled rather than simply amused" — the humor had a dark, sharp edge.'},
  {diff:'hard',passage:'The journalist\'s account was notable for its <u>verisimilitude</u>, capturing not just the events but the textures and sensory details of the moment.',word:'verisimilitude',stem:'As used in the passage, "verisimilitude" most nearly means:',opts:['extensive length','the appearance of being true or real','political neutrality','reliance on anonymous sources'],ans:1,exp:'<strong>Verisimilitude</strong> means the quality of seeming true or real. Capturing "textures and sensory details" is exactly what creates this lifelike quality in writing.'},
  {diff:'hard',passage:'The philosopher argued that human freedom was fundamentally <u>circumscribed</u> by the social, linguistic, and historical conditions into which one is born.',word:'circumscribed',stem:'As used in the passage, "circumscribed" most nearly means:',opts:['expanded and enriched','completely eliminated','limited or confined within boundaries','elevated to new heights'],ans:2,exp:'<strong>Circumscribed</strong> means restricted or confined within limits. The philosopher is arguing that the conditions of our birth draw a circle around what we can freely choose — they limit our freedom.'},
  {diff:'hard',passage:'The administration\'s response to the crisis was widely criticized as <u>dilatory</u>, with meaningful action delayed for months while the situation deteriorated.',word:'dilatory',stem:'As used in the passage, "dilatory" most nearly means:',opts:['overly aggressive','intended to cause delay','transparently dishonest','poorly communicated'],ans:1,exp:'<strong>Dilatory</strong> means causing or intending to cause delay. The clue is "action delayed for months while the situation deteriorated" — the slow response made things worse.'},
  {diff:'hard',passage:'Her writing demonstrated a <u>pellucid</u> understanding of the theory, translating abstract ideas into language any reader could grasp.',word:'pellucid',stem:'As used in the passage, "pellucid" most nearly means:',opts:['deeply controversial','transparently clear','deceptively simple','highly technical'],ans:1,exp:'<strong>Pellucid</strong> means transparently clear, easy to understand. The evidence: abstract ideas became accessible to any reader — perfectly clear expression.'},
  {diff:'hard',passage:'The treaty was seen as a <u>palliative</u> measure — addressing the symptoms of the conflict without resolving its underlying causes.',word:'palliative',stem:'As used in the passage, "palliative" most nearly means:',opts:['permanently resolving','making worse','providing temporary relief without curing','unnecessarily complex'],ans:2,exp:'<strong>Palliative</strong> means providing temporary relief without addressing the root cause — like a painkiller that treats symptoms but not the disease. The passage makes this explicit: symptoms addressed, causes unresolved.'},
];

let selDiff = 'all', sessionLen = 10;
let queue = [], idx = 0, score = 0, streak = 0, bestStreak = 0, answered = false;

document.querySelectorAll('#diffGroup .chip').forEach(c=>c.addEventListener('click',function(){
  document.querySelectorAll('#diffGroup .chip').forEach(x=>x.classList.remove('active'));
  this.classList.add('active'); selDiff=this.dataset.val;
}));
document.querySelectorAll('#lenGroup .chip').forEach(c=>c.addEventListener('click',function(){
  document.querySelectorAll('#lenGroup .chip').forEach(x=>x.classList.remove('active'));
  this.classList.add('active'); sessionLen=this.dataset.val==='all'?999:parseInt(this.dataset.val);
}));

function startSession(){
  let pool = selDiff==='all' ? QUESTIONS : QUESTIONS.filter(q=>q.diff===selDiff);
  // Shuffle
  pool = pool.sort(()=>Math.random()-.5);
  queue = pool.slice(0, Math.min(sessionLen, pool.length));
  idx=0; score=0; streak=0; bestStreak=0; answered=false;
  document.getElementById('setupCard').style.display='none';
  document.getElementById('resultsCard').style.display='none';
  document.getElementById('practiceArea').style.display='';
  showQ();
}

function showQ(){
  if(idx >= queue.length){ showResults(); return; }
  const q = queue[idx];
  answered = false;
  document.getElementById('qMeta').innerHTML =
    `Question ${idx+1} of ${queue.length} <span class="diff-badge diff-${q.diff}">${q.diff==='elem'?'Gr K–5':q.diff==='easy'?'Gr 6–8':q.diff==='medium'?'Gr 9–10':'SAT/AP'}</span>`;
  document.getElementById('qPassage').innerHTML = q.passage;
  document.getElementById('qStem').textContent = q.stem;
  document.getElementById('qExp').style.display='none';
  document.getElementById('nextBtnWrap').style.display='none';
  document.getElementById('qOptions').innerHTML = q.opts.map((o,i)=>`
    <div class="option" id="opt${i}" onclick="answer(${i})">
      <span class="opt-letter">${String.fromCharCode(65+i)}</span>
      <span>${o}</span>
    </div>`).join('');
  updateProg();
}

function answer(chosen){
  if(answered) return;
  answered = true;
  const q = queue[idx];
  const opts = document.querySelectorAll('.option');
  opts.forEach(o=>o.classList.add('locked'));
  opts.forEach((o,i)=>{
    if(i===q.ans) o.classList.add(chosen===q.ans?'correct':'revealed');
    else if(i===chosen) o.classList.add('wrong');
  });
  document.getElementById('qExp').innerHTML = q.exp;
  document.getElementById('qExp').style.display='';
  if(chosen===q.ans){
    score++; streak++;
    if(streak>bestStreak) bestStreak=streak;
  } else {
    streak=0;
  }
  document.getElementById('liveScore').textContent=score;
  document.getElementById('nextBtnWrap').style.display='';
}

function nextQ(){ idx++; showQ(); }
function skipQ(){ idx++; showQ(); }

function updateProg(){
  const pct = queue.length ? idx/queue.length*100 : 0;
  document.getElementById('progFill').style.width=pct+'%';
  document.getElementById('progLabel').textContent=`${idx} / ${queue.length}`;
}

function showResults(){
  document.getElementById('practiceArea').style.display='none';
  document.getElementById('resultsCard').style.display='';
  document.getElementById('finalScore').textContent=`${score}/${queue.length}`;
  document.getElementById('resPct').textContent=Math.round(score/queue.length*100)+'%';
  document.getElementById('resCorrect').textContent=score;
  document.getElementById('resStreak').textContent=bestStreak;
  // Save
  const hist=JSON.parse(localStorage.getItem('wic-hist')||'[]');
  hist.unshift({score,total:queue.length,diff:selDiff,ts:Date.now()});
  if(hist.length>50)hist.pop();
  localStorage.setItem('wic-hist',JSON.stringify(hist));
}

function showSetup(){
  document.getElementById('resultsCard').style.display='none';
  document.getElementById('setupCard').style.display='';
}
</script>
</body></html>
