<link rel="stylesheet" href="ace-theme.css">
<style>
:root{--bg:#f7f8fa;--card:#fff;--accent:#4f46e5;--accent2:#7c3aed;--text:#ffffff;--muted:#b0bece;--border:#e5e7eb;--green:#059669;--red:#dc2626;--amber:#d97706;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topnav{display:flex;align-items:center;gap:6px;padding:0 20px;height:54px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}.topnav::-webkit-scrollbar{display:none}
.logo{font-size:1.3rem;font-weight:800;color:var(--accent);text-decoration:none;margin-right:10px}.logo span{color:var(--accent2)}
.nav-link{text-decoration:none;color:var(--muted);font-size:.85rem;padding:6px 10px;border-radius:7px;white-space:nowrap}.nav-link:hover{background:var(--bg)}
.nav-link.active{color:var(--accent);font-weight:700}
.spacer{flex:1}

.hero{text-align:center;padding:28px 20px 16px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
.hero h1{font-size:1.7rem;font-weight:800;margin-bottom:4px}
.hero p{opacity:.85;font-size:.9rem}

.layout{display:grid;grid-template-columns:280px 1fr;gap:0;max-width:1200px;margin:0 auto;height:calc(100vh - 140px);min-height:500px}
.sidebar{background:var(--card);border-right:1px solid var(--border);padding:16px;overflow-y:auto;display:flex;flex-direction:column;gap:12px}
.graph-wrap{position:relative;background:#0f172a;overflow:hidden}
canvas{display:block;width:100%;height:100%}

/* Sidebar */
.section-label{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:6px}
.fn-row{display:flex;align-items:center;gap:6px;margin-bottom:6px}
.fn-color{width:18px;height:18px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid rgba(255,255,255,.3)}
.fn-input{flex:1;background:transparent;border:1.5px solid var(--border);border-radius:8px;padding:6px 10px;font-size:.85rem;font-family:'Courier New',monospace;color:var(--text);outline:none;transition:border .15s}
.fn-input:focus{border-color:var(--accent)}
.fn-input.error{border-color:var(--red)}
.fn-del{background:none;border:none;cursor:pointer;color:var(--muted);font-size:1rem;padding:2px 4px;flex-shrink:0}
.fn-del:hover{color:var(--red)}

.btn{padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-weight:700;font-size:.8rem;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.88}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm{padding:5px 10px;font-size:.75rem}

.range-row{display:flex;gap:6px;align-items:center}
.range-inp{width:68px;background:transparent;border:1.5px solid var(--border);border-radius:7px;padding:5px 8px;font-size:.82rem;color:var(--text);text-align:center}
.range-inp:focus{outline:none;border-color:var(--accent)}

/* Presets */
.preset-btn{display:block;width:100%;text-align:left;padding:7px 10px;border-radius:8px;border:1px solid var(--border);background:transparent;cursor:pointer;font-size:.78rem;color:var(--text);margin-bottom:4px;font-family:'Courier New',monospace;transition:all .15s}
.preset-btn:hover{border-color:var(--accent);background:rgba(79,70,229,.05)}

/* Overlay info */
.graph-overlay{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.6);border-radius:8px;padding:8px 12px;font-size:.75rem;color:#94a3b8;pointer-events:none}
.coord-display{position:absolute;bottom:10px;left:10px;background:rgba(0,0,0,.55);border-radius:6px;padding:4px 10px;font-size:.72rem;color:#94a3b8;pointer-events:none;font-family:'Courier New',monospace}
.intersect-list{font-size:.74rem;color:#94a3b8;max-height:80px;overflow-y:auto}
.intersect-pt{color:#fbbf24;font-family:'Courier New',monospace}

/* Error toast */
.err-msg{font-size:.75rem;color:var(--red);margin-top:4px;min-height:16px}

/* Mobile */
@media(max-width:700px){
  .layout{grid-template-columns:1fr;grid-template-rows:auto 340px;height:auto}
  .sidebar{border-right:none;border-bottom:1px solid var(--border)}
}

[data-theme="dark"] .sidebar{background:#1a1d2e;border-color:#2a2d3e}
[data-theme="dark"] .fn-input{border-color:#2a2d3e;color:#e2e8f0}
[data-theme="dark"] .range-inp{border-color:#2a2d3e;color:#e2e8f0}
[data-theme="dark"] .preset-btn{border-color:#2a2d3e;color:#e2e8f0}
[data-theme="dark"] .btn-outline{border-color:#2a2d3e;color:#e2e8f0}
</style>

<div class="hero">
  <h1>📈 Graphing Tool</h1>
  <p>Plot functions, find intersections, zoom and explore</p>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div>
      <div class="section-label">Functions</div>
      <div id="fnList"></div>
      <button class="btn btn-outline btn-sm" onclick="addFunction()" style="width:100%;margin-top:4px">+ Add Function</button>
      <div class="err-msg" id="errMsg"></div>
    </div>

    <div>
      <div class="section-label">Window</div>
      <div class="range-row" style="margin-bottom:6px">
        <span style="font-size:.75rem;color:var(--muted);width:22px">x:</span>
        <input class="range-inp" id="xMin" value="-10" oninput="scheduleRedraw()">
        <span style="font-size:.75rem;color:var(--muted)">to</span>
        <input class="range-inp" id="xMax" value="10" oninput="scheduleRedraw()">
      </div>
      <div class="range-row" style="margin-bottom:10px">
        <span style="font-size:.75rem;color:var(--muted);width:22px">y:</span>
        <input class="range-inp" id="yMin" value="-10" oninput="scheduleRedraw()">
        <span style="font-size:.75rem;color:var(--muted)">to</span>
        <input class="range-inp" id="yMax" value="10" oninput="scheduleRedraw()">
      </div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-outline btn-sm" onclick="resetView()">Reset View</button>
        <button class="btn btn-outline btn-sm" onclick="zoomIn()">Zoom +</button>
        <button class="btn btn-outline btn-sm" onclick="zoomOut()">Zoom −</button>
      </div>
    </div>

    <div>
      <div class="section-label">Quick Presets</div>
      <button class="preset-btn" onclick="loadPreset(['x^2','2*x+1'])">y = x²  &  y = 2x+1</button>
      <button class="preset-btn" onclick="loadPreset(['sin(x)','cos(x)'])">sin(x)  &  cos(x)</button>
      <button class="preset-btn" onclick="loadPreset(['x^3-3*x','3*x^2-3'])">y = x³-3x  &  y′</button>
      <button class="preset-btn" onclick="loadPreset(['1/x'])">y = 1/x</button>
      <button class="preset-btn" onclick="loadPreset(['sqrt(x)','x^(1/3)'])">√x  &  ∛x</button>
      <button class="preset-btn" onclick="loadPreset(['abs(x)'])">y = |x|</button>
      <button class="preset-btn" onclick="loadPreset(['log(x)','exp(x)'])">ln(x)  &  eˣ</button>
      <button class="preset-btn" onclick="loadPreset(['tan(x)'])">y = tan(x)</button>
    </div>

    <div id="intersectPanel" style="display:none">
      <div class="section-label">Intersections</div>
      <div class="intersect-list" id="intersectList"></div>
    </div>

    <div style="font-size:.72rem;color:var(--muted);line-height:1.6;margin-top:4px">
      <strong>Syntax:</strong> x^2, sqrt(x), sin(x), cos(x), tan(x), log(x), exp(x), abs(x), pi, e<br>
      Use * for multiply: 2*x not 2x
    </div>
  </div>

  <!-- Canvas -->
  <div class="graph-wrap" id="graphWrap">
    <canvas id="gc"></canvas>
    <div class="graph-overlay" id="overlayInfo"></div>
    <div class="coord-display" id="coordDisplay" style="display:none"></div>
  </div>
</div>

<script>
const COLORS = ['#6366f1','#f59e0b','#10b981','#ef4444','#06b6d4','#ec4899','#8b5cf6','#84cc16'];
let functions = [{expr:'x^2',color:COLORS[0]},{expr:'sin(x)*2',color:COLORS[1]}];
let dragging=false, dragStart={x:0,y:0}, panStart={xMin:0,xMax:0,yMin:0,yMax:0};

const canvas = document.getElementById('gc');
const ctx = canvas.getContext('2d');

// ── Math parser ──────────────────────────────────────────
function safeEval(expr, x) {
  try {
    const fn = new Function('x','pi','e','sin','cos','tan','log','exp','sqrt','abs','pow',
      '"use strict"; return (' + expr + ');'
    );
    const v = fn(x, Math.PI, Math.E, Math.sin, Math.cos, Math.tan, Math.log, Math.exp, Math.sqrt, Math.abs, Math.pow);
    return isFinite(v) ? v : null;
  } catch(e){ return null; }
}

// Preprocess: convert ^ to ** but only for power expressions
function preprocessExpr(e) {
  return e
    .replace(/\^/g,'**')
    .replace(/(\d)(x)/g,'$1*$2')  // 2x → 2*x
    .replace(/\)(x|\()/g,')*$1'); // )(x → )*(x
}

// ── Render functions list ────────────────────────────────
function renderFnList() {
  const list = document.getElementById('fnList');
  list.innerHTML = functions.map((f,i)=>`
    <div class="fn-row">
      <div class="fn-color" style="background:${f.color}" title="Color ${i+1}"></div>
      <input class="fn-input" id="fn${i}" value="${f.expr}" placeholder="e.g. x^2"
        oninput="updateFn(${i},this.value)" onkeydown="if(event.key==='Enter')redraw()">
      ${functions.length>1?`<button class="fn-del" onclick="removeFn(${i})" title="Remove">✕</button>`:''}
    </div>`).join('');
}

function addFunction() {
  if(functions.length>=8) return;
  functions.push({expr:'',color:COLORS[functions.length%COLORS.length]});
  renderFnList();
  document.getElementById('fn'+(functions.length-1)).focus();
}

function removeFn(i) {
  functions.splice(i,1);
  renderFnList(); redraw();
}

function updateFn(i, val) {
  functions[i].expr = val;
  scheduleRedraw();
}

let redrawTimer=null;
function scheduleRedraw(){ clearTimeout(redrawTimer); redrawTimer=setTimeout(redraw,80); }

// ── Coordinate helpers ───────────────────────────────────
function getWindow() {
  return {
    xMin: parseFloat(document.getElementById('xMin').value)||(-10),
    xMax: parseFloat(document.getElementById('xMax').value)||(10),
    yMin: parseFloat(document.getElementById('yMin').value)||(-10),
    yMax: parseFloat(document.getElementById('yMax').value)||(10),
  };
}

function toCanvas(wx, wy, W, H, win) {
  const cx = (wx - win.xMin)/(win.xMax - win.xMin) * W;
  const cy = H - (wy - win.yMin)/(win.yMax - win.yMin) * H;
  return {x:cx, y:cy};
}

function toWorld(cx, cy, W, H, win) {
  const wx = win.xMin + cx/W*(win.xMax-win.xMin);
  const wy = win.yMin + (1-cy/H)*(win.yMax-win.yMin);
  return {x:wx, y:wy};
}

// ── Main draw ────────────────────────────────────────────
function redraw() {
  const wrap = document.getElementById('graphWrap');
  const W = wrap.clientWidth || 600;
  const H = wrap.clientHeight || 500;
  canvas.width = W * devicePixelRatio;
  canvas.height = H * devicePixelRatio;
  canvas.style.width = W+'px';
  canvas.style.height = H+'px';
  ctx.scale(devicePixelRatio, devicePixelRatio);

  const win = getWindow();
  const isDark = document.documentElement.getAttribute('data-theme')==='dark';
  const bg = isDark ? '#0f172a' : '#ffffff';
  const gridColor = isDark ? 'rgba(255,255,255,.06)' : 'rgba(0,0,0,.07)';
  const axisColor = isDark ? 'rgba(255,255,255,.25)' : 'rgba(0,0,0,.3)';
  const labelColor = isDark ? '#b0bece' : '#9ca3af';

  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // Grid
  const xRange = win.xMax - win.xMin;
  const yRange = win.yMax - win.yMin;
  const gridStep = niceStep(Math.max(xRange,yRange)/10);

  ctx.strokeStyle = gridColor;
  ctx.lineWidth = 1;
  for(let gx=Math.ceil(win.xMin/gridStep)*gridStep; gx<=win.xMax; gx+=gridStep) {
    const p = toCanvas(gx,0,W,H,win);
    ctx.beginPath(); ctx.moveTo(p.x,0); ctx.lineTo(p.x,H); ctx.stroke();
  }
  for(let gy=Math.ceil(win.yMin/gridStep)*gridStep; gy<=win.yMax; gy+=gridStep) {
    const p = toCanvas(0,gy,W,H,win);
    ctx.beginPath(); ctx.moveTo(0,p.y); ctx.lineTo(W,p.y); ctx.stroke();
  }

  // Axes
  ctx.strokeStyle = axisColor;
  ctx.lineWidth = 1.5;
  const ox = toCanvas(0,0,W,H,win);
  if(ox.x>=0&&ox.x<=W){ ctx.beginPath();ctx.moveTo(ox.x,0);ctx.lineTo(ox.x,H);ctx.stroke(); }
  if(ox.y>=0&&ox.y<=H){ ctx.beginPath();ctx.moveTo(0,ox.y);ctx.lineTo(W,ox.y);ctx.stroke(); }

  // Axis labels
  ctx.fillStyle = labelColor;
  ctx.font = '10px system-ui';
  ctx.textAlign = 'center';
  for(let gx=Math.ceil(win.xMin/gridStep)*gridStep; gx<=win.xMax; gx+=gridStep) {
    if(Math.abs(gx)<0.0001) continue;
    const p = toCanvas(gx,0,W,H,win);
    const ly = Math.min(Math.max(ox.y+14,14),H-4);
    ctx.fillText(fmt(gx), p.x, ly);
  }
  ctx.textAlign = 'right';
  for(let gy=Math.ceil(win.yMin/gridStep)*gridStep; gy<=win.yMax; gy+=gridStep) {
    if(Math.abs(gy)<0.0001) continue;
    const p = toCanvas(0,gy,W,H,win);
    const lx = Math.min(Math.max(ox.x-6,4),W-4);
    ctx.fillText(fmt(gy), lx, p.y+4);
  }

  // Functions
  const STEPS = Math.max(W*2, 800);
  let errMsg = '';
  let hasError = false;
  functions.forEach((f,fi)=>{
    if(!f.expr.trim()) return;
    const expr = preprocessExpr(f.expr.trim());
    ctx.strokeStyle = f.color;
    ctx.lineWidth = 2.5;
    ctx.lineJoin = 'round';
    ctx.beginPath();
    let started=false, lastY=null;
    let funcErr=false;
    for(let i=0;i<=STEPS;i++){
      const wx = win.xMin + i/STEPS*(win.xMax-win.xMin);
      const wy = safeEval(expr, wx);
      if(wy===null){started=false;lastY=null;funcErr=true;continue;}
      const py = toCanvas(wx,wy,W,H,win);
      if(!started||lastY===null||(Math.abs(py.y-(lastY||0))>H*2)){ctx.moveTo(py.x,py.y);}
      else{ctx.lineTo(py.x,py.y);}
      started=true;lastY=py.y;
    }
    ctx.stroke();
    if(funcErr&&!functions.some((g,gi)=>gi<fi&&g.expr===f.expr)){
      // only flag if it seems broken, not just discontinuous
      const testVals=[0,1,-1,0.5];
      const allNull=testVals.every(v=>safeEval(expr,v)===null);
      if(allNull){hasError=true;if(!errMsg)errMsg='Check expression: '+f.expr;}
    }
  });
  document.getElementById('errMsg').textContent = hasError?errMsg:'';
  document.querySelectorAll('.fn-input').forEach((el,i)=>{
    const expr=preprocessExpr(el.value.trim());
    const testVals=[0,1,-1];
    const allNull=testVals.every(v=>safeEval(expr,v)===null);
    el.classList.toggle('error',!!el.value&&allNull);
  });

  // Intersections between f0 and f1
  findAndDrawIntersections(W,H,win,STEPS);

  // Overlay
  document.getElementById('overlayInfo').innerHTML=functions.filter(f=>f.expr).map((f,i)=>`
    <span style="color:${f.color}">●</span> y = ${f.expr}<br>`).join('');
}

function findAndDrawIntersections(W,H,win,STEPS){
  if(functions.filter(f=>f.expr.trim()).length<2){document.getElementById('intersectPanel').style.display='none';return;}
  const f0=preprocessExpr(functions[0].expr.trim());
  const f1=preprocessExpr(functions[1].expr.trim());
  if(!f0||!f1){document.getElementById('intersectPanel').style.display='none';return;}
  const pts=[];
  let prev=null;
  for(let i=0;i<=STEPS*2;i++){
    const wx=win.xMin+i/(STEPS*2)*(win.xMax-win.xMin);
    const y0=safeEval(f0,wx), y1=safeEval(f1,wx);
    if(y0===null||y1===null){prev=null;continue;}
    const diff=y0-y1;
    if(prev!==null&&prev.diff*diff<0){
      // Sign change — bisect
      let lo=prev.x,hi=wx;
      for(let b=0;b<30;b++){
        const mid=(lo+hi)/2;
        const d=(safeEval(f0,mid)||0)-(safeEval(f1,mid)||0);
        if(Math.abs(d)<1e-10)break;
        if(prev.diff*d<0)hi=mid;else lo=mid;
      }
      const ix=(lo+hi)/2, iy=safeEval(f0,ix)||0;
      if(pts.every(p=>Math.abs(p.x-ix)>0.01)){
        pts.push({x:ix,y:iy});
      }
    }
    prev={x:wx,diff};
  }
  // Draw intersection dots
  const win2=getWindow();
  pts.forEach(pt=>{
    const cp=toCanvas(pt.x,pt.y,W,H,win2);
    ctx.beginPath();
    ctx.arc(cp.x,cp.y,5,0,Math.PI*2);
    ctx.fillStyle='#fbbf24';
    ctx.fill();
    ctx.strokeStyle='#fff';
    ctx.lineWidth=1.5;
    ctx.stroke();
  });
  if(pts.length){
    document.getElementById('intersectPanel').style.display='';
    document.getElementById('intersectList').innerHTML=pts.slice(0,8).map(p=>`<span class="intersect-pt">(${p.x.toFixed(3)}, ${p.y.toFixed(3)})</span><br>`).join('');
  } else {
    document.getElementById('intersectPanel').style.display='none';
  }
}

function niceStep(raw){
  const p=Math.pow(10,Math.floor(Math.log10(raw)));
  const f=raw/p;
  if(f<1.5)return p;
  if(f<3.5)return 2*p;
  if(f<7.5)return 5*p;
  return 10*p;
}
function fmt(n){
  if(Number.isInteger(n)) return n.toString();
  return parseFloat(n.toPrecision(3)).toString();
}

// ── Zoom / Pan ───────────────────────────────────────────
function resetView(){
  document.getElementById('xMin').value=-10;document.getElementById('xMax').value=10;
  document.getElementById('yMin').value=-10;document.getElementById('yMax').value=10;
  redraw();
}
function zoomIn(factor=0.7){scaleView(factor);}
function zoomOut(factor=1.4){scaleView(factor);}
function scaleView(f){
  const win=getWindow();
  const cx=(win.xMin+win.xMax)/2, cy=(win.yMin+win.yMax)/2;
  const hw=(win.xMax-win.xMin)/2*f, hh=(win.yMax-win.yMin)/2*f;
  document.getElementById('xMin').value=(cx-hw).toFixed(2);
  document.getElementById('xMax').value=(cx+hw).toFixed(2);
  document.getElementById('yMin').value=(cy-hh).toFixed(2);
  document.getElementById('yMax').value=(cy+hh).toFixed(2);
  redraw();
}

// Mouse wheel zoom
document.getElementById('graphWrap').addEventListener('wheel',function(e){
  e.preventDefault();
  zoomIn(e.deltaY>0?1.15:0.87);
},{passive:false});

// Mouse pan
document.getElementById('graphWrap').addEventListener('mousedown',function(e){
  if(e.button!==0)return;
  dragging=true;
  const W=this.clientWidth,H=this.clientHeight;
  dragStart={x:e.clientX,y:e.clientY};
  panStart=getWindow();
});
window.addEventListener('mousemove',function(e){
  const wrap=document.getElementById('graphWrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  const win=getWindow();
  const cp=wrap.getBoundingClientRect();
  const wx=toWorld(e.clientX-cp.left,e.clientY-cp.top,W,H,win);
  document.getElementById('coordDisplay').style.display='';
  document.getElementById('coordDisplay').textContent=`x = ${wx.x.toFixed(3)}, y = ${wx.y.toFixed(3)}`;
  if(!dragging)return;
  const dx=e.clientX-dragStart.x, dy=e.clientY-dragStart.y;
  const xRange=panStart.xMax-panStart.xMin, yRange=panStart.yMax-panStart.yMin;
  const dxW=-dx/W*xRange, dyW=dy/H*yRange;
  document.getElementById('xMin').value=(panStart.xMin+dxW).toFixed(3);
  document.getElementById('xMax').value=(panStart.xMax+dxW).toFixed(3);
  document.getElementById('yMin').value=(panStart.yMin+dyW).toFixed(3);
  document.getElementById('yMax').value=(panStart.yMax+dyW).toFixed(3);
  scheduleRedraw();
});
window.addEventListener('mouseup',function(){dragging=false;});
document.getElementById('graphWrap').addEventListener('mouseleave',function(){
  document.getElementById('coordDisplay').style.display='none';
});

// Touch pan/zoom
let touches={}, lastDist=null;
document.getElementById('graphWrap').addEventListener('touchstart',function(e){
  e.preventDefault();
  if(e.touches.length===1){
    dragging=true;
    dragStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
    panStart=getWindow();
  }
  if(e.touches.length===2){lastDist=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);}
},{passive:false});
document.getElementById('graphWrap').addEventListener('touchmove',function(e){
  e.preventDefault();
  const wrap=this;
  const W=wrap.clientWidth,H=wrap.clientHeight;
  if(e.touches.length===1&&dragging){
    const dx=e.touches[0].clientX-dragStart.x, dy=e.touches[0].clientY-dragStart.y;
    const xRange=panStart.xMax-panStart.xMin, yRange=panStart.yMax-panStart.yMin;
    const dxW=-dx/W*xRange, dyW=dy/H*yRange;
    document.getElementById('xMin').value=(panStart.xMin+dxW).toFixed(3);
    document.getElementById('xMax').value=(panStart.xMax+dxW).toFixed(3);
    document.getElementById('yMin').value=(panStart.yMin+dyW).toFixed(3);
    document.getElementById('yMax').value=(panStart.yMax+dyW).toFixed(3);
    scheduleRedraw();
  }
  if(e.touches.length===2&&lastDist!==null){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    zoomIn(lastDist/d);
    lastDist=d;
  }
},{passive:false});
document.getElementById('graphWrap').addEventListener('touchend',function(){dragging=false;lastDist=null;});

function loadPreset(exprs){
  functions=exprs.map((e,i)=>({expr:e,color:COLORS[i%COLORS.length]}));
  renderFnList();
  resetView();
}

// Init
renderFnList();
window.addEventListener('resize', ()=>{redraw();});
redraw();
</script>
</body></html>
