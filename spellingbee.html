<!DOCTYPE html>

<title>Spelling Bee Trainer — aceAcademy</title>
<link rel="stylesheet" href="ace-theme.css">
<style>
:root{--bg:#0b1120;--card:#1a2540;--accent:#6366f1;--accent2:#a5b4fc;--text:#ffffff;--muted:#b0bece;--border:#2a3a55;--green:#34d399;--red:#f87171;--amber:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
.topnav{display:flex;align-items:center;gap:6px;padding:0 20px;height:54px;background:#080e1c;border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto}.topnav::-webkit-scrollbar{display:none}
.logo{font-size:1.3rem;font-weight:800;color:#fff;text-decoration:none;margin-right:10px}.logo span{color:var(--accent2)}
.nav-link{text-decoration:none;color:var(--muted);font-size:.85rem;padding:6px 10px;border-radius:7px;white-space:nowrap;font-weight:600}.nav-link:hover{background:rgba(255,255,255,.07);color:#fff}.nav-link.active{color:var(--accent2)}
.spacer{flex:1}
.hero{text-align:center;padding:32px 20px 18px;background:linear-gradient(135deg,#06091a,#1a2080,#2d0d5c);border-bottom:1px solid var(--border)}
.hero h1{font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:6px}
.hero p{color:var(--accent2);font-size:.95rem}
.container{max-width:820px;margin:24px auto;padding:0 20px}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;margin-bottom:20px}
.card h2{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:14px}
.btn{padding:9px 20px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:.85rem;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.88}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:#fff}.btn-outline:hover{border-color:var(--accent)}
.btn-big{padding:12px 28px;font-size:.95rem;border-radius:12px}
.grade-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px}
.grade-card{background:#111827;border:1.5px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:.15s;text-align:center}
.grade-card:hover{border-color:var(--accent)}
.grade-card.active{border-color:var(--accent);background:rgba(99,102,241,.12)}
.grade-icon{font-size:1.6rem;margin-bottom:6px}
.grade-name{font-size:.9rem;font-weight:700;color:#fff}
.grade-count{font-size:.72rem;color:var(--muted);margin-top:2px}
.mode-row{display:flex;gap:8px;margin-bottom:16px}
.mode-btn{flex:1;padding:10px;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-weight:700;font-size:.85rem;cursor:pointer}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.study-card{background:#111827;border:1.5px solid var(--border);border-radius:16px;padding:28px;text-align:center;margin-bottom:14px}
.study-word{font-size:1.6rem;font-weight:800;color:#fff;margin-bottom:10px}
.study-def{font-size:.95rem;color:var(--accent2);margin-bottom:8px;line-height:1.5}
.study-sentence{font-size:.88rem;color:var(--muted);font-style:italic}
.study-nav{display:flex;gap:10px;justify-content:center;margin-top:14px}
.progress-line{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:10px}
.quiz-card{background:#111827;border:1.5px solid var(--border);border-radius:16px;padding:24px;text-align:center}
.quiz-def{font-size:1rem;color:#fff;font-weight:600;margin-bottom:10px;line-height:1.6}
.quiz-sentence{font-size:.9rem;color:var(--muted);font-style:italic;margin-bottom:18px}
.spell-input{width:260px;max-width:80%;padding:12px;border-radius:10px;border:2px solid var(--border);background:#0d1628;color:#fff;font-size:1.15rem;font-weight:700;text-align:center;outline:none}
.spell-input:focus{border-color:var(--accent)}
.spell-input.correct{border-color:var(--green);background:rgba(52,211,153,.12)}
.spell-input.wrong{border-color:var(--red);background:rgba(248,113,113,.12)}
.feedback{margin-top:14px;font-size:.95rem;font-weight:700;min-height:24px}
.feedback.ok{color:var(--green)}
.feedback.err{color:var(--red)}
.score-display{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:10px}
.result-big{font-size:2.8rem;font-weight:900;text-align:center;color:var(--accent2);margin:6px 0}
.missed-list{background:#111827;border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:14px;text-align:left}
.missed-item{font-size:.85rem;padding:6px 0;border-bottom:1px solid var(--border)}
.missed-item:last-child{border-bottom:none}
</style>

<div class="hero">
  <h1>🐝 Spelling Bee Trainer</h1>
  <p>Grade-leveled word lists from K through 8. Study the words, then type them from their definition — just like a real spelling bee.</p>
</div>

    <div class="mode-row">
      <button class="mode-btn active" id="modeStudy" onclick="setMode('study')">📖 Study</button>
      <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">🐝 Spelling Quiz</button>
    </div>

    <div id="studyArea">
      <div class="progress-line" id="studyProgress"></div>
      <div class="study-card">
        <div class="study-word" id="studyWord"></div>
        <div class="study-def" id="studyDef"></div>
        <div class="study-sentence" id="studySentence"></div>
      </div>
      <div class="study-nav">
        <button class="btn btn-outline" onclick="prevWord()">← Prev</button>
        <button class="btn btn-primary" onclick="nextWord()">Next →</button>
      </div>
    </div>

    <div id="quizArea" style="display:none">
      <div class="score-display" id="quizProgress"></div>
      <div id="quizQCard"></div>
      <div id="quizResult" style="display:none">
        <div class="result-big" id="quizFinalScore"></div>
        <div style="text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:10px" id="quizMsg"></div>
        <div id="missedWords"></div>
        <div style="text-align:center;margin-top:14px"><button class="btn btn-primary btn-big" onclick="startQuiz()">Retake Quiz</button></div>
      </div>
    </div>
  </div>

</div>

const gradeKeys = Object.keys(WORDS);
let currentGrade = null, mode = 'study', wordIdx = 0;
let quizQ = [], quizIdx = 0, quizScore = 0, missed = [];

function renderGradeGrid(){
  document.getElementById('gradeGrid').innerHTML = gradeKeys.map(k => {
    const g = WORDS[k];
    return `<div class="grade-card${k===currentGrade?' active':''}" onclick="selectGrade('${k}')">
      <div class="grade-icon">${g.icon}</div>
      <div class="grade-name">${g.label}</div>
      <div class="grade-count">${g.words.length} words</div>
    </div>`;
  }).join('');
}
function selectGrade(k){
  currentGrade = k; wordIdx = 0;
  renderGradeGrid();
  document.getElementById('studyCard').style.display = 'block';
  setMode(mode);
}
function setMode(m){
  mode = m;
  document.getElementById('modeStudy').classList.toggle('active', m==='study');
  document.getElementById('modeQuiz').classList.toggle('active', m==='quiz');
  document.getElementById('studyArea').style.display = m==='study' ? 'block' : 'none';
  document.getElementById('quizArea').style.display = m==='quiz' ? 'block' : 'none';
  if(m==='study') renderStudy(); else startQuiz();
}
function renderStudy(){
  const words = WORDS[currentGrade].words;
  const [w,def,sent] = words[wordIdx];
  document.getElementById('studyProgress').textContent = `Word ${wordIdx+1} of ${words.length}`;
  document.getElementById('studyWord').textContent = w;
  document.getElementById('studyDef').textContent = def;
  document.getElementById('studySentence').textContent = sent.replace('___', w);
}
function nextWord(){ const words = WORDS[currentGrade].words; wordIdx = (wordIdx+1) % words.length; renderStudy(); }
function prevWord(){ const words = WORDS[currentGrade].words; wordIdx = (wordIdx-1+words.length) % words.length; renderStudy(); }

function shuffle(arr){
  for(let i=arr.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}
function startQuiz(){
  const words = WORDS[currentGrade].words;
  quizQ = shuffle(words.slice()).slice(0, Math.min(10, words.length));
  quizIdx = 0; quizScore = 0; missed = [];
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizQCard').style.display = 'block';
  renderQuiz();
}
function renderQuiz(){
  const [w,def,sent] = quizQ[quizIdx];
  document.getElementById('quizProgress').textContent = `Word ${quizIdx+1} of ${quizQ.length} · Score: ${quizScore}`;
  document.getElementById('quizQCard').innerHTML = `
    <div class="quiz-card">
      <div class="quiz-def">${def}</div>
      <div class="quiz-sentence">${sent.replace('___','_____')}</div>
      <input type="text" class="spell-input" id="spellInput" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkSpelling()">
      <div class="feedback" id="spellFeedback"></div>
      <div style="margin-top:14px"><button class="btn btn-primary" onclick="checkSpelling()">Check Spelling</button></div>
    </div>`;
  document.getElementById('spellInput').focus();
}
function checkSpelling(){
  const [w] = quizQ[quizIdx];
  const input = document.getElementById('spellInput');
  const val = input.value.trim();
  if(!val) return;
  const ok = val.toLowerCase() === w.toLowerCase();
  const fb = document.getElementById('spellFeedback');
  if(ok){
    input.classList.add('correct');
    fb.className = 'feedback ok';
    fb.textContent = '✅ Correct!';
    quizScore++;
  } else {
    input.classList.add('wrong');
    fb.className = 'feedback err';
    fb.textContent = `✗ The correct spelling is: ${w}`;
    missed.push(w);
  }
  input.disabled = true;
  setTimeout(() => {
    quizIdx++;
    if(quizIdx >= quizQ.length) endQuiz(); else renderQuiz();
  }, 1100);
}
function endQuiz(){
  document.getElementById('quizQCard').style.display = 'none';
  document.getElementById('quizResult').style.display = 'block';
  const pct = Math.round(quizScore/quizQ.length*100);
  document.getElementById('quizFinalScore').textContent = `${quizScore}/${quizQ.length}`;
  document.getElementById('quizMsg').textContent = pct>=90 ? "Spelling bee champion! Excellent work." :
    pct>=70 ? "Great job — review the ones you missed." :
    pct>=50 ? "Good effort. A bit more practice will help." :
    "Keep practicing these words — you'll get there.";
  const missedDiv = document.getElementById('missedWords');
  if(missed.length){
    missedDiv.innerHTML = `<div class="missed-list"><strong style="font-size:.85rem">Words to review:</strong>${missed.map(w=>`<div class="missed-item">${w}</div>`).join('')}</div>`;
  } else {
    missedDiv.innerHTML = '';
  }
}
