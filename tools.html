<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Science & Math Tools — Ace Academy</title>
<style>
:root{--bg:#0b1120;--card:#1a2540;--accent:#6366f1;--accent2:#a5b4fc;--text:#ffffff;--muted:#b0bece;--border:#2a3a55}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;flex-wrap:wrap}
.top-bar a{color:var(--accent2);text-decoration:none;font-size:.85rem}
.top-bar h1{font-size:1rem;font-weight:700}
.tab-row{display:flex;gap:0;overflow-x:auto;flex-shrink:0;background:var(--card);border-bottom:1px solid var(--border);padding:0 12px;scrollbar-width:none}
.tab-row::-webkit-scrollbar{display:none}
.tab{padding:10px 16px;cursor:pointer;font-size:.8rem;font-weight:600;color:var(--muted);border-bottom:2px solid transparent;white-space:nowrap;transition:.12s;flex-shrink:0}
.tab:hover{color:var(--text)}
.tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.frame-area{flex:1;position:relative;overflow:hidden}
iframe.tool-frame{position:absolute;inset:0;width:100%;height:100%;border:none;display:none}
iframe.tool-frame.active{display:block}
/* Loading state */
.frame-loading{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:var(--muted);font-size:.88rem;pointer-events:none}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div class="top-bar">
  <a href="alltools.html">← Tools</a>
  <span style="color:var(--border)">|</span>
  <h1>🔬 Science & Math Tools</h1>
  <span style="margin-left:auto;font-size:.72rem;color:var(--muted)">Click a tab to switch tools</span>
</div>

<div class="tab-row" id="tabRow">
  <div class="tab active" onclick="showTool('graphcalc',this)">📈 Graphing Calculator</div>
  <div class="tab" onclick="showTool('geometrycalc',this)">📐 Geometry Calculator</div>
  <div class="tab" onclick="showTool('trigcalc',this)">📐 Trigonometry Tool</div>
  <div class="tab" onclick="showTool('numtheory',this)">🔢 Number Theory</div>
  <div class="tab" onclick="showTool('statscalc',this)">📊 Statistics Calculator</div>
  <div class="tab" onclick="showTool('equationsolver',this)">🧮 Equation Solver</div>
  <div class="tab" onclick="showTool('periodictable',this)">⚗️ Periodic Table</div>
</div>

<div class="frame-area" id="frameArea">
  <div class="frame-loading" id="loader"><div class="spin"></div><div>Loading tool...</div></div>
  <iframe class="tool-frame active" id="frame-graphcalc" src="graphcalc.html" onload="hideLoader()"></iframe>
  <iframe class="tool-frame" id="frame-geometrycalc" src="about:blank"></iframe>
  <iframe class="tool-frame" id="frame-trigcalc" src="about:blank"></iframe>
  <iframe class="tool-frame" id="frame-numtheory" src="about:blank"></iframe>
  <iframe class="tool-frame" id="frame-statscalc" src="about:blank"></iframe>
  <iframe class="tool-frame" id="frame-equationsolver" src="about:blank"></iframe>
  <iframe class="tool-frame" id="frame-periodictable" src="about:blank"></iframe>
</div>

<script>
const SRCS={
  graphcalc:'graphcalc.html',
  geometrycalc:'geometrycalc.html',
  trigcalc:'trigcalc.html',
  numtheory:'numtheory.html',
  statscalc:'statscalc.html',
  equationsolver:'equationsolver.html',
  periodictable:'periodictable.html'
};
const loaded=new Set(['graphcalc']);

function showTool(id,tabEl){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tabEl.classList.add('active');
  document.querySelectorAll('.tool-frame').forEach(f=>f.classList.remove('active'));
  const frame=document.getElementById('frame-'+id);
  frame.classList.add('active');
  if(!loaded.has(id)){
    document.getElementById('loader').style.display='flex';
    frame.src=SRCS[id];
    frame.onload=hideLoader;
    loaded.add(id);
  }
}

function hideLoader(){
  document.getElementById('loader').style.display='none';
}
</script>
</body>
</html>
