<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Unit Converter вЂ” Ace Academy</title>
<link rel="stylesheet" href="ace-theme.css"/>
<style>
:root{--bg:#0b1120;--card:#1a2540;--accent:#6366f1;--accent2:#a5b4fc;--text:#ffffff;--muted:#b0bece;--border:#2a3a55}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px}
.top-bar a{color:var(--accent2);text-decoration:none;font-size:.9rem}
.top-bar h1{font-size:1.1rem;font-weight:700}
.container{max-width:860px;margin:0 auto;padding:24px 16px}
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:24px;margin-bottom:20px}
label{font-size:.82rem;color:var(--muted);display:block;margin-bottom:5px}
input,select{background:#0d1728;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:10px 14px;font-size:.95rem;width:100%}
input:focus,select:focus{outline:none;border-color:var(--accent)}
.row3{display:grid;grid-template-columns:1fr auto 1fr;gap:14px;align-items:end;margin-bottom:20px}
.swap-btn{background:var(--card);border:1px solid var(--border);border-radius:50%;width:42px;height:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.1rem;color:var(--accent2);flex-shrink:0;transition:.15s}
.swap-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.result-box{background:#0d1728;border-radius:12px;padding:20px;border:1px solid var(--border);margin-bottom:20px}
.result-main{font-size:2rem;font-weight:700;color:var(--accent2);margin-bottom:4px}
.result-label{font-size:.85rem;color:var(--muted)}
.steps{background:#0d1728;border-radius:10px;padding:16px;border-left:3px solid var(--accent)}
.steps h3{font-size:.82rem;font-weight:700;color:var(--accent2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em}
.step{padding:6px 0;font-size:.9rem;border-bottom:1px solid var(--border)}
.step:last-child{border:none;color:var(--accent2);font-weight:700}
.step .label{color:var(--muted);font-size:.8rem}
/* Category tabs */
.cat-grid{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px}
.cat-btn{padding:7px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.82rem;font-weight:600;transition:.15s}
.cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
/* Quick ref table */
.ref-table{width:100%;border-collapse:collapse;font-size:.82rem}
.ref-table th{color:var(--accent2);text-align:left;padding:6px 10px;border-bottom:1px solid var(--border)}
.ref-table td{padding:6px 10px;border-bottom:1px solid var(--border)22;color:var(--muted)}
.ref-table tr:hover td{color:var(--text);background:#0d172855}
</style>
</head>
<body>
<div class="top-bar">
  <a href="alltools.html">в†ђ Tools</a>
  <span style="color:var(--border)">|</span>
  <h1>рџ“ђ Unit Converter</h1>
</div>
<div class="container">
  <div class="cat-grid" id="catGrid"></div>

  <div class="card">
    <div class="row3">
      <div>
        <label>From</label>
        <select id="fromUnit" onchange="convert()"></select>
      </div>
      <button class="swap-btn" onclick="swap()" title="Swap units">в‡„</button>
      <div>
        <label>To</label>
        <select id="toUnit" onchange="convert()"></select>
      </div>
    </div>
    <div>
      <label>Value</label>
      <input id="valIn" type="number" value="1" oninput="convert()"/>
    </div>
  </div>

  <div class="result-box" id="resultBox" style="display:none">
    <div class="result-main" id="resultMain"></div>
    <div class="result-label" id="resultLabel"></div>
  </div>

  <div class="steps" id="stepsBox" style="display:none">
    <h3>Step-by-Step</h3>
    <div id="stepsContent"></div>
  </div>

  <div class="card" style="margin-top:20px">
    <h3 style="font-size:.85rem;font-weight:700;color:var(--accent2);margin-bottom:12px">рџ“‹ Common Conversions</h3>
    <table class="ref-table" id="refTable"></table>
  </div>
</div>

<script>
const CATS = {
  Length:{icon:'рџ“Џ',base:'m',units:{
    'nm':1e-9,'Ојm':1e-6,'mm':0.001,'cm':0.01,'m':1,'km':1000,
    'in':0.0254,'ft':0.3048,'yd':0.9144,'mi':1609.344,'nmi':1852,'ly':9.461e15
  }},
  Mass:{icon:'вљ–пёЏ',base:'kg',units:{
    'mg':1e-6,'g':0.001,'kg':1,'tonne':1000,
    'oz':0.0283495,'lb':0.453592,'ton':907.185,'stone':6.35029
  }},
  Volume:{icon:'рџ§Є',base:'L',units:{
    'mL':0.001,'L':1,'mВі':1000,'cmВі':0.001,
    'tsp':0.00492892,'tbsp':0.0147868,'fl oz':0.0295735,
    'cup':0.236588,'pt':0.473176,'qt':0.946353,'gal':3.78541
  }},
  Temperature:{icon:'рџЊЎпёЏ',special:true,units:['В°C','В°F','K','В°R']},
  Speed:{icon:'рџљЂ',base:'m/s',units:{
    'm/s':1,'km/h':1/3.6,'mph':0.44704,'knots':0.514444,'ft/s':0.3048,'mach':343
  }},
  Pressure:{icon:'рџ’Ё',base:'Pa',units:{
    'Pa':1,'kPa':1000,'MPa':1e6,'bar':1e5,'atm':101325,'mmHg':133.322,'psi':6894.76,'torr':133.322
  }},
  Energy:{icon:'вљЎ',base:'J',units:{
    'J':1,'kJ':1000,'MJ':1e6,'cal':4.184,'kcal':4184,'kWh':3.6e6,'BTU':1055.06,'eV':1.602e-19,'Wh':3600
  }},
  Area:{icon:'рџ”І',base:'mВІ',units:{
    'mmВІ':1e-6,'cmВІ':0.0001,'mВІ':1,'kmВІ':1e6,
    'inВІ':6.4516e-4,'ftВІ':0.0929,'ydВІ':0.8361,'acre':4046.86,'ha':10000,'miВІ':2.59e6
  }},
  Time:{icon:'вЏ±пёЏ',base:'s',units:{
    'ns':1e-9,'Ојs':1e-6,'ms':0.001,'s':1,'min':60,'h':3600,
    'day':86400,'week':604800,'month':2629800,'year':31557600
  }},
  Data:{icon:'рџ’ѕ',base:'bit',units:{
    'bit':1,'byte':8,'KB':8192,'MB':8388608,'GB':8589934592,'TB':8796093022208
  }}
};

const REFS = {
  Length:[['1 in','2.54 cm'],['1 ft','30.48 cm'],['1 mi','1.609 km'],['1 km','0.621 mi'],['1 yd','0.9144 m']],
  Mass:[['1 kg','2.205 lb'],['1 lb','453.6 g'],['1 oz','28.35 g'],['1 tonne','1000 kg'],['1 stone','6.35 kg']],
  Volume:[['1 gal','3.785 L'],['1 L','33.81 fl oz'],['1 cup','236.6 mL'],['1 qt','0.946 L'],['1 pt','473.2 mL']],
  Temperature:[['0 В°C','32 В°F'],['100 В°C','212 В°F'],['37 В°C','98.6 В°F'],['0 K','в€’273.15 В°C'],['20 В°C','68 В°F']],
  Speed:[['60 mph','96.56 km/h'],['1 m/s','3.6 km/h'],['1 mach','1234.8 km/h'],['1 knot','1.852 km/h'],['100 km/h','62.14 mph']],
  Pressure:[['1 atm','101.325 kPa'],['1 atm','14.696 psi'],['1 bar','100 kPa'],['1 mmHg','133.3 Pa'],['1 psi','6.895 kPa']],
  Energy:[['1 kcal','4184 J'],['1 kWh','3.6 MJ'],['1 BTU','1055 J'],['1 kJ','0.239 kcal'],['1 eV','1.602e-19 J']],
  Area:[['1 acre','4046.9 mВІ'],['1 ha','10000 mВІ'],['1 miВІ','2.59 kmВІ'],['1 ftВІ','929 cmВІ'],['1 inВІ','6.452 cmВІ']],
  Time:[['1 h','3600 s'],['1 day','86400 s'],['1 year','365.25 days'],['1 week','7 days'],['1 min','60 s']],
  Data:[['1 byte','8 bits'],['1 KB','1024 bytes'],['1 MB','1024 KB'],['1 GB','1024 MB'],['1 TB','1024 GB']]
};

let currentCat = 'Length';

function buildCats(){
  const el=document.getElementById('catGrid');
  el.innerHTML=Object.entries(CATS).map(([k,v])=>
    `<button class="cat-btn${k===currentCat?' active':''}" onclick="setCat('${k}')">${v.icon} ${k}</button>`
  ).join('');
}

function setCat(cat){
  currentCat=cat;
  buildCats();
  buildUnitSelects();
  buildRef();
  convert();
}

function buildUnitSelects(){
  const cat=CATS[currentCat];
  const units=cat.special?cat.units:Object.keys(cat.units);
  ['fromUnit','toUnit'].forEach((id,i)=>{
    const sel=document.getElementById(id);
    sel.innerHTML=units.map((u,j)=>`<option value="${u}"${(i===0&&j===0)||(i===1&&j===Math.min(1,units.length-1))?'selected':''}>${u}</option>`).join('');
  });
  // Sensible defaults per category
  const defaults={Length:['km','mi'],Mass:['kg','lb'],Volume:['L','gal'],Temperature:['В°C','В°F'],Speed:['km/h','mph'],Pressure:['atm','kPa'],Energy:['kJ','kcal'],Area:['mВІ','ftВІ'],Time:['h','min'],Data:['MB','KB']};
  if(defaults[currentCat]){
    const [f,t]=defaults[currentCat];
    document.getElementById('fromUnit').value=f;
    document.getElementById('toUnit').value=t;
  }
}

function buildRef(){
  const refs=REFS[currentCat]||[];
  document.getElementById('refTable').innerHTML=
    '<tr><th>From</th><th>To</th></tr>'+
    refs.map(([a,b])=>`<tr><td>${a}</td><td>${b}</td></tr>`).join('');
}

function fmt(n){
  if(n===0) return '0';
  const abs=Math.abs(n);
  if(abs>=1e15||abs<1e-6&&abs!==0) return n.toExponential(6);
  if(abs>=1000) return parseFloat(n.toPrecision(8)).toLocaleString('en-US',{maximumFractionDigits:6});
  return parseFloat(n.toPrecision(8)).toString();
}

function convertTemp(val,from,to){
  let c;
  if(from==='В°C') c=val;
  else if(from==='В°F') c=(val-32)*5/9;
  else if(from==='K') c=val-273.15;
  else if(from==='В°R') c=(val-491.67)*5/9;
  if(to==='В°C') return {result:c,steps:tempSteps(val,from,to,c)};
  if(to==='В°F') return {result:c*9/5+32,steps:tempSteps(val,from,to,c)};
  if(to==='K') return {result:c+273.15,steps:tempSteps(val,from,to,c)};
  if(to==='В°R') return {result:(c+273.15)*9/5,steps:tempSteps(val,from,to,c)};
}

function tempSteps(val,from,to,celsius){
  const steps=[];
  const FORMULAS={
    'В°Cв†’В°F':'В°F = В°C Г— 9/5 + 32','В°Fв†’В°C':'В°C = (В°F в€’ 32) Г— 5/9',
    'В°Cв†’K':'K = В°C + 273.15','Kв†’В°C':'В°C = K в€’ 273.15',
    'В°Cв†’В°R':'В°R = (В°C + 273.15) Г— 9/5','В°Rв†’В°C':'В°C = (В°R в€’ 491.67) Г— 5/9',
    'В°Fв†’K':'First: В°C = (В°Fв€’32)Г—5/9, then K = В°C+273.15',
    'Kв†’В°F':'First: В°C = Kв€’273.15, then В°F = В°CГ—9/5+32',
    'В°Fв†’В°R':'First: В°C = (В°Fв€’32)Г—5/9, then В°R=(В°C+273.15)Г—9/5',
    'В°Rв†’В°F':'First: В°C=(В°Rв€’491.67)Г—5/9, then В°F=В°CГ—9/5+32',
    'Kв†’В°R':'First: В°C=Kв€’273.15, then В°R=(В°C+273.15)Г—9/5',
    'В°Rв†’K':'First: В°C=(В°Rв€’491.67)Г—5/9, then K=В°C+273.15',
    'В°Cв†’В°C':'No conversion needed','В°Fв†’В°F':'No conversion needed','Kв†’K':'No conversion needed','В°Rв†’В°R':'No conversion needed'
  };
  steps.push({l:'Formula',v:FORMULAS[from+'в†’'+to]||'Multi-step'});
  if(from!=='В°C'&&to!=='В°C') steps.push({l:'To Celsius first',v:`${fmt(celsius)} В°C`});
  return steps;
}

function convert(){
  const val=parseFloat(document.getElementById('valIn').value);
  const from=document.getElementById('fromUnit').value;
  const to=document.getElementById('toUnit').value;
  if(isNaN(val)){document.getElementById('resultBox').style.display='none';document.getElementById('stepsBox').style.display='none';return;}
  const cat=CATS[currentCat];
  let result,steps=[];
  if(cat.special){
    const r=convertTemp(val,from,to);
    result=r.result;steps=r.steps;
  } else {
    const fFactor=cat.units[from],tFactor=cat.units[to];
    const base=val*fFactor;
    result=base/tFactor;
    if(from===to){steps=[{l:'Same unit',v:'No conversion needed'}];}
    else{
      steps=[
        {l:`1 ${from} in ${cat.base}`,v:`${fmt(fFactor)} ${cat.base}`},
        {l:`Convert to ${cat.base}`,v:`${fmt(val)} Г— ${fmt(fFactor)} = ${fmt(base)} ${cat.base}`},
        {l:`1 ${cat.base} in ${to}`,v:`${fmt(1/tFactor)} ${to}`},
        {l:`Convert to ${to}`,v:`${fmt(base)} Г· ${fmt(tFactor)} = ${fmt(result)} ${to}`}
      ];
    }
  }
  document.getElementById('resultMain').textContent=`${fmt(val)} ${from} = ${fmt(result)} ${to}`;
  document.getElementById('resultLabel').textContent=`${currentCat} conversion`;
  document.getElementById('resultBox').style.display='block';
  document.getElementById('stepsBox').style.display='block';
  document.getElementById('stepsContent').innerHTML=steps.map((s,i)=>
    `<div class="step"><span class="label">${s.l}: </span>${s.v}</div>`
  ).join('')+`<div class="step">вњ… ${fmt(val)} ${from} = <strong>${fmt(result)} ${to}</strong></div>`;
}

function swap(){
  const f=document.getElementById('fromUnit').value;
  const t=document.getElementById('toUnit').value;
  document.getElementById('fromUnit').value=t;
  document.getElementById('toUnit').value=f;
  convert();
}

buildCats();buildUnitSelects();buildRef();convert();
</script>
</body>
</html>
