.btn-outline{background:transparent;border:1.5px solid var(--border);color:#fff}.btn-outline:hover{border-color:var(--accent)}

.tab-row{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{flex:1;padding:10px;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-weight:700;font-size:.85rem;cursor:pointer}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}

.mode-row{display:flex;gap:8px;margin-bottom:16px}

.flash-wrap{margin-bottom:16px}

.flash-card:hover{border-color:var(--accent)}
.flash-card .def{font-size:.95rem;font-weight:500;color:var(--accent2);line-height:1.6}
.flash-nav{display:flex;gap:10px;justify-content:center;margin-top:14px}

.q-block{background:#111827;border-radius:10px;border:1px solid var(--border);padding:16px 18px;margin-bottom:14px}
.q-text{font-size:.95rem;font-weight:600;color:#fff;margin-bottom:12px;line-height:1.5}
.opt{display:block;width:100%;text-align:left;padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);background:#0d1628;color:#fff;margin-bottom:8px;cursor:pointer;font-size:.85rem;font-family:inherit;transition:.15s}
.opt:hover{border-color:var(--accent)}
.opt.correct{border-color:var(--green);background:rgba(52,211,153,.15)}
.opt.wrong{border-color:var(--red);background:rgba(248,113,113,.15)}
.opt:disabled{cursor:default}
.score-display{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:10px}
.result-big{font-size:3rem;font-weight:900;text-align:center;color:var(--accent2);margin:6px 0}

.graph-wrap{position:relative;background:#0d1628;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;height:420px}
canvas{display:block;width:100%;height:100%}
.graph-controls{display:flex;flex-wrap:wrap;gap:20px;margin-top:16px}

.shift-btns{display:flex;gap:6px}
.shift-btns button{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:#111827;color:#fff;cursor:pointer;font-size:.8rem;font-weight:700}
.shift-btns button:hover{border-color:var(--accent)}
.toggle-row{display:flex;gap:6px}
.toggle-row button{flex:1;padding:8px;border-radius:8px;border:1.5px solid var(--border);background:#111827;color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:700}
.toggle-row button.active{background:var(--accent);border-color:var(--accent);color:#fff}
.eq-readout{display:flex;gap:14px;flex-wrap:wrap;margin-top:14px}
.eq-box{flex:1;min-width:100px;background:#111827;border:1px solid var(--border);border-radius:10px;padding:10px 14px;text-align:center}
.eq-val{font-size:1.3rem;font-weight:900;color:var(--accent2)}
.eq-lbl{font-size:.68rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
input[type=range]{width:100%;accent-color:var(--accent)}
</style>
</head>

<div class="hero">
  <h1>💹 AP Economics — Concepts & Grapher</h1>
  <p>142 Micro/Macro terms to drill, plus an interactive supply & demand grapher with shifts, price ceilings, and floors.</p>
</div>

<div class="container">

  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" id="tabConcepts" onclick="setTab('concepts')">📚 Concept Drill</button>
      <button class="tab-btn" id="tabGrapher" onclick="setTab('grapher')">📉 Supply & Demand Grapher</button>
    </div>
  </div>

  <div id="conceptsPanel">
    <div class="card">
      <h2>Choose a Unit</h2>
      <div class="unit-grid" id="unitGrid"></div>
    </div>

    <div class="card" id="studyCard" style="display:none">
      <div class="mode-row">
        <button class="mode-btn active" id="modeFlash" onclick="setMode('flash')">🗂️ Flashcards</button>
        <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">✅ Quiz Me</button>
      </div>

      <div id="flashArea">
        <div class="flash-progress" id="flashProgress"></div>
        <div class="flash-wrap">
          <div class="flash-card" id="flashCard" onclick="flipCard()"></div>
        </div>
        <div class="flash-nav">
          <button class="btn btn-outline" onclick="prevCard()">← Prev</button>
          <button class="btn btn-outline" onclick="shuffleCards()">🔀 Shuffle</button>
          <button class="btn btn-primary" onclick="nextCard()">Next →</button>
        </div>
      </div>

      <div id="quizArea" style="display:none">
        <div class="score-display" id="quizProgress"></div>
        <div id="quizQCard"></div>
        <div id="quizResult" style="display:none">
          <div class="result-big" id="quizFinalScore"></div>
          <div style="text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:14px" id="quizMsg"></div>
          <div style="text-align:center"><button class="btn btn-primary btn-big" onclick="startQuiz()">Retake Quiz</button></div>
        </div>
      </div>
    </div>
  </div>

  <div id="grapherPanel" style="display:none">
    <div class="card">
      <h2>Supply & Demand Model</h2>
      <div class="graph-wrap"><canvas id="sdCanvas"></canvas></div>
      <div class="eq-readout">
        <div class="eq-box"><div class="eq-val" id="eqPrice">$0</div><div class="eq-lbl">Equilibrium Price</div></div>
        <div class="eq-box"><div class="eq-val" id="eqQty">0</div><div class="eq-lbl">Equilibrium Qty</div></div>
        <div class="eq-box"><div class="eq-val" id="eqStatus">Balanced</div><div class="eq-lbl">Market Status</div></div>
      </div>
      <div class="graph-controls">
        <div class="control-group">
          <label>Shift Demand</label>
          <div class="shift-btns">
            <button onclick="shiftDemand(-1)">← Decrease (D1)</button>
            <button onclick="shiftDemand(1)">Increase (D1) →</button>
          </div>
        </div>
        <div class="control-group">
          <label>Shift Supply</label>
          <div class="shift-btns">
            <button onclick="shiftSupply(-1)">← Increase (S1)</button>
            <button onclick="shiftSupply(1)">Decrease (S1) →</button>
          </div>
        </div>
        <div class="control-group">
          <label>Government Intervention</label>
          <div class="toggle-row">
            <button id="btnNone" class="active" onclick="setIntervention('none')">None</button>
            <button id="btnCeiling" onclick="setIntervention('ceiling')">Price Ceiling</button>
            <button id="btnFloor" onclick="setIntervention('floor')">Price Floor</button>
          </div>
          <div id="interventionSlider" style="display:none;margin-top:10px">
            <input type="range" id="interventionRange" min="1" max="19" value="10" oninput="updateIntervention()">
          </div>
        </div>
      </div>
      <div style="margin-top:14px"><button class="btn btn-outline" onclick="resetGraph()">↺ Reset Graph</button></div>
      <div style="margin-top:14px;font-size:.8rem;color:var(--muted);line-height:1.6" id="graphExplain"></div>
    </div>
  </div>

</div>

<script>
const UNITS = {
  "basics": {
    "label": "Basic Concepts & PPC",
    "icon": "⚖️",
    "terms": [
      [
        "Scarcity",
        "The fundamental economic problem: unlimited wants but limited resources."
      ],
      [
        "Opportunity Cost",
        "The value of the next-best alternative given up when making a choice."
      ],
      [
        "Factors of Production",
        "Land, labor, capital, and entrepreneurship — the inputs used to produce goods/services."
      ],
      [
        "Production Possibilities Curve",
        "A graph showing the maximum combinations of two goods an economy can produce with given resources."
      ],
      [
        "Productive Efficiency",
        "Producing goods at the lowest possible cost, represented by points on the PPC."
      ],
      [
        "Allocative Efficiency",
        "Producing the mix of goods most wanted by society; the 'best' point on the PPC."
      ],
      [
        "Comparative Advantage",
        "The ability to produce a good at a lower opportunity cost than another producer."
      ],
      [
        "Absolute Advantage",
        "The ability to produce more of a good using the same resources as another producer."
      ],
      [
        "Gains from Trade",
        "The increased total output/consumption possible when parties trade based on comparative advantage."
      ],
      [
        "Terms of Trade",
        "The rate at which one good can be exchanged for another between trading partners."
      ],
      [
        "Law of Increasing Opportunity Cost",
        "As production of a good increases, the opportunity cost of producing more of it rises — shown by the PPC's bowed-out shape."
      ],
      [
        "Positive Economics",
        "Objective, fact-based analysis of 'what is' in the economy."
      ],
      [
        "Normative Economics",
        "Value-based analysis of 'what should be' in the economy."
      ],
      [
        "Command Economy",
        "An economic system where the government controls production decisions."
      ],
      [
        "Market Economy",
        "An economic system where supply and demand, not government, direct production decisions."
      ],
      [
        "Circular Flow Model",
        "A diagram showing how money, goods, and resources flow between households, firms, and government."
      ],
      [
        "Trade-Off",
        "The idea that using resources in one way means giving up another possible use."
      ],
      [
        "Sunk Cost",
        "A cost already incurred that cannot be recovered and should not affect future decisions."
      ],
      [
        "Marginal Analysis",
        "Comparing the additional benefits of an action to its additional costs."
      ],
      [
        "Division of Labor",
        "Splitting a production process into distinct tasks performed by different workers."
      ],
      [
        "Specialization",
        "Focusing production on the goods or services a producer makes most efficiently."
      ],
      [
        "Mixed Economy",
        "An economic system combining market forces with government intervention."
      ]
    ]
  },
  "supplydemand": {
    "label": "Supply, Demand & Elasticity",
    "icon": "📈",
    "terms": [
      [
        "Law of Demand",
        "As price rises, quantity demanded falls, all else equal (inverse relationship)."
      ],
      [
        "Law of Supply",
        "As price rises, quantity supplied rises, all else equal (direct relationship)."
      ],
      [
        "Equilibrium Price",
        "The price at which quantity supplied equals quantity demanded."
      ],
      [
        "Equilibrium Quantity",
        "The quantity bought and sold at the equilibrium price."
      ],
      [
        "Surplus",
        "A situation where quantity supplied exceeds quantity demanded at a given price (price above equilibrium)."
      ],
      [
        "Shortage",
        "A situation where quantity demanded exceeds quantity supplied at a given price (price below equilibrium)."
      ],
      [
        "Change in Demand",
        "A shift of the entire demand curve, caused by a non-price determinant (income, tastes, etc.)."
      ],
      [
        "Change in Quantity Demanded",
        "Movement along a fixed demand curve, caused only by a change in the good's own price."
      ],
      [
        "Normal Good",
        "A good for which demand increases as consumer income increases."
      ],
      [
        "Inferior Good",
        "A good for which demand decreases as consumer income increases."
      ],
      [
        "Substitute Goods",
        "Goods where an increase in the price of one increases demand for the other (e.g., Coke/Pepsi)."
      ],
      [
        "Complementary Goods",
        "Goods that are used together, so an increase in the price of one decreases demand for the other."
      ],
      [
        "Price Elasticity of Demand",
        "A measure of how much quantity demanded responds to a change in price."
      ],
      [
        "Elastic Demand",
        "Demand where % change in quantity demanded > % change in price (elasticity > 1)."
      ],
      [
        "Inelastic Demand",
        "Demand where % change in quantity demanded < % change in price (elasticity < 1)."
      ],
      [
        "Price Ceiling",
        "A legal maximum price set below equilibrium, causing a shortage (e.g., rent control)."
      ],
      [
        "Price Floor",
        "A legal minimum price set above equilibrium, causing a surplus (e.g., minimum wage)."
      ],
      [
        "Consumer Surplus",
        "The difference between what consumers are willing to pay and what they actually pay."
      ],
      [
        "Producer Surplus",
        "The difference between what producers actually receive and the minimum they'd accept."
      ],
      [
        "Deadweight Loss",
        "The loss of total economic surplus that occurs when a market is not at equilibrium."
      ],
      [
        "Income Elasticity of Demand",
        "A measure of how responsive quantity demanded is to a change in consumer income."
      ],
      [
        "Cross-Price Elasticity of Demand",
        "A measure of how responsive quantity demanded of one good is to a price change in another."
      ],
      [
        "Price Elasticity of Supply",
        "A measure of how responsive quantity supplied is to a change in price."
      ],
      [
        "Unitary Elastic",
        "Demand or supply where percentage change in quantity equals percentage change in price."
      ],
      [
        "Total Revenue Test",
        "A method of judging elasticity by observing how total revenue changes as price changes."
      ],
      [
        "Excise Tax",
        "A tax on a specific good, which shifts the supply curve and creates deadweight loss."
      ]
    ]
  },
  "marketstructure": {
    "label": "Market Structures & Failure",
    "icon": "🏭",
    "terms": [
      [
        "Perfect Competition",
        "Market structure with many small firms selling identical products; firms are price takers."
      ],
      [
        "Monopoly",
        "Market structure with a single seller and high barriers to entry; firm is a price maker."
      ],
      [
        "Monopolistic Competition",
        "Market structure with many firms selling similar but differentiated products."
      ],
      [
        "Oligopoly",
        "Market structure with a few large, interdependent firms dominating the market."
      ],
      [
        "Price Taker",
        "A firm that must accept the market price because it has no market power (perfect competition)."
      ],
      [
        "Price Maker",
        "A firm with enough market power to set its own price (monopoly)."
      ],
      [
        "Marginal Revenue",
        "The additional revenue from selling one more unit of output."
      ],
      [
        "Marginal Cost",
        "The additional cost of producing one more unit of output."
      ],
      [
        "Profit-Maximizing Rule",
        "A firm maximizes profit by producing where marginal revenue equals marginal cost (MR=MC)."
      ],
      [
        "Barriers to Entry",
        "Obstacles that prevent new firms from entering a market, e.g., patents, high startup costs."
      ],
      [
        "Economies of Scale",
        "The cost advantage a firm gets as output increases, lowering average cost per unit."
      ],
      [
        "Externality",
        "A cost or benefit affecting a third party not involved in a transaction."
      ],
      [
        "Negative Externality",
        "A cost imposed on a third party, e.g., pollution from a factory."
      ],
      [
        "Positive Externality",
        "A benefit received by a third party, e.g., benefits of vaccination or education."
      ],
      [
        "Public Good",
        "A good that is non-excludable and non-rivalrous, e.g., national defense."
      ],
      [
        "Free-Rider Problem",
        "The tendency for people to benefit from a public good without paying for it."
      ],
      [
        "Market Failure",
        "A situation where the free market fails to allocate resources efficiently."
      ],
      [
        "Antitrust Policy",
        "Government laws designed to prevent monopolies and promote market competition."
      ],
      [
        "Monopolistic Competition Firm",
        "A firm with many competitors selling differentiated products with some pricing power."
      ],
      [
        "Cartel",
        "A group of firms that collude to set prices or output like a monopoly."
      ],
      [
        "Game Theory",
        "The study of strategic decision-making between interdependent firms or players."
      ],
      [
        "Prisoner's Dilemma",
        "A game theory scenario showing why two rational firms might not cooperate even when it benefits both."
      ],
      [
        "Kinked Demand Curve",
        "A model explaining price rigidity in oligopoly due to firms' reactions to price changes."
      ],
      [
        "Natural Monopoly",
        "A market where one firm can supply the entire market at lower cost than multiple firms."
      ]
    ]
  },
  "macrobasics": {
    "label": "Macro Basics & Measurement",
    "icon": "📊",
    "terms": [
      [
        "GDP",
        "Gross Domestic Product; the total market value of all final goods and services produced within a country in a year."
      ],
      [
        "Real GDP",
        "GDP adjusted for inflation, allowing comparison across years."
      ],
      [
        "Nominal GDP",
        "GDP measured using current prices, not adjusted for inflation."
      ],
      [
        "GDP Deflator",
        "A price index that measures the change in prices of all goods included in GDP."
      ],
      [
        "Expenditure Approach",
        "Method of calculating GDP by summing C + I + G + Nx (consumption, investment, government spending, net exports)."
      ],
      [
        "Unemployment Rate",
        "The percentage of the labor force that is jobless and actively seeking work."
      ],
      [
        "Labor Force",
        "All people who are either employed or actively seeking employment."
      ],
      [
        "Frictional Unemployment",
        "Short-term unemployment as people transition between jobs."
      ],
      [
        "Structural Unemployment",
        "Unemployment due to a mismatch between workers' skills and available jobs."
      ],
      [
        "Cyclical Unemployment",
        "Unemployment caused by a downturn in the business cycle (recession)."
      ],
      [
        "Natural Rate of Unemployment",
        "The unemployment rate when the economy is at full employment (frictional + structural only)."
      ],
      [
        "Inflation",
        "A sustained increase in the general price level of goods and services in an economy."
      ],
      [
        "CPI",
        "Consumer Price Index; measures the average change in prices of a fixed basket of goods."
      ],
      [
        "Deflation",
        "A sustained decrease in the general price level."
      ],
      [
        "Stagflation",
        "The combination of stagnant economic growth, high unemployment, and high inflation."
      ],
      [
        "Business Cycle",
        "The recurring pattern of expansion and contraction in economic activity over time."
      ],
      [
        "Recession",
        "A significant decline in economic activity lasting more than a few months; often defined as two straight quarters of falling real GDP."
      ],
      [
        "Peak / Trough",
        "Peak = the high point of the business cycle before a downturn; trough = the low point before recovery."
      ],
      [
        "Value Added",
        "The market value of a product minus the cost of intermediate goods used to produce it."
      ],
      [
        "Underemployment",
        "Workers employed below their skill level or working fewer hours than desired."
      ],
      [
        "Discouraged Worker",
        "A person who has stopped looking for work and is not counted in the labor force."
      ],
      [
        "Nominal Interest Rate",
        "The stated interest rate not adjusted for inflation."
      ],
      [
        "Real Interest Rate",
        "The interest rate adjusted for inflation, calculated as nominal rate minus inflation rate."
      ],
      [
        "Okun's Law",
        "The observed relationship between unemployment and lost GDP output."
      ]
    ]
  },
  "adas": {
    "label": "AD/AS & Fiscal Policy",
    "icon": "🏛️",
    "terms": [
      [
        "Aggregate Demand",
        "The total quantity of goods and services demanded in an economy at various price levels."
      ],
      [
        "Aggregate Supply",
        "The total quantity of goods and services that firms will produce at various price levels."
      ],
      [
        "Short-Run Aggregate Supply",
        "The AS curve that is upward sloping because some input prices (e.g., wages) are sticky."
      ],
      [
        "Long-Run Aggregate Supply",
        "The vertical AS curve at the full-employment (potential) level of output."
      ],
      [
        "Potential GDP",
        "The level of real GDP an economy produces when all resources are fully employed."
      ],
      [
        "Recessionary Gap",
        "When actual GDP is below potential GDP, indicating a slack economy."
      ],
      [
        "Inflationary Gap",
        "When actual GDP is above potential GDP, indicating an overheated economy."
      ],
      [
        "Multiplier Effect",
        "The idea that an initial change in spending leads to a larger overall change in GDP."
      ],
      [
        "Marginal Propensity to Consume",
        "The fraction of additional income a household spends rather than saves."
      ],
      [
        "Fiscal Policy",
        "Government use of spending and taxation to influence the economy."
      ],
      [
        "Expansionary Fiscal Policy",
        "Increasing government spending and/or cutting taxes to stimulate a sluggish economy."
      ],
      [
        "Contractionary Fiscal Policy",
        "Decreasing government spending and/or raising taxes to slow an overheating economy."

const unitKeys = Object.keys(UNITS);
let currentUnit = null;
let mode = 'flash';
let cardOrder = [];
let cardIdx = 0;
let flipped = false;
let quizQ = [];
let quizIdx = 0;
let quizScore = 0;

function setTab(t) {
  document.getElementById('tabConcepts').classList.toggle('active', t === 'concepts');
  document.getElementById('tabGrapher').classList.toggle('active', t === 'grapher');
  document.getElementById('conceptsPanel').style.display = t === 'concepts' ? 'block' : 'none';
  document.getElementById('grapherPanel').style.display = t === 'grapher' ? 'block' : 'none';
  if (t === 'grapher') { resizeCanvas(); drawGraph(); }
}

function renderUnitGrid() {
  const grid = document.getElementById('unitGrid');
  grid.innerHTML = unitKeys.map(k => {
    const u = UNITS[k];
    return `<div class="unit-card${k===currentUnit?' active':''}" onclick="selectUnit('${k}')">
      <div class="unit-icon">${u.icon}</div>
      <div class="unit-name">${escHtml(u.label)}</div>
      <div class="unit-count">${u.terms.length} terms</div>
    </div>`;
  }).join('');
}

function selectUnit(k) {
  currentUnit = k;
  renderUnitGrid();
  document.getElementById('studyCard').style.display = 'block';
  cardOrder = UNITS[k].terms.map((_, i) => i);
  cardIdx = 0;
  flipped = false;
  setMode(mode);
}

function setMode(m) {
  mode = m;
  document.getElementById('modeFlash').classList.toggle('active', m === 'flash');
  document.getElementById('modeQuiz').classList.toggle('active', m === 'quiz');
  document.getElementById('flashArea').style.display = m === 'flash' ? 'block' : 'none';
  document.getElementById('quizArea').style.display = m === 'quiz' ? 'block' : 'none';
  if (m === 'flash') renderFlash();
  else startQuiz();
}

function renderFlash() {
  if (!currentUnit) return;
  const terms = UNITS[currentUnit].terms;
  const [term, def] = terms[cardOrder[cardIdx]];
  document.getElementById('flashProgress').textContent = `Card ${cardIdx+1} of ${terms.length}`;
  const card = document.getElementById('flashCard');
  card.innerHTML = flipped ? `<div class="def">${escHtml(def)}</div>` : `<div>${escHtml(term)}</div>`;
}

function flipCard() { flipped = !flipped; renderFlash(); }
function nextCard() { cardIdx = (cardIdx + 1) % cardOrder.length; flipped = false; renderFlash(); }
function prevCard() { cardIdx = (cardIdx - 1 + cardOrder.length) % cardOrder.length; flipped = false; renderFlash(); }
function shuffleCards() {
  for (let i = cardOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardOrder[i], cardOrder[j]] = [cardOrder[j], cardOrder[i]];
  }
  cardIdx = 0; flipped = false; renderFlash();
}

function startQuiz() {
  if (!currentUnit) return;
  const terms = UNITS[currentUnit].terms;
  const idxs = terms.map((_, i) => i);
  for (let i = idxs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
  }
  quizQ = idxs.slice(0, Math.min(10, idxs.length)).map(i => {
    const [term, def] = terms[i];
    const distractors = terms.filter((_, di) => di !== i).map(t => t[1]);
    for (let k = distractors.length - 1; k > 0; k--) {
      const j = Math.floor(Math.random() * (k + 1));
      [distractors[k], distractors[j]] = [distractors[j], distractors[k]];
    }
    const opts = [def, ...distractors.slice(0, 3)];
    for (let k = opts.length - 1; k > 0; k--) {
      const j = Math.floor(Math.random() * (k + 1));
      [opts[k], opts[j]] = [opts[j], opts[k]];
    }
    return { term, def, opts };
  });
  quizIdx = 0; quizScore = 0;
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizQCard').style.display = 'block';
  renderQuiz();
}

function renderQuiz() {
  const q = quizQ[quizIdx];
  document.getElementById('quizProgress').textContent = `Question ${quizIdx+1} of ${quizQ.length} · Score: ${quizScore}`;
  document.getElementById('quizQCard').innerHTML = `
    <div class="q-block">
      <div class="q-text">What is the best definition of: <strong>${escHtml(q.term)}</strong>?</div>
      ${q.opts.map((o,oi) => `<button class="opt" data-idx="${oi}" onclick="answerQuiz(this,${oi})">${escHtml(o)}</button>`).join('')}
    </div>`;
}

function answerQuiz(btn, optIdx) {
  const q = quizQ[quizIdx];
  const opt = q.opts[optIdx];
  const correct = opt === q.def;
  if (correct) quizScore++;
  document.querySelectorAll('#quizQCard .opt').forEach(b => {
    b.disabled = true;
    if (q.opts[parseInt(b.getAttribute('data-idx'),10)] === q.def) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');
  setTimeout(() => {
    quizIdx++;
    if (quizIdx >= quizQ.length) endQuiz();
    else renderQuiz();
  }, 900);
}

function endQuiz() {
  document.getElementById('quizQCard').style.display = 'none';
  document.getElementById('quizResult').style.display = 'block';
  const pct = Math.round(quizScore / quizQ.length * 100);
  document.getElementById('quizFinalScore').textContent = `${quizScore}/${quizQ.length}`;
  document.getElementById('quizMsg').textContent = pct >= 90 ? "Excellent! You know this unit cold." :
    pct >= 70 ? "Great work — review the ones you missed." :
    pct >= 50 ? "Good effort. A bit more review will help." :
    "Keep studying this unit — you'll get there.";
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════════════
// SUPPLY & DEMAND GRAPHER
// ═══════════════════════════════════════════════════════════
const canvas = document.getElementById('sdCanvas');
const ctx = canvas.getContext('2d');

// Lines defined as Price = intercept - slope*Q (demand) / Price = intercept + slope*Q (supply)
// Using Q range 0-20, P range 0-20
let demand = { intercept: 18, slope: 0.8 };
let supply = { intercept: 2, slope: 0.8 };
let intervention = 'none';
let interventionPrice = 10;

function resizeCanvas() {
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
}
window.addEventListener('resize', () => { if (document.getElementById('grapherPanel').style.display !== 'none') { resizeCanvas(); drawGraph(); } });

const MAXQ = 20, MAXP = 20, PAD = 50;

function toX(q, W) { return PAD + (q / MAXQ) * (W - PAD - 20); }
function toY(p, H) { return (H - PAD) - (p / MAXP) * (H - PAD - 20); }

function demandP(q) { return Math.max(0, demand.intercept - demand.slope * q); }
function supplyP(q) { return Math.max(0, supply.intercept + supply.slope * q); }

function findEquilibrium() {
  // demand.intercept - demand.slope*q = supply.intercept + supply.slope*q
  const q = (demand.intercept - supply.intercept) / (demand.slope + supply.slope);
  const p = demandP(q);
  return { q: Math.max(0, q), p: Math.max(0, p) };
}

function drawGraph() {
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1628';
  ctx.fillRect(0, 0, W, H);

  // axes
  ctx.strokeStyle = '#2a3a55';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD, 10); ctx.lineTo(PAD, H - PAD); ctx.lineTo(W - 20, H - PAD);
  ctx.stroke();
  ctx.fillStyle = '#b0bece';
  ctx.font = '11px Inter, sans-serif';
  ctx.fillText('Quantity →', W - 90, H - PAD + 24);
  ctx.save();
  ctx.translate(16, PAD + 20);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('Price ($) →', 0, 0);
  ctx.restore();

  // demand curve
  ctx.strokeStyle = '#6366f1';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let q = 0; q <= MAXQ; q += 0.5) {
    const p = demandP(q);
    const x = toX(q, W), y = toY(Math.min(p, MAXP), H);
    if (q === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  // supply curve
  ctx.strokeStyle = '#34d399';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  for (let q = 0; q <= MAXQ; q += 0.5) {
    const p = supplyP(q);
    const x = toX(q, W), y = toY(Math.min(p, MAXP), H);
    if (q === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();

  const eq = findEquilibrium();

  // intervention line
  if (intervention !== 'none') {
    ctx.strokeStyle = '#fbbf24';
    ctx.lineWidth = 2;
    ctx.setLineDash([6,4]);
    const y = toY(interventionPrice, H);
    ctx.beginPath();
    ctx.moveTo(PAD, y); ctx.lineTo(W - 20, y);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle = '#fbbf24';
    ctx.font = 'bold 11px Inter, sans-serif';
    ctx.fillText((intervention === 'ceiling' ? 'Price Ceiling' : 'Price Floor') + ' = $' + interventionPrice.toFixed(1), PAD + 6, y - 6);

    // shortage/surplus shading
    const qDatP = qAtDemand(interventionPrice);
    const qSatP = qAtSupply(interventionPrice);
    if (intervention === 'ceiling' && interventionPrice < eq.p) {
      drawGap(qSatP, qDatP, interventionPrice, W, H, '#f87171', 'Shortage');
    } else if (intervention === 'floor' && interventionPrice > eq.p) {
      drawGap(qDatP, qSatP, interventionPrice, W, H, '#f87171', 'Surplus');
    }
  }

  // equilibrium point
  const ex = toX(eq.q, W), ey = toY(Math.min(eq.p, MAXP), H);
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ex, ey, 4.5, 0, Math.PI*2);
  ctx.fill();
  ctx.strokeStyle = '#94a3b8';
  ctx.setLineDash([3,3]);
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(ex, H-PAD); ctx.lineTo(ex, ey); ctx.lineTo(PAD, ey); ctx.stroke();
  ctx.setLineDash([]);

  // labels
  ctx.fillStyle = '#6366f1'; ctx.font = 'bold 12px Inter, sans-serif';
  ctx.fillText('D', toX(MAXQ*0.95, W) - 12, toY(demandP(MAXQ*0.95), H) - 6);
  ctx.fillStyle = '#34d399';
  ctx.fillText('S', toX(MAXQ*0.95, W) - 12, toY(Math.min(supplyP(MAXQ*0.95),MAXP), H) - 6);

  document.getElementById('eqPrice').textContent = '$' + eq.p.toFixed(2);
  document.getElementById('eqQty').textContent = eq.q.toFixed(1);
  let status = 'Balanced';
  if (intervention === 'ceiling' && interventionPrice < eq.p) status = 'Shortage';
  else if (intervention === 'floor' && interventionPrice > eq.p) status = 'Surplus';
  document.getElementById('eqStatus').textContent = status;

  updateExplain(eq, status);
}

function qAtDemand(p) { return Math.max(0, (demand.intercept - p) / demand.slope); }
function qAtSupply(p) { return Math.max(0, (p - supply.intercept) / supply.slope); }

function drawGap(qLo, qHi, p, W, H, color, label) {
  const x1 = toX(qLo, W), x2 = toX(qHi, W), y = toY(p, H);
  ctx.strokeStyle = color;
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(x1, y); ctx.lineTo(x2, y);
  ctx.stroke();
}

function shiftDemand(dir) {
  demand.intercept = Math.max(4, Math.min(30, demand.intercept + dir * 2));
  drawGraph();
}
function shiftSupply(dir) {
  supply.intercept = Math.max(-8, Math.min(14, supply.intercept - dir * 2));
  drawGraph();
}

function setIntervention(type) {
  intervention = type;
  document.getElementById('btnNone').classList.toggle('active', type === 'none');
  document.getElementById('btnCeiling').classList.toggle('active', type === 'ceiling');
  document.getElementById('btnFloor').classList.toggle('active', type === 'floor');
  document.getElementById('interventionSlider').style.display = type === 'none' ? 'none' : 'block';
  drawGraph();
}

function updateIntervention() {
  interventionPrice = parseInt(document.getElementById('interventionRange').value, 10);
  drawGraph();
}

function resetGraph() {
  demand = { intercept: 18, slope: 0.8 };
  supply = { intercept: 2, slope: 0.8 };
  intervention = 'none';
  document.getElementById('interventionRange').value = 10;
  setIntervention('none');
}

function updateExplain(eq, status) {
  const el = document.getElementById('graphExplain');
  if (intervention === 'none') {
    el.textContent = `Market clears at equilibrium: price $${eq.p.toFixed(2)}, quantity ${eq.q.toFixed(1)}. Use the shift buttons to see how equilibrium moves when demand or supply changes.`;
  } else if (intervention === 'ceiling') {
    el.textContent = interventionPrice < eq.p
      ? `A price ceiling below equilibrium ($${interventionPrice} < $${eq.p.toFixed(2)}) is binding — it creates a shortage (quantity demanded exceeds quantity supplied), shown in red.`
      : `This price ceiling ($${interventionPrice}) is above equilibrium ($${eq.p.toFixed(2)}), so it's non-binding — the market still clears at equilibrium.`;
  } else {
    el.textContent = interventionPrice > eq.p
      ? `A price floor above equilibrium ($${interventionPrice} > $${eq.p.toFixed(2)}) is binding — it creates a surplus (quantity supplied exceeds quantity demanded), shown in red.`
      : `This price floor ($${interventionPrice}) is below equilibrium ($${eq.p.toFixed(2)}), so it's non-binding — the market still clears at equilibrium.`;
  }
}

renderUnitGrid();
resizeCanvas();
</script>
