// ——— 3D Atom Canvas Animation ———
function initAtomCanvas(protons, neutrons, shells, cat){
  if(window._atomAnim){cancelAnimationFrame(window._atomAnim);window._atomAnim=null;}
  const canvas=document.getElementById('atom-canvas');
  if(!canvas) return;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2;

  const CAT_COLORS={'cat-alkali':'#ef4444','cat-alkaline':'#f59e0b','cat-transition':'#818cf8',
    'cat-post':'#a78bfa','cat-metalloid':'#34d399','cat-nonmetal':'#22d3ee',
    'cat-halogen':'#fb923c','cat-noble':'#c084fc','cat-lanthanide':'#f472b6',
    'cat-actinide':'#a3e635','cat-unknown':'#6366f1'};
  const catColor=CAT_COLORS[cat.cls]||'#6366f1';

  // — Nucleus particles —
  const total=protons+neutrons;
  const MAX_SHOW=90;
  const ratio=Math.min(1,MAX_SHOW/Math.max(1,total));
  const showP=Math.max(1,Math.round(protons*ratio));
  const showN=Math.max(0,Math.round(neutrons*ratio));
  const nucR=Math.max(10,Math.min(26,4.5*Math.cbrt(showP+showN)));

  const nucleons=[];
  [[showP,'p'],[showN,'n']].forEach(([count,type])=>{
    for(let i=0;i<count;i++){
      let x,y,z,att=0;
      do{x=(Math.random()*2-1)*nucR*0.9;y=(Math.random()*2-1)*nucR*0.9;z=(Math.random()*2-1)*nucR*0.9;att++;}
      while(x*x+y*y+z*z>nucR*nucR*0.81&&att<40);
      nucleons.push({type,x,y,z});
    }
  });

  // — Orbits —
  const nShells=shells.filter(n=>n>0).length||1;
  const ORB_MIN=nucR+16, ORB_MAX=cy-14;
  // Tilt angles per shell (inclination from horizontal + azimuth offset)
  const INCL=[20,55,35,72,18,62,44].map(d=>d*Math.PI/180);
  const AZIM=[0,50,100,30,130,70,160].map(d=>d*Math.PI/180);
  // Angular speed: inner shells faster, ω ∝ 1/n^1.5 (Bohr model approximation)
  const OMEGA_BASE=1.9;

  let shellIdx=0;
  const orbits=shells.map((n,i)=>{
    if(n===0) return null;
    const r=ORB_MIN+(shellIdx+1)*(ORB_MAX-ORB_MIN)/(nShells+0.2);
    shellIdx++;
    const incl=INCL[i%7];
    const azim=AZIM[i%7];
    const omega=OMEGA_BASE/Math.pow(i+1,1.45);
    const electrons=Array.from({length:n},(_,j)=>({angle:(j/n)*2*Math.PI+(i*1.1)}));
    return{r,incl,azim,omega,electrons,shellNum:i+1};
  }).filter(Boolean);

  // — Render loop —
  let last=null;
  let t=0;
  function frame(ts){
    if(!last) last=ts;
    const dt=Math.min((ts-last)/1000,0.05);
    last=ts; t+=dt;
    const cv=document.getElementById('atom-canvas');
    if(!cv){window._atomAnim=null;return;}

    ctx.clearRect(0,0,W,H);

    // Center glow
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,nucR*3);
    g.addColorStop(0,catColor+'28');g.addColorStop(1,'transparent');
    ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,nucR*3,0,Math.PI*2);ctx.fill();

    // Update electrons
    orbits.forEach(o=>o.electrons.forEach(e=>{e.angle+=o.omega*dt;}));

    // Very slow precession of orbital planes
    const prec=t*0.12;

    // Draw orbital paths
    orbits.forEach((o,i)=>{
      const incl=o.incl;
      const az=o.azim+prec*(i%2===0?1:-0.7);
      const b=o.r*Math.abs(Math.cos(incl));
      ctx.save();ctx.translate(cx,cy);ctx.rotate(az);
      ctx.beginPath();ctx.ellipse(0,0,o.r,Math.max(4,b),0,0,Math.PI*2);
      ctx.strokeStyle=`rgba(100,160,255,0.14)`;ctx.lineWidth=0.8;
      ctx.setLineDash([4,5]);ctx.stroke();ctx.setLineDash([]);
      ctx.restore();
    });

    // Collect all items with 3D depth
    const items=[];

    // Nucleus nucleons
    nucleons.forEach(p=>{
      items.push({kind:'nuc',type:p.type,sx:cx+p.x,sy:cy+p.y,depth:p.z,nucR:p.z/nucR});
    });

    // Electrons: 3D position using inclination + precessing azimuth
    orbits.forEach((o,oi)=>{
      const incl=o.incl;
      const az=o.azim+prec*(oi%2===0?1:-0.7);
      const cosAz=Math.cos(az), sinAz=Math.sin(az);
      const cosI=Math.cos(incl), sinI=Math.sin(incl);
      o.electrons.forEach(e=>{
        // Position on unit circle in orbital plane
        const lx=o.r*Math.cos(e.angle);
        const ly=o.r*Math.sin(e.angle);
        // Apply inclination (tilt around local x-axis)
        const lx2=lx, ly2=ly*cosI, lz2=ly*sinI;
        // Apply azimuth rotation (around world z-axis)
        const wx=lx2*cosAz-ly2*sinAz;
        const wy=lx2*sinAz+ly2*cosAz;
        const wz=lz2;
        items.push({kind:'elec',sx:cx+wx,sy:cy+wy,depth:wz,r:3.5+wz/o.r*1.5,oi});
      });
    });

    // Sort back to front
    items.sort((a,b)=>a.depth-b.depth);

    // Draw
    items.forEach(item=>{
      if(item.kind==='nuc'){
        const c=item.type==='p'?'#ef4444':'#3b82f6';
        const lit=0.6+0.4*(item.nucR+1)/2;
        ctx.beginPath();ctx.arc(item.sx,item.sy,3.8,0,Math.PI*2);
        ctx.fillStyle=c;ctx.globalAlpha=Math.max(0.5,Math.min(1,lit));
        ctx.fill();
        ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=0.4;ctx.stroke();
        ctx.globalAlpha=1;
      } else {
        const orb=orbits[item.oi];
        const alpha=orb?0.45+0.55*((item.depth/orb.r+1)/2):0.8;
        const r=Math.max(2.2,item.r);
        ctx.save();
        ctx.globalAlpha=Math.max(0.3,Math.min(1,alpha));
        ctx.shadowColor='#fde047';ctx.shadowBlur=9;
        ctx.beginPath();ctx.arc(item.sx,item.sy,r,0,Math.PI*2);
        ctx.fillStyle='#fde047';ctx.fill();
        ctx.shadowBlur=0;ctx.restore();
      }
    });

    // Nucleus border
    ctx.beginPath();ctx.arc(cx,cy,nucR,0,Math.PI*2);
    ctx.strokeStyle=catColor+'66';ctx.lineWidth=1.2;ctx.stroke();

    // Legend
    ctx.font='9px sans-serif'; ctx.textBaseline='middle';
    [[catColor,'Protons (red)','#ef4444'],[catColor,'Neutrons (blue)','#3b82f6'],[catColor,'Electrons (yellow)','#fde047']].forEach(([_,label,col],i)=>{
      const lx=12,ly=H-36+i*13;
      ctx.beginPath();ctx.arc(lx,ly,4,0,Math.PI*2);ctx.fillStyle=col;ctx.fill();
      ctx.fillStyle='rgba(176,190,206,0.8)';ctx.fillText(label,lx+9,ly);
    });

    window._atomAnim=requestAnimationFrame(frame);
  }
  window._atomAnim=requestAnimationFrame(frame);
}

function buildLegend(){
  document.getElementById('legend').innerHTML=Object.entries(CATS).map(([k,v])=>`
    <span class="leg" data-cat="${k}" onclick="toggleCat('${k}',this)">
      <span class="leg-dot ${v.cls}"></span>${v.label}
    </span>`).join('');
}

function toggleCat(cat,btn){
  filterCat=filterCat===cat?null:cat;
  document.querySelectorAll('.leg').forEach(l=>l.classList.remove('active'));
  if(filterCat) btn.classList.add('active');
  document.querySelectorAll('.el[data-num]').forEach(el=>{
    const elData=EMAP[+el.dataset.num];
    if(!elData) return;
    el.style.opacity=(!filterCat||elData[4]===filterCat)?'1':'0.12';
  });
}

function makeEl(num){
  const e=EMAP[num]; if(!e) return null;
  const div=document.createElement('div');
  div.className=`el ${CATS[e[4]]?.cls||'cat-unknown'}`;
  div.dataset.num=num;
  div.title=e[2];
  div.innerHTML=`<div class="el-num">${num}</div><div class="el-sym">${e[1]}</div><div class="el-name">${e[2]}</div><div class="el-mass">${parseFloat(e[3]).toFixed(0)}</div>`;
  div.onclick=()=>showDetail(num);
  return div;
}

function makeSpacer(){
  const d=document.createElement('div'); d.className='el-spacer'; return d;
}

function makePlaceholder(label){
  const d=document.createElement('div');
  d.className='el-placeholder';
  d.innerHTML=label;
  return d;
}

function buildTable(){
  const g=document.getElementById('ptGrid');
  g.innerHTML='';

  // Main rows
  LAYOUT.forEach(row=>{
    row.forEach(num=>{
      if(num===0){ g.appendChild(makeSpacer()); }
      else if(num<0){
        // f-block placeholder
        const label=num===-57?'57–71':'89–103';
        g.appendChild(makePlaceholder(label));
      } else {
        const el=makeEl(num);
        if(el) g.appendChild(el); else g.appendChild(makeSpacer());
      }
    });
  });

  // Gap
  const gap=document.createElement('div'); gap.className='el-gap'; g.appendChild(gap);

  // Lanthanide row
  [null,null,...LANTHANIDES,null].forEach((num,i)=>{
    if(i>=18) return;
    if(num===null){ g.appendChild(i===0?makePlaceholder('6'):i===1?makePlaceholder('La'):makeSpacer()); }
    else { const el=makeEl(num); if(el) g.appendChild(el); else g.appendChild(makeSpacer()); }
  });

  // Actinide row
  [null,null,...ACTINIDES,null].forEach((num,i)=>{
    if(i>=18) return;
    if(num===null){ g.appendChild(i===0?makePlaceholder('7'):i===1?makePlaceholder('Ac'):makeSpacer()); }
    else { const el=makeEl(num); if(el) g.appendChild(el); else g.appendChild(makeSpacer()); }
  });
}

function showDetail(num){
  const e=EMAP[num]; if(!e) return;
  document.querySelectorAll('.el').forEach(el=>el.classList.remove('selected'));
  document.querySelectorAll(`.el[data-num="${num}"]`).forEach(el=>el.classList.add('selected'));

  const cat=CATS[e[4]]||{cls:'cat-unknown',label:'Unknown'};
  const dp=document.getElementById('detailPanel');
  dp.className='detail-panel visible';

  const sb=document.getElementById('dp-sym');
  sb.textContent=e[1]; sb.className=`dp-sym-big ${cat.cls}`;
  document.getElementById('dp-name').textContent=e[2];
  document.getElementById('dp-sub').textContent=`Atomic Number: ${e[0]}  ·  Period: ${e[5]}  ·  Group: ${e[6]||'f-block'}`;
  const ct=document.getElementById('dp-cat');
  ct.textContent=cat.label; ct.className=`dp-cat-tag ${cat.cls}`;

  const protons=e[0];
  const neutrons=Math.round(parseFloat(e[3]))-protons;
  const electrons=protons;
  const shells=SHELLS[protons]||[];
  const valence=shells[shells.length-1]||0;

  document.getElementById('dp-stats').innerHTML=[
    ['Atomic Number', protons],
    ['Atomic Mass', e[3]+' u'],
    ['Protons', protons],
    ['Neutrons', neutrons+'*'],
    ['Electrons', electrons],
    ['Valence Electrons', valence],
    ['Electron Shells', shells.length],
    ['Period', e[5]],
    ['Group', e[6]||'f-block'],
    ['Category', cat.label],
  ].map(([l,v])=>`<div class="dp-stat"><div class="dp-stat-lbl">${l}</div><div class="dp-stat-val">${v}</div></div>`).join('');

  // Bohr model SVG
  initAtomCanvas(protons, neutrons, shells, cat);

  // Shell table
  document.getElementById('dp-shell-table').innerHTML=
    '<tr><th>Shell</th><th>Name</th><th>Max e⁻</th><th>e⁻ in this element</th></tr>'+
    shells.map((n,i)=>{
      const maxes=[2,8,18,32,50,72,98];
      return `<tr><td>${i+1}</td><td>${SHELL_NAMES[i]||'?'}</td><td>${maxes[i]||'?'}</td><td>${n}</td></tr>`;
    }).join('');

  document.getElementById('dp-cfg').textContent=e[7];
  document.getElementById('dp-desc').textContent=e[8]+'  (* Neutron count based on most common isotope rounded mass.)';
  document.getElementById('dp-uses').textContent=e[9];
  document.getElementById('dp-disc').textContent=e[10];
  dp.scrollIntoView({behavior:'smooth',block:'nearest'});
}


function searchEls(){
  const q=document.getElementById('ptSearch').value.toLowerCase().trim();
  document.querySelectorAll('.el[data-num]').forEach(el=>{
    const e=EMAP[+el.dataset.num];
    const match=!q||e[1].toLowerCase().includes(q)||e[2].toLowerCase().includes(q)||String(e[0]).includes(q)||e[4].includes(q);
    el.style.opacity=match?'1':'0.08';
  });
  if(!q&&!filterCat) document.querySelectorAll('.el[data-num]').forEach(el=>el.style.opacity='1');
}

buildLegend();
buildTable();

// ═══════════════ QUIZ MODE ═══════════════
let ptqMode = 'all';
let ptqScore = 0, ptqTotal = 0;
const PTQ_TYPES = ['sym2name','name2sym','num2sym','sym2cat'];

document.querySelectorAll('.ptq-mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ptq-mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    ptqMode = btn.dataset.val;
    nextPtQuiz();
  });
});

function ptqShuffle(arr){
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function ptqPick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function ptqRenderOptions(options, correctIdx, onAnswer){
  const container = document.getElementById('ptqOpts');
  container.innerHTML = '';
  options.forEach((opt,i) => {
    const btn = document.createElement('button');
    btn.className = 'ptq-opt-btn';
    btn.textContent = opt;
    btn.onclick = () => onAnswer(i, btn, container);
    container.appendChild(btn);
  });
}
function ptqLockOptions(container, chosenBtn, correctIdx){
  const btns = container.querySelectorAll('.ptq-opt-btn');
  btns.forEach((b,i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct');
    else if (b === chosenBtn) b.classList.add('wrong');
    else b.classList.add('dim');
  });
}

function nextPtQuiz(){
  const fbEl = document.getElementById('ptqFeedback');
  if (fbEl) fbEl.classList.remove('show');
  const type = ptqMode === 'all' ? ptqPick(PTQ_TYPES) : ptqMode;
  const el = ptqPick(E);
  const num = el[0], sym = el[1], name = el[2], cat = el[4];
  const catLabel = (CATS[cat]||{label:'Unknown'}).label;

  let promptLabel, qText, correctVal, distractorFn;
  if (type === 'sym2name') {
    promptLabel = 'Symbol → Name';
    qText = sym;
    correctVal = name;
    distractorFn = () => ptqPick(E)[2];
  } else if (type === 'name2sym') {
    promptLabel = 'Name → Symbol';
    qText = name;
    correctVal = sym;
    distractorFn = () => ptqPick(E)[1];
  } else if (type === 'num2sym') {
    promptLabel = 'Atomic Number → Symbol';
    qText = String(num);
    correctVal = sym;
    distractorFn = () => ptqPick(E)[1];
  } else {
    promptLabel = 'Symbol → Category';
    qText = sym;
    correctVal = catLabel;
    distractorFn = () => (CATS[ptqPick(E)[4]]||{label:'Unknown'}).label;
  }

  document.getElementById('ptqDir').textContent = promptLabel;
  document.getElementById('ptqQ').textContent = qText;

  const used = new Set([correctVal]);
  const distractors = [];
  let guard = 0;
  while (distractors.length < 3 && guard < 300) {
    guard++;
    const d = distractorFn();
    if (!used.has(d)) { distractors.push(d); used.add(d); }
  }
  const opts = ptqShuffle([correctVal, ...distractors]);
  const correctIdx = opts.indexOf(correctVal);

  ptqRenderOptions(opts, correctIdx, (i, btn, container) => {
    const isCorrect = i === correctIdx;
    ptqTotal++; if (isCorrect) ptqScore++;
    document.getElementById('ptqScore').textContent = ptqScore;
    document.getElementById('ptqTotal').textContent = ptqTotal;
    ptqLockOptions(container, btn, correctIdx);
    const fb = document.getElementById('ptqFeedback');
    fb.className = 'ptq-feedback show ' + (isCorrect ? 'ok' : 'bad');
    fb.innerHTML = (isCorrect ? '✅ Correct! ' : '❌ Not quite. ') + `<strong>${sym}</strong> is <strong>${name}</strong> (atomic number ${num}, ${catLabel}).`;
  });
}

function setPtTab(t){
  document.getElementById('tabExplorer').classList.toggle('active', t==='explorer');
  document.getElementById('tabQuiz').classList.toggle('active', t==='quiz');
  document.getElementById('explorerPanel').style.display = t==='explorer' ? 'block' : 'none';
  document.getElementById('quizPanel').style.display = t==='quiz' ? 'block' : 'none';
  if (t==='quiz' && !document.getElementById('ptqOpts').children.length) nextPtQuiz();
}
</script>
