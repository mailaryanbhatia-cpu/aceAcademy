<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">

<title>Periodic Table Explorer — aceAcademy</title>
<link rel="stylesheet" href="ace-theme.css">
<style>
:root{--bg:#0b1120;--card:#1a2540;--accent:#6366f1;--accent2:#a5b4fc;--muted:#b0bece;--border:#2a3a55;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
.topnav{display:flex;align-items:center;gap:6px;padding:0 20px;height:54px;background:#080e1c;border-bottom:1px solid var(--border);overflow-x:auto}.topnav::-webkit-scrollbar{display:none}
.logo{font-size:1.3rem;font-weight:800;color:#fff;text-decoration:none;margin-right:10px}.logo span{color:var(--accent2)}
.nav-link{text-decoration:none;color:var(--muted);font-size:.85rem;padding:6px 10px;border-radius:7px;white-space:nowrap;font-weight:600}.nav-link:hover{background:rgba(255,255,255,.07);color:#fff}.nav-link.active{color:var(--accent2)}
.spacer{flex:1}
.hero{text-align:center;padding:24px 20px 12px;background:linear-gradient(135deg,#06091a,#1a2080,#2d0d5c);border-bottom:1px solid var(--border)}
.hero h1{font-size:1.7rem;font-weight:800;color:#fff;margin-bottom:4px}
.hero p{color:var(--accent2);font-size:.9rem}
.container{max-width:1100px;margin:16px auto;padding:0 12px}

/* Table */
.pt-wrap{overflow-x:auto;padding-bottom:10px}
.pt-grid{display:grid;grid-template-columns:repeat(18,1fr);gap:3px;min-width:720px}
.el{border-radius:5px;padding:3px 2px;cursor:pointer;text-align:center;border:1.5px solid transparent;transition:all .12s;position:relative;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
.el:hover{border-color:#fff;transform:scale(1.08);z-index:2}
.el.selected{border-color:#fff;box-shadow:0 0 0 2px #fff}
.el-num{font-size:.52rem;font-weight:700;opacity:.7;line-height:1}
.el-sym{font-size:.85rem;font-weight:800;line-height:1.1}
.el-name{font-size:.38rem;line-height:1;opacity:.75;margin-top:1px}
.el-mass{font-size:.37rem;opacity:.6}
.el-spacer{aspect-ratio:1}

/* Category colors */
.cat-alkali{background:#7f1d1d;color:#fca5a5}
.cat-alkaline{background:#7c2d12;color:#fed7aa}
.cat-lanthanide{background:#1e3a5f;color:#93c5fd}
.cat-actinide{background:#1e1b4b;color:#c4b5fd}
.cat-transition{background:#064e3b;color:#6ee7b7}
.cat-post{background:#1a3a2a;color:#a7f3d0}
.cat-metalloid{background:#365314;color:#d9f99d}
.cat-nonmetal{background:#1c3461;color:#bfdbfe}
.cat-noble{background:#4a1d96;color:#ddd6fe}
.cat-unknown{background:#1f2937;color:#d1d5db}

/* Legend */
.legend{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0 14px}
.leg{display:flex;align-items:center;gap:5px;font-size:.7rem;font-weight:600;cursor:pointer;padding:3px 8px;border-radius:6px;border:1.5px solid transparent;transition:all .12s}
.leg:hover,.leg.active{border-color:#fff}
.leg-dot{width:10px;height:10px;border-radius:3px;flex-shrink:0}

/* Detail panel */
.detail-panel{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:20px;margin-bottom:16px;display:none}
.detail-panel.visible{display:block}
.dp-header{display:flex;gap:16px;align-items:center;margin-bottom:14px}
.dp-symbol-big{font-size:3rem;font-weight:900;width:80px;height:80px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.dp-name{font-size:1.4rem;font-weight:800;color:#fff}
.dp-num{font-size:.85rem;color:var(--muted);margin-bottom:3px}
.dp-cat{font-size:.75rem;font-weight:700;padding:3px 10px;border-radius:8px;display:inline-block;margin-bottom:5px}
.dp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:14px}
@media(max-width:600px){.dp-grid{grid-template-columns:1fr 1fr}}
.dp-stat{background:#111827;border-radius:8px;padding:10px 12px}
.dp-stat-label{font-size:.65rem;font-weight:800;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:3px}
.dp-stat-val{font-size:.95rem;font-weight:700;color:#fff}
.dp-section{margin-bottom:12px}
.dp-section-title{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.07em;color:var(--accent2);margin-bottom:5px}
.dp-section-body{font-size:.85rem;color:#fff;line-height:1.6}
.electron-config{font-family:monospace;font-size:.88rem;background:#111827;padding:8px 12px;border-radius:7px;color:var(--accent2)}

/* Search */
.search-row{display:flex;gap:10px;margin-bottom:12px}
.pt-search{flex:1;background:#111827;border:1.5px solid var(--border);border-radius:9px;padding:9px 14px;color:#fff;font-size:.88rem;font-family:inherit;outline:none;transition:border .15s}
.pt-search:focus{border-color:var(--accent)}
</style>
</head>

  [33,'As','Arsenic',74.922,'metalloid',4,15,'[Ar] 3d¹⁰ 4s² 4p³','Toxic metalloid; used historically as a poison.','Semiconductors, wood preservatives, pesticides, pharmaceuticals.','Known since the Middle Ages.'],
  [34,'Se','Selenium',78.971,'nonmetal',4,16,'[Ar] 3d¹⁰ 4s² 4p⁴','Photoconductive nonmetal; essential trace element.','Solar cells, photocopiers, glass coloring, nutritional supplements.','Discovered by Jöns Jacob Berzelius in 1817.'],
  [35,'Br','Bromine',79.904,'nonmetal',4,17,'[Ar] 3d¹⁰ 4s² 4p⁵','Reddish-brown liquid at room temperature; one of two liquid elements.','Flame retardants, photography, water treatment, sedatives.','Discovered by Antoine Jérôme Balard in 1826.'],
  [36,'Kr','Krypton',83.798,'noble',4,18,'[Ar] 3d¹⁰ 4s² 4p⁶','Dense inert gas; much heavier than air.','Lighting, lasers, scientific measurement.','Discovered by Ramsay & Travers in 1898.'],
  [37,'Rb','Rubidium',85.468,'alkali',5,1,'[Kr] 5s¹','Soft silvery-white metal; extremely reactive.','Atomic clocks, research, fireworks (purple color).','Discovered by Bunsen & Kirchhoff in 1861.'],
  [38,'Sr','Strontium',87.62,'alkaline',5,2,'[Kr] 5s²','Soft yellowish metal; gives red color to fireworks.','Fireworks (red), magnets, CRT screens, bone cancer treatment.','Discovered by Adair Crawford in 1790.'],
  [47,'Ag','Silver',107.868,'transition',5,11,'[Kr] 4d¹⁰ 5s¹','Best electrical and thermal conductor of all metals. Precious metal.','Jewelry, coins, electronics, antimicrobial coatings, photography.','Known since antiquity.'],
  [50,'Sn','Tin',118.71,'post',5,14,'[Kr] 4d¹⁰ 5s² 5p²','Soft, silvery metal; resists corrosion. Produces a "tin cry" when bent.','Cans (tin plating), solder, bronze alloys, organ pipes.','Known since antiquity (≈3000 BCE).'],
  [53,'I','Iodine',126.904,'nonmetal',5,17,'[Kr] 4d¹⁰ 5s² 5p⁵','Purple-black solid that sublimes to violet vapor. Essential for thyroid health.','Antiseptics, thyroid medication, X-ray contrast agents, nutrition.','Discovered by Bernard Courtois in 1811.'],
  [54,'Xe','Xenon',131.293,'noble',5,18,'[Kr] 4d¹⁰ 5s² 5p⁶','Heavy, colorless inert gas. Used in powerful lamps.','Xenon headlights, ion propulsion, anesthesia, flash lamps.','Discovered by Ramsay & Travers in 1898.'],
  [55,'Cs','Cesium',132.905,'alkali',6,1,'[Xe] 6s¹','Softest metal; melts at 28.5°C. Most reactive alkali metal.','Atomic clocks (GPS precision), drilling fluids, research.','Discovered by Bunsen & Kirchhoff in 1860.'],

  [78,'Pt','Platinum',195.084,'transition',6,10,'[Xe] 4f¹⁴ 5d⁹ 6s¹','Dense, precious, corrosion-resistant silver-white metal.','Catalytic converters, jewelry, chemotherapy (cisplatin), electrodes.','Discovered by Antonio de Ulloa in 1748.'],
  [79,'Au','Gold',196.967,'transition',6,11,'[Xe] 4f¹⁴ 5d¹⁰ 6s¹','Soft, dense, yellow precious metal. Does not tarnish or corrode.','Jewelry, electronics (contacts), currency, dentistry, nanotechnology.','Known since antiquity.'],

  [88,'Ra','Radium',226,'alkaline',7,2,'[Rn] 7s²','Radioactive, luminescent silvery-white metal.','Cancer radiation therapy, historically in luminous paint.','Discovered by Marie & Pierre Curie in 1898.'],
  [92,'U','Uranium',238.029,'actinide',7,0,'[Rn] 5f³ 6d¹ 7s²','Radioactive heavy metal. Fissionable isotope U-235 used in nuclear reactions.','Nuclear power plants, nuclear weapons, counterweights, radiation shielding.','Discovered by Martin Heinrich Klaproth in 1789.'],
  [94,'Pu','Plutonium',244,'actinide',7,0,'[Rn] 5f⁶ 7s²','Radioactive transuranic metal. Fissile material for nuclear weapons and reactors.','Nuclear weapons, nuclear power, space power sources (RTGs).','Discovered by Glenn Seaborg et al. in 1940.'],

// Grid position: [row, col] (1-indexed)
const POSITIONS = {
  1:[1,1], 2:[1,18],
  3:[2,1], 4:[2,2], 5:[2,13], 6:[2,14], 7:[2,15], 8:[2,16], 9:[2,17], 10:[2,18],
  11:[3,1],12:[3,2],13:[3,13],14:[3,14],15:[3,15],16:[3,16],17:[3,17],18:[3,18],
  19:[4,1],20:[4,2],21:[4,3],22:[4,4],23:[4,5],24:[4,6],25:[4,7],26:[4,8],27:[4,9],28:[4,10],29:[4,11],30:[4,12],31:[4,13],32:[4,14],33:[4,15],34:[4,16],35:[4,17],36:[4,18],
  37:[5,1],38:[5,2],47:[5,11],50:[5,14],53:[5,17],54:[5,18],
  55:[6,1],56:[6,2],74:[6,6],78:[6,10],79:[6,11],80:[6,12],82:[6,14],86:[6,18],
  88:[7,2],92:[7,0],94:[7,0],
  // Lanthanides row 9, actinides row 10 (handled separately)
};

let selectedEl = null;
let filterCat = null;

function buildTable(){
  const grid = document.getElementById('ptGrid');
  // Build 9-row x 18-col grid
  const cells = Array.from({length:9*18}, ()=>null);

  // Place elements
  ELEMENTS.forEach(el=>{
    const pos = POSITIONS[el[0]];
    if(!pos||pos[1]===0) return; // skip actinides/lanthanides with no pos
    const row=pos[0]-1, col=pos[1]-1;
    cells[row*18+col] = el;
  });

  // Lanthanides row 8 (cols 3-17)
  const lans = ELEMENTS.filter(e=>e[4]==='lanthanide');
  lans.forEach((e,i)=>{ cells[8*18+(i+2)]=e; });

  // Actinides row 9 (cols 3-17)
  const acts = ELEMENTS.filter(e=>e[4]==='actinide');
  acts.forEach((e,i)=>{ cells[(8+1)*18+(i+2)]=e; }); // row 10 doesn't exist in our 9-row grid — will skip

  grid.innerHTML = '';

  // Rows 1-7
  for(let r=0;r<7;r++){
    for(let c=0;c<18;c++){
      const el=cells[r*18+c];
      if(!el){ grid.appendChild(Object.assign(document.createElement('div'),{className:'el-spacer'})); continue; }
      grid.appendChild(makeElDiv(el));
    }
  }
  // Gap row
  const gapDiv=document.createElement('div');gapDiv.style.gridColumn='1/-1';gapDiv.style.height='6px';grid.appendChild(gapDiv);
  // Lanthanide row
  for(let c=0;c<18;c++){
    const el=c>=2&&c<2+lans.length?lans[c-2]:null;
    if(!el){grid.appendChild(Object.assign(document.createElement('div'),{className:'el-spacer'}));continue;}
    grid.appendChild(makeElDiv(el));
  }
}

function makeElDiv(el){
  const [num,sym,name,mass,cat]=el;
  const catCls = CATS[cat]?.cls||'cat-unknown';
  const div=document.createElement('div');
  div.className=`el ${catCls}`;
  div.id='el-'+num;
  div.innerHTML=`<div class="el-num">${num}</div><div class="el-sym">${sym}</div><div class="el-name">${name.slice(0,7)}</div><div class="el-mass">${Number(mass).toFixed(1)}</div>`;
  div.onclick=()=>showDetail(el);
  if(filterCat && cat!==filterCat) div.style.opacity='0.2';
  return div;
}

function buildLegend(){
  const leg=document.getElementById('legend');
  leg.innerHTML=Object.entries(CATS).map(([k,v])=>`
    <span class="leg" data-cat="${k}" onclick="toggleFilter('${k}',this)">
      <span class="leg-dot ${v.cls}"></span>${v.label}
    </span>`).join('');
}

function toggleFilter(cat,btn){
  if(filterCat===cat){filterCat=null;document.querySelectorAll('.leg').forEach(l=>l.classList.remove('active'));}
  else{filterCat=cat;document.querySelectorAll('.leg').forEach(l=>l.classList.remove('active'));btn.classList.add('active');}
  document.querySelectorAll('.el').forEach(el=>{
    const elData=ELEMENTS.find(e=>el.id==='el-'+e[0]);
    if(!elData) return;
    el.style.opacity = (!filterCat||elData[4]===filterCat)?'1':'0.15';
  });
}

function showDetail(el){
  const [num,sym,name,mass,cat,period,group,config,desc,uses,discovery]=el;
  selectedEl=num;
  document.querySelectorAll('.el').forEach(e=>e.classList.remove('selected'));
  document.getElementById('el-'+num)?.classList.add('selected');

  const catInfo=CATS[cat]||{cls:'cat-unknown',label:'Unknown'};
  const dp=document.getElementById('detailPanel');
  dp.className='detail-panel visible';

  const bigEl=document.getElementById('dp-symbig');
  bigEl.textContent=sym;
  bigEl.className=`dp-symbol-big ${catInfo.cls}`;
  document.getElementById('dp-name').textContent=name;
  document.getElementById('dp-num').textContent=`Atomic Number: ${num} · Period: ${period} · Group: ${group||'—'}`;
  const catTag=document.getElementById('dp-cat');
  catTag.textContent=catInfo.label;
  catTag.className=`dp-cat ${catInfo.cls}`;
  document.getElementById('dp-stats').innerHTML=[
    ['Atomic Mass', mass+' u'],
    ['State (STP)', cat==='noble'?'Gas':cat==='nonmetal'&&[35,80].includes(num)?num===35?'Liquid':'Liquid':'Solid/Gas varies'],
    ['Category', catInfo.label],
  ].map(([l,v])=>`<div class="dp-stat"><div class="dp-stat-label">${l}</div><div class="dp-stat-val">${v}</div></div>`).join('');
  document.getElementById('dp-config').textContent=config;
  document.getElementById('dp-desc').textContent=desc;
  document.getElementById('dp-uses').textContent=uses;
  document.getElementById('dp-discovery').textContent=discovery;

  dp.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function searchElements(){
  const q=document.getElementById('ptSearch').value.toLowerCase().trim();
  ELEMENTS.forEach(el=>{
    const match = !q || el[1].toLowerCase().includes(q)||el[2].toLowerCase().includes(q)||String(el[0]).includes(q);
    const div=document.getElementById('el-'+el[0]);
    if(div) div.style.opacity = match?'1':'0.1';
  });
  if(!q && !filterCat) document.querySelectorAll('.el').forEach(e=>e.style.opacity='1');
}

buildLegend();
buildTable();
</script>
</body></html>
