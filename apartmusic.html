<div class="container">

  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="setTab('concepts')" id="tabConcepts">📚 Concept Drill</button>

    </div>
  </div>

  <div id="conceptsPanel">
    <div class="card">
      <h2>Subject</h2>
      <div class="subject-toggle">

      </div>
      <h2>Choose a Unit</h2>
      <div class="unit-grid" id="unitGrid"></div>
    </div>

    <div class="card" id="studyCard" style="display:none">
      <div class="mode-row">
        <button class="mode-btn active" id="modeFlash" onclick="setMode('flash')">🗂️ Flashcards</button>
        <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">✅ Quiz Me</button>
      </div>

      <div id="flashArea">
        <div class="flash-progress" id="flashProgress"></div>
        <div class="flash-wrap">
          <div class="flash-card" id="flashCard" onclick="flipCard()"></div>
        </div>
        <div class="flash-nav">
          <button class="btn btn-outline" onclick="prevCard()">← Prev</button>

        </div>
      </div>

      <div id="quizArea" style="display:none">

        <div id="quizQCard"></div>

        </div>
      </div>
    </div>
  </div>

  <div id="intervalPanel" style="display:none">

      <h2>Note + Interval → Result Note</h2>

          <select id="ivRoot"></select>
        </div>
        <div>
          <label>Interval</label>

        </div>
      </div>

    </div>

      </div>

    </div>

const unitKeys = Object.keys(UNITS);
let currentSubject = 'art';
let currentUnit = null;
let mode = 'flash';
let cardOrder = [];
let cardIdx = 0;
let flipped = false;
let quizQ = [];
let quizIdx = 0;
let quizScore = 0;

function setTab(t) {
  document.getElementById('tabConcepts').classList.toggle('active', t === 'concepts');
  document.getElementById('tabInterval').classList.toggle('active', t === 'interval');
  document.getElementById('conceptsPanel').style.display = t === 'concepts' ? 'block' : 'none';
  document.getElementById('intervalPanel').style.display = t === 'interval' ? 'block' : 'none';
}

function setSubject(s) {
  currentSubject = s;
  document.getElementById('btnArt').classList.toggle('active', s === 'art');
  document.getElementById('btnMusic').classList.toggle('active', s === 'music');
  currentUnit = null;
  document.getElementById('studyCard').style.display = 'none';
  renderUnitGrid();
}

function renderUnitGrid() {
  const grid = document.getElementById('unitGrid');
  const keys = unitKeys.filter(k => UNITS[k].subject === currentSubject);
  grid.innerHTML = keys.map(k => {
    const u = UNITS[k];
    return `<div class="unit-card${k===currentUnit?' active':''}" onclick="selectUnit('${k}')">
      <div class="unit-icon">${u.icon}</div>
      <div class="unit-name">${escHtml(u.label)}</div>
      <div class="unit-count">${u.terms.length} terms</div>
    </div>`;
  }).join('');
}

function selectUnit(k) {
  currentUnit = k;
  renderUnitGrid();
  document.getElementById('studyCard').style.display = 'block';
  cardOrder = UNITS[k].terms.map((_, i) => i);
  cardIdx = 0;
  flipped = false;
  setMode(mode);
}

function setMode(m) {
  mode = m;
  document.getElementById('modeFlash').classList.toggle('active', m === 'flash');
  document.getElementById('modeQuiz').classList.toggle('active', m === 'quiz');
  document.getElementById('flashArea').style.display = m === 'flash' ? 'block' : 'none';
  document.getElementById('quizArea').style.display = m === 'quiz' ? 'block' : 'none';
  if (m === 'flash') renderFlash();
  else startQuiz();
}

function renderFlash() {
  if (!currentUnit) return;
  const terms = UNITS[currentUnit].terms;
  const [term, def] = terms[cardOrder[cardIdx]];
  document.getElementById('flashProgress').textContent = `Card ${cardIdx+1} of ${terms.length}`;
  const card = document.getElementById('flashCard');
  card.innerHTML = flipped ? `<div class="def">${escHtml(def)}</div>` : `<div>${escHtml(term)}</div>`;
}

function flipCard() { flipped = !flipped; renderFlash(); }
function nextCard() { cardIdx = (cardIdx + 1) % cardOrder.length; flipped = false; renderFlash(); }
function prevCard() { cardIdx = (cardIdx - 1 + cardOrder.length) % cardOrder.length; flipped = false; renderFlash(); }
function shuffleCards() {
  for (let i = cardOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardOrder[i], cardOrder[j]] = [cardOrder[j], cardOrder[i]];
  }
  cardIdx = 0; flipped = false; renderFlash();
}

function startQuiz() {
  if (!currentUnit) return;
  const terms = UNITS[currentUnit].terms;
  const idxs = terms.map((_, i) => i);
  for (let i = idxs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
  }
  quizQ = idxs.slice(0, Math.min(10, idxs.length)).map(i => {
    const [term, def] = terms[i];
    const distractors = terms.filter((_, di) => di !== i).map(t => t[1]);
    for (let k = distractors.length - 1; k > 0; k--) {
      const j = Math.floor(Math.random() * (k + 1));
      [distractors[k], distractors[j]] = [distractors[j], distractors[k]];
    }
    const opts = [def, ...distractors.slice(0, 3)];
    for (let k = opts.length - 1; k > 0; k--) {
      const j = Math.floor(Math.random() * (k + 1));
      [opts[k], opts[j]] = [opts[j], opts[k]];
    }
    return { term, def, opts };
  });
  quizIdx = 0; quizScore = 0;
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizQCard').style.display = 'block';
  renderQuiz();
}

function renderQuiz() {
  const q = quizQ[quizIdx];
  document.getElementById('quizProgress').textContent = `Question ${quizIdx+1} of ${quizQ.length} · Score: ${quizScore}`;
  document.getElementById('quizQCard').innerHTML = `
    <div class="q-block">
      <div class="q-text">What is the best definition of: <strong>${escHtml(q.term)}</strong>?</div>
      ${q.opts.map((o,oi) => `<button class="opt" data-idx="${oi}" onclick="answerQuiz(this,${oi})">${escHtml(o)}</button>`).join('')}
    </div>`;
}

function answerQuiz(btn, optIdx) {
  const q = quizQ[quizIdx];
  const opt = q.opts[optIdx];
  const correct = opt === q.def;
  if (correct) quizScore++;
  document.querySelectorAll('#quizQCard .opt').forEach(b => {
    b.disabled = true;
    if (q.opts[parseInt(b.getAttribute('data-idx'),10)] === q.def) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');
  setTimeout(() => {
    quizIdx++;
    if (quizIdx >= quizQ.length) endQuiz();
    else renderQuiz();
  }, 900);
}

function endQuiz() {
  document.getElementById('quizQCard').style.display = 'none';
  document.getElementById('quizResult').style.display = 'block';
  const pct = Math.round(quizScore / quizQ.length * 100);
  document.getElementById('quizFinalScore').textContent = `${quizScore}/${quizQ.length}`;
  document.getElementById('quizMsg').textContent = pct >= 90 ? "Excellent! You know this unit cold." :
    pct >= 70 ? "Great work — review the ones you missed." :
    pct >= 50 ? "Good effort. A bit more review will help." :
    "Keep studying this unit — you'll get there.";
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// ═══════════════════════════════════════════════════════════
// INTERVAL IDENTIFIER
// ═══════════════════════════════════════════════════════════
const CHROMATIC = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const INTERVALS = [
  { name: 'Perfect Unison', semitones: 0 },
  { name: 'Minor 2nd', semitones: 1 },
  { name: 'Major 2nd', semitones: 2 },
  { name: 'Minor 3rd', semitones: 3 },
  { name: 'Major 3rd', semitones: 4 },
  { name: 'Perfect 4th', semitones: 5 },
  { name: 'Tritone (Aug 4th/Dim 5th)', semitones: 6 },
  { name: 'Perfect 5th', semitones: 7 },
  { name: 'Minor 6th', semitones: 8 },
  { name: 'Major 6th', semitones: 9 },
  { name: 'Minor 7th', semitones: 10 },
  { name: 'Major 7th', semitones: 11 },
  { name: 'Perfect Octave', semitones: 12 },
];

function populateIntervalSelects() {
  const noteOpts = CHROMATIC.map(n => `<option>${n}</option>`).join('');
  document.getElementById('ivRoot').innerHTML = noteOpts;
  document.getElementById('ivNote1').innerHTML = noteOpts;
  document.getElementById('ivNote2').innerHTML = noteOpts;
  document.getElementById('ivInterval').innerHTML = INTERVALS.map(iv => `<option value="${iv.semitones}">${iv.name}</option>`).join('');
  document.getElementById('ivNote2').selectedIndex = 4;
}

function solveInterval() {
  const root = document.getElementById('ivRoot').value;
  const semitones = parseInt(document.getElementById('ivInterval').value, 10);
  const out = document.getElementById('intervalOutput');
  const rootIdx = CHROMATIC.indexOf(root);
  const resultIdx = (rootIdx + semitones) % 12;
  const octaveUp = Math.floor((rootIdx + semitones) / 12);
  const resultNote = CHROMATIC[resultIdx];
  const ivName = INTERVALS.find(iv => iv.semitones === semitones).name;
  out.innerHTML = `<div class="result-box">
    <div class="result-val">${esc(resultNote)}${octaveUp > 0 ? ' (up an octave)' : ''}</div>
    <div class="result-lbl">${esc(root)} + ${esc(ivName)}</div>
  </div>`;
}

function identifyInterval() {
  const n1 = document.getElementById('ivNote1').value;
  const n2 = document.getElementById('ivNote2').value;
  const out = document.getElementById('identifyOutput');
  const i1 = CHROMATIC.indexOf(n1);
  const i2 = CHROMATIC.indexOf(n2);
  let diff = (i2 - i1 + 12) % 12;
  const iv = INTERVALS.find(iv => iv.semitones === diff);
  out.innerHTML = `<div class="result-box">
    <div class="result-val">${esc(iv.name)}</div>
    <div class="result-lbl">${esc(n1)} → ${esc(n2)} (${diff} semitones)</div>
  </div>`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderUnitGrid();
populateIntervalSelects();
