<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Essay Grader — aceAcademy</title>
<link rel="stylesheet" href="ace-theme.css"/>
<link rel="manifest" href="/aceAcademy/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="/aceAcademy/icons/icon-192.png"/>
<script src="theme.js"></script>
<script src="streak.js"></script>
<style>
body{font-family:var(--font);background:#0b1120;color:#e2e8f0;margin:0}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#0f172a;border-bottom:1px solid #1e293b}
.nav a{color:#e2e8f0;text-decoration:none;font-weight:700;font-size:1.1rem}
.nav-links{display:flex;gap:14px;align-items:center}
.nav-links a{color:#94a3b8;text-decoration:none;font-size:.88rem}
.nav-links a:hover{color:#e2e8f0}
.container{max-width:900px;margin:0 auto;padding:32px 20px}
h1{font-size:1.8rem;font-weight:900;margin:0 0 4px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#64748b;font-size:.93rem;margin-bottom:28px}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:600px){.form-row{grid-template-columns:1fr}}
label{display:block;font-size:.82rem;font-weight:700;color:#94a3b8;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
select,textarea{width:100%;background:#0f172a;border:1px solid #334155;border-radius:10px;color:#e2e8f0;font-size:.9rem;padding:10px 14px;box-sizing:border-box;font-family:inherit;transition:border-color .2s;resize:vertical}
select:focus,textarea:focus{outline:none;border-color:#6366f1}
textarea{min-height:260px;line-height:1.6}
.grade-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:12px 32px;border-radius:99px;font-weight:800;font-size:1rem;cursor:pointer;display:flex;align-items:center;gap:8px;margin:0 auto}
.grade-btn:hover{opacity:.9}
.grade-btn:disabled{opacity:.5;cursor:default}
.results{display:none;margin-top:32px}
.overall{text-align:center;margin-bottom:28px}
.score-circle{width:110px;height:110px;border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 12px;font-weight:900;font-size:2rem;border:4px solid}
.score-label{font-size:.85rem;color:#94a3b8;text-transform:uppercase;letter-spacing:.06em}
.rubric-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:14px;margin-bottom:24px}
.rubric-card{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:18px}
.rubric-card h3{margin:0 0 8px;font-size:.88rem;font-weight:800;color:#a5b4fc}
.rubric-score{font-size:1.6rem;font-weight:900;margin-bottom:4px}
.rubric-max{font-size:.75rem;color:#475569}
.rubric-note{font-size:.78rem;color:#94a3b8;margin-top:6px;line-height:1.4}
.bar-track{background:#1e293b;border-radius:99px;height:7px;margin-top:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width 1s ease}
.feedback-section{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:22px;margin-bottom:16px}
.feedback-section h2{margin:0 0 14px;font-size:1rem;font-weight:800;color:#a5b4fc;display:flex;align-items:center;gap:8px}
.fb-item{display:flex;gap:10px;margin-bottom:10px;font-size:.85rem;line-height:1.5}
.fb-icon{flex-shrink:0;font-size:1rem}
.strengths .fb-icon{color:#10b981}
.improve .fb-icon{color:#f59e0b}
.tips .fb-icon{color:#6366f1}
.stats-bar{display:flex;gap:20px;flex-wrap:wrap;background:#0f172a;border:1px solid #1e293b;border-radius:12px;padding:14px 18px;margin-bottom:24px;font-size:.82rem}
.stat-item{display:flex;flex-direction:column;align-items:center;gap:2px}
.stat-num2{font-weight:800;font-size:1.1rem;color:#a5b4fc}
.stat-lab2{color:#64748b;font-size:.7rem;text-transform:uppercase}
.spinner{display:none;text-align:center;padding:24px;color:#6366f1;font-size:.9rem}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html">🎓 aceAcademy</a>
  <div class="nav-links">
    <a href="tutor.html">Tutor</a>
    <a href="alltools.html">All Tools</a>
    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.1rem" id="themeToggle">☀️</button>
  </div>
</nav>

<div class="container">
  <h1>✍️ Essay Grader</h1>
  <p class="subtitle">Paste your essay and get structured feedback based on real AP rubrics</p>

  <div class="form-row">
    <div>
      <label>Rubric</label>
      <select id="rubricSel">
        <option value="aplang">AP Language & Composition</option>
        <option value="aplit">AP Literature & Composition</option>
        <option value="apworld">AP World / APUSH / AP Gov (DBQ)</option>
        <option value="sat">SAT Essay (Reading/Analysis/Writing)</option>
        <option value="general">General 5-Paragraph Essay</option>
      </select>
    </div>
    <div>
      <label>Prompt / Assignment (optional)</label>
      <select id="promptType">
        <option value="">— Select type —</option>
        <option value="argumentative">Argumentative</option>
        <option value="synthesis">Synthesis</option>
        <option value="rhetorical">Rhetorical Analysis</option>
        <option value="dbq">DBQ</option>
        <option value="leq">LEQ / SAQ</option>
        <option value="narrative">Narrative / Personal</option>
      </select>
    </div>
  </div>

  <div style="margin-bottom:16px">
    <label>Your Essay</label>
    <textarea id="essayBox" placeholder="Paste your essay here…"></textarea>
  </div>

  <div style="text-align:center;margin-bottom:32px">
    <button class="grade-btn" onclick="gradeEssay()" id="gradeBtn">✨ Grade My Essay</button>
  </div>

  <div class="spinner" id="spinner">⏳ Analyzing your essay…</div>

  <div class="results" id="results">
    <div class="overall">
      <div class="score-circle" id="scoreCircle">
        <span id="scoreNum">0</span>
      </div>
      <div id="scoreVerdict" style="font-weight:800;font-size:1.1rem;margin-bottom:4px"></div>
      <div class="score-label" id="scoreScale"></div>
    </div>

    <div class="stats-bar" id="essayStats"></div>

    <div class="rubric-grid" id="rubricCards"></div>

    <div class="feedback-section strengths">
      <h2>💪 Strengths</h2>
      <div id="strengthsList"></div>
    </div>

    <div class="feedback-section improve">
      <h2>⚠️ Areas to Improve</h2>
      <div id="improveList"></div>
    </div>

    <div class="feedback-section tips">
      <h2>💡 Specific Tips</h2>
      <div id="tipsList"></div>
    </div>
  </div>
</div>

<script>
// ── Transition words ───────────────────────────────────────────
var TRANSITIONS = ['furthermore','moreover','however','therefore','consequently','in addition','nevertheless','on the other hand','in contrast','for example','for instance','in conclusion','to summarize','additionally','subsequently','conversely','similarly','likewise','as a result','thus','hence','although','while','whereas'];

// ── Vocab complexity words ─────────────────────────────────────
var COMPLEX_WORDS = ['sophisticated','nuanced','intricate','fundamental','demonstrate','articulate','perspective','significant','ambiguous','rhetoric','analyze','synthesis','juxtapose','ubiquitous','paradigm','contend','assert','illuminate','elucidate','emphasize','arguably','compelling','coherent','substantiate','corroborate','inherent','implications','characterize'];

// ── Thesis patterns ────────────────────────────────────────────
var THESIS_PATTERNS = [/\bargues? that\b/i,/\bclaims? that\b/i,/\bcontends? that\b/i,/\basserts? that\b/i,/\bthis essay (will|argues|shows|demonstrates)\b/i,/\bthe (author|writer|speaker|text) (argues|suggests|claims|contends)\b/i,/\bin (this|the following)\b/i,/\bultimately\b/i,/\bthrough\b.*\bthe author\b/i];

// ── Evidence patterns ──────────────────────────────────────────
var EVIDENCE_PATTERNS = [/\baccording to\b/i,/\bfor (example|instance)\b/i,/\bas (shown|demonstrated|seen|evidenced)\b/i,/\bquote[sd]?\b/i,/\bin (lines?|paragraph|the (text|passage|document))\b/i,/\bstatistic(ally)?\b/i,/\bstudi(es|ed)\b/i,/\bresearch (shows?|suggests?|indicates?)\b/i,/\bdata (shows?|suggests?|indicates?)\b/i,/["""][^"""]{10,}["""]/];

function analyzeEssay(text, rubric, promptType) {
  var sentences = text.match(/[^.!?]+[.!?]+/g) || [];
  var words     = text.trim().split(/\s+/).filter(Boolean);
  var paras     = text.trim().split(/\n\s*\n/).filter(function(p){ return p.trim().length > 20; });
  var wc        = words.length;
  var sc        = sentences.length;
  var pc        = paras.length;

  // Sentence length variety
  var sentLengths = sentences.map(function(s){ return s.trim().split(/\s+/).length; });
  var avgSentLen  = sc > 0 ? sentLengths.reduce(function(a,b){ return a+b; },0)/sc : 0;
  var sentVariety = sc > 1 ? Math.sqrt(sentLengths.reduce(function(a,l){ return a+Math.pow(l-avgSentLen,2); },0)/sc) : 0;

  // Transition count
  var lc = text.toLowerCase();
  var transCount = TRANSITIONS.filter(function(t){ return lc.includes(t); }).length;

  // Thesis detection (first/last paragraph)
  var firstPara = (paras[0]||'').toLowerCase();
  var lastPara  = (paras[paras.length-1]||'').toLowerCase();
  var hasThesis = THESIS_PATTERNS.some(function(p){ return p.test(firstPara); });
  var hasConclusion = THESIS_PATTERNS.some(function(p){ return p.test(lastPara); }) || /\bin conclusion\b|\bto conclude\b|\bultimately\b/.test(lastPara);

  // Evidence count
  var evidenceCount = EVIDENCE_PATTERNS.filter(function(p){ return p.test(text); }).length;

  // Complex vocab
  var complexCount = COMPLEX_WORDS.filter(function(w){ return lc.includes(w); }).length;

  // Paragraph structure score (intro, body, conclusion)
  var structureScore = Math.min(1, pc >= 4 ? 1 : pc / 4);

  // Spelling approximation (simple: look for obvious repeated spaces, etc.)
  var hasLongEnough = wc >= 300;

  // ── Score by rubric ───────────────────────────────────────────
  var categories = [];
  var totalScore, maxScore, verdict, scaleLabel;

  if (rubric === 'aplang' || rubric === 'aplit') {
    // AP Lang/Lit: Thesis(0-1), Evidence & Commentary(0-4), Sophistication(0-1) → max 6
    var thesisScore = hasThesis ? 1 : 0;
    var evScore = Math.min(4, Math.round(
      (evidenceCount >= 2 ? 1 : 0) +
      (evidenceCount >= 4 ? 1 : 0) +
      (transCount >= 3 ? 1 : 0) +
      (pc >= 3 ? 1 : 0)
    ));
    var sophScore = (complexCount >= 3 && sentVariety > 3 && wc >= 400) ? 1 : 0;
    totalScore = thesisScore + evScore + sophScore;
    maxScore   = 6;
    scaleLabel = 'out of 6 (AP Scale)';
    verdict    = totalScore >= 5 ? 'Excellent' : totalScore >= 4 ? 'Proficient' : totalScore >= 3 ? 'Developing' : 'Needs Work';
    categories = [
      { name:'Thesis', score:thesisScore, max:1, color:'#6366f1',
        note: thesisScore ? 'Thesis statement detected in your opening.' : 'No clear thesis found in your introduction.' },
      { name:'Evidence & Commentary', score:evScore, max:4, color:'#8b5cf6',
        note: 'Found ~'+evidenceCount+' evidence markers and '+transCount+' transition words.' },
      { name:'Sophistication', score:sophScore, max:1, color:'#ec4899',
        note: sophScore ? 'Strong vocabulary and sentence variety detected.' : 'Add more complex vocabulary and vary sentence structure.' }
    ];
  } else if (rubric === 'apworld') {
    // DBQ: Thesis(0-1), Contextualization(0-1), Evidence(0-3), Analysis(0-2) → max 7
    var th = hasThesis ? 1 : 0;
    var ctx = /\bhistorical(ly)?\b|\bbackground\b|\bcontext\b|\bprior to\b|\bcentur(y|ies)\b/.test(text) ? 1 : 0;
    var ev = Math.min(3, Math.round(evidenceCount * 0.6 + (transCount >= 2 ? 0.5 : 0)));
    var an = Math.min(2, Math.round((complexCount >= 2 ? 1 : 0) + (sentVariety > 2 ? 1 : 0)));
    totalScore = th + ctx + ev + an;
    maxScore   = 7;
    scaleLabel = 'out of 7 (DBQ Scale)';
    verdict    = totalScore >= 6 ? 'Excellent' : totalScore >= 4 ? 'Proficient' : totalScore >= 2 ? 'Developing' : 'Needs Work';
    categories = [
      { name:'Thesis', score:th, max:1, color:'#6366f1', note: th ? 'Clear thesis present.' : 'Add a specific, defensible thesis.' },
      { name:'Contextualization', score:ctx, max:1, color:'#8b5cf6', note: ctx ? 'Historical context detected.' : 'Add broader historical context before the time period.' },
      { name:'Evidence', score:ev, max:3, color:'#10b981', note: 'Found ~'+evidenceCount+' evidence/document references.' },
      { name:'Analysis & Reasoning', score:an, max:2, color:'#f59e0b', note: 'Complexity and analytical depth.' }
    ];
  } else if (rubric === 'sat') {
    // SAT: Reading(1-4), Analysis(1-4), Writing(1-4) → max 12 (displayed as /24 for two graders)
    var rd = Math.min(4, Math.max(1, Math.round(evidenceCount * 0.5 + (hasThesis?1:0))));
    var an2 = Math.min(4, Math.max(1, Math.round(transCount * 0.3 + complexCount * 0.3 + (structureScore>=.75?1:0))));
    var wr = Math.min(4, Math.max(1, Math.round((sentVariety > 3?1:0) + (wc>=400?1:0) + (pc>=4?1:0) + (hasConclusion?1:0))));
    totalScore = rd + an2 + wr;
    maxScore   = 12;
    scaleLabel = 'out of 12 (one reader) · ×2 for full score';
    verdict    = totalScore >= 10 ? 'Excellent' : totalScore >= 7 ? 'Proficient' : totalScore >= 5 ? 'Developing' : 'Needs Work';
    categories = [
      { name:'Reading', score:rd, max:4, color:'#3b82f6', note: 'Comprehension and use of source text.' },
      { name:'Analysis', score:an2, max:4, color:'#8b5cf6', note: 'Rhetorical analysis and use of evidence.' },
      { name:'Writing', score:wr, max:4, color:'#10b981', note: 'Grammar, structure, and language use.' }
    ];
  } else {
    // General: Thesis, Structure, Evidence, Style, Mechanics → max 25
    var th2  = hasThesis ? 5 : wc > 200 ? 3 : 1;
    var str2 = Math.round(structureScore * 5);
    var ev2  = Math.min(5, evidenceCount);
    var sty  = Math.min(5, Math.round(complexCount * 0.6 + sentVariety * 0.3));
    var mech = hasLongEnough ? Math.min(5, Math.round(3 + transCount * 0.3)) : 2;
    totalScore = th2 + str2 + ev2 + sty + mech;
    maxScore   = 25;
    scaleLabel = 'out of 25';
    verdict    = totalScore >= 21 ? 'Excellent' : totalScore >= 16 ? 'Proficient' : totalScore >= 11 ? 'Developing' : 'Needs Work';
    categories = [
      { name:'Thesis', score:th2, max:5, color:'#6366f1', note: hasThesis ? 'Clear thesis detected.' : 'Strengthen your opening thesis statement.' },
      { name:'Structure', score:str2, max:5, color:'#8b5cf6', note: pc + ' paragraphs detected. Aim for 5+ well-developed paragraphs.' },
      { name:'Evidence', score:ev2, max:5, color:'#10b981', note: evidenceCount + ' evidence/example markers found.' },
      { name:'Style', score:sty, max:5, color:'#f59e0b', note: complexCount + ' sophisticated words, sentence variety score: '+Math.round(sentVariety)+'.' },
      { name:'Mechanics', score:mech, max:5, color:'#3b82f6', note: wc + ' words. Transitions used: ' + transCount + '.' }
    ];
  }

  // ── Feedback generation ───────────────────────────────────────
  var strengths = [], improvements = [], tips = [];

  if (hasThesis) strengths.push('Your essay opens with a clear, arguable thesis statement.');
  if (evidenceCount >= 3) strengths.push('You use multiple pieces of evidence to support your argument.');
  if (transCount >= 4) strengths.push('Strong use of transition words creates smooth paragraph flow.');
  if (complexCount >= 4) strengths.push('Sophisticated vocabulary demonstrates strong command of language.');
  if (pc >= 5) strengths.push('Well-structured with a full introduction, body paragraphs, and conclusion.');
  if (sentVariety > 5) strengths.push('Good sentence length variety keeps the reader engaged.');
  if (hasConclusion) strengths.push('Your conclusion effectively wraps up the argument.');
  if (wc >= 500) strengths.push('Sufficient length shows thorough development of ideas.');
  if (strengths.length === 0) strengths.push('Essay submitted — keep working on the areas below to strengthen it.');

  if (!hasThesis) improvements.push('Add a clear, specific thesis in your first paragraph that states your argument.');
  if (evidenceCount < 2) improvements.push('Include more textual evidence, examples, or data to support your claims.');
  if (transCount < 3) improvements.push('Use more transition words (however, furthermore, consequently) to connect ideas.');
  if (wc < 300) improvements.push('Essay is too short — aim for at least 400-500 words for a full response.');
  if (pc < 4) improvements.push('Add more paragraphs — each body paragraph should cover one main point.');
  if (complexCount < 2) improvements.push('Upgrade your vocabulary with more precise, academic language.');
  if (!hasConclusion) improvements.push('Your conclusion should restate the thesis and synthesize your argument.');
  if (sentVariety < 2) improvements.push('Vary your sentence structure — mix short, punchy sentences with longer ones.');

  if (rubric === 'aplang') {
    tips.push('AP Lang scores are holistic — even a strong thesis can score lower without line-level commentary on your evidence.');
    tips.push('For sophistication: demonstrate a complex understanding by acknowledging counterarguments or placing the argument in a broader context.');
  } else if (rubric === 'aplit') {
    tips.push('AP Lit rewards close reading — quote directly from the text and explain the literary devices at work.');
    tips.push('Avoid plot summary. Every sentence should analyze, not just describe.');
  } else if (rubric === 'apworld') {
    tips.push('Contextualization must be in a separate, developed paragraph — not just a single sentence.');
    tips.push('For complexity points: explain cause and effect, continuity and change, or compare to another time period.');
  } else if (rubric === 'sat') {
    tips.push('The SAT essay rewards analysis of how the author builds an argument — focus on rhetoric, evidence use, and persuasive techniques.');
  }
  tips.push('Read your essay aloud — you'll catch awkward phrasing and missing transitions your eyes skip over.');
  tips.push('Each body paragraph: Topic sentence → Evidence → Explanation → Connection back to thesis.');

  return { totalScore, maxScore, verdict, scaleLabel, categories, strengths, improvements, tips, wc, sc, pc, avgSentLen: Math.round(avgSentLen), transCount };
}

function gradeEssay() {
  var text = document.getElementById('essayBox').value.trim();
  if (text.length < 50) { alert('Please paste your essay first.'); return; }
  var rubric = document.getElementById('rubricSel').value;
  var promptType = document.getElementById('promptType').value;

  document.getElementById('gradeBtn').disabled = true;
  document.getElementById('spinner').style.display = 'block';
  document.getElementById('results').style.display = 'none';

  setTimeout(function(){
    var r = analyzeEssay(text, rubric, promptType);
    renderResults(r);
    document.getElementById('gradeBtn').disabled = false;
    document.getElementById('spinner').style.display = 'none';
    document.getElementById('results').style.display = 'block';
    document.getElementById('results').scrollIntoView({ behavior:'smooth' });
  }, 800);
}

function renderResults(r) {
  var pct = Math.round(r.totalScore / r.maxScore * 100);
  var color = pct >= 75 ? '#10b981' : pct >= 55 ? '#f59e0b' : '#ef4444';

  var circle = document.getElementById('scoreCircle');
  circle.style.borderColor = color;
  circle.style.color = color;
  circle.style.background = 'rgba('+hexToRgb(color)+',0.08)';
  document.getElementById('scoreNum').textContent = r.totalScore + '/' + r.maxScore;
  document.getElementById('scoreVerdict').textContent = r.verdict;
  document.getElementById('scoreVerdict').style.color = color;
  document.getElementById('scoreScale').textContent = r.scaleLabel;

  document.getElementById('essayStats').innerHTML = [
    { n: r.wc, l: 'Words' },
    { n: r.sc, l: 'Sentences' },
    { n: r.pc, l: 'Paragraphs' },
    { n: r.avgSentLen, l: 'Avg Sent Len' },
    { n: r.transCount, l: 'Transitions' }
  ].map(function(s){
    return '<div class="stat-item"><div class="stat-num2">'+s.n+'</div><div class="stat-lab2">'+s.l+'</div></div>';
  }).join('');

  document.getElementById('rubricCards').innerHTML = r.categories.map(function(c){
    var barPct = Math.round(c.score/c.max*100);
    return '<div class="rubric-card">'
      +'<h3>'+c.name+'</h3>'
      +'<div class="rubric-score" style="color:'+c.color+'">'+c.score+'</div>'
      +'<div class="rubric-max">out of '+c.max+'</div>'
      +'<div class="bar-track"><div class="bar-fill" style="width:'+barPct+'%;background:'+c.color+'"></div></div>'
      +'<div class="rubric-note">'+c.note+'</div>'
      +'</div>';
  }).join('');

  document.getElementById('strengthsList').innerHTML = r.strengths.map(function(s){
    return '<div class="fb-item"><span class="fb-icon">✓</span><span>'+s+'</span></div>';
  }).join('');
  document.getElementById('improveList').innerHTML = r.improvements.map(function(s){
    return '<div class="fb-item"><span class="fb-icon">→</span><span>'+s+'</span></div>';
  }).join('');
  document.getElementById('tipsList').innerHTML = r.tips.map(function(s){
    return '<div class="fb-item"><span class="fb-icon">💡</span><span>'+s+'</span></div>';
  }).join('');
}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return r+','+g+','+b;
}
</script>
