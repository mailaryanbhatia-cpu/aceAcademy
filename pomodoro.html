<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pomodoro Timer — aceAcademy</title>
<link rel="stylesheet" href="ace-theme.css"/>
<link rel="manifest" href="/aceAcademy/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="/aceAcademy/icons/icon-192.png"/>
<script src="theme.js"></script>
<script src="/aceAcademy/streak.js"></script>
<script src="/aceAcademy/nav-profile.js"></script>
<script src="/aceAcademy/splash.js"></script>
<script src="/aceAcademy/sounds.js"></script>
<script src="/aceAcademy/coins.js"></script>
<style>
body{font-family:var(--font);background:#0b1120;color:#e2e8f0;margin:0}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#0f172a;border-bottom:1px solid #1e293b}
.nav a{color:#e2e8f0;text-decoration:none;font-weight:700;font-size:1.1rem}
.nav-links{display:flex;gap:14px;align-items:center}
.nav-links a{color:#94a3b8;text-decoration:none;font-size:.88rem}.nav-links a:hover{color:#e2e8f0}
.container{max-width:860px;margin:0 auto;padding:28px 20px}
h1{font-size:1.8rem;font-weight:900;margin:0 0 4px;background:linear-gradient(135deg,#6366f1,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#64748b;font-size:.93rem;margin-bottom:28px}

/* Timer */
.timer-card{background:#0f172a;border:1px solid #1e293b;border-radius:24px;padding:36px;text-align:center;margin-bottom:20px;position:relative}
.mode-tabs{display:flex;gap:4px;justify-content:center;margin-bottom:28px}
.mode-tab{padding:7px 18px;border-radius:99px;border:1.5px solid #334155;background:transparent;color:#64748b;font-size:.82rem;font-weight:700;cursor:pointer;transition:all .2s}
.mode-tab.active{border-color:#6366f1;background:rgba(99,102,241,.15);color:#a5b4fc}
.timer-ring{position:relative;width:220px;height:220px;margin:0 auto 24px}
.timer-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#1e293b;stroke-width:10}
.ring-fg{fill:none;stroke-width:10;stroke-linecap:round;transition:stroke-dashoffset .5s linear,stroke .3s}
.timer-display{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.timer-time{font-size:3rem;font-weight:900;color:#e2e8f0;letter-spacing:-.02em;line-height:1}
.timer-label{font-size:.78rem;color:#64748b;margin-top:4px;text-transform:uppercase;letter-spacing:.08em}
.timer-controls{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.t-btn{padding:11px 28px;border-radius:99px;border:none;font-weight:800;font-size:.95rem;cursor:pointer;transition:all .2s}
.t-start{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff}
.t-start:hover{opacity:.9}
.t-reset{background:#1e293b;color:#94a3b8;border:1px solid #334155}
.t-reset:hover{border-color:#6366f1;color:#a5b4fc}
.subject-row{display:flex;align-items:center;gap:10px;justify-content:center;margin-bottom:8px}
.subject-row select{background:#1e293b;border:1px solid #334155;border-radius:8px;color:#e2e8f0;padding:7px 12px;font-size:.85rem}
.session-count{font-size:.82rem;color:#64748b}
.session-dots{display:flex;gap:5px;justify-content:center;margin-top:10px}
.session-dot{width:10px;height:10px;border-radius:50%;background:#1e293b;transition:background .3s}
.session-dot.done{background:#6366f1}

/* Stats */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:16px;text-align:center}
.stat-num{font-size:1.8rem;font-weight:900;line-height:1;color:#6366f1}
.stat-label{font-size:.72rem;color:#64748b;margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* History */
.section{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:20px;margin-bottom:16px}
.section h2{margin:0 0 14px;font-size:.93rem;font-weight:800;color:#a5b4fc;display:flex;align-items:center;gap:8px}
.hist-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid #1e293b;font-size:.83rem}
.hist-row:last-child{border-bottom:none}
.hist-icon{font-size:1rem;flex-shrink:0}
.hist-text{flex:1;color:#e2e8f0}
.hist-time{color:#475569;font-size:.75rem}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{width:100px;font-size:.78rem;color:#94a3b8;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#1e293b;border-radius:99px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#6366f1,#8b5cf6)}
.bar-val{width:36px;font-size:.74rem;color:#64748b;text-align:right}
.settings-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:14px;padding-top:14px;border-top:1px solid #1e293b}
.dur-btn{padding:5px 14px;border-radius:99px;border:1.5px solid #334155;background:transparent;color:#64748b;font-size:.78rem;font-weight:700;cursor:pointer;transition:all .2s}
.dur-btn.active{border-color:#6366f1;color:#a5b4fc;background:rgba(99,102,241,.1)}
</style>
</head>
<body>
<nav class="nav">
  <a href="index.html">🎓 aceAcademy</a>
  <div class="nav-links">
    <a href="progress.html">Progress</a>
    <a href="alltools.html">All Tools</a>
    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.1rem" id="themeToggle">☀️</button>
  </div>
</nav>
<div class="container">
  <h1>🍅 Pomodoro Timer</h1>
  <p class="subtitle">Focus sessions with session history, subject tracking, and daily stats</p>

  <div class="timer-card">
    <div class="mode-tabs">
      <button class="mode-tab active" onclick="setMode('focus')" id="tab-focus">🍅 Focus</button>
      <button class="mode-tab" onclick="setMode('short')" id="tab-short">☕ Short Break</button>
      <button class="mode-tab" onclick="setMode('long')" id="tab-long">🌿 Long Break</button>
    </div>

    <div class="timer-ring">
      <svg width="220" height="220" viewBox="0 0 220 220">
        <circle class="ring-bg" cx="110" cy="110" r="100"/>
        <circle class="ring-fg" id="ringFg" cx="110" cy="110" r="100" stroke="#6366f1"
          stroke-dasharray="628" stroke-dashoffset="0"/>
      </svg>
      <div class="timer-display">
        <div class="timer-time" id="timerDisplay">25:00</div>
        <div class="timer-label" id="timerLabel">Focus</div>
      </div>
    </div>

    <div class="subject-row">
      <span style="font-size:.82rem;color:#64748b">Subject:</span>
      <select id="subjectSel">
        <option value="General">General Study</option>
        <option value="AP Biology">AP Biology</option>
        <option value="AP Chemistry">AP Chemistry</option>
        <option value="AP Physics">AP Physics</option>
        <option value="AP Calculus">AP Calculus</option>
        <option value="AP History">AP History</option>
        <option value="AP English">AP English</option>
        <option value="AP Gov">AP Gov</option>
        <option value="AP Psychology">AP Psychology</option>
        <option value="SAT Prep">SAT Prep</option>
        <option value="Math">Math</option>
        <option value="Reading">Reading</option>
        <option value="Writing">Writing</option>
      </select>
    </div>

    <div class="timer-controls">
      <button class="t-btn t-reset" onclick="resetTimer()">↺ Reset</button>
      <button class="t-btn t-start" id="startBtn" onclick="toggleTimer()">▶ Start</button>
    </div>

    <div class="session-count" id="sessionCount">Session 1 of 4</div>
    <div class="session-dots" id="sessionDots"></div>

    <div class="settings-row">
      <span style="font-size:.74rem;color:#475569">Focus:</span>
      <button class="dur-btn active" onclick="setDuration('focus',25,this)">25m</button>
      <button class="dur-btn" onclick="setDuration('focus',30,this)">30m</button>
      <button class="dur-btn" onclick="setDuration('focus',45,this)">45m</button>
      <button class="dur-btn" onclick="setDuration('focus',50,this)">50m</button>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-grid" id="statsGrid"></div>

  <!-- Today's subjects -->
  <div class="section" id="subjectSection">
    <h2>📚 Today by Subject</h2>
    <div id="subjectBars"></div>
  </div>

  <!-- Session history -->
  <div class="section">
    <h2>📋 Session History</h2>
    <div id="historyList"></div>
  </div>
</div>

<script>
var STORE = 'ace_pomodoro_sessions';
var DURATIONS = { focus:25, short:5, long:15 };
var COLORS = { focus:'#6366f1', short:'#10b981', long:'#3b82f6' };
var CIRCUMFERENCE = 2*Math.PI*100; // ≈628

var mode = 'focus';
var totalSecs, remainingSecs, interval = null, running = false;
var sessionNum = 1, pomosBeforeLong = 4;

function getSessions(){ return JSON.parse(localStorage.getItem(STORE)||'[]'); }
function saveSessions(s){ localStorage.setItem(STORE, JSON.stringify(s)); }

function setMode(m){
  mode = m;
  ['focus','short','long'].forEach(function(x){
    document.getElementById('tab-'+x).classList.toggle('active', x===m);
  });
  resetTimer();
}

function setDuration(m, mins, btn){
  DURATIONS[m] = mins;
  document.querySelectorAll('.settings-row .dur-btn').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  if(mode===m) resetTimer();
}

function resetTimer(){
  clearInterval(interval); running=false;
  totalSecs = DURATIONS[mode]*60;
  remainingSecs = totalSecs;
  document.getElementById('startBtn').textContent = '▶ Start';
  document.getElementById('timerLabel').textContent = mode==='focus'?'Focus':mode==='short'?'Short Break':'Long Break';
  updateDisplay();
}

function toggleTimer(){
  if(running){ pauseTimer(); } else { startTimer(); }
}

function startTimer(){
  running=true;
  document.getElementById('startBtn').textContent = '⏸ Pause';
  interval = setInterval(function(){
    remainingSecs--;
    updateDisplay();
    if(remainingSecs<=0){ timerDone(); }
  }, 1000);
}

function pauseTimer(){
  clearInterval(interval); running=false;
  document.getElementById('startBtn').textContent = '▶ Resume';
}

function updateDisplay(){
  var m = Math.floor(remainingSecs/60);
  var s = remainingSecs%60;
  document.getElementById('timerDisplay').textContent = (m<10?'0':'')+m+':'+(s<10?'0':'')+s;
  document.title = (m<10?'0':'')+m+':'+(s<10?'0':'')+s+' — aceAcademy';
  var pct = 1-(remainingSecs/totalSecs);
  var offset = CIRCUMFERENCE*(1-pct);
  document.getElementById('ringFg').style.strokeDashoffset = offset;
  document.getElementById('ringFg').style.stroke = COLORS[mode];
}

function timerDone(){
  clearInterval(interval); running=false;
  document.getElementById('startBtn').textContent = '▶ Start';
  document.title = 'aceAcademy';

  if(window.AceSound) AceSound.sessionDone();

  // Save session
  if(mode==='focus'){
    var sessions = getSessions();
    var subject = document.getElementById('subjectSel').value;
    sessions.unshift({
      type:'focus', subject:subject, mins:DURATIONS.focus,
      date:new Date().toISOString(), sessionNum:sessionNum
    });
    saveSessions(sessions);
    sessionNum++;
    if(window.AceCoins) AceCoins.earn(5,'Pomodoro session completed');

    // Auto advance
    if(sessionNum % pomosBeforeLong === 1){
      setMode('long');
      showAlert('🌿 Time for a long break! Great work!');
    } else {
      setMode('short');
      showAlert('☕ Session done! Take a short break.');
    }
  } else {
    setMode('focus');
  }

  renderStats();
  renderDots();
}

function showAlert(msg){
  var t = document.createElement('div');
  t.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:800;padding:13px 26px;border-radius:14px;z-index:99999;font-size:.95rem;box-shadow:0 8px 32px rgba(99,102,241,.5)';
  t.textContent = msg;
  document.body.appendChild(t);
  if('Notification' in window && Notification.permission==='granted'){
    new Notification('aceAcademy', {body:msg, icon:'/aceAcademy/icons/icon-192.png'});
  }
  setTimeout(function(){ t.style.opacity='0'; t.style.transition='opacity .5s'; },3000);
  setTimeout(function(){ t.remove(); },3500);
}

function renderDots(){
  var dots = '';
  for(var i=0;i<pomosBeforeLong;i++){
    var done = i < (sessionNum-1)%pomosBeforeLong || (sessionNum>pomosBeforeLong && sessionNum%pomosBeforeLong===1);
    dots += '<div class="session-dot'+(i<(sessionNum-1)%pomosBeforeLong?' done':'')+'"></div>';
  }
  document.getElementById('sessionDots').innerHTML = dots;
  document.getElementById('sessionCount').textContent = 'Session '+sessionNum+' of '+pomosBeforeLong;
}

function renderStats(){
  var sessions = getSessions();
  var today = new Date().toISOString().split('T')[0];
  var todaySessions = sessions.filter(function(s){ return s.date&&s.date.split('T')[0]===today&&s.type==='focus'; });
  var weekSessions = sessions.filter(function(s){
    var d = new Date(s.date); var now = new Date();
    return s.type==='focus' && (now-d)<7*86400000;
  });
  var totalMins = sessions.filter(function(s){return s.type==='focus';}).reduce(function(a,s){return a+s.mins;},0);
  var todayMins = todaySessions.reduce(function(a,s){return a+s.mins;},0);

  document.getElementById('statsGrid').innerHTML = [
    {num:todaySessions.length,   label:"Today's Sessions", color:'#6366f1'},
    {num:todayMins+'m',          label:'Focus Time Today',  color:'#8b5cf6'},
    {num:weekSessions.length,    label:'This Week',         color:'#3b82f6'},
    {num:Math.round(totalMins/60)+'h', label:'Total Focus Time', color:'#10b981'}
  ].map(function(s){
    return '<div class="stat-card"><div class="stat-num" style="color:'+s.color+'">'+s.num+'</div><div class="stat-label">'+s.label+'</div></div>';
  }).join('');

  // Subject breakdown today
  var bySubject = {};
  todaySessions.forEach(function(s){ bySubject[s.subject]=(bySubject[s.subject]||0)+s.mins; });
  var subEntries = Object.entries(bySubject).sort(function(a,b){return b[1]-a[1];});
  var maxMins = subEntries.length ? subEntries[0][1] : 1;
  if(subEntries.length===0){
    document.getElementById('subjectBars').innerHTML='<div style="color:#475569;font-size:.83rem;text-align:center;padding:12px">Complete a session to see subject breakdown</div>';
  } else {
    document.getElementById('subjectBars').innerHTML = subEntries.map(function(e){
      return '<div class="bar-row"><div class="bar-label">'+e[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round(e[1]/maxMins*100)+'%"></div></div><div class="bar-val">'+e[1]+'m</div></div>';
    }).join('');
  }

  // History
  var recent = sessions.slice(0,15);
  if(!recent.length){
    document.getElementById('historyList').innerHTML='<div style="color:#475569;font-size:.83rem;text-align:center;padding:12px">No sessions yet — start your first Pomodoro!</div>';
  } else {
    document.getElementById('historyList').innerHTML = recent.map(function(s){
      var icon = s.type==='focus'?'🍅':'☕';
      var label = s.type==='focus'?s.mins+'min focus · '+s.subject:'Break';
      var time = new Date(s.date).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})+' · '+new Date(s.date).toLocaleDateString([],{month:'short',day:'numeric'});
      return '<div class="hist-row"><span class="hist-icon">'+icon+'</span><span class="hist-text">'+label+'</span><span class="hist-time">'+time+'</span></div>';
    }).join('');
  }
}

// Init
resetTimer(); renderDots(); renderStats();
</script>
</body>
</html>
