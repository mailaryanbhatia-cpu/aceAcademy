<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<script src="/timer.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AP Government & Politics Concept Drill — aceAcademy</title>
<link rel="stylesheet" href="ace-theme.css">
<style>
:root{--bg:#0b1120;--card:#1a2540;--accent:#6366f1;--accent2:#a5b4fc;--text:#ffffff;--muted:#b0bece;--border:#2a3a55;--green:#34d399;--red:#f87171;--amber:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
.topnav{display:flex;align-items:center;gap:6px;padding:0 20px;height:54px;background:#080e1c;border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto}.topnav::-webkit-scrollbar{display:none}
.logo{font-size:1.3rem;font-weight:800;color:#fff;text-decoration:none;margin-right:10px}.logo span{color:var(--accent2)}
.nav-link{text-decoration:none;color:var(--muted);font-size:.85rem;padding:6px 10px;border-radius:7px;white-space:nowrap;font-weight:600}.nav-link:hover{background:rgba(255,255,255,.07);color:#fff}.nav-link.active{color:var(--accent2)}
.spacer{flex:1}
.hero{text-align:center;padding:32px 20px 18px;background:linear-gradient(135deg,#06091a,#1a2080,#2d0d5c);border-bottom:1px solid var(--border)}
.hero h1{font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:6px}
.hero p{color:var(--accent2);font-size:.95rem}
.container{max-width:900px;margin:24px auto;padding:0 20px}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;margin-bottom:20px}
.card h2{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:14px}
.btn{padding:9px 20px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:.85rem;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.88}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:#fff}.btn-outline:hover{border-color:var(--accent)}
.btn-big{padding:12px 28px;font-size:.95rem;border-radius:12px}
.unit-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:10px}
.unit-card{background:#111827;border:1.5px solid var(--border);border-radius:12px;padding:16px;cursor:pointer;transition:.15s}
.unit-card:hover{border-color:var(--accent)}
.unit-card.active{border-color:var(--accent);background:rgba(99,102,241,.12)}
.unit-icon{font-size:1.6rem;margin-bottom:6px}
.unit-name{font-size:.88rem;font-weight:700;color:#fff}
.unit-count{font-size:.72rem;color:var(--muted);margin-top:2px}

.mode-row{display:flex;gap:8px;margin-bottom:16px}
.mode-btn{flex:1;padding:10px;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-weight:700;font-size:.85rem;cursor:pointer}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

.flash-wrap{margin-bottom:16px}
.flash-card{min-height:220px;border-radius:16px;border:1.5px solid var(--border);background:#111827;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px;cursor:pointer;font-size:1.1rem;font-weight:700;color:#fff;transition:.2s}
.flash-card:hover{border-color:var(--accent)}
.flash-card .def{font-size:.95rem;font-weight:500;color:var(--accent2);line-height:1.6}
.flash-progress{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:10px}
.flash-nav{display:flex;gap:10px;justify-content:center;margin-top:14px}

.q-block{background:#111827;border-radius:10px;border:1px solid var(--border);padding:16px 18px;margin-bottom:14px}
.q-text{font-size:.95rem;font-weight:600;color:#fff;margin-bottom:12px;line-height:1.5}
.opt{display:block;width:100%;text-align:left;padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);background:#0d1628;color:#fff;margin-bottom:8px;cursor:pointer;font-size:.85rem;font-family:inherit;transition:.15s}
.opt:hover{border-color:var(--accent)}
.opt.correct{border-color:var(--green);background:rgba(52,211,153,.15)}
.opt.wrong{border-color:var(--red);background:rgba(248,113,113,.15)}
.opt:disabled{cursor:default}
.score-display{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:10px}
.result-big{font-size:3rem;font-weight:900;text-align:center;color:var(--accent2);margin:6px 0}
</style>
</head>
<body>
<nav class="topnav">
  <a class="logo" href="index.html">ace<span>Academy</span></a>
  <a class="nav-link" href="index.html">Home</a>
  <a class="nav-link" href="alltools.html">All Tools</a>
  <a class="nav-link active" href="apgov.html">AP Government</a>
  <div class="spacer"></div>
</nav>
<script src="auth-guard.js"></script>

<div class="hero">
  <h1>🏛️ AP Government & Politics Concept Drill</h1>
  <p>68 key terms across 5 units, including required Supreme Court cases. Flip flashcards or quiz yourself.</p>
</div>

<div class="container">

  <div class="card">
    <h2>Choose a Unit</h2>
    <div class="unit-grid" id="unitGrid"></div>
  </div>

  <div class="card" id="studyCard" style="display:none">
    <div class="mode-row">
      <button class="mode-btn active" id="modeFlash" onclick="setMode('flash')">🗂️ Flashcards</button>
      <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">✅ Quiz Me</button>
    </div>

    <div id="flashArea">
      <div class="flash-progress" id="flashProgress"></div>
      <div class="flash-wrap">
        <div class="flash-card" id="flashCard" onclick="flipCard()"></div>
      </div>
      <div class="flash-nav">
        <button class="btn btn-outline" onclick="prevCard()">← Prev</button>
        <button class="btn btn-outline" onclick="shuffleCards()">🔀 Shuffle</button>
        <button class="btn btn-primary" onclick="nextCard()">Next →</button>
      </div>
    </div>

    <div id="quizArea" style="display:none">
      <div class="score-display" id="quizProgress"></div>
      <div id="quizQCard"></div>
      <div id="quizResult" style="display:none">
        <div class="result-big" id="quizFinalScore"></div>
        <div style="text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:14px" id="quizMsg"></div>
        <div style="text-align:center"><button class="btn btn-primary btn-big" onclick="startQuiz()">Retake Quiz</button></div>
      </div>
    </div>
  </div>

</div>

<script>
const UNITS = {
  "foundations": {
    "label": "Foundations of American Democracy",
    "icon": "🏛️",
    "terms": [
      [
        "Popular Sovereignty",
        "The principle that government derives its power from the consent of the governed."
      ],
      [
        "Republicanism",
        "A system in which power is held by the people and exercised through elected representatives."
      ],
      [
        "Federalism",
        "A system of government in which power is divided between a national government and state governments."
      ],
      [
        "Separation of Powers",
        "The division of government into legislative, executive, and judicial branches with distinct functions."
      ],
      [
        "Checks and Balances",
        "A system allowing each branch of government to limit the powers of the others."
      ],
      [
        "Limited Government",
        "The principle that government power is restricted by law, typically through a constitution."
      ],
      [
        "Social Contract Theory",
        "The idea that government's legitimacy comes from an implicit agreement among individuals to form society."
      ],
      [
        "Articles of Confederation",
        "The first U.S. constitution, which created a weak central government and was later replaced."
      ],
      [
        "Federalist No. 10",
        "An essay by James Madison arguing that a large republic best controls the dangers of factions."
      ],
      [
        "Federalist No. 51",
        "An essay by James Madison explaining how checks and balances prevent tyranny."
      ],
      [
        "Brutus No. 1",
        "An Anti-Federalist essay warning that a strong national government would threaten individual liberty."
      ],
      [
        "Enumerated Powers",
        "Powers explicitly granted to the federal government by the Constitution."
      ],
      [
        "Reserved Powers",
        "Powers not granted to the federal government that are retained by the states, per the 10th Amendment."
      ],
      [
        "Concurrent Powers",
        "Powers shared by both the federal and state governments, such as the power to tax."
      ],
      [
        "Necessary and Proper Clause",
        "The constitutional clause granting Congress implied powers to carry out its enumerated duties."
      ]
    ]
  },
  "branches": {
    "label": "Interactions Among Branches",
    "icon": "⚖️",
    "terms": [
      [
        "Bicameral Legislature",
        "A two-chamber legislative body, as in the U.S. Congress with its House and Senate."
      ],
      [
        "Filibuster",
        "A Senate procedural tactic used to delay or block a vote through extended debate."
      ],
      [
        "Cloture",
        "A Senate procedure used to end a filibuster and force a vote, requiring 60 votes."
      ],
      [
        "Committee System",
        "The organization of Congress into specialized groups that draft and review legislation."
      ],
      [
        "Pork Barrel Legislation",
        "Government spending directed to benefit a legislator's home district, aiding reelection."
      ],
      [
        "Logrolling",
        "The practice of trading votes among legislators to secure passage of favored bills."
      ],
      [
        "Veto",
        "The president's power to reject a bill passed by Congress."
      ],
      [
        "Pocket Veto",
        "An indirect presidential veto that occurs when Congress adjourns before a bill can be signed."
      ],
      [
        "Executive Order",
        "A directive issued by the president that has the force of law without requiring congressional approval."
      ],
      [
        "Bureaucracy",
        "The system of departments and agencies that implement and administer government policy."
      ],
      [
        "Judicial Review",
        "The power of courts to declare laws or executive actions unconstitutional, established in Marbury v. Madison."
      ],
      [
        "Judicial Activism",
        "A judicial philosophy favoring active use of court power to address social issues."
      ],
      [
        "Judicial Restraint",
        "A judicial philosophy favoring deference to the elected branches and precedent."
      ],
      [
        "Stare Decisis",
        "The legal principle of adhering to precedent set by prior court decisions."
      ],
      [
        "Solicitor General",
        "The federal official who represents the U.S. government before the Supreme Court."
      ]
    ]
  },
  "rights": {
    "label": "Civil Liberties & Civil Rights",
    "icon": "✊",
    "terms": [
      [
        "Civil Liberties",
        "Individual freedoms protected from government interference, such as speech and religion."
      ],
      [
        "Civil Rights",
        "Protections against discrimination, ensuring equal treatment under the law for all groups."
      ],
      [
        "Selective Incorporation",
        "The process by which the Supreme Court has applied Bill of Rights protections to the states via the 14th Amendment."
      ],
      [
        "Establishment Clause",
        "The First Amendment clause prohibiting government establishment of an official religion."
      ],
      [
        "Free Exercise Clause",
        "The First Amendment clause protecting individuals' right to practice their religion freely."
      ],
      [
        "Symbolic Speech",
        "Nonverbal expression protected by the First Amendment, such as wearing armbands or burning flags."
      ],
      [
        "Due Process Clause",
        "The constitutional guarantee that government cannot deprive individuals of life, liberty, or property without fair procedures."
      ],
      [
        "Equal Protection Clause",
        "The 14th Amendment clause requiring states to treat individuals equally under the law."
      ],
      [
        "Miranda v. Arizona",
        "The 1966 case establishing that suspects must be informed of their rights before interrogation."
      ],
      [
        "Gideon v. Wainwright",
        "The 1963 case establishing the right to a court-appointed attorney for defendants who cannot afford one."
      ],
      [
        "Tinker v. Des Moines",
        "The 1969 case affirming students' right to symbolic speech in public schools."
      ],
      [
        "Engel v. Vitale",
        "The 1962 case ruling that school-sponsored prayer violates the Establishment Clause."
      ],
      [
        "McCulloch v. Maryland",
        "The 1819 case affirming federal supremacy and the constitutionality of implied powers."
      ],
      [
        "Affirmative Action",
        "Policies intended to increase opportunities for historically underrepresented or disadvantaged groups."
      ],
      [
        "Griswold v. Connecticut",
        "The 1965 case that established a constitutional right to privacy."
      ]
    ]
  },
  "ideologies": {
    "label": "Political Ideologies & Beliefs",
    "icon": "🗳️",
    "terms": [
      [
        "Political Ideology",
        "A consistent set of beliefs about the purpose and scope of government."
      ],
      [
        "Liberalism (Political)",
        "An ideology generally favoring government action to promote equality and social welfare."
      ],
      [
        "Conservatism (Political)",
        "An ideology generally favoring limited government, free markets, and traditional social values."
      ],
      [
        "Political Socialization",
        "The process by which individuals develop their political beliefs and values, often through family and media."
      ],
      [
        "Public Opinion",
        "The aggregate of individual attitudes and beliefs about political issues and leaders."
      ],
      [
        "Political Efficacy",
        "An individual's belief that they can influence political outcomes through participation."
      ],
      [
        "Random Sampling",
        "A polling technique in which every individual has an equal chance of being selected, ensuring representativeness."
      ],
      [
        "Political Culture",
        "The shared values, beliefs, and attitudes that shape a society's political behavior."
      ],
      [
        "Libertarianism",
        "An ideology emphasizing minimal government intervention in both economic and personal matters."
      ]
    ]
  },
  "participation": {
    "label": "Political Participation",
    "icon": "📮",
    "terms": [
      [
        "Political Party",
        "An organization that recruits, nominates, and supports candidates for public office."
      ],
      [
        "Two-Party System",
        "A political system dominated by two major parties, as in the United States."
      ],
      [
        "Third Party",
        "A minor political party that competes alongside the two dominant parties."
      ],
      [
        "Interest Group",
        "An organization that seeks to influence public policy on behalf of its members' shared interests."
      ],
      [
        "Lobbying",
        "The act of attempting to influence legislation or government policy on behalf of a group."
      ],
      [
        "Political Action Committee (PAC)",
        "An organization that raises and spends money to elect or defeat political candidates."
      ],
      [
        "Super PAC",
        "An independent political committee that can raise unlimited funds but cannot coordinate directly with candidates."
      ],
      [
        "Citizens United v. FEC",
        "The 2010 Supreme Court case ruling that corporate political spending is protected free speech."
      ],
      [
        "Electoral College",
        "The body of electors that formally selects the U.S. president based on state-by-state results."
      ],
      [
        "Gerrymandering",
        "The manipulation of electoral district boundaries to favor a particular political party."
      ],
      [
        "Voter Turnout",
        "The percentage of eligible voters who actually cast a ballot in an election."
      ],
      [
        "Winner-Take-All System",
        "An electoral system in which the candidate with the most votes in a state receives all of its electoral votes."
      ],
      [
        "Mass Media",
        "Communication outlets that reach large audiences and shape public political knowledge and opinion."
      ],
      [
        "Political Socialization Agents",
        "Sources such as family, schools, and media that shape an individual's political views."
      ]
    ]
  }
};

const unitKeys = Object.keys(UNITS);
let currentUnit = null;
let mode = 'flash';
let cardOrder = [];
let cardIdx = 0;
let flipped = false;
let quizQ = [];
let quizIdx = 0;
let quizScore = 0;

function renderUnitGrid() {
  const grid = document.getElementById('unitGrid');
  grid.innerHTML = unitKeys.map(k => {
    const u = UNITS[k];
    return `<div class="unit-card${k===currentUnit?' active':''}" onclick="selectUnit('${k}')">
      <div class="unit-icon">${u.icon}</div>
      <div class="unit-name">${escHtml(u.label)}</div>
      <div class="unit-count">${u.terms.length} terms</div>
    </div>`;
  }).join('');
}

function selectUnit(k) {
  currentUnit = k;
  renderUnitGrid();
  document.getElementById('studyCard').style.display = 'block';
  cardOrder = UNITS[k].terms.map((_, i) => i);
  cardIdx = 0;
  flipped = false;
  setMode(mode);
}

function setMode(m) {
  mode = m;
  document.getElementById('modeFlash').classList.toggle('active', m === 'flash');
  document.getElementById('modeQuiz').classList.toggle('active', m === 'quiz');
  document.getElementById('flashArea').style.display = m === 'flash' ? 'block' : 'none';
  document.getElementById('quizArea').style.display = m === 'quiz' ? 'block' : 'none';
  if (m === 'flash') renderFlash();
  else startQuiz();
}

function renderFlash() {
  if (!currentUnit) return;
  const terms = UNITS[currentUnit].terms;
  const [term, def] = terms[cardOrder[cardIdx]];
  document.getElementById('flashProgress').textContent = `Card ${cardIdx+1} of ${terms.length}`;
  const card = document.getElementById('flashCard');
  card.innerHTML = flipped ? `<div class="def">${escHtml(def)}</div>` : `<div>${escHtml(term)}</div>`;
}

function flipCard() { flipped = !flipped; renderFlash(); }
function nextCard() { cardIdx = (cardIdx + 1) % cardOrder.length; flipped = false; renderFlash(); }
function prevCard() { cardIdx = (cardIdx - 1 + cardOrder.length) % cardOrder.length; flipped = false; renderFlash(); }
function shuffleCards() {
  for (let i = cardOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardOrder[i], cardOrder[j]] = [cardOrder[j], cardOrder[i]];
  }
  cardIdx = 0; flipped = false; renderFlash();
}

function startQuiz() {
  if (!currentUnit) return;
  const terms = UNITS[currentUnit].terms;
  const idxs = terms.map((_, i) => i);
  for (let i = idxs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
  }
  quizQ = idxs.slice(0, Math.min(10, idxs.length)).map(i => {
    const [term, def] = terms[i];
    const distractors = terms.filter((_, di) => di !== i).map(t => t[1]);
    for (let k = distractors.length - 1; k > 0; k--) {
      const j = Math.floor(Math.random() * (k + 1));
      [distractors[k], distractors[j]] = [distractors[j], distractors[k]];
    }
    const opts = [def, ...distractors.slice(0, 3)];
    for (let k = opts.length - 1; k > 0; k--) {
      const j = Math.floor(Math.random() * (k + 1));
      [opts[k], opts[j]] = [opts[j], opts[k]];
    }
    return { term, def, opts };
  });
  quizIdx = 0; quizScore = 0;
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizQCard').style.display = 'block';
  renderQuiz();
}

function renderQuiz() {
  const q = quizQ[quizIdx];
  document.getElementById('quizProgress').textContent = `Question ${quizIdx+1} of ${quizQ.length} · Score: ${quizScore}`;
  document.getElementById('quizQCard').innerHTML = `
    <div class="q-block">
      <div class="q-text">What is the best definition of: <strong>${escHtml(q.term)}</strong>?</div>
      ${q.opts.map((o,oi) => `<button class="opt" data-idx="${oi}" onclick="answerQuiz(this,${oi})">${escHtml(o)}</button>`).join('')}
    </div>`;
}

function answerQuiz(btn, optIdx) {
  const q = quizQ[quizIdx];
  const opt = q.opts[optIdx];
  const correct = opt === q.def;
  if (correct) quizScore++;
  document.querySelectorAll('#quizQCard .opt').forEach(b => {
    b.disabled = true;
    if (q.opts[parseInt(b.getAttribute('data-idx'),10)] === q.def) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');
  setTimeout(() => {
    quizIdx++;
    if (quizIdx >= quizQ.length) endQuiz();
    else renderQuiz();
  }, 900);
}

function endQuiz() {
  document.getElementById('quizQCard').style.display = 'none';
  document.getElementById('quizResult').style.display = 'block';
  const pct = Math.round(quizScore / quizQ.length * 100);
  document.getElementById('quizFinalScore').textContent = `${quizScore}/${quizQ.length}`;
  document.getElementById('quizMsg').textContent = pct >= 90 ? "Excellent! You know this unit cold." :
    pct >= 70 ? "Great work — review the ones you missed." :
    pct >= 50 ? "Good effort. A bit more review will help." :
    "Keep studying this unit — you'll get there.";
}

function escHtml(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderUnitGrid();
</script>
</body>
</html>
