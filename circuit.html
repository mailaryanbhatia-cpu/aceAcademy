<div class="hero">
  <h1>🔌 Circuit Calculator</h1>
  <p>Ohm's Law &amp; power relationships, plus series and parallel resistance for any number of resistors.</p>
</div>

<div class="container">

  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="setTab('ohm')" id="tabOhm">⚡ Ohm's Law &amp; Power</button>
      <button class="tab-btn" onclick="setTab('resist')" id="tabResist">🔗 Series / Parallel Resistance</button>
    </div>
  </div>

  <div class="card" id="ohmPanel">
    <h2>Enter exactly 2 of the 4 values</h2>
    <div class="var-grid">
      <div><label>Voltage (V)</label><input type="number" id="ohmV" step="any" placeholder="V"><div class="var-unit">volts</div></div>
      <div><label>Current (I)</label><input type="number" id="ohmI" step="any" placeholder="I"><div class="var-unit">amps</div></div>
      <div><label>Resistance (R)</label><input type="number" id="ohmR" step="any" placeholder="R"><div class="var-unit">ohms (Ω)</div></div>
      <div><label>Power (P)</label><input type="number" id="ohmP" step="any" placeholder="P"><div class="var-unit">watts</div></div>
    </div>
    <div style="margin-top:16px"><button class="btn btn-primary btn-big" onclick="solveOhm()">⚡ Solve</button> <button class="btn btn-outline" onclick="clearOhm()">Clear</button></div>
    <div id="ohmOutput"></div>
  </div>

  <div class="card" id="resistPanel" style="display:none">
    <h2>Resistor Network</h2>
    <div class="mode-toggle">
      <button class="active" id="btnSeries" onclick="setResistMode('series')">Series</button>
      <button id="btnParallel" onclick="setResistMode('parallel')">Parallel</button>
    </div>
    <div id="resistorList"></div>
    <button class="btn btn-outline btn-sm" onclick="addResistor()">+ Add Resistor</button>
    <div style="margin-top:16px"><button class="btn btn-primary btn-big" onclick="solveResist()">⚡ Calculate Total</button></div>
    <div id="resistOutput"></div>
  </div>

</div>

<script>
function setTab(t) {
  document.getElementById('tabOhm').classList.toggle('active', t === 'ohm');
  document.getElementById('tabResist').classList.toggle('active', t === 'resist');
  document.getElementById('ohmPanel').style.display = t === 'ohm' ? 'block' : 'none';
  document.getElementById('resistPanel').style.display = t === 'resist' ? 'block' : 'none';
}

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.round(n * 100000) / 100000;
}

// ═══════════════ OHM'S LAW & POWER ═══════════════
function clearOhm() {
  ['ohmV','ohmI','ohmR','ohmP'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('ohmOutput').innerHTML = '';
}

function solveOhm() {
  const ids = ['ohmV','ohmI','ohmR','ohmP'];
  const vals = {};
  ids.forEach(id => { const raw = document.getElementById(id).value; vals[id.slice(3)] = raw === '' ? null : parseFloat(raw); });
  const known = Object.keys(vals).filter(k => vals[k] !== null);
  const unknown = Object.keys(vals).filter(k => vals[k] === null);
  const out = document.getElementById('ohmOutput');

  if (known.length !== 2) {
    out.innerHTML = `<div class="error-box">⚠️ Enter exactly 2 values and leave the other 2 blank. You have ${known.length} filled in.</div>`;
    return;
  }

  let { V, I, R, P } = vals;
  let steps = [];
  const has = (x, y) => known.includes(x) && known.includes(y);

  try {
    if (has('V', 'I')) {
      R = V / I;
      P = V * I;
      steps.push(`R = V / I = ${V} / ${I} = <strong>${fmt(R)} Ω</strong>`);
      steps.push(`P = V × I = ${V} × ${I} = <strong>${fmt(P)} W</strong>`);
    } else if (has('V', 'R')) {
      I = V / R;
      P = (V * V) / R;
      steps.push(`I = V / R = ${V} / ${R} = <strong>${fmt(I)} A</strong>`);
      steps.push(`P = V² / R = ${V}² / ${R} = <strong>${fmt(P)} W</strong>`);
    } else if (has('V', 'P')) {
      I = P / V;
      R = (V * V) / P;
      steps.push(`I = P / V = ${P} / ${V} = <strong>${fmt(I)} A</strong>`);
      steps.push(`R = V² / P = ${V}² / ${P} = <strong>${fmt(R)} Ω</strong>`);
    } else if (has('I', 'R')) {
      V = I * R;
      P = I * I * R;
      steps.push(`V = I × R = ${I} × ${R} = <strong>${fmt(V)} V</strong>`);
      steps.push(`P = I² × R = ${I}² × ${R} = <strong>${fmt(P)} W</strong>`);
    } else if (has('I', 'P')) {
      V = P / I;
      R = P / (I * I);
      steps.push(`V = P / I = ${P} / ${I} = <strong>${fmt(V)} V</strong>`);
      steps.push(`R = P / I² = ${P} / ${I}² = <strong>${fmt(R)} Ω</strong>`);
    } else if (has('R', 'P')) {
      if (P < 0 || R < 0) throw new Error("Power and resistance must be non-negative for a real solution.");
      I = Math.sqrt(P / R);
      V = Math.sqrt(P * R);
      steps.push(`I = √(P / R) = √(${P} / ${R}) = <strong>${fmt(I)} A</strong>`);
      steps.push(`V = √(P × R) = √(${P} × ${R}) = <strong>${fmt(V)} V</strong>`);
    } else {
      throw new Error("Unexpected combination of known/unknown variables.");
    }

    const results = { V, I, R, P };
    const labels = { V: 'V (volts)', I: 'I (amps)', R: 'R (ohms)', P: 'P (watts)' };
    const resultHTML = unknown.map(k => `<div class="result-box"><div class="result-val">${fmt(results[k])}</div><div class="result-lbl">${labels[k]}</div></div>`).join('');
    out.innerHTML = `<div class="result-grid">${resultHTML}</div><div class="steps-box">${steps.map(s => `<div class="step">${s}</div>`).join('')}</div>`;
  } catch (e) {
    out.innerHTML = `<div class="error-box">⚠️ ${esc(e.message)}</div>`;
  }
}

// ═══════════════ SERIES / PARALLEL RESISTANCE ═══════════════
let resistMode = 'series';
let resistorCount = 3;

function setResistMode(m) {
  resistMode = m;
  document.getElementById('btnSeries').classList.toggle('active', m === 'series');
  document.getElementById('btnParallel').classList.toggle('active', m === 'parallel');
}

function renderResistorList() {
  const list = document.getElementById('resistorList');
  let html = '';
  for (let i = 0; i < resistorCount; i++) {
    html += `<div class="resistor-row">
      <input type="number" id="resistor-${i}" step="any" placeholder="R${i+1} (Ω)" value="${i===0?100:i===1?220:i===2?330:''}">
      <button class="rm-btn" onclick="removeResistor(${i})">✕</button>
    </div>`;
  }
  list.innerHTML = html;
}

function addResistor() {
  resistorCount++;
  renderResistorList();
}

function removeResistor(i) {
  const vals = [];
  for (let j = 0; j < resistorCount; j++) {
    if (j === i) continue;
    const v = document.getElementById(`resistor-${j}`).value;
    vals.push(v);
  }
  resistorCount = Math.max(1, resistorCount - 1);
  renderResistorList();
  vals.forEach((v, idx) => { if (document.getElementById(`resistor-${idx}`)) document.getElementById(`resistor-${idx}`).value = v; });
}

function solveResist() {
  const out = document.getElementById('resistOutput');
  const values = [];
  for (let i = 0; i < resistorCount; i++) {
    const raw = document.getElementById(`resistor-${i}`).value;
    if (raw === '') continue;
    const v = parseFloat(raw);
    if (isNaN(v) || v < 0) { out.innerHTML = `<div class="error-box">⚠️ Resistor values must be non-negative numbers.</div>`; return; }
    values.push(v);
  }
  if (values.length < 1) { out.innerHTML = `<div class="error-box">⚠️ Enter at least 1 resistor value.</div>`; return; }

  let total;
  let steps = [];
  if (resistMode === 'series') {
    total = values.reduce((a, b) => a + b, 0);
    steps.push(`R_total = R₁ + R₂ + ... + Rₙ = ${values.join(' + ')} = <strong>${fmt(total)} Ω</strong>`);
  } else {
    if (values.some(v => v === 0)) {
      total = 0;
      steps.push(`A 0 Ω resistor short-circuits the parallel network — total resistance = <strong>0 Ω</strong>`);
    } else {
      const sumRecip = values.reduce((a, b) => a + 1/b, 0);
      total = 1 / sumRecip;
      steps.push(`1/R_total = 1/R₁ + 1/R₂ + ... + 1/Rₙ = ${values.map(v => '1/'+v).join(' + ')} = ${fmt(sumRecip)}`);
      steps.push(`R_total = 1 / ${fmt(sumRecip)} = <strong>${fmt(total)} Ω</strong>`);
    }
  }

  out.innerHTML = `<div class="result-grid"><div class="result-box"><div class="result-val">${fmt(total)} Ω</div><div class="result-lbl">Total Resistance</div></div></div>
    <div class="steps-box">${steps.map(s => `<div class="step">${s}</div>`).join('')}</div>`;
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderResistorList();
</script>
</body>
