<!DOCTYPE html>
<html lang="en">
<head>
<script src="/timer.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Student Progress — AcerAcademy</title>
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://academyacer.com/share.html">
<link rel="stylesheet" href="/ace-shared.css"/>
<link rel="stylesheet" href="/mobile.css"/>
<meta property="og:title" content="My AcerAcademy Progress"/>
<meta property="og:description" content="Check out my AP study progress on AcerAcademy"/>
<meta property="og:image" content="/icon-192.png"/>
<style>
.page-wrap{max-width:700px;margin:0 auto;padding:24px 16px 80px}
.hero-card{background:linear-gradient(135deg,rgba(99,102,241,.2),rgba(139,92,246,.15));border:1.5px solid rgba(99,102,241,.3);border-radius:24px;padding:32px;text-align:center;margin-bottom:24px}
.avatar-ring{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:900;color:#fff;margin:0 auto 14px;border:3px solid rgba(255,255,255,.15)}
.student-name{font-size:1.5rem;font-weight:900;color:#e2e8f0;margin:0 0 4px}
.student-sub{font-size:.85rem;color:#94a3b8;margin:0 0 16px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:12px;margin-bottom:20px}
.stat-box{background:#0f172a;border:1px solid #ffffff;border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:1.5rem;font-weight:900}
.stat-lbl{font-size:.7rem;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
.section-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px}
.section-title{font-size:.9rem;font-weight:800;color:#a5b4fc;margin:0 0 16px;display:flex;align-items:center;gap:8px}
.badge-row{display:flex;flex-wrap:wrap;gap:10px}
.badge-pill{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:99px;font-size:.82rem;font-weight:700;border:1.5px solid}
.prog-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.prog-label{font-size:.82rem;color:#e2e8f0;width:130px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prog-track{flex:1;height:8px;background:#ffffff;border-radius:99px;overflow:hidden}
.prog-fill{height:100%;border-radius:99px}
.prog-val{font-size:.78rem;color:#94a3b8;width:38px;text-align:right}
.share-footer{text-align:center;padding:24px 0 0;border-top:1px solid #ffffff;margin-top:8px}
.powered{font-size:.78rem;color:#b0bece;margin-bottom:12px}
.join-btn{display:inline-block;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;text-decoration:none;padding:12px 28px;border-radius:12px;font-weight:800;font-size:.9rem}
.loading{text-align:center;padding:80px 20px;color:#b0bece}
.error-state{text-align:center;padding:60px 20px}
.privacy-note{font-size:.72rem;color:#b0bece;text-align:center;margin-top:12px}
</style>
</head>
<body>
<div class="page-wrap">
  <div id="loadingState" class="loading">
    <div style="font-size:2rem;margin-bottom:12px">🎓</div>
    <div>Loading student progress…</div>
  </div>
  <div id="mainContent" style="display:none"></div>
  <div id="errorState" class="error-state" style="display:none">
    <div style="font-size:2rem;margin-bottom:12px">🔒</div>
    <div style="font-size:1.1rem;font-weight:800;color:#e2e8f0;margin-bottom:8px">Profile not found</div>
    <div style="color:#64748b;font-size:.85rem;margin-bottom:20px">This share link may have expired or been removed.</div>
    <a href="index.html" style="color:#818cf8;font-size:.85rem">Go to AcerAcademy →</a>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script>
firebase.initializeApp({
  apiKey:            "AIzaSyExample",
  authDomain:        "aceacademy-33738.firebaseapp.com",
  projectId:         "aceacademy-33738",
  storageBucket:     "aceacademy-33738.firebasestorage.app",
  messagingSenderId: "000000000000",
  appId:             "1:000000000000:web:000000"
});
var db = firebase.firestore();

var BADGE_DEFS = [
  { id:'bronze',  emoji:'🥉', name:'Bronze Scholar',  color:'#cd7f32' },
  { id:'silver',  emoji:'🥈', name:'Silver Scholar',  color:'#c0c0c0' },
  { id:'gold',    emoji:'🥇', name:'Gold Scholar',    color:'#ffd700' },
  { id:'diamond', emoji:'💎', name:'Diamond Scholar', color:'#b9f2ff' }
];

function getShareToken(){
  var params = new URLSearchParams(window.location.search);
  return params.get('id') || params.get('token') || '';
}

function renderProfile(data){
  var name     = data.name || 'AcerAcademy Student';
  var grade    = data.grade || '';
  var initials = name.split(' ').map(function(w){return w[0]||'';}).join('').slice(0,2).toUpperCase() || '🎓';
  var streak   = data.streak || 0;
  var coins    = data.coins || 0;
  var tests    = data.tests || [];
  var subjects = data.subjects || [];
  var badges   = data.badges || [];
  var goals    = data.goals || 0;
  var avgScore = tests.length ? Math.round(tests.reduce(function(a,t){return a+(t.pct||0);},0)/tests.length) : 0;
  var visible  = data.visible || { streak:true, scores:true, badges:true, subjects:true };

  // Subject averages
  var subjectMap = {};
  tests.forEach(function(t){
    if(!t.subject) return;
    if(!subjectMap[t.subject]) subjectMap[t.subject]={total:0,count:0};
    subjectMap[t.subject].total+=(t.pct||0);
    subjectMap[t.subject].count++;
  });

  var html = '';

  // Hero
  html += '<div class="hero-card">';
  html += '<div class="avatar-ring">'+(data.avatar?'<img src="'+data.avatar+'" style="width:80px;height:80px;border-radius:50%;object-fit:cover"/>':initials)+'</div>';
  html += '<div class="student-name">'+name+'</div>';
  html += '<div class="student-sub">'+(grade?grade+' · ':'')+'AcerAcademy Student</div>';
  // Stats row
  var stats = [];
  if(visible.streak) stats.push({num:streak+'🔥', lbl:'Day Streak', color:'#ef4444'});
  if(visible.scores && tests.length) stats.push({num:avgScore+'%', lbl:'Avg Score', color:'#10b981'});
  stats.push({num:tests.length, lbl:'Tests Taken', color:'#6366f1'});
  if(goals) stats.push({num:goals, lbl:'Goals Done', color:'#f59e0b'});
  html += '<div class="stat-grid">'+stats.map(function(s){
    return '<div class="stat-box"><div class="stat-num" style="color:'+s.color+'">'+s.num+'</div><div class="stat-lbl">'+s.lbl+'</div></div>';
  }).join('')+'</div>';
  html += '</div>';

  // Badges
  if(visible.badges && badges.length){
    html += '<div class="section-card"><div class="section-title">🏆 Badges Earned</div><div class="badge-row">';
    BADGE_DEFS.filter(function(b){return badges.includes(b.id);}).forEach(function(b){
      html += '<div class="badge-pill" style="color:'+b.color+';border-color:'+b.color+'44;background:'+b.color+'11">'+b.emoji+' '+b.name+'</div>';
    });
    html += '</div></div>';
  }

  // Subject scores
  if(visible.subjects && subjects.length){
    html += '<div class="section-card"><div class="section-title">📚 Subject Performance</div>';
    subjects.forEach(function(s){
      var sc = subjectMap[s];
      var avg = sc ? Math.round(sc.total/sc.count) : null;
      if(avg===null) return;
      var color = avg>=80?'#10b981':avg>=60?'#f59e0b':'#ef4444';
      html += '<div class="prog-row"><div class="prog-label">'+s.replace('AP ','')+'</div><div class="prog-track"><div class="prog-fill" style="width:'+avg+'%;background:'+color+'"></div></div><div class="prog-val" style="color:'+color+'">'+avg+'%</div></div>';
    });
    html += '</div>';
  }

  // Score trend (sparkline)
  if(visible.scores && tests.length >= 3){
    html += '<div class="section-card"><div class="section-title">📈 Score Trend</div>';
    var recent = tests.slice(-10);
    html += '<div style="display:flex;align-items:flex-end;gap:4px;height:60px;">';
    recent.forEach(function(t){
      var h = Math.max(8, Math.round((t.pct||0)/100*56));
      var color = (t.pct||0)>=80?'#10b981':(t.pct||0)>=60?'#f59e0b':'#ef4444';
      html += '<div title="'+t.subject+': '+(t.pct||0)+'%" style="flex:1;height:'+h+'px;background:'+color+';border-radius:4px 4px 0 0;min-width:12px;opacity:.85"></div>';
    });
    html += '</div>';
    html += '<div style="display:flex;justify-content:space-between;font-size:.7rem;color:#b0bece;margin-top:4px"><span>Older</span><span>Recent</span></div>';
    html += '</div>';
  }

  // Footer
  html += '<div class="share-footer">';
  html += '<div class="powered">Powered by <strong style="color:#818cf8">AcerAcademy</strong> — Free AP study tools</div>';
  html += '<a href="index.html" class="join-btn">Start Studying Free →</a>';
  html += '<div class="privacy-note">Only information the student chose to share is shown here.</div>';
  html += '</div>';

  document.getElementById('mainContent').innerHTML = html;
  document.getElementById('loadingState').style.display  = 'none';
  document.getElementById('mainContent').style.display   = '';
  document.title = name + "'s Progress — AcerAcademy";
}

// Load from Firestore
var token = getShareToken();
if(!token){
  document.getElementById('loadingState').style.display='none';
  document.getElementById('errorState').style.display='';
} else {
  db.collection('public_profiles').doc(token).get().then(function(doc){
    if(!doc.exists){
      document.getElementById('loadingState').style.display='none';
      document.getElementById('errorState').style.display='';
    } else {
      renderProfile(doc.data());
    }
  }).catch(function(){
    document.getElementById('loadingState').style.display='none';
    document.getElementById('errorState').style.display='';
  });
}
</script>
</body>
</html>
