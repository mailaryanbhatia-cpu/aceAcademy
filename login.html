<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>aceAcademy — Sign In</title>
<link rel="icon" href="/icons/icon-192.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;font-family:'Inter','Segoe UI',system-ui,sans-serif;-webkit-font-smoothing:antialiased;}
body{
  background:#060b18;
  min-height:100vh;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  padding:24px;
  color:#e2e8f0;
  position:relative;
  overflow:hidden;
}

/* ── Background glow orbs ── */
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse 60% 50% at 20% -10%, rgba(99,102,241,.25) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 80% 110%, rgba(124,58,237,.2) 0%, transparent 60%);
  pointer-events:none;z-index:0;
}
body::after{
  content:'';position:fixed;
  width:600px;height:600px;border-radius:50%;
  background:radial-gradient(circle, rgba(99,102,241,.06) 0%, transparent 70%);
  top:50%;left:50%;transform:translate(-50%,-60%);
  pointer-events:none;z-index:0;
}

/* ── Brand ── */
.brand-wrap{text-align:center;margin-bottom:36px;position:relative;z-index:1;}
.brand-icon{font-size:3rem;display:block;margin-bottom:12px;filter:drop-shadow(0 0 20px rgba(129,140,248,.5));}
.brand-name{
  font-size:2rem;font-weight:900;letter-spacing:-1.5px;
  background:linear-gradient(135deg,#818cf8 0%,#a78bfa 50%,#c084fc 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
}
.brand-tagline{font-size:.83rem;color:#475569;margin-top:6px;letter-spacing:.02em;}

/* ── Card ── */
.auth-card{
  background:rgba(13,21,38,.95);
  border:1px solid rgba(255,255,255,.08);
  border-radius:24px;
  box-shadow:0 32px 80px rgba(0,0,0,.6), 0 0 0 1px rgba(129,140,248,.08);
  width:100%;max-width:400px;
  padding:36px;
  position:relative;z-index:1;
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
}

.card-title{
  font-size:1.3rem;font-weight:800;letter-spacing:-.03em;
  text-align:center;margin-bottom:6px;color:#e2e8f0;
}
.card-sub{
  font-size:.83rem;color:#475569;text-align:center;
  margin-bottom:28px;line-height:1.5;
}

/* ── Google button ── */
.btn-google{
  display:flex;align-items:center;justify-content:center;gap:12px;
  width:100%;padding:14px 20px;
  background:#fff;color:#1f2937;
  border:none;border-radius:14px;
  font-size:.92rem;font-weight:700;font-family:inherit;
  cursor:pointer;
  transition:all .18s cubic-bezier(.4,0,.2,1);
  box-shadow:0 4px 20px rgba(0,0,0,.3);
  letter-spacing:-.01em;
  position:relative;overflow:hidden;
}
.btn-google:hover{
  transform:translateY(-1px);
  box-shadow:0 8px 32px rgba(99,102,241,.3),0 4px 20px rgba(0,0,0,.3);
  background:#f8faff;
}
.btn-google:active{transform:translateY(0);box-shadow:0 2px 10px rgba(0,0,0,.2);}
.btn-google:disabled{opacity:.6;cursor:not-allowed;transform:none;}
.btn-google svg{flex-shrink:0;width:20px;height:20px;}
.btn-google-text{flex:1;text-align:center;}

/* ── Divider ── */
.divider{
  display:flex;align-items:center;gap:12px;
  margin:22px 0;color:#334155;font-size:.75rem;
}
.divider::before,.divider::after{
  content:'';flex:1;height:1px;background:rgba(255,255,255,.07);
}

/* ── Username/password form ── */
.field{margin-bottom:16px;}
.field label{
  display:block;font-size:.72rem;font-weight:700;
  color:#475569;text-transform:uppercase;letter-spacing:.8px;
  margin-bottom:7px;
}
.field input{
  width:100%;padding:11px 14px;
  background:rgba(255,255,255,.04);
  border:1px solid rgba(255,255,255,.08);
  border-radius:10px;color:#e2e8f0;
  font-size:.88rem;font-family:inherit;outline:none;
  transition:all .18s;
}
.field input:focus{
  border-color:rgba(129,140,248,.5);
  background:rgba(129,140,248,.06);
  box-shadow:0 0 0 3px rgba(99,102,241,.12);
}
.field input::placeholder{color:#334155;}

.btn-primary{
  width:100%;padding:12px;
  background:linear-gradient(135deg,#6366f1,#8b5cf6);
  color:#fff;border:none;border-radius:12px;
  font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;
  transition:all .18s;letter-spacing:-.01em;
  box-shadow:0 4px 16px rgba(99,102,241,.4);
}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 8px 24px rgba(99,102,241,.5);}
.btn-primary:active{transform:translateY(0);}

.tab-toggle{
  display:flex;gap:8px;margin-bottom:20px;
  background:rgba(255,255,255,.04);border-radius:10px;padding:4px;
}
.tab-btn{
  flex:1;padding:8px;border:none;background:none;
  color:#475569;font-size:.8rem;font-weight:600;font-family:inherit;
  cursor:pointer;border-radius:7px;transition:all .15s;
}
.tab-btn.active{background:rgba(99,102,241,.2);color:#a5b4fc;}

.form-panel{display:none;}
.form-panel.active{display:block;}

/* ── Strength bar ── */
.strength-bar{height:3px;background:rgba(255,255,255,.07);border-radius:2px;margin-top:6px;}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0;}
.strength-label{font-size:.68rem;color:#475569;margin-top:3px;}

/* ── Messages ── */
.msg{
  font-size:.8rem;border-radius:8px;
  padding:0;max-height:0;overflow:hidden;
  transition:all .2s;margin-top:12px;text-align:center;
}
.msg.show{padding:10px 14px;max-height:60px;}
.msg.error{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2);}
.msg.success{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2);}

/* ── Loading spinner ── */
.spinner{
  display:none;width:18px;height:18px;border-radius:50%;
  border:2px solid rgba(0,0,0,.15);border-top-color:#1f2937;
  animation:spin .6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Footer note ── */
.auth-note{
  text-align:center;font-size:.72rem;color:#334155;
  margin-top:20px;position:relative;z-index:1;
  line-height:1.6;
}
</style>
<link rel="stylesheet" href="/mobile.css"/>
</head>
<body>

<div class="brand-wrap">
  <span class="brand-icon">🎓</span>
  <div class="brand-name">aceAcademy</div>
  <div class="brand-tagline">Grades 6–12 · AP Courses · Study Tools</div>
</div>

<div class="auth-card">
  <div class="card-title">Welcome back</div>
  <div class="card-sub">Sign in to access your curriculum,<br>progress, and study tools.</div>

  <!-- Google Sign-In -->
  <button class="btn-google" id="googleBtn" onclick="handleGoogleSignIn()">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    <span class="btn-google-text" id="googleBtnText">Continue with Google</span>
    <div class="spinner" id="googleSpinner"></div>
  </button>

  <div id="google-msg" class="msg"></div>

  <!-- Divider -->
  <div class="divider">or use username &amp; password</div>

  <!-- Tab toggle -->
  <div class="tab-toggle">
    <button class="tab-btn active" id="tab-in" onclick="switchTab('in')">Sign In</button>
    <button class="tab-btn" id="tab-up" onclick="switchTab('up')">Create Account</button>
  </div>

  <!-- Sign In panel -->
  <div class="form-panel active" id="panel-in">
    <div class="field">
      <label>Username</label>
      <input id="si-user" type="text" placeholder="your_username" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="si-pass" type="password" placeholder="••••••••" autocomplete="current-password"
             onkeydown="if(event.key==='Enter') doSignIn()"/>
    </div>
    <div id="signin-msg" class="msg"></div>
    <button class="btn-primary" style="margin-top:4px" onclick="doSignIn()">Sign In</button>
  </div>

  <!-- Sign Up panel -->
  <div class="form-panel" id="panel-up">
    <div class="field">
      <label>Username</label>
      <input id="su-user" type="text" placeholder="choose_a_username" autocomplete="username"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input id="su-pass" type="password" placeholder="••••••••" oninput="checkStrength(this.value)" autocomplete="new-password"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input id="su-pass2" type="password" placeholder="••••••••" autocomplete="new-password"
             onkeydown="if(event.key==='Enter') doSignUp()"/>
    </div>
    <div id="signup-msg" class="msg"></div>
    <button class="btn-primary" style="margin-top:4px" onclick="doSignUp()">Create Account</button>
  </div>
</div>

<div class="auth-note">
  By signing in you agree to keep studying hard 📚<br>
  Your data is stored locally on this device.
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="firestore.js"></script>
<script>
// Redirect if already signed in
(function(){
  try{
    const s = JSON.parse(localStorage.getItem('aceSession')||'null');
    if(s && (s.uid || s.username)) window.location.replace('index.html');
  }catch(e){}
})();

// Also listen for Firebase auth state
document.addEventListener('ace-auth-ready', function(){
  window.location.replace('index.html');
});

// ── Google Sign-In ───────────────────────────────────────────────
function handleGoogleSignIn(){
  const btn = document.getElementById('googleBtn');
  const txt = document.getElementById('googleBtnText');
  const spinner = document.getElementById('googleSpinner');
  btn.disabled = true;
  txt.textContent = 'Signing in…';
  spinner.style.display = 'block';

  aceGoogleSignIn()
    .then(function(){
      showMsg('google-msg','✓ Signed in! Redirecting…','success');
      setTimeout(function(){ window.location.replace('index.html'); }, 600);
    })
    .catch(function(err){
      btn.disabled = false;
      txt.textContent = 'Continue with Google';
      spinner.style.display = 'none';
      if(err.code !== 'auth/popup-closed-by-user'){
        showMsg('google-msg', err.message || 'Sign-in failed. Try again.', 'error');
      }
    });
}

// ── Tab switching ────────────────────────────────────────────────
function switchTab(t){
  ['in','up'].forEach(function(id){
    document.getElementById('tab-'+id).classList.toggle('active', id===t);
    document.getElementById('panel-'+id).classList.toggle('active', id===t);
  });
}

// ── Strength meter ───────────────────────────────────────────────
function checkStrength(pw){
  let s=0;
  if(pw.length>=6)s++;if(pw.length>=10)s++;
  if(/[A-Z]/.test(pw))s++;if(/[0-9]/.test(pw))s++;if(/[^A-Za-z0-9]/.test(pw))s++;
  const colors=['#f87171','#f87171','#fbbf24','#34d399','#34d399'];
  const labels=['Too short','Weak','Fair','Strong','Very strong'];
  document.getElementById('strengthFill').style.cssText='width:'+(s*20)+'%;background:'+(colors[Math.max(0,s-1)]||'transparent');
  document.getElementById('strengthLabel').textContent=pw.length?labels[Math.max(0,s-1)]:'';
}

// ── Username/password auth ───────────────────────────────────────
function showMsg(id,text,type){
  const el=document.getElementById(id);
  el.textContent=text;el.className='msg '+type+' show';
}

function getAccounts(){try{return JSON.parse(localStorage.getItem('aceAccounts')||'{}')}catch{return{}}}
function saveAccounts(a){localStorage.setItem('aceAccounts',JSON.stringify(a));}

async function sha256(str){
  const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

async function doSignIn(){
  const user=document.getElementById('si-user').value.trim().toLowerCase();
  const pass=document.getElementById('si-pass').value;
  if(!user||!pass) return showMsg('signin-msg','Please fill in both fields.','error');
  const accounts=getAccounts();
  if(!accounts[user]) return showMsg('signin-msg','No account found for that username.','error');
  const hash=await sha256('aceAcademy:'+user+':'+pass);
  if(hash!==accounts[user].hash) return showMsg('signin-msg','Incorrect password.','error');
  localStorage.setItem('aceSession',JSON.stringify({username:user,name:accounts[user].name||user,loginTime:Date.now()}));
  showMsg('signin-msg','Welcome back, '+user+'! ✓','success');
  setTimeout(()=>window.location.replace('index.html'),700);
}

async function doSignUp(){
  const user=document.getElementById('su-user').value.trim().toLowerCase();
  const pass=document.getElementById('su-pass').value;
  const pass2=document.getElementById('su-pass2').value;
  if(!user||user.length<3||!/^[a-z0-9_]+$/.test(user))
    return showMsg('signup-msg','Username: 3+ chars, letters/numbers/_ only.','error');
  if(pass.length<6) return showMsg('signup-msg','Password must be 6+ characters.','error');
  if(pass!==pass2) return showMsg('signup-msg','Passwords do not match.','error');
  const accounts=getAccounts();
  if(accounts[user]) return showMsg('signup-msg','Username already taken.','error');
  const hash=await sha256('aceAcademy:'+user+':'+pass);
  accounts[user]={hash,name:user,created:Date.now()};
  saveAccounts(accounts);
  localStorage.setItem('aceSession',JSON.stringify({username:user,name:user,loginTime:Date.now()}));
  showMsg('signup-msg','Account created! Signing you in… ✓','success');
  setTimeout(()=>window.location.replace('index.html'),900);
}
</script>
</body>
</html>
