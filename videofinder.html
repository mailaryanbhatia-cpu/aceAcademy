:root{--bg:#0b1120;--surface:#1a2540;--surface2:#0f1a2e;--accent:#6366f1;--accent2:#8b5cf6;--text:#e2e8f0;--muted:#94a3b8;--border:#2d3748;--green:#10b981;--yellow:#f59e0b;--red:#ef4444}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Segoe UI",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topnav{display:flex;align-items:center;gap:6px;padding:0 20px;height:54px;background:var(--surface2);border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}

.logo{font-size:1.3rem;font-weight:800;color:var(--accent);text-decoration:none;margin-right:10px;white-space:nowrap}.logo span{color:var(--accent2)}

.hero{text-align:center;padding:40px 20px 28px;background:linear-gradient(135deg,#1a1040,#0b1120)}
.hero h1{font-size:2rem;font-weight:800;margin-bottom:8px}
.hero p{color:var(--muted);max-width:560px;margin:0 auto}
.container{max-width:1100px;margin:0 auto;padding:24px 20px}
.search-bar{display:flex;gap:10px;margin-bottom:24px;flex-wrap:wrap}
.search-bar input{flex:1;min-width:200px;padding:12px 16px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:.95rem;outline:none}
.search-bar input:focus{border-color:var(--accent)}
.search-bar select{padding:12px 14px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);font-size:.9rem}
.search-bar button{padding:12px 22px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-weight:700;cursor:pointer;font-size:.95rem}
.search-bar button:hover{background:#4f46e5}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:24px}
.filter-btn{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.82rem;font-weight:600;transition:.15s}
.filter-btn:hover,.filter-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.1)}
.section-title{font-size:1.1rem;font-weight:800;margin-bottom:14px;color:var(--text)}
.video-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;margin-bottom:32px}
.video-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;overflow:hidden;cursor:pointer;transition:.2s;text-decoration:none;display:block}
.video-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.video-thumb{width:100%;height:160px;object-fit:cover;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:3rem}
.video-info{padding:14px}
.video-source{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.source-yt{color:#ef4444}.source-khan{color:#14b8a6}.source-crash{color:#f59e0b}
.video-title{font-size:.9rem;font-weight:700;margin-bottom:6px;line-height:1.4}
.video-meta{font-size:.78rem;color:var(--muted);display:flex;gap:8px;flex-wrap:wrap}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:.7rem;font-weight:700;background:rgba(99,102,241,.15);color:var(--accent)}
.no-results{text-align:center;padding:60px 20px;color:var(--muted)}
.no-results .icon{font-size:3rem;margin-bottom:12px}
</style>

const sourceIcon = {khan:'🟢', yt:'🔴', crash:'🟡'};
const sourceLabel = {khan:'Khan Academy', yt:'YouTube', crash:'Crash Course'};
const sourceClass = {khan:'source-khan', yt:'source-yt', crash:'source-crash'};

let currentSubj = 'all';
let currentGrade = 'all';
let currentSearch = '';

function renderVideos() {
  let vids = VIDEOS.filter(v => {
    const matchSubj = currentSubj === 'all' || v.subj === currentSubj;
    const matchGrade = currentGrade === 'all' || v.grade === currentGrade;
    const q = currentSearch.toLowerCase();
    const matchSearch = !q || v.title.toLowerCase().includes(q) || v.topic.toLowerCase().includes(q) || v.desc.toLowerCase().includes(q);
    return matchSubj && matchGrade && matchSearch;
  });

  const container = document.getElementById('resultsContainer');
  if (vids.length === 0) {
    container.innerHTML = '<div class="no-results"><div class="icon">🎬</div><p>No videos found. Try a different search or filter.</p></div>';
    return;
  }

  // Group by subject
  const groups = {};
  vids.forEach(v => {
    const key = v.subj;
    if (!groups[key]) groups[key] = [];
    groups[key].push(v);
  });

  const subjLabels = {math:'📐 Math', science:'🔬 Science', ela:'📖 ELA', history:'🏛 History', ap:'🎓 AP'};

  container.innerHTML = Object.entries(groups).map(([subj, list]) => `
    <div class="section-title">${subjLabels[subj] || subj} <span style="color:var(--muted);font-size:.85rem;font-weight:400">(${list.length} videos)</span></div>
    <div class="video-grid">
      ${list.map(v => `
        <a href="${v.url}" target="_blank" class="video-card">
          <div class="video-thumb" style="background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:2.5rem">
            ${v.subj==='math'?'📐':v.subj==='science'?'🔬':v.subj==='ela'?'📖':v.subj==='history'?'🏛':'🎓'}
          </div>
          <div class="video-info">
            <div class="video-source ${sourceClass[v.source]}">${sourceIcon[v.source]} ${sourceLabel[v.source]}</div>
            <div class="video-title">${v.title}</div>
            <div class="video-meta">
              <span>⏱ ${v.duration}</span>
              <span>📚 Grade ${v.grade}</span>
              <span class="tag">${v.topic}</span>
            </div>
            <div style="font-size:.78rem;color:var(--muted);margin-top:6px;line-height:1.4">${v.desc}</div>
          </div>
        </a>
      `).join('')}
    </div>
  `).join('');
}
