<!DOCTYPE html>
<html lang="en">
<head>
<script src="/timer.js"></script>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Graphing Calculator — Ace Academy</title>
<style>
:root{--bg:#0b1120;--card:#1a2540;--accent:#6366f1;--accent2:#a5b4fc;--text:#ffffff;--muted:#b0bece;--border:#2a3a55}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',sans-serif;min-height:100vh;display:flex;flex-direction:column}
.top-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.top-bar a{color:var(--accent2);text-decoration:none;font-size:.9rem}
.top-bar h1{font-size:1.1rem;font-weight:700}
.main{display:flex;flex:1;overflow:hidden;flex-direction:column}
.toolbar{background:var(--card);border-bottom:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.fn-row{display:flex;align-items:center;gap:8px;background:#0d1728;border-radius:8px;padding:4px 4px 4px 12px;border:1px solid var(--border)}
.fn-color{width:14px;height:14px;border-radius:50%;flex-shrink:0;cursor:pointer;border:2px solid #fff3}
.fn-label{font-size:.8rem;color:var(--muted);flex-shrink:0}
.fn-input{background:transparent;border:none;color:var(--text);font-size:.9rem;font-family:'Courier New',monospace;width:180px;outline:none;padding:4px 0}
.fn-del{background:transparent;border:none;color:#ef4444;cursor:pointer;font-size:1rem;padding:0 6px;line-height:1}
.fn-del:hover{color:#f87171}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:.82rem;font-weight:600;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:#5254d4}
.btn-ghost{background:transparent;color:var(--accent2);border:1px solid var(--border)}
.btn-ghost:hover{background:#1e2d4a}
.btn-sm{padding:5px 10px;font-size:.76rem}
.canvas-wrap{flex:1;position:relative;overflow:hidden;min-height:300px}
canvas{display:block;width:100%;height:100%}
.coords{position:absolute;bottom:10px;left:10px;background:#0007;padding:4px 10px;border-radius:6px;font-size:.72rem;color:var(--muted);font-family:monospace;pointer-events:none}
.zoom-btns{position:absolute;bottom:10px;right:10px;display:flex;flex-direction:column;gap:6px}
.zoom-btn{width:34px;height:34px;border-radius:8px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center}
.zoom-btn:hover{background:#1e2d4a}
.info-bar{background:var(--card);border-top:1px solid var(--border);padding:8px 16px;font-size:.75rem;color:var(--muted);display:flex;gap:20px;flex-wrap:wrap}
</style>
</head>
<body>
<div class="top-bar">
  <a href="alltools.html">← Tools</a>
  <span style="color:var(--border)">|</span>
  <h1>📈 Graphing Calculator</h1>
</div>

<div class="main">
  <div class="toolbar" id="toolbar">
    <div id="fnRows"></div>
    <button class="btn btn-ghost btn-sm" onclick="addFn()">+ Add Function</button>
    <button class="btn btn-ghost btn-sm" onclick="resetView()">⊙ Reset View</button>
    <button class="btn btn-ghost btn-sm" onclick="toggleGrid()">⊞ Grid</button>
    <span style="font-size:.75rem;color:var(--muted);margin-left:6px">Scroll to zoom · Drag to pan</span>
  </div>
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="gc"></canvas>
    <div class="coords" id="coords">x=0, y=0</div>
    <div class="zoom-btns">
      <button class="zoom-btn" onclick="zoom(1.3)">+</button>
      <button class="zoom-btn" onclick="zoom(0.77)">−</button>
    </div>
  </div>
  <div class="info-bar" id="infoBar">Enter a function above and press Enter or click outside the box to plot it.</div>
</div>

<script>
const COLORS=['#6366f1','#10b981','#ef4444','#f59e0b','#ec4899','#06b6d4','#8b5cf6','#84cc16'];
let fns=[];
let showGrid=true;

// View state
let ox=0,oy=0,scale=60; // pixels per unit
let dragging=false,dragSx,dragSy,dragOx,dragOy;

const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');

function addFn(expr=''){
  const color=COLORS[fns.length%COLORS.length];
  fns.push({expr,color,visible:true,error:false});
  renderRows();
  draw();
  // focus last input
  const inputs=document.querySelectorAll('.fn-input');
  if(inputs.length) inputs[inputs.length-1].focus();
}

function removeFn(i){
  fns.splice(i,1);
  renderRows();
  draw();
}

function renderRows(){
  const el=document.getElementById('fnRows');
  el.innerHTML=fns.map((f,i)=>`
    <div class="fn-row" style="border-color:${f.color}44">
      <div class="fn-color" style="background:${f.color}" onclick="cycleFnColor(${i})" title="Change color"></div>
      <span class="fn-label">y =</span>
      <input class="fn-input" value="${escAttr(f.expr)}" placeholder="e.g. x^2, sin(x), 2*x+1"
        oninput="fns[${i}].expr=this.value;drawSoon()"
        onkeydown="if(event.key==='Enter'){draw();showInfo()}"
        id="fni-${i}"/>
      <button class="fn-del" onclick="removeFn(${i})">✕</button>
    </div>
  `).join('');
}

function cycleFnColor(i){
  const ci=(COLORS.indexOf(fns[i].color)+1)%COLORS.length;
  fns[i].color=COLORS[ci];
  renderRows();
  draw();
}

// Math parser — safe eval with Math functions
function safeEval(expr,x){
  try{
    const e=expr
      .replace(/\^/g,'**')
      .replace(/(\d)(x)/g,'$1*x')
      .replace(/\bsin\b/g,'Math.sin')
      .replace(/\bcos\b/g,'Math.cos')
      .replace(/\btan\b/g,'Math.tan')
      .replace(/\basin\b/g,'Math.asin')
      .replace(/\bacos\b/g,'Math.acos')
      .replace(/\batan\b/g,'Math.atan')
      .replace(/\bsqrt\b/g,'Math.sqrt')
      .replace(/\babs\b/g,'Math.abs')
      .replace(/\blog\b/g,'Math.log10')
      .replace(/\bln\b/g,'Math.log')
      .replace(/\bpi\b/g,'Math.PI')
      .replace(/\be\b/g,'Math.E')
      .replace(/\bfloor\b/g,'Math.floor')
      .replace(/\bceil\b/g,'Math.ceil')
      .replace(/\bround\b/g,'Math.round');
    // eslint-disable-next-line no-new-func
    return Function('x','return '+e)(x);
  }catch(err){return NaN;}
}

function toCanvas(x,y){
  const W=canvas.width,H=canvas.height;
  return[W/2+ox+x*scale, H/2-oy-y*scale];
}
function toWorld(cx,cy){
  const W=canvas.width,H=canvas.height;
  return[(cx-W/2-ox)/scale, -(cy-H/2-oy)/scale];
}

function resize(){
  const wrap=document.getElementById('canvasWrap');
  canvas.width=wrap.clientWidth;
  canvas.height=wrap.clientHeight;
  draw();
}

function draw(){
  const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  ctx.fillStyle='#080f1f';
  ctx.fillRect(0,0,W,H);

  // Grid
  if(showGrid){
    const step=niceStep(100/scale);
    const x0=toWorld(0,0)[0], x1=toWorld(W,0)[0];
    const y0=toWorld(0,H)[1], y1=toWorld(0,0)[1];
    ctx.strokeStyle='#1e2d4a';
    ctx.lineWidth=1;
    // vertical gridlines
    const gx0=Math.ceil(x0/step)*step;
    for(let gx=gx0;gx<=x1;gx+=step){
      const [px]=toCanvas(gx,0);
      ctx.beginPath();ctx.moveTo(px,0);ctx.lineTo(px,H);ctx.stroke();
    }
    // horizontal gridlines
    const gy0=Math.ceil(y0/step)*step;
    for(let gy=gy0;gy<=y1;gy+=step){
      const [,py]=toCanvas(0,gy);
      ctx.beginPath();ctx.moveTo(0,py);ctx.lineTo(W,py);ctx.stroke();
    }
    // Labels
    ctx.fillStyle='#4a5a7a';
    ctx.font='11px monospace';
    ctx.textAlign='center';
    for(let gx=gx0;gx<=x1;gx+=step){
      const [px,py]=toCanvas(gx,0);
      if(Math.abs(gx)<step*0.01) continue;
      ctx.fillText(fmt(gx),px,Math.min(Math.max(py+14,14),H-4));
    }
    ctx.textAlign='right';
    for(let gy=gy0;gy<=y1;gy+=step){
      const [px,py]=toCanvas(0,gy);
      if(Math.abs(gy)<step*0.01) continue;
      ctx.fillText(fmt(gy),Math.min(Math.max(px-6,30),W-4),py+4);
    }
  }

  // Axes
  const [axPx]=toCanvas(0,0); const [,axPy]=toCanvas(0,0);
  ctx.strokeStyle='#4a5a8a'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(0,axPy);ctx.lineTo(W,axPy);ctx.stroke();
  ctx.beginPath();ctx.moveTo(axPx,0);ctx.lineTo(axPx,H);ctx.stroke();
  // Axis arrows
  ctx.fillStyle='#4a5a8a';
  arrow(W-8,axPy,0); arrow(axPx,8,Math.PI/2*3);

  // Plot functions
  const steps=W*2;
  const xMin=toWorld(0,0)[0], xMax=toWorld(W,0)[0];
  fns.forEach(f=>{
    if(!f.expr.trim()){f.error=false;return;}
    ctx.strokeStyle=f.color;
    ctx.lineWidth=2.2;
    ctx.shadowBlur=6;ctx.shadowColor=f.color+'88';
    ctx.beginPath();
    let penDown=false;
    let prevY=null;
    for(let px=0;px<=W;px+=0.5){
      const x=toWorld(px,0)[0];
      const y=safeEval(f.expr,x);
      if(!isFinite(y)||Math.abs(y)>1e6){penDown=false;prevY=null;continue;}
      const [,py]=toCanvas(0,y);
      // discontinuity detection
      if(prevY!==null&&Math.abs(py-prevY)>H*2){penDown=false;}
      if(!penDown){ctx.moveTo(px,py);penDown=true;}
      else ctx.lineTo(px,py);
      prevY=py;
    }
    ctx.stroke();
    ctx.shadowBlur=0;
    f.error=false;
  });
}

function arrow(x,y,angle){
  ctx.save();ctx.translate(x,y);ctx.rotate(angle);
  ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(-7,4);ctx.lineTo(-7,-4);ctx.closePath();ctx.fill();
  ctx.restore();
}

function niceStep(raw){
  const p=Math.pow(10,Math.floor(Math.log10(raw)));
  const f=raw/p;
  return f<1.5?p:f<3?2*p:f<7?5*p:10*p;
}

function fmt(n){
  if(Number.isInteger(n)) return n;
  return parseFloat(n.toPrecision(4));
}

function zoom(factor){
  scale*=factor;
  draw();
}

function resetView(){scale=60;ox=0;oy=0;draw();}
function toggleGrid(){showGrid=!showGrid;draw();}

// Pan
canvas.addEventListener('mousedown',e=>{
  dragging=true;dragSx=e.clientX;dragSy=e.clientY;dragOx=ox;dragOy=oy;
  canvas.style.cursor='grabbing';
});
window.addEventListener('mousemove',e=>{
  if(dragging){
    ox=dragOx+(e.clientX-dragSx);
    oy=dragOy-(e.clientY-dragSy);
    draw();
  }
  const rect=canvas.getBoundingClientRect();
  const [wx,wy]=toWorld(e.clientX-rect.left,e.clientY-rect.top);
  document.getElementById('coords').textContent=`x=${wx.toFixed(3)}, y=${wy.toFixed(3)}`;
});
window.addEventListener('mouseup',()=>{dragging=false;canvas.style.cursor='crosshair';});
canvas.style.cursor='crosshair';

// Touch pan
let t1=null,t1ox,t1oy,t1scale;
canvas.addEventListener('touchstart',e=>{
  if(e.touches.length===1){
    dragging=true;
    dragSx=e.touches[0].clientX;dragSy=e.touches[0].clientY;dragOx=ox;dragOy=oy;
  }
  if(e.touches.length===2){
    dragging=false;
    t1={x0:(e.touches[0].clientX+e.touches[1].clientX)/2,
        y0:(e.touches[0].clientY+e.touches[1].clientY)/2,
        d0:Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY)};
    t1ox=ox;t1oy=oy;t1scale=scale;
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  if(e.touches.length===1&&dragging){
    ox=dragOx+(e.touches[0].clientX-dragSx);
    oy=dragOy-(e.touches[0].clientY-dragSy);
    draw();
  }
  if(e.touches.length===2&&t1){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    scale=t1scale*(d/t1.d0);
    draw();
  }
  e.preventDefault();
},{passive:false});
canvas.addEventListener('touchend',()=>{dragging=false;t1=null;});

// Scroll to zoom
canvas.addEventListener('wheel',e=>{
  e.preventDefault();
  const factor=e.deltaY<0?1.1:0.91;
  // zoom toward cursor
  const rect=canvas.getBoundingClientRect();
  const mx=e.clientX-rect.left, my=e.clientY-rect.top;
  const [wx,wy]=toWorld(mx,my);
  scale*=factor;
  const [nx,ny]=toCanvas(wx,wy);
  ox+=mx-nx; oy-=my-ny;
  draw();
},{passive:false});

let drawTimer=null;
function drawSoon(){clearTimeout(drawTimer);drawTimer=setTimeout(draw,80);}

function showInfo(){
  const parts=fns.filter(f=>f.expr.trim()).map(f=>{
    // find x-intercepts roughly
    const roots=[];
    const step=0.01;
    let prev=safeEval(f.expr,-10);
    for(let x=-10;x<=10;x+=step){
      const cur=safeEval(f.expr,x);
      if(isFinite(prev)&&isFinite(cur)&&prev*cur<0&&Math.abs(cur-prev)<5){
        roots.push(x.toFixed(2));
      }
      prev=cur;
    }
    const yint=safeEval(f.expr,0);
    return `<span style="color:${f.color}">y=${f.expr}</span> · y-int: ${isFinite(yint)?yint.toFixed(3):'—'} · x-int(approx): ${roots.length?roots.slice(0,5).join(', '):'none found'}`;
  });
  document.getElementById('infoBar').innerHTML=parts.join('&nbsp;&nbsp;|&nbsp;&nbsp;')||'Enter a function above.';
}

function escAttr(s){return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// Init
window.addEventListener('resize',resize);
resize();
addFn('x^2');
addFn('sin(x)');
showInfo();
</script>
</body>
</html>
