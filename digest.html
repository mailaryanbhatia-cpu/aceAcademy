<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<link rel="stylesheet" href="/ace-shared.css">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Weekly Digest — aceAcademy</title>
<link rel="stylesheet" href="ace-theme.css"/>
<link rel="manifest" href="/manifest.json"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<link rel="apple-touch-icon" href="/icons/icon-192.png"/>
<script src="theme.js"></script>
<script src="streak.js"></script>
<style>
body{font-family:var(--font);background:var(--bg);color:#e2e8f0;margin:0;padding:0}
.nav{display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:#0f172a;border-bottom:1px solid #1e293b}
.nav a{color:#e2e8f0;text-decoration:none;font-weight:700;font-size:1.1rem}
.nav-links{display:flex;gap:14px;align-items:center}
.nav-links a{color:#94a3b8;text-decoration:none;font-size:.88rem;transition:color .2s}
.nav-links a:hover{color:#e2e8f0}
.container{max-width:860px;margin:0 auto;padding:32px 20px}
h1{font-size:1.8rem;font-weight:900;margin:0 0 4px;background:linear-gradient(135deg,#6366f1,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:#64748b;font-size:.95rem;margin-bottom:32px}
.week-nav{display:flex;align-items:center;gap:16px;margin-bottom:28px}
.week-nav button{background:#1e293b;border:1px solid #334155;color:#e2e8f0;padding:7px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;transition:background .2s}
.week-nav button:hover{background:#334155}
.week-label{font-weight:700;color:#a5b4fc;font-size:1rem}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:14px;margin-bottom:28px}
.stat-card{background:#0f172a;border:1px solid #1e293b;border-radius:14px;padding:18px;text-align:center;transition:border-color .2s}
.stat-card:hover{border-color:#6366f1}
.stat-num{font-size:2rem;font-weight:900;line-height:1}
.stat-label{font-size:.75rem;color:#64748b;margin-top:5px;text-transform:uppercase;letter-spacing:.05em}
.section{background:#0f172a;border:1px solid #1e293b;border-radius:16px;padding:22px;margin-bottom:18px}
.section h2{margin:0 0 16px;font-size:1rem;font-weight:800;color:#a5b4fc;display:flex;align-items:center;gap:8px}
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.bar-label{width:120px;font-size:.82rem;color:#94a3b8;text-align:right;flex-shrink:0}
.bar-track{flex:1;background:#1e293b;border-radius:99px;height:10px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:linear-gradient(90deg,#6366f1,#8b5cf6);transition:width .8s ease}
.bar-val{width:36px;font-size:.78rem;color:#64748b;text-align:right;flex-shrink:0}
.day-row{display:flex;align-items:center;gap:8px;margin-bottom:8px;font-size:.85rem}
.day-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.day-name{width:36px;color:#94a3b8}
.day-acts{color:#e2e8f0}
.empty{color:#475569;font-size:.88rem;text-align:center;padding:20px 0}
.share-btn{background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;border:none;padding:10px 22px;border-radius:99px;font-weight:700;font-size:.88rem;cursor:pointer;display:flex;align-items:center;gap:7px;margin:0 auto}
.share-btn:hover{opacity:.9}
.score-pill{display:inline-block;padding:2px 9px;border-radius:99px;font-size:.73rem;font-weight:700;margin-left:6px}
.score-good{background:rgba(16,185,129,.2);color:#10b981}
.score-ok{background:rgba(245,158,11,.2);color:#f59e0b}
.score-low{background:rgba(239,68,68,.2);color:#ef4444}
</style>
<script src="/timer.js"></script>
</head>
<body>
<nav class="nav">
  <a href="index.html">🎓 aceAcademy</a>
  <div class="nav-links">
    <a href="index.html">Home</a>
    <a href="progress.html">Progress</a>
    <a href="alltools.html">All Tools</a>
    <button onclick="toggleTheme()" style="background:none;border:none;cursor:pointer;font-size:1.1rem" id="themeToggle">☀️</button>
  </div>
</nav>

<div class="container">
  <h1>📋 Weekly Digest</h1>
  <p class="subtitle" id="weekSubtitle">Your study summary for this week</p>

  <div class="week-nav">
    <button onclick="shiftWeek(-1)">◀ Prev</button>
    <span class="week-label" id="weekLabel">This Week</span>
    <button onclick="shiftWeek(1)" id="nextBtn">Next ▶</button>
  </div>

  <div class="stats-grid" id="statsGrid"></div>

  <div class="section">
    <h2>📅 Day-by-Day Activity</h2>
    <div id="dayBreakdown"></div>
  </div>

  <div class="section">
    <h2>📝 Tests Taken</h2>
    <div id="testsSection"></div>
  </div>

  <div class="section">
    <h2>🃏 Flashcards Reviewed</h2>
    <div id="flashSection"></div>
  </div>

  <div class="section">
    <h2>🎯 Goals Progress</h2>
    <div id="goalsSection"></div>
  </div>

  <div class="section">
    <h2>📚 Reading</h2>
    <div id="readingSection"></div>
  </div>

  <div style="text-align:center;margin-top:24px">
    <button class="share-btn" onclick="shareDigest()">📤 Share My Week</button>
  </div>
</div>

<script>
var weekOffset = 0;

function getWeekRange(offset) {
  var now = new Date();
  var day = now.getDay(); // 0=Sun
  var monday = new Date(now);
  monday.setDate(now.getDate() - ((day + 6) % 7) + offset * 7);
  monday.setHours(0,0,0,0);
  var sunday = new Date(monday);
  sunday.setDate(monday.getDate() + 6);
  sunday.setHours(23,59,59,999);
  return { start: monday, end: sunday };
}

function fmtDate(d) {
  return d.toISOString().split('T')[0];
}

function dateInRange(dateStr, range) {
  var d = new Date(dateStr + 'T00:00:00');
  return d >= range.start && d <= range.end;
}

function shiftWeek(dir) {
  weekOffset += dir;
  if (weekOffset > 0) weekOffset = 0;
  document.getElementById('nextBtn').disabled = weekOffset >= 0;
  renderDigest();
}

function renderDigest() {
  var range = getWeekRange(weekOffset);
  var label = weekOffset === 0 ? 'This Week' :
               weekOffset === -1 ? 'Last Week' :
               'Week of ' + range.start.toLocaleDateString('en-US',{month:'short',day:'numeric'});
  document.getElementById('weekLabel').textContent = label;
  document.getElementById('weekSubtitle').textContent =
    range.start.toLocaleDateString('en-US',{month:'long',day:'numeric'}) + ' – ' +
    range.end.toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
  document.getElementById('nextBtn').disabled = weekOffset >= 0;

  // ── Gather data ──────────────────────────────────────────────
  var tests    = JSON.parse(localStorage.getItem('aceTestHistory') || '[]');
  var decks    = JSON.parse(localStorage.getItem('ace_flashcards_v2') || '{}');
  var sessions = JSON.parse(localStorage.getItem('ace_reading_sessions') || '[]');
  var goals    = JSON.parse(localStorage.getItem('ace_goals') || '[]');
  var streakD  = JSON.parse(localStorage.getItem('ace_login_streak') || '{"count":0}');

  // Week tests
  var weekTests = tests.filter(function(t){ return t.date && dateInRange(t.date.split('T')[0], range); });
  // Week reading
  var weekRead  = sessions.filter(function(s){ return s.date && dateInRange(s.date, range); });
  var readMins  = weekRead.reduce(function(a,s){ return a + (s.minutes||0); }, 0);
  var readPages = weekRead.reduce(function(a,s){ return a + (s.pages||0); }, 0);

  // Flashcard reviews this week (approximate from deck lastReview dates)
  var flashCount = 0;
  Object.values(decks).forEach(function(deck){
    if (!deck.cards) return;
    deck.cards.forEach(function(c){
      if (c.lastReview && dateInRange(c.lastReview.split('T')[0], range)) flashCount++;
    });
  });

  // Days studied (union of all activity dates)
  var activeDays = new Set();
  weekTests.forEach(function(t){ if(t.date) activeDays.add(t.date.split('T')[0]); });
  weekRead.forEach(function(s){ if(s.date) activeDays.add(s.date); });
  Object.values(decks).forEach(function(deck){
    if(!deck.cards) return;
    deck.cards.forEach(function(c){
      if(c.lastReview && dateInRange(c.lastReview.split('T')[0], range))
        activeDays.add(c.lastReview.split('T')[0]);
    });
  });

  // Avg test score
  var avgScore = weekTests.length ? Math.round(weekTests.reduce(function(a,t){ return a+(t.pct||t.score||0); },0)/weekTests.length) : null;

  // ── Stats grid ───────────────────────────────────────────────
  var statsData = [
    { num: activeDays.size + ' / 7', label: 'Days Studied', color: '#6366f1' },
    { num: weekTests.length, label: 'Tests Taken', color: '#8b5cf6' },
    { num: avgScore !== null ? avgScore + '%' : '—', label: 'Avg Score', color: '#10b981' },
    { num: flashCount, label: 'Cards Reviewed', color: '#f59e0b' },
    { num: readMins + 'm', label: 'Reading Time', color: '#3b82f6' },
    { num: streakD.count || 0, label: 'Day Streak 🔥', color: '#ef4444' }
  ];
  document.getElementById('statsGrid').innerHTML = statsData.map(function(s){
    return '<div class="stat-card"><div class="stat-num" style="color:'+s.color+'">'+s.num+'</div><div class="stat-label">'+s.label+'</div></div>';
  }).join('');

  // ── Day breakdown ────────────────────────────────────────────
  var days = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  var dayRows = '';
  for (var i = 0; i < 7; i++) {
    var d = new Date(range.start);
    d.setDate(range.start.getDate() + i);
    var ds = fmtDate(d);
    var acts = [];
    var dayTests = weekTests.filter(function(t){ return t.date && t.date.split('T')[0] === ds; });
    if (dayTests.length) acts.push(dayTests.length + ' test' + (dayTests.length>1?'s':''));
    var dayRead = weekRead.filter(function(s){ return s.date === ds; });
    if (dayRead.length) {
      var mins = dayRead.reduce(function(a,s){ return a+s.minutes; }, 0);
      acts.push(mins + 'min reading');
    }
    var dayFlash = 0;
    Object.values(decks).forEach(function(deck){
      if(!deck.cards) return;
      deck.cards.forEach(function(c){ if(c.lastReview && c.lastReview.split('T')[0]===ds) dayFlash++; });
    });
    if (dayFlash) acts.push(dayFlash + ' flashcards');
    var isToday = ds === fmtDate(new Date());
    var color = acts.length ? '#6366f1' : '#1e293b';
    dayRows += '<div class="day-row">'
      + '<div class="day-dot" style="background:'+color+'"></div>'
      + '<div class="day-name">'+days[i]+(isToday?' ★':'')+'</div>'
      + '<div class="day-acts">'+(acts.length ? acts.join(' · ') : '<span style="color:#475569">No activity</span>')+'</div>'
      + '</div>';
  }
  document.getElementById('dayBreakdown').innerHTML = dayRows;

  // ── Tests section ─────────────────────────────────────────────
  if (weekTests.length === 0) {
    document.getElementById('testsSection').innerHTML = '<div class="empty">No tests taken this week</div>';
  } else {
    document.getElementById('testsSection').innerHTML = weekTests.map(function(t){
      var pct = t.pct || t.score || 0;
      var pill = pct >= 80 ? 'score-good' : pct >= 60 ? 'score-ok' : 'score-low';
      return '<div class="bar-row"><div class="bar-label">'+(t.subject||t.name||'Test')+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div>'
        +'<div class="bar-val"><span class="score-pill '+pill+'">'+pct+'%</span></div></div>';
    }).join('');
  }

  // ── Flashcards section ───────────────────────────────────────
  var deckRows = [];
  Object.entries(decks).forEach(function(e){
    var name = e[0], deck = e[1];
    if (!deck.cards) return;
    var reviewed = deck.cards.filter(function(c){ return c.lastReview && dateInRange(c.lastReview.split('T')[0], range); }).length;
    if (reviewed > 0) deckRows.push({ name: name, reviewed: reviewed, total: deck.cards.length });
  });
  if (deckRows.length === 0) {
    document.getElementById('flashSection').innerHTML = '<div class="empty">No flashcard reviews this week</div>';
  } else {
    var maxRev = Math.max.apply(null, deckRows.map(function(r){ return r.reviewed; }));
    document.getElementById('flashSection').innerHTML = deckRows.map(function(r){
      var pct = Math.round(r.reviewed / Math.max(maxRev,1) * 100);
      return '<div class="bar-row"><div class="bar-label">'+r.name+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%"></div></div>'
        +'<div class="bar-val" style="color:#a5b4fc">'+r.reviewed+'</div></div>';
    }).join('');
  }

  // ── Goals section ────────────────────────────────────────────
  if (goals.length === 0) {
    document.getElementById('goalsSection').innerHTML = '<div class="empty">No goals set yet — <a href="goals.html" style="color:#6366f1">add one</a></div>';
  } else {
    document.getElementById('goalsSection').innerHTML = goals.slice(0,5).map(function(g){
      var pct = Math.min(100, g.progress || 0);
      var done = pct >= 100;
      return '<div class="bar-row"><div class="bar-label">'+(done?'✅ ':'')+(g.title||'Goal')+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+pct+'%;background:'+(done?'linear-gradient(90deg,#10b981,#34d399)':'linear-gradient(90deg,#6366f1,#8b5cf6)')+'"></div></div>'
        +'<div class="bar-val" style="color:#64748b">'+pct+'%</div></div>';
    }).join('');
  }

  // ── Reading section ──────────────────────────────────────────
  if (weekRead.length === 0) {
    document.getElementById('readingSection').innerHTML = '<div class="empty">No reading sessions this week</div>';
  } else {
    var books = {};
    weekRead.forEach(function(s){
      var b = s.book || 'Unknown';
      books[b] = (books[b]||0) + (s.minutes||0);
    });
    document.getElementById('readingSection').innerHTML =
      '<div style="margin-bottom:10px;font-size:.85rem;color:#94a3b8">'
      + readMins + ' minutes · ' + readPages + ' pages this week</div>'
      + Object.entries(books).map(function(e){
          return '<div class="bar-row"><div class="bar-label">'+e[0]+'</div>'
            +'<div class="bar-track"><div class="bar-fill" style="width:'+Math.min(100,e[1])+'%;background:linear-gradient(90deg,#3b82f6,#6366f1)"></div></div>'
            +'<div class="bar-val" style="color:#64748b">'+e[1]+'m</div></div>';
        }).join('');
  }
}

function shareDigest() {
  var range = getWeekRange(weekOffset);
  var streakD = JSON.parse(localStorage.getItem('ace_login_streak') || '{"count":0}');
  var tests   = JSON.parse(localStorage.getItem('aceTestHistory') || '[]');
  var weekTests = tests.filter(function(t){ return t.date && dateInRange(t.date.split('T')[0], range); });
  var avgScore = weekTests.length ? Math.round(weekTests.reduce(function(a,t){ return a+(t.pct||0); },0)/weekTests.length) : null;

  var text = '📋 My aceAcademy Week\n'
    + '🔥 Streak: ' + (streakD.count||0) + ' days\n'
    + '📝 Tests: ' + weekTests.length + (avgScore !== null ? ' (avg ' + avgScore + '%)' : '') + '\n'
    + '🌐 aceAcademy: https://mailaryanbhatia-cpu.github.io/';

  if (navigator.share) {
    navigator.share({ title: 'My aceAcademy Weekly Digest', text: text });
  } else {
    navigator.clipboard.writeText(text).then(function(){
      alert('Copied to clipboard!');
    });
  }
}

renderDigest();
</script>
<script src="/analytics.js"></script>
</body>
</html>
