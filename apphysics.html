<script>
const UNITS = {
  "kinematics": {
    "label": "Kinematics",
    "icon": "🏃",
    "terms": [
      ["Displacement","The change in an object's position, a vector quantity measured from start point to end point."],
      ["Velocity","The rate of change of displacement with respect to time; a vector with both magnitude and direction."],
      ["Speed","The magnitude of velocity; a scalar quantity describing how fast an object moves."],
      ["Acceleration","The rate of change of velocity with respect to time."],
      ["Instantaneous Velocity","The velocity of an object at a specific moment in time, found from the slope of a position-time graph."],
      ["Average Velocity","Total displacement divided by total time elapsed."],
      ["Free Fall","Motion under the influence of gravity alone, with constant acceleration g ≈ 9.8 m/s²."],
      ["Projectile Motion","Two-dimensional motion of an object under gravity, combining constant horizontal velocity and vertical acceleration."],
      ["Range (Projectile)","The horizontal distance a projectile travels before returning to its launch height."],
      ["Kinematic Equations","The set of equations relating displacement, velocity, acceleration, and time for constant acceleration."],
      ["Position-Time Graph","A graph whose slope at any point gives instantaneous velocity."],
      ["Velocity-Time Graph","A graph whose slope gives acceleration and whose area under the curve gives displacement."],
      ["Relative Velocity","The velocity of an object as measured from a particular reference frame."],
      ["Vector","A quantity with both magnitude and direction, such as displacement, velocity, or force."],
      ["Scalar","A quantity described by magnitude alone, such as distance, speed, or mass."],
      ["Terminal Velocity","The constant maximum velocity reached by a falling object when air resistance balances gravity."]
    ]
  },
  "dynamics": {
    "label": "Newton's Laws & Dynamics",
    "icon": "🍎",
    "terms": [
      ["Newton's First Law","An object at rest stays at rest and an object in motion stays in motion at constant velocity unless acted on by a net external force."],
      ["Newton's Second Law","The net force on an object equals its mass times its acceleration: F = ma."],
      ["Newton's Third Law","For every action force, there is an equal and opposite reaction force."],
      ["Inertia","The tendency of an object to resist changes in its state of motion; proportional to mass."],
      ["Net Force","The vector sum of all forces acting on an object."],
      ["Weight","The gravitational force exerted on an object's mass, equal to mg."],
      ["Normal Force","The support force exerted by a surface perpendicular to that surface, preventing objects from passing through it."],
      ["Friction (Static/Kinetic)","A resistive force between surfaces in contact; static friction prevents motion from starting, kinetic friction opposes motion in progress."],
      ["Coefficient of Friction","A dimensionless value describing the ratio of friction force to normal force between two surfaces."],
      ["Tension","The pulling force transmitted through a string, rope, or cable when it is pulled taut."],
      ["Free-Body Diagram","A diagram showing all forces acting on a single object, represented as vectors."],
      ["Equilibrium","A state in which the net force (and net torque) on an object is zero, so it does not accelerate."],
      ["Apparent Weight","The normal force experienced by an object, which can differ from true weight during acceleration (e.g., in an elevator)."],
      ["Air Resistance (Drag)","A resistive force opposing an object's motion through air, increasing with speed."],
      ["Mass vs. Weight","Mass is the amount of matter in an object (invariant); weight is the gravitational force on that mass (location-dependent)."]
    ]
  },
  "circular": {
    "label": "Circular Motion & Gravitation",
    "icon": "🌐",
    "terms": [
      ["Uniform Circular Motion","Motion in a circular path at constant speed, with velocity direction continuously changing."],
      ["Centripetal Acceleration","The acceleration directed toward the center of a circular path, given by v²/r."],
      ["Centripetal Force","The net force directed toward the center of a circle that causes centripetal acceleration; not a separate force but the net of real forces."],
      ["Period (T)","The time required to complete one full revolution or cycle."],
      ["Frequency (f)","The number of revolutions or cycles completed per unit time; the reciprocal of period."],
      ["Angular Velocity","The rate of change of angular position with respect to time, measured in radians per second."],
      ["Newton's Law of Universal Gravitation","Every mass attracts every other mass with a force proportional to the product of their masses and inversely proportional to the square of the distance between them."],
      ["Gravitational Field Strength (g)","The gravitational force per unit mass at a given location, equal to GM/r²."],
      ["Orbital Velocity","The speed an object needs to maintain a stable circular orbit around a larger body."],
      ["Kepler's Laws","Three laws describing planetary orbits: elliptical paths, equal areas in equal times, and the relation between orbital period and radius."],
      ["Banked Curve","A curved roadway tilted so that the normal force contributes to the centripetal force needed for circular motion."],
      ["Geosynchronous Orbit","An orbit in which a satellite's period matches Earth's rotation, keeping it above the same point on Earth."],
      ["Weightlessness (Apparent)","The sensation of zero apparent weight experienced in free-fall or orbit, where gravity provides all centripetal force."],
      ["Escape Velocity","The minimum speed needed for an object to break free of a gravitational field without further propulsion."]
    ]
  },
  "energy": {
    "label": "Work, Energy & Power",
    "icon": "⚡",
    "terms": [
      ["Work","The energy transferred to or from an object via a force acting through a displacement: W = Fd·cosθ."],
      ["Kinetic Energy","The energy of motion, equal to ½mv²."],
      ["Potential Energy","Stored energy due to an object's position or configuration, such as gravitational or elastic potential energy."],
      ["Gravitational Potential Energy","Energy stored due to an object's height in a gravitational field, equal to mgh."],
      ["Elastic Potential Energy","Energy stored in a stretched or compressed spring, equal to ½kx²."],
      ["Work-Energy Theorem","The net work done on an object equals its change in kinetic energy."],
      ["Conservation of Mechanical Energy","In the absence of non-conservative forces, the total mechanical energy (KE + PE) of a system remains constant."],
      ["Conservative Force","A force, like gravity or a spring force, for which work done is path-independent and mechanical energy is conserved."],
      ["Non-Conservative Force","A force, like friction, that removes mechanical energy from a system, usually converting it to heat."],
      ["Power","The rate at which work is done or energy is transferred, measured in watts."],
      ["Hooke's Law","The restoring force of a spring is proportional to its displacement from equilibrium: F = -kx."],
      ["Spring Constant (k)","A measure of a spring's stiffness, relating the restoring force to displacement."],
      ["Efficiency","The ratio of useful energy output to total energy input in a process."],
      ["Energy Conservation (General)","The principle that total energy in an isolated system remains constant, though it may change form."]
    ]
  },
  "momentum": {
    "label": "Momentum & Impulse",
    "icon": "💥",
    "terms": [
      ["Momentum","The product of an object's mass and velocity, a vector quantity: p = mv."],
      ["Impulse","The change in momentum of an object, equal to the net force applied multiplied by the time interval."],
      ["Impulse-Momentum Theorem","The impulse applied to an object equals its change in momentum."],
      ["Conservation of Momentum","In an isolated system with no external forces, total momentum before an interaction equals total momentum after."],
      ["Elastic Collision","A collision in which both momentum and kinetic energy are conserved."],
      ["Inelastic Collision","A collision in which momentum is conserved but kinetic energy is not, due to energy converted to heat, sound, or deformation."],
      ["Perfectly Inelastic Collision","A collision in which the colliding objects stick together and move with a common final velocity."],
      ["Center of Mass","The average position of an object's or system's mass, weighted by distribution."],
      ["Explosion (Physics)","An event in which an object separates into multiple pieces, with total momentum conserved even though kinetic energy increases."],
      ["Coefficient of Restitution","A measure of how elastic a collision is, comparing relative speeds before and after impact."]
    ]
  },
  "shm": {
    "label": "Simple Harmonic Motion & Waves",
    "icon": "🌊",
    "terms": [
      ["Simple Harmonic Motion (SHM)","Periodic motion where the restoring force is proportional and opposite to displacement from equilibrium."],
      ["Amplitude","The maximum displacement of an oscillating object from its equilibrium position."],
      ["Period of SHM","The time for one complete oscillation cycle, independent of amplitude for ideal SHM."],
      ["Pendulum (Simple)","A mass on a string that exhibits approximate SHM for small angles, with period dependent on length and gravity."],
      ["Mass-Spring System","A system exhibiting SHM whose period depends on mass and spring constant, not amplitude."],
      ["Restoring Force","A force that acts to return a system to its equilibrium position."],
      ["Wave","A disturbance that transfers energy through a medium or space without permanently displacing matter."],
      ["Wavelength","The distance between two successive identical points on a wave, such as crest to crest."],
      ["Wave Frequency","The number of wave cycles passing a point per unit time."],
      ["Wave Speed","The speed at which a wave pattern travels, equal to wavelength times frequency."],
      ["Transverse Wave","A wave in which particle motion is perpendicular to the direction of wave travel, such as light or a wave on a string."],
      ["Longitudinal Wave","A wave in which particle motion is parallel to the direction of wave travel, such as sound."],
      ["Resonance","A phenomenon where a system oscillates with maximum amplitude when driven at its natural frequency."],
      ["Standing Wave","A wave pattern formed by interference of two waves traveling in opposite directions, with fixed nodes and antinodes."]
    ]
  },
  "rotation": {
    "label": "Rotational Motion & Torque",
    "icon": "🔄",
    "terms": [
      ["Torque","The rotational analog of force, equal to force times the perpendicular lever arm distance from the pivot: τ = rF·sinθ."],
      ["Rotational Equilibrium","A state in which the net torque on an object is zero, so its angular velocity does not change."],
      ["Moment of Inertia","A measure of an object's resistance to changes in rotational motion, dependent on mass distribution relative to the axis."],
      ["Angular Acceleration","The rate of change of angular velocity with respect to time."],
      ["Angular Momentum","The rotational analog of linear momentum, equal to moment of inertia times angular velocity: L = Iω."],
      ["Conservation of Angular Momentum","In the absence of external torque, the total angular momentum of a system remains constant."],
      ["Rotational Kinetic Energy","The kinetic energy of a rotating object, equal to ½Iω²."],
      ["Lever Arm","The perpendicular distance from the axis of rotation to the line of action of a force."],
      ["Rolling Without Slipping","Motion combining rotation and translation where the contact point has zero relative velocity with the surface."],
      ["Parallel Axis Theorem","A theorem relating an object's moment of inertia about any axis to its moment of inertia about a parallel axis through its center of mass."]
    ]
  },
  "electricity": {
    "label": "Electricity & Circuits",
    "icon": "🔌",
    "terms": [
      ["Electric Charge","A fundamental property of matter that causes it to experience a force in an electric field; can be positive or negative."],
      ["Coulomb's Law","The electric force between two point charges is proportional to the product of the charges and inversely proportional to the square of the distance between them."],
      ["Electric Field","A region around a charged object where another charge would experience a force, measured in newtons per coulomb."],
      ["Electric Potential (Voltage)","The electric potential energy per unit charge at a point in a field, measured in volts."],
      ["Current","The rate of flow of electric charge through a conductor, measured in amperes."],
      ["Resistance","Opposition to the flow of electric current in a conductor, measured in ohms."],
      ["Ohm's Law","The relationship V = IR between voltage, current, and resistance in a circuit."],
      ["Series Circuit","A circuit in which components are connected end to end so the same current flows through each."],
      ["Parallel Circuit","A circuit in which components are connected across common points, so voltage is the same across each branch."],
      ["Electric Power","The rate at which electrical energy is transferred or converted, equal to IV."],
      ["Capacitor","A device that stores electric charge and energy in an electric field between two conductive plates."],
      ["Capacitance","A measure of a capacitor's ability to store charge per unit voltage, measured in farads."],
      ["Resistivity","An intrinsic material property describing how strongly a material opposes current flow."],
      ["Kirchhoff's Laws","Rules stating that current is conserved at a junction and voltage sums to zero around any closed loop."]
    ]
  }
};

const unitKeys = Object.keys(UNITS);
let currentUnit = null;
let mode = 'flash';
let cardOrder = [];
let cardIdx = 0;
let flipped = false;
let quizQ = [];
let quizIdx = 0;
let quizScore = 0;

function renderUnitGrid() {
  const grid = document.getElementById('unitGrid');
  grid.innerHTML = unitKeys.map(k => {
    const u = UNITS[k];
    return `<div class="unit-card${k===currentUnit?' active':''}" onclick="selectUnit('${k}')">
      <div class="unit-icon">${u.icon}</div>
      <div class="unit-name">${escHtml(u.label)}</div>
      <div class="unit-count">${u.terms.length} terms</div>
    </div>`;
  }).join('');
}

function selectUnit(k) {
  currentUnit = k;
  renderUnitGrid();
  document.getElementById('studyCard').style.display = 'block';
  cardOrder = UNITS[k].terms.map((_, i) => i);
  cardIdx = 0;
  flipped = false;
  setMode(mode);
}

function setMode(m) {
  mode = m;
  document.getElementById('modeFlash').classList.toggle('active', m === 'flash');
  document.getElementById('modeQuiz').classList.toggle('active', m === 'quiz');
  document.getElementById('flashArea').style.display = m === 'flash' ? 'block' : 'none';
  document.getElementById('quizArea').style.display = m === 'quiz' ? 'block' : 'none';
  if (m === 'flash') renderFlash();
  else startQuiz();
}

function renderFlash() {
  if (!currentUnit) return;
  const terms = UNITS[currentUnit].terms;
  const [term, def] = terms[cardOrder[cardIdx]];
  document.getElementById('flashProgress').textContent = `Card ${cardIdx+1} of ${terms.length}`;
  const card = document.getElementById('flashCard');
  card.innerHTML = flipped ? `<div class="def">${escHtml(def)}</div>` : `<div>${escHtml(term)}</div>`;
}

function flipCard() { flipped = !flipped; renderFlash(); }
function nextCard() { cardIdx = (cardIdx + 1) % cardOrder.length; flipped = false; renderFlash(); }
function prevCard() { cardIdx = (cardIdx - 1 + cardOrder.length) % cardOrder.length; flipped = false; renderFlash(); }
function shuffleCards() {
  for (let i = cardOrder.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [cardOrder[i], cardOrder[j]] = [cardOrder[j], cardOrder[i]];
  }
  cardIdx = 0; flipped = false; renderFlash();
}

function startQuiz() {
  if (!currentUnit) return;
  const terms = UNITS[currentUnit].terms;
  const idxs = terms.map((_, i) => i);
  for (let i = idxs.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [idxs[i], idxs[j]] = [idxs[j], idxs[i]];
  }
  quizQ = idxs.slice(0, Math.min(10, idxs.length)).map(i => {
    const [term, def] = terms[i];
    const distractors = terms.filter((_, di) => di !== i).map(t => t[1]);
    for (let k = distractors.length - 1; k > 0; k--) {
      const j = Math.floor(Math.random() * (k + 1));
      [distractors[k], distractors[j]] = [distractors[j], distractors[k]];
    }
    const opts = [def, ...distractors.slice(0, 3)];
    for (let k = opts.length - 1; k > 0; k--) {
      const j = Math.floor(Math.random() * (k + 1));
      [opts[k], opts[j]] = [opts[j], opts[k]];
    }
    return { term, def, opts };
  });
  quizIdx = 0; quizScore = 0;
  document.getElementById('quizResult').style.display = 'none';
  document.getElementById('quizQCard').style.display = 'block';
  renderQuiz();
}

function renderQuiz() {
  const q = quizQ[quizIdx];
  document.getElementById('quizProgress').textContent = `Question ${quizIdx+1} of ${quizQ.length} · Score: ${quizScore}`;
  document.getElementById('quizQCard').innerHTML = `
    <div class="q-block">
      <div class="q-text">What is the best definition of: <strong>${escHtml(q.term)}</strong>?</div>
      ${q.opts.map((o,oi) => `<button class="opt" data-idx="${oi}" onclick="answerQuiz(this,${oi})">${escHtml(o)}</button>`).join('')}
    </div>`;
}

function answerQuiz(btn, optIdx) {
  const q = quizQ[quizIdx];
  const opt = q.opts[optIdx];
  const correct = opt === q.def;
  if (correct) quizScore++;
  document.querySelectorAll('#quizQCard .opt').forEach(b => {
    b.disabled = true;
    if (q.opts[parseInt(b.getAttribute('data-idx'),10)] === q.def) b.classList.add('correct');
  });
  if (!correct) btn.classList.add('wrong');
  setTimeout(() => {
    quizIdx++;
    if (quizIdx >= quizQ.length) endQuiz();
    else renderQuiz();
  }, 900);
}

function endQuiz() {
  document.getElementById('quizQCard').style.display = 'none';
  document.getElementById('quizResult').style.display = 'block';
  const pct = Math.round(quizScore / quizQ.length * 100);
  document.getElementById('quizFinalScore').textContent = `${quizScore}/${quizQ.length}`;
  document.getElementById('quizMsg').textContent = pct >= 90 ? "Excellent! You know this unit cold." :
    pct >= 70 ? "Great work — review the ones you missed." :
    pct >= 50 ? "Good effort. A bit more review will help." :
    "Keep studying this unit — you'll get there.";
}
