<html data-theme="dark" lang="en">

<title>AcerAcademy — Languages</title>
<style>
:root{
  --bg:#f7f8fa;--card:#fff;--accent:#4f46e5;--accent2:#7c3aed;
  --text:#1e1b4b;--muted:#6b7280;--border:#e5e7eb;--hover:#f0f0ff;
  --green:#059669;--red:#dc2626;--amber:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* NAV */
.topnav{background:#1a2540;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:12px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.topnav .logo{font-weight:800;font-size:1.15rem;color:var(--accent);text-decoration:none;letter-spacing:-.5px}
.topnav .logo span{color:var(--accent2)}
.topnav a.nav-link{font-size:.82rem;color:var(--muted);text-decoration:none;padding:4px 9px;border-radius:6px;transition:all .15s;white-space:nowrap}
.topnav a.nav-link:hover,.topnav a.nav-link.active{background:var(--hover);color:var(--accent)}
.topnav .spacer{flex:1}

/* HERO */
.hero{background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff;padding:32px 24px 28px;text-align:center}
.hero h1{font-size:2rem;font-weight:900;margin-bottom:6px}
.hero p{font-size:1rem;opacity:.85}

/* LANG SELECTOR */
.lang-bar{display:flex;justify-content:center;gap:12px;padding:20px;flex-wrap:wrap;background:#1a2540;border-bottom:1px solid var(--border)}
.lang-btn{display:flex;align-items:center;gap:8px;padding:10px 20px;border-radius:12px;border:2px solid var(--border);background:#1a2540;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .2s}
.lang-btn:hover{border-color:var(--accent);color:var(--accent)}
.lang-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.lang-btn .flag{font-size:1.4rem}

/* MODE TABS */
.mode-bar{display:flex;justify-content:center;gap:8px;padding:14px;background:#1a2540;border-bottom:1px solid var(--border);flex-wrap:wrap}
.mode-tab{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:#1a2540;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
.mode-tab:hover{border-color:var(--accent);color:var(--accent)}
.mode-tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* CATEGORY FILTER */
.cat-bar{display:flex;gap:8px;padding:14px 24px;flex-wrap:wrap;border-bottom:1px solid var(--border);background:#1a2540}
.cat-btn{padding:5px 14px;border-radius:16px;border:1.5px solid var(--border);background:#1a2540;font-size:.78rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
.cat-btn:hover,.cat-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* MAIN */
.main{flex:1;padding:28px 24px;max-width:900px;margin:0 auto;width:100%}

/* ── FLASHCARDS ── */
.fc-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px}
.fc-wrap{perspective:800px;height:180px;cursor:pointer}
.fc-inner{position:relative;width:100%;height:100%;transition:transform .5s;transform-style:preserve-3d}
.fc-wrap.flipped .fc-inner{transform:rotateY(180deg)}
.fc-front,.fc-back{position:absolute;inset:0;border-radius:14px;border:1.5px solid var(--border);background:#1a2540;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;backface-visibility:hidden;box-shadow:0 2px 8px rgba(0,0,0,.06)}
.fc-back{transform:rotateY(180deg);background:rgba(99,102,241,0.18)}
.fc-char{font-size:2.4rem;line-height:1.2;margin-bottom:6px}
.fc-rom{font-size:.82rem;color:var(--accent);font-weight:600;margin-bottom:3px}
.fc-meaning{font-size:.85rem;color:var(--text);font-weight:600;text-align:center}
.fc-cat{font-size:.68rem;color:var(--muted);position:absolute;top:8px;right:10px;text-transform:uppercase;letter-spacing:.04em}
.fc-hint{font-size:.72rem;color:var(--muted);margin-top:6px;text-align:center}
.fc-controls{display:flex;justify-content:center;gap:12px;margin-bottom:20px}
.fc-ctrl-btn{padding:8px 20px;border-radius:8px;border:1.5px solid var(--border);background:#1a2540;font-size:.85rem;font-weight:600;cursor:pointer;color:var(--muted);transition:all .15s}
.fc-ctrl-btn:hover{border-color:var(--accent);color:var(--accent)}
.fc-ctrl-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* ── QUIZ ── */
.quiz-wrap{max-width:600px;margin:0 auto}
.quiz-progress{display:flex;align-items:center;gap:12px;margin-bottom:20px;font-size:.85rem;color:var(--muted)}
.quiz-bar{flex:1;height:8px;background:var(--border);border-radius:4px;overflow:hidden}
.quiz-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:width .4s}
.quiz-card{background:#1a2540;border-radius:16px;border:1.5px solid var(--border);padding:32px;text-align:center;margin-bottom:20px;box-shadow:0 2px 12px rgba(0,0,0,.06)}
.quiz-prompt-label{font-size:.75rem;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:12px;font-weight:700}
.quiz-char{font-size:3.5rem;margin-bottom:8px;line-height:1.1}
.quiz-rom{font-size:1rem;color:var(--accent);font-weight:600;margin-bottom:4px}
.quiz-sub{font-size:.85rem;color:var(--muted)}
.quiz-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.quiz-choice{padding:14px;border-radius:10px;border:1.5px solid var(--border);background:#1a2540;font-size:.9rem;font-weight:500;cursor:pointer;transition:all .15s;text-align:left}
.quiz-choice:hover:not(:disabled){border-color:var(--accent);background:var(--hover)}
.quiz-choice.correct{border-color:var(--green);background:#f0fdf4;color:#065f46;font-weight:700}
.quiz-choice.wrong{border-color:var(--red);background:#fef2f2;color:#991b1b}
.quiz-choice:disabled{cursor:not-allowed}
.quiz-type-input{width:100%;padding:12px 16px;border:1.5px solid var(--border);border-radius:10px;font-size:1rem;font-family:inherit;margin-bottom:10px;transition:border-color .2s}
.quiz-type-input:focus{outline:none;border-color:var(--accent)}
.quiz-type-input.correct{border-color:var(--green);background:#f0fdf4}
.quiz-type-input.wrong{border-color:var(--red);background:#fef2f2}
.quiz-feedback{padding:12px 16px;border-radius:8px;font-size:.88rem;margin-bottom:14px;display:none}
.quiz-feedback.show{display:block}
.quiz-feedback.correct{background:#f0fdf4;color:#065f46;border-left:3px solid var(--green)}
.quiz-feedback.wrong{background:#fef2f2;color:#991b1b;border-left:3px solid var(--red)}
.quiz-next-btn{background:var(--accent);color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;width:100%}
.quiz-next-btn:hover{background:var(--accent2)}
.quiz-mode-row{display:flex;gap:8px;margin-bottom:18px;justify-content:center}
.qmode-btn{padding:7px 16px;border-radius:8px;border:1.5px solid var(--border);background:#1a2540;font-size:.82rem;font-weight:600;cursor:pointer;color:var(--muted)}
.qmode-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.quiz-score{text-align:center;padding:40px 20px}
.quiz-score .score-big{font-size:4rem;font-weight:900;color:var(--accent)}
.quiz-score p{color:var(--muted);margin:8px 0 20px}
.quiz-score button{background:var(--accent);color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer}

/* ── WRITING PRACTICE ── */
.writing-layout{display:grid;grid-template-columns:1fr 2fr;gap:20px;align-items:start}
@media(max-width:640px){.writing-layout{grid-template-columns:1fr}}
.writing-picker{display:flex;flex-direction:column;gap:8px;max-height:500px;overflow-y:auto;padding-right:4px}
.writing-item{padding:10px 14px;border-radius:10px;border:1.5px solid var(--border);background:#1a2540;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all .15s}
.writing-item:hover{border-color:var(--accent);background:var(--hover)}
.writing-item.active{border-color:var(--accent);background:rgba(99,102,241,0.18)}
.writing-item .wi-char{font-size:1.8rem;width:44px;text-align:center}
.writing-item .wi-info{flex:1}
.writing-item .wi-rom{font-size:.78rem;color:var(--accent);font-weight:600}
.writing-item .wi-meaning{font-size:.82rem;color:var(--muted)}
.writing-panel{background:#1a2540;border-radius:16px;border:1.5px solid var(--border);padding:24px;position:sticky;top:80px}
.writing-char-display{font-size:7rem;text-align:center;line-height:1;margin:8px 0;background:
  repeating-linear-gradient(0deg,transparent,transparent 49px,#e0e0e0 49px,#e0e0e0 50px),
  repeating-linear-gradient(90deg,transparent,transparent 49px,#e0e0e0 49px,#e0e0e0 50px),
  linear-gradient(#f8f8ff,#f8f8ff);
  background-size:50px 50px,50px 50px,100% 100%;
  border:1.5px solid var(--border);border-radius:12px;padding:12px;min-height:120px;display:flex;align-items:center;justify-content:center}
.writing-rom{font-size:1.2rem;color:var(--accent);font-weight:700;text-align:center;margin-bottom:4px}
.writing-meaning{font-size:.95rem;color:var(--muted);text-align:center;margin-bottom:16px}
.writing-canvas-wrap{position:relative;margin:12px 0}
canvas#traceCanvas{border:1.5px solid var(--border);border-radius:12px;cursor:crosshair;touch-action:none;display:block;width:100%;background:
  repeating-linear-gradient(0deg,transparent,transparent 49px,#e8e8f0 49px,#e8f0e8 50px),
  repeating-linear-gradient(90deg,transparent,transparent 49px,#e8e8f0 49px,#e8f0e8 50px),
  #fff;
  background-size:50px 50px,50px 50px,100% 100%}
.canvas-btns{display:flex;gap:8px;margin-top:10px}
.canvas-btn{flex:1;padding:9px;border-radius:8px;border:1.5px solid var(--border);background:#1a2540;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;color:var(--muted)}
.canvas-btn:hover{border-color:var(--accent);color:var(--accent)}
.canvas-btn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.stroke-info{background:#f7f7ff;border-radius:10px;padding:12px 14px;margin-top:10px;font-size:.82rem;line-height:1.7;color:var(--text)}
.stroke-info strong{color:var(--accent)}

/* ── PHRASEBOOK ── */
.phrase-grid{display:flex;flex-direction:column;gap:12px}
.phrase-card{background:#1a2540;border:1.5px solid var(--border);border-radius:14px;padding:18px 20px;display:flex;align-items:center;gap:16px;transition:box-shadow .15s}
.phrase-card:hover{box-shadow:0 4px 16px rgba(79,70,229,.08)}
.phrase-char{font-size:1.8rem;min-width:60px;text-align:center}
.phrase-info{flex:1}
.phrase-rom{font-size:.85rem;color:var(--accent);font-weight:600;margin-bottom:2px}
.phrase-meaning{font-size:.95rem;font-weight:600;color:var(--text)}
.phrase-notes{font-size:.78rem;color:var(--muted);margin-top:2px}
.phrase-speak{background:var(--hover);border:none;border-radius:8px;padding:8px 12px;font-size:.8rem;color:var(--accent);font-weight:600;cursor:pointer;white-space:nowrap;transition:background .15s}
.phrase-speak:hover{background:#ddd6fe}
.section-head{font-size:.8rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:8px 0 6px;margin-top:8px}

/* EMPTY / UTIL */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty .icon{font-size:3rem;margin-bottom:12px}
</style>

<script>
// ═══════════════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════════════
const LANGUAGES = {
  mandarin: {
    name:"Mandarin Chinese", flag:"🇨🇳", script:"普通话",
    vocab:[
  {char:"你好",rom:"nǐ hǎo",meaning:"Hello",cat:"greetings",strokes:12,tips:"你(you)+好(good). 你 has the person radical 亻."},
  {char:"谢谢",rom:"xiè xiè",meaning:"Thank you",cat:"greetings",strokes:17,tips:"谢 means \'to thank\'. Repeated for emphasis."},
  {char:"再见",rom:"zài jiàn",meaning:"Goodbye",cat:"greetings",strokes:14,tips:"再=again, 见=see. Literally \'see again\'."},
  {char:"对不起",rom:"duì bu qǐ",meaning:"Sorry",cat:"greetings",strokes:20,tips:"对=correct, 不=not, 起=rise. Formal apology."},
  {char:"没关系",rom:"méi guān xi",meaning:"No worries",cat:"greetings",strokes:18,tips:"没=not, 关系=matter. \'It doesn\'t matter.\'"},
  {char:"早上好",rom:"zǎo shang hǎo",meaning:"Good morning",cat:"greetings",strokes:18,tips:"早=early, 上=up, 好=good."},
  {char:"下午好",rom:"xià wǔ hǎo",meaning:"Good afternoon",cat:"greetings",strokes:15,tips:"下午=afternoon, 好=good."},
  {char:"晚上好",rom:"wǎn shang hǎo",meaning:"Good evening",cat:"greetings",strokes:20,tips:"晚=evening, 上=up, 好=good."},
  {char:"请",rom:"qǐng",meaning:"Please",cat:"greetings",strokes:10,tips:"请 is also used to mean \'invite\' or \'please enter\'."},
  {char:"不客气",rom:"bù kèqì",meaning:"You're welcome",cat:"greetings",strokes:12,tips:"客气=polite/courteous. \'Don\'t be polite\' = you\'re welcome."},
  {char:"好的",rom:"hǎo de",meaning:"Okay / Alright",cat:"greetings",strokes:8,tips:"好=good, 的 is a particle. Casual agreement."},
  {char:"是",rom:"shì",meaning:"Yes / Is",cat:"greetings",strokes:9,tips:"是 means \'is/are/am\'. Also used for emphatic \'yes\'."},
  {char:"欢迎",rom:"huān yíng",meaning:"Welcome",cat:"greetings",strokes:14,tips:"欢=happy, 迎=receive/welcome."},

      {cat:"Greetings",char:"お名前は何ですか？",rom:"Onamae wa nan desu ka?",meaning:"What is your name?",note:"Polite form. は (wa) is the topic marker particle."},

      {cat:"Greetings",char:"お元気ですか？",rom:"Ogenki desu ka?",meaning:"How are you?",note:"元気 (genki) = healthy/energetic. お is a polite prefix."},

function setLang(l, btn){
  lang = l; activeCat = 'all';
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setMode(m, btn){
  mode = m; activeCat = 'all';
  document.querySelectorAll('.mode-tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function setCat(c, btn){
  activeCat = c;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderContent();
}

// ═══════════════════════════════════════════════════════════════
// RENDER ROUTER
// ═══════════════════════════════════════════════════════════════
function render(){
  const cats = CATS[mode] || [];
  const catBar = document.getElementById('catBar');

  if(cats.length === 0){
    catBar.style.display = 'none';
  } else {
    catBar.style.display = '';
    catBar.innerHTML = cats.map(c=>`<button class="cat-btn${activeCat===c?' active':''}" onclick="setCat('${c}',this)">${c==='all'?'All Categories':cap(c)}</button>`).join('');
  }
  renderContent();
}

function renderContent(){
  if(mode==='flashcards') renderFlashcards();
  else if(mode==='quiz') initQuiz();
  else if(mode==='writing') renderWriting();
  else renderPhrasebook();
}

function cap(s){ return s.charAt(0).toUpperCase()+s.slice(1); }

function filteredVocab(){
  const v = LANGUAGES[lang].vocab;
  return activeCat==='all' ? v : v.filter(w=>w.cat===activeCat);
}

// ═══════════════════════════════════════════════════════════════
// FLASHCARDS
// ═══════════════════════════════════════════════════════════════
function renderFlashcards(){
  const words = filteredVocab();
  const main = document.getElementById('mainArea');
  if(!words.length){ main.innerHTML='<div class="empty"><div class="icon">📭</div><p>No cards in this category.</p></div>'; return; }

  let html = `<div class="fc-controls">
    <button class="fc-ctrl-btn active" id="fcAll" onclick="flipAll(false,this)">Show All</button>
    <button class="fc-ctrl-btn" id="fcFlip" onclick="flipAll(true,this)">Flip All</button>
    <button class="fc-ctrl-btn" onclick="shuffleFC()">🔀 Shuffle</button>
  </div>
  <div class="fc-grid" id="fcGrid">`;

  words.forEach((w,i)=>{
    html += `<div class="fc-wrap" id="fc${i}" onclick="flipCard(${i})">
      <div class="fc-inner">
        <div class="fc-front">
          <span class="fc-cat">${w.cat}</span>
          <div class="fc-char">${w.char}</div>
          <div class="fc-rom">${w.rom}</div>
          <div class="fc-hint" style="opacity:.5;font-size:.65rem">tap to reveal</div>
        </div>
        <div class="fc-back">
          <span class="fc-cat">${w.cat}</span>
          <div class="fc-char" style="font-size:1.6rem">${w.char}</div>
          <div class="fc-rom">${w.rom}</div>
          <div class="fc-meaning">${w.meaning}</div>
          ${w.tips?`<div class="fc-hint">${w.tips}</div>`:''}
        </div>
      </div>
    </div>`;
  });
  html += '</div>';
  main.innerHTML = html;
}

function flipCard(i){
  document.getElementById('fc'+i)?.classList.toggle('flipped');
}
function flipAll(state, btn){
  document.querySelectorAll('.fc-wrap').forEach(c=>{ if(state) c.classList.add('flipped'); else c.classList.remove('flipped'); });
  document.querySelectorAll('.fc-ctrl-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
}
function shuffleFC(){ renderFlashcards(); }

// ═══════════════════════════════════════════════════════════════
// QUIZ
// ═══════════════════════════════════════════════════════════════
function initQuiz(){
  let pool = filteredVocab();
  if(pool.length < 4){
    document.getElementById('mainArea').innerHTML='<div class="empty"><div class="icon">🃏</div><p>Need at least 4 words in this category to quiz.<br>Select "All Categories" or a larger category.</p></div>';
    return;
  }
  // Shuffle
  quizQueue = [...pool].sort(()=>Math.random()-.5).slice(0, Math.min(pool.length, 15));
  quizIdx = 0; quizScore = 0;
  renderQuizCard();
}

function renderQuizCard(){
  const main = document.getElementById('mainArea');
  if(quizIdx >= quizQueue.length){ renderQuizScore(); return; }

  const word = quizQueue[quizIdx];
  const pct = Math.round(quizIdx/quizQueue.length*100);
  const allVocab = LANGUAGES[lang].vocab;

  // Build wrong choices from full vocab pool
  let wrongs = allVocab.filter(w=>w.meaning!==word.meaning).sort(()=>Math.random()-.5).slice(0,3);
  let choices = [word, ...wrongs].sort(()=>Math.random()-.5);
  const correctIdx = choices.indexOf(word);

  let html = `<div class="quiz-wrap">
    <div class="quiz-progress">
      <span>${quizIdx+1} / ${quizQueue.length}</span>
      <div class="quiz-bar"><div class="quiz-bar-fill" style="width:${pct}%"></div></div>
      <span>⭐ ${quizScore}</span>
    </div>
    <div class="quiz-mode-row">
      <button class="qmode-btn${quizMode==='mc'?' active':''}" onclick="setQuizMode('mc')">Multiple Choice</button>
      <button class="qmode-btn${quizMode==='type'?' active':''}" onclick="setQuizMode('type')">Type Answer</button>
    </div>
    <div class="quiz-card">
      <div class="quiz-prompt-label">What does this mean?</div>
      <div class="quiz-char">${word.char}</div>
      <div class="quiz-rom">${word.rom}</div>
      <div class="quiz-sub">${LANGUAGES[lang].name}</div>
    </div>`;

  if(quizMode==='mc'){
    html += `<div class="quiz-choices">`;
    choices.forEach((c,i)=>{
      html += `<button class="quiz-choice" id="qc${i}" onclick="answerMC(${i},${correctIdx})">${c.meaning}</button>`;
    });
    html += `</div>`;
  } else {
    html += `<input class="quiz-type-input" id="typeInput" placeholder="Type the meaning in English…" onkeydown="if(event.key==='Enter')checkType('${word.meaning.replace(/'/g,"\\'")}')"/>
    <button class="quiz-next-btn" onclick="checkType('${word.meaning.replace(/'/g,"\\'")}')">Check →</button>`;
  }

  html += `<div class="quiz-feedback" id="quizFB"></div>`;
  if(quizMode==='mc') html += `<button class="quiz-next-btn" id="nextBtn" style="display:none" onclick="nextQuiz()">Next →</button>`;
  html += `</div>`;

  main.innerHTML = html;
  if(quizMode==='type') document.getElementById('typeInput')?.focus();
}

function setQuizMode(m){ quizMode = m; renderQuizCard(); }

function answerMC(chosen, correct){
  document.querySelectorAll('.quiz-choice').forEach(b=>b.disabled=true);
  document.getElementById(`qc${correct}`)?.classList.add('correct');
  const fb = document.getElementById('quizFB');
  if(chosen===correct){
    quizScore++;
    fb.className='quiz-feedback show correct';
    fb.innerHTML=`✅ Correct! <strong>${quizQueue[quizIdx].rom}</strong> = ${quizQueue[quizIdx].meaning}`;
  } else {
    document.getElementById(`qc${chosen}`)?.classList.add('wrong');
    fb.className='quiz-feedback show wrong';
    fb.innerHTML=`❌ The answer is <strong>${quizQueue[quizIdx].meaning}</strong> (${quizQueue[quizIdx].rom})`;
  }
  const nb = document.getElementById('nextBtn');
  if(nb) nb.style.display='block';
}

function checkType(correct){
  const inp = document.getElementById('typeInput');
  if(!inp) return;
  const val = inp.value.trim().toLowerCase();
  const correctLow = correct.toLowerCase();
  const ok = val===correctLow || correctLow.includes(val) || val.includes(correctLow.split(/[/,]/)[0].trim());
  inp.disabled = true;
  inp.classList.add(ok?'correct':'wrong');
  const fb = document.getElementById('quizFB');
  fb.className='quiz-feedback show '+(ok?'correct':'wrong');
  if(ok){ quizScore++; fb.innerHTML=`✅ Correct! ${quizQueue[quizIdx].rom} = ${quizQueue[quizIdx].meaning}`; }
  else { fb.innerHTML=`❌ Correct answer: <strong>${correct}</strong>`; }
  // Replace Check button with Next
  setTimeout(()=>nextQuiz(), ok?800:1500);
}

function nextQuiz(){ quizIdx++; renderQuizCard(); }

function renderQuizScore(){
  const pct = Math.round(quizScore/quizQueue.length*100);
  const emoji = pct>=90?'🏆':pct>=70?'⭐':pct>=50?'👍':'📖';
  const msg = pct>=90?'Excellent! You really know your '+LANGUAGES[lang].name+'!':pct>=70?'Great work! Keep practicing!':pct>=50?'Good effort — review the ones you missed.':'Keep studying — you\'ll get there!';
  document.getElementById('mainArea').innerHTML=`<div class="quiz-score">
    <div class="score-big">${emoji} ${pct}%</div>
    <p>${quizScore} / ${quizQueue.length} correct — ${msg}</p>
    <button onclick="initQuiz()">🔄 Try Again</button>
  </div>`;
}

// WRITING PRACTICE
// ═══════════════════════════════════════════════════════════════
function renderWriting(){
  const words = filteredVocab();
  const main = document.getElementById('mainArea');
  if(!words.length){ main.innerHTML='<div class="empty"><div class="icon">✍️</div><p>No characters in this category.</p></div>'; return; }

  if(!writingSelected || !words.find(w=>w.char===writingSelected.char)) writingSelected = words[0];
  const sel = writingSelected;

  let listHTML = words.map((w,i)=>`<div class="writing-item${w.char===sel.char?' active':''}" onclick="selectWriting(${i})">
    <div class="wi-char" style="font-size:${w.char.length>3?'1rem':'1.8rem'}">${w.char}</div>
    <div class="wi-info"><div class="wi-rom">${w.rom}</div><div class="wi-meaning">${w.meaning}</div></div>
  </div>`).join('');

  const strokeNote = sel.strokes ? `<div><strong>Strokes:</strong> ${sel.strokes} total</div>` : '';
  const tipsNote = sel.tips ? `<div style="margin-top:6px"><strong>Tips:</strong> ${sel.tips}</div>` : '';

  main.innerHTML = `<div class="writing-layout">
    <div class="writing-picker" id="writingList">${listHTML}</div>
    <div class="writing-panel">
      <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:8px">Reference Character</div>
      <div class="writing-char-display" id="refChar">${sel.char}</div>
      <div class="writing-rom" id="refRom">${sel.rom}</div>
      <div class="writing-meaning" id="refMeaning">${sel.meaning}</div>
      <div style="font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px">Trace Here</div>
      <div class="writing-canvas-wrap">
        <canvas id="traceCanvas" width="500" height="500"></canvas>
      </div>
      <div class="canvas-btns">
        <button class="canvas-btn" onclick="clearCanvas()">🗑️ Clear</button>
        <button class="canvas-btn" onclick="showGuide()">👁️ Guide</button>
      </div>
      <div class="stroke-info" id="strokeInfo">${strokeNote}${tipsNote}</div>
    </div>
  </div>`;

  initCanvas();
}

let writingWords = [];
function selectWriting(i){
  writingWords = filteredVocab();
  writingSelected = writingWords[i];
  renderWriting();
}

function initCanvas(){
  const canvas = document.getElementById('traceCanvas');
  if(!canvas) return;
  // Make it square and responsive
  const w = canvas.parentElement.offsetWidth || 280;
  canvas.width = w; canvas.height = w;
  drawingCtx = canvas.getContext('2d');
  drawingCtx.strokeStyle = '#4f46e5';
  drawingCtx.lineWidth = 4;
  drawingCtx.lineCap = 'round';
  drawingCtx.lineJoin = 'round';

  // Draw grid
  drawGrid(drawingCtx, w, w);

  canvas.addEventListener('mousedown', startDraw);
  canvas.addEventListener('mousemove', draw);
  canvas.addEventListener('mouseup', stopDraw);
  canvas.addEventListener('mouseleave', stopDraw);
  canvas.addEventListener('touchstart', e=>{e.preventDefault(); const t=e.touches[0]; const r=canvas.getBoundingClientRect(); startDraw({offsetX:t.clientX-r.left,offsetY:t.clientY-r.top});}, {passive:false});
  canvas.addEventListener('touchmove', e=>{e.preventDefault(); const t=e.touches[0]; const r=canvas.getBoundingClientRect(); draw({offsetX:t.clientX-r.left,offsetY:t.clientY-r.top});}, {passive:false});
  canvas.addEventListener('touchend', stopDraw);
}

function drawGrid(ctx, w, h){
  ctx.save();
  ctx.strokeStyle='#e0e0f0';
  ctx.lineWidth=1;
  // Main crosshairs
  ctx.setLineDash([4,4]);
  ctx.beginPath(); ctx.moveTo(w/2,0); ctx.lineTo(w/2,h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,h/2); ctx.lineTo(w,h/2); ctx.stroke();
  // Diagonals
  ctx.strokeStyle='#ebebf8';
  ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(w,h); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(w,0); ctx.lineTo(0,h); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

function startDraw(e){ isDrawing=true; [lastX,lastY]=[e.offsetX,e.offsetY]; }
function draw(e){
  if(!isDrawing||!drawingCtx) return;
  drawingCtx.beginPath();
  drawingCtx.moveTo(lastX,lastY);
  drawingCtx.lineTo(e.offsetX,e.offsetY);
  drawingCtx.stroke();
  [lastX,lastY]=[e.offsetX,e.offsetY];
}
function stopDraw(){ isDrawing=false; }
function clearCanvas(){
  if(!drawingCtx) return;
  const canvas = document.getElementById('traceCanvas');
  drawingCtx.clearRect(0,0,canvas.width,canvas.height);
  drawGrid(drawingCtx, canvas.width, canvas.height);
}
function showGuide(){
  const canvas = document.getElementById('traceCanvas');
  if(!canvas||!drawingCtx||!writingSelected) return;
  clearCanvas();
  const text = writingSelected.char;
  // Scale font so longer words still fit: base 70% width per char, capped
  const maxFontPx = canvas.width * 0.7;
  const scaledFontPx = Math.min(maxFontPx, canvas.width * 0.85 / Math.max(text.length, 1));
  drawingCtx.save();
  drawingCtx.font = `${scaledFontPx}px serif`;
  drawingCtx.fillStyle = 'rgba(79,70,229,0.18)';
  drawingCtx.textAlign='center';
  drawingCtx.textBaseline='middle';
  drawingCtx.fillText(text, canvas.width/2, canvas.height/2);
  drawingCtx.restore();
}

// ═══════════════════════════════════════════════════════════════
// PHRASEBOOK
// ═══════════════════════════════════════════════════════════════
function renderPhrasebook(){
  const phrases = LANGUAGES[lang].phrases;
  const main = document.getElementById('mainArea');

  // Group by category
  const grouped = {};
  phrases.forEach(p=>{ if(!grouped[p.cat]) grouped[p.cat]=[]; grouped[p.cat].push(p); });

  let html = '<div class="phrase-grid">';
  for(const [cat, ps] of Object.entries(grouped)){
    html += `<div class="section-head">📂 ${cat}</div>`;
    ps.forEach((p,i)=>{
      const spk = encodeURIComponent(p.char);
      html += `<div class="phrase-card">
        <div class="phrase-char">${p.char.length>4?p.char.slice(0,3)+'…':p.char}</div>
        <div class="phrase-info">
          <div class="phrase-rom">${p.rom}</div>
          <div class="phrase-meaning">${p.meaning}</div>
          ${p.note?`<div class="phrase-notes">💡 ${p.note}</div>`:''}
        </div>
        <button class="phrase-speak" onclick="speak('${p.char.replace(/'/g,"\\'")}','${lang}')">🔊 Hear</button>
      </div>`;
    });
  }
  html += '</div>';
  main.innerHTML = html;
}

// ═══════════════════════════════════════════════════════════════
// TEXT-TO-SPEECH
// ═══════════════════════════════════════════════════════════════
function speak(text, language){
  if(!window.speechSynthesis) return;
  const langMap = {mandarin:'zh-CN', japanese:'ja-JP', hindi:'hi-IN'};
  const utt = new SpeechSynthesisUtterance(text);
  utt.lang = langMap[language] || 'zh-CN';
  utt.rate = 0.85;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(utt);
}

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
render();
</script>

<script>
(function(){
  const NOTE_TABS = [
    {key:'general',   label:'📓 General'},
    {key:'math',      label:'➕ Math'},
    {key:'science',   label:'🔬 Science'},
    {key:'ela',       label:'📖 ELA'},
    {key:'history',   label:'🌍 History'},
    {key:'cs',        label:'💻 CS'},
    {key:'health',    label:'❤️ Health'},
    {key:'languages', label:'🌏 Languages'},
  ];
  let activeTab = 'general';

  function noteKey(k){ return 'aceNotes_' + k; }

  function loadNote(k){
    try{ return localStorage.getItem(noteKey(k)) || ''; }catch(e){ return ''; }
  }
  function saveNote(){
    try{ localStorage.setItem(noteKey(activeTab), document.getElementById('notesTA').value); }catch(e){}
  }
  window.saveNote = saveNote;

  function buildTabs(){
    const container = document.getElementById('notesTabs');
    container.innerHTML = NOTE_TABS.map(t=>
      `<button class="np-tab${t.key===activeTab?' active':''}" onclick="switchTab('${t.key}')">${t.label}</button>`
    ).join('');
  }

  window.switchTab = function(k){
    saveNote();
    activeTab = k;
    buildTabs();
    const ta = document.getElementById('notesTA');
    ta.value = loadNote(k);
    ta.focus();
    updateWordCount();
    updateBadge();
  };

  window.toggleNotes = function(){
    const p = document.getElementById('notesPanel');
    p.classList.toggle('open');
    if(p.classList.contains('open')){
      document.getElementById('notesTA').value = loadNote(activeTab);
      updateWordCount();
      updateBadge();
      document.getElementById('notesTA').focus();
    }
  };

  window.updateWordCount = function(){
    const v = (document.getElementById('notesTA')?.value||'').trim();
    const words = v ? v.split(/\s+/).length : 0;
    const el = document.getElementById('npWordCount');
    if(el) el.textContent = words + (words===1?' word':' words');
  };

  window.updateBadge = function(){
    // Show badge if any tab has content
    const hasNotes = NOTE_TABS.some(t=> loadNote(t.key).trim().length > 0);
    const b = document.getElementById('notesBadge');
    if(b) b.style.display = hasNotes ? 'block' : 'none';
  };

  window.clearNote = function(){
    if(!confirm('Clear notes for this tab?')) return;
    try{ localStorage.removeItem(noteKey(activeTab)); }catch(e){}
    document.getElementById('notesTA').value = '';
    updateWordCount();
    updateBadge();
  };

  window.copyNotes = function(){
    const ta = document.getElementById('notesTA');
    if(!ta || !ta.value.trim()){ alert('No notes to copy!'); return; }
    navigator.clipboard.writeText(ta.value).then(()=>{
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = '✅ Copied!';
      setTimeout(()=>{ btn.textContent = orig; }, 1500);
    }).catch(()=>{
      ta.select();
      document.execCommand('copy');
    });
  };

  window.downloadNotes = function(){
    const allNotes = NOTE_TABS
      .map(t=>{ const c=loadNote(t.key).trim(); return c ? `=== ${t.label} ===\n${c}` : ''; })
      .filter(Boolean).join('\n\n');
    if(!allNotes){ alert('No notes to save!'); return; }
    const blob = new Blob([allNotes], {type:'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'aceAcademy-notes.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // Init
  buildTabs();
  updateBadge();

  // Close panel when clicking outside
  document.addEventListener('click', function(e){
    const p = document.getElementById('notesPanel');
    const b = document.getElementById('notesBtn');
    if(p && p.classList.contains('open') && !p.contains(e.target) && !b.contains(e.target)){
      p.classList.remove('open');
    }
  });
})();
</script>

    long:  {label:'Long Break',  color:'#7c3aed'},
  };
  let mode='work', running=false, remaining=25*60, total=25*60;
  let intervalId=null, sessions=0, longBreakMin=15;

  function getFocusMin(){ return Math.max(1,parseInt(document.getElementById('tpFocusMin')?.value||25)); }
  function getShortMin(){ return Math.max(1,parseInt(document.getElementById('tpShortMin')?.value||5)); }

  function modeSeconds(m){
    if(m==='work')  return getFocusMin()*60;
    if(m==='short') return getShortMin()*60;
    return longBreakMin*60;
  }

  window.updateTimerSettings = function(){
    if(!running){ total=modeSeconds(mode); remaining=total; updateDisplay(); }
  };

  window.setTimerMode = function(m){
    if(running) stopTimer();
    mode=m;
    total=modeSeconds(m);
    remaining=total;
    document.querySelectorAll('.tp-mode-btn').forEach(b=>b.classList.remove('active'));
    const ids={work:'tmWork',short:'tmShort',long:'tmLong'};
    document.getElementById(ids[m])?.classList.add('active');
    document.getElementById('timerArc').style.stroke=MODES[m].color;
    document.getElementById('timerBtn').style.background=MODES[m].color;
    document.getElementById('timerModeLabel').textContent=MODES[m].label;
    updateDisplay();
    document.getElementById('tpStatusText').textContent='Ready';
  };

  window.toggleTimer = function(){
    const p=document.getElementById('timerPanel');
    p.classList.toggle('open');
  };

  window.toggleTimerRun = function(){
    running ? stopTimer() : startTimer();
  };

  function startTimer(){
    if(remaining<=0) resetTimer();
    running=true;
    intervalId=setInterval(tick,1000);
    document.getElementById('timerStartBtn').textContent='⏸ Pause';
    document.getElementById('timerBtn').classList.add('running');
    document.getElementById('tpStatusText').textContent=mode==='work'?'Studying…':'Resting…';
  }

  function stopTimer(){
    running=false;
    clearInterval(intervalId);
    document.getElementById('timerStartBtn').textContent='▶ Start';
    document.getElementById('timerBtn').classList.remove('running');
    document.getElementById('tpStatusText').textContent='Paused';
  }

  window.resetTimer = function(){
    stopTimer();
    remaining=total=modeSeconds(mode);
    updateDisplay();
    document.getElementById('tpStatusText').textContent='Ready';
  };

  function tick(){
    remaining--;
    if(remaining<=0){
      remaining=0;
      updateDisplay();
      stopTimer();
      playBell();
      if(mode==='work'){
        sessions++;
        document.getElementById('tpSessionCount').textContent=sessions;
        // auto-switch to break
        const nextMode = sessions%4===0?'long':'short';
        setTimeout(()=>{ setTimerMode(nextMode); playBell(); },500);
        document.getElementById('tpStatusText').textContent='Session done! 🎉';
      } else {
        setTimeout(()=>{ setTimerMode('work'); },500);
        document.getElementById('tpStatusText').textContent='Break over!';
      }
      // open panel so user sees the notification
      document.getElementById('timerPanel').classList.add('open');
      return;
    }
    updateDisplay();
  }

  function updateDisplay(){
    const m=Math.floor(remaining/60), s=remaining%60;
    document.getElementById('timerDisplay').textContent =
      String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    const arc=document.getElementById('timerArc');
    if(arc){
      const pct = total>0 ? remaining/total : 1;
      arc.style.strokeDashoffset = String(Math.round(283*(1-pct)));
    }
    // Update page title while running
    if(running){
      document.title='⏱ '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+' — aceAcademy';
    } else {
      document.title = document.title.replace(/^⏱.*?—\s*/,'');
    }
  }

  function playBell(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [0,0.15,0.3].forEach((delay,i)=>{
        const osc=ctx.createOscillator(), gain=ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value=i===0?880:i===1?1046:1318;
        gain.gain.setValueAtTime(0.3,ctx.currentTime+delay);
        gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.6);
        osc.start(ctx.currentTime+delay);
        osc.stop(ctx.currentTime+delay+0.7);
      });
    }catch(e){}
  }

  // Close on outside click (avoid conflicting with notes panel)
  document.addEventListener('click',function(e){
    const p=document.getElementById('timerPanel');
    const b=document.getElementById('timerBtn');
    if(p&&p.classList.contains('open')&&!p.contains(e.target)&&!b.contains(e.target)){
      p.classList.remove('open');
    }
  });

  // Shift notes button up so they don't overlap
  const nb=document.getElementById('notesBtn');
  if(nb) nb.style.bottom='84px';
  const tp=document.getElementById('timerBtn');
  if(tp) tp.style.bottom='24px';
})();
</script>
