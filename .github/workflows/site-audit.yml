name: Site Audit

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install dependencies (jsdom, for the functional test suite)
        run: npm install
      - name: Run site-wide syntax + link audit
        run: node scripts/site-audit.js
      - name: Run functional smoke tests (curriculum, tutor, essaygrader, xp-system)
        run: node tests/run-all.js
      - name: Verify data-source/ and shipped data files haven't drifted apart
        run: node scripts/build-data.js --check
