.hero h1{font-size:2rem;font-weight:800;margin-bottom:8px}
.hero p{color:var(--muted);max-width:540px;margin:0 auto}
.container{max-width:860px;margin:0 auto;padding:20px}
/* Home */
.home-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;margin-bottom:24px}
.grade-card{background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:.2s;text-align:center}
.grade-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.grade-icon{font-size:2rem;margin-bottom:8px}
.grade-title{font-size:1rem;font-weight:700;margin-bottom:4px}
.grade-sub{font-size:.8rem;color:var(--muted)}
.mastery-bar{height:5px;background:var(--border);border-radius:3px;margin-top:10px;overflow:hidden}
.mastery-fill{height:100%;background:var(--green);border-radius:3px;transition:width .4s}

.mode-row{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-bottom:24px}
.mode-btn{padding:10px 20px;border-radius:10px;border:1.5px solid var(--border);background:var(--surface2);color:var(--muted);cursor:pointer;font-size:.88rem;font-weight:600;transition:.15s;text-align:center}
.mode-btn:hover,.mode-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(99,102,241,.1)}
.mode-btn .mode-icon{font-size:1.4rem;display:block;margin-bottom:4px}

.quiz-card{background:var(--surface);border:1.5px solid var(--border);border-radius:16px;padding:28px;max-width:640px;margin:0 auto}
.q-header{display:flex;align-items:center;gap:12px;margin-bottom:20px}

.spell-input.correct{border-color:var(--green);background:rgba(16,185,129,.08)}
.spell-input.wrong{border-color:var(--red);background:rgba(239,68,68,.08)}

.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}

.choice-btn.wrong{background:rgba(239,68,68,.12);border-color:var(--red);color:var(--red)}

.btn-primary{background:var(--accent);color:#fff;width:100%}.btn-primary:hover{background:#4f46e5}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:var(--muted)}.btn-outline:hover{border-color:var(--accent);color:var(--accent)}
.btn-green{background:var(--green);color:#fff}.btn-green:hover{background:#059669}

.feedback{text-align:center;padding:12px;border-radius:10px;font-size:.95rem;font-weight:600;margin-bottom:12px;display:none}
.feedback.show{display:block}
.feedback.correct-fb{background:rgba(16,185,129,.15);color:var(--green)}
.feedback.wrong-fb{background:rgba(239,68,68,.12);color:var(--red)}

.results-card{background:var(--surface);border-radius:16px;padding:28px;text-align:center;max-width:500px;margin:0 auto}
.score-big{font-size:3.5rem;font-weight:900;color:var(--accent)}
.score-label{font-size:1rem;color:var(--muted);margin-bottom:20px}

/* Speak btn */
.speak-btn{background:var(--surface2);border:1.5px solid var(--border);color:var(--muted);border-radius:8px;padding:7px 14px;cursor:pointer;font-size:.82rem;margin-bottom:12px}

</style>

    {w:'complacent',def:'Showing uncritical satisfaction with oneself.',ex:'He became complacent after early success.',pos:'adjective'},
    {w:'contentious',def:'Causing or likely to cause controversy.',ex:'It was a contentious political debate.',pos:'adjective'},
    {w:'corroborate',def:'To confirm or give support to a statement.',ex:'The witness corroborated his story.',pos:'verb'},
    {w:'dearth',def:'A scarcity or lack of something.',ex:'There was a dearth of evidence.',pos:'noun'},
    {w:'equivocate',def:'To use ambiguous language to conceal the truth.',ex:'The politician equivocated on every issue.',pos:'verb'},
    {w:'esoteric',def:'Intended for or understood by a small group.',ex:'The topic was too esoteric for most people.',pos:'adjective'},
    {w:'exacerbate',def:'To make a problem worse.',ex:'Stress can exacerbate health problems.',pos:'verb'},
    {w:'facetious',def:'Treating serious issues with inappropriate humor.',ex:'His facetious remarks offended everyone.',pos:'adjective'},
    {w:'ignominious',def:'Deserving or causing public disgrace.',ex:'The team suffered an ignominious defeat.',pos:'adjective'},

  11: [
    {w:'abstruse',def:'Difficult to understand; obscure.',ex:'The abstruse theory confused even experts.',pos:'adjective'},
    {w:'alacrity',def:'Brisk and cheerful readiness.',ex:'She accepted the offer with alacrity.',pos:'noun'},
    {w:'anathema',def:'Something strongly disliked or disapproved of.',ex:'Corruption is anathema to democracy.',pos:'noun'},

    {w:'byzantine',def:'Excessively complicated and detailed.',ex:'The tax code is byzantine in its complexity.',pos:'adjective'},
    {w:'clandestine',def:'Kept secret or done secretively.',ex:'They held clandestine meetings.',pos:'adjective'},
    {w:'deleterious',def:'Causing harm or damage.',ex:'Smoking has deleterious effects on health.',pos:'adjective'},
    {w:'dilettante',def:'A person who cultivates an area superficially.',ex:'He was a dilettante in art, not a serious student.',pos:'noun'},
    {w:'enervate',def:'To make someone feel drained of energy.',ex:'The heat enervated all the hikers.',pos:'verb'},
    {w:'ephemeron',def:'Something that exists for only a short time.',ex:'Fashion trends are mere ephemerons.',pos:'noun'},
    {w:'hegemony',def:'Leadership or dominance of one country over others.',ex:'The empire sought hegemony over the region.',pos:'noun'},
    {w:'iconoclast',def:'A person who attacks cherished beliefs.',ex:'The scientist was an iconoclast who challenged dogma.',pos:'noun'},
    {w:'loquacious',def:'Tending to talk a great deal.',ex:'The loquacious host dominated the conversation.',pos:'adjective'},
    {w:'obfuscate',def:'To make unclear or confusing.',ex:'His answer only served to obfuscate the matter.',pos:'verb'},
    {w:'sycophant',def:'A person who acts obsequiously to gain favor.',ex:'The king surrounded himself with sycophants.',pos:'noun'},
  ],
  12: [
    {w:'abstemious',def:'Not self-indulgent, especially with food and drink.',ex:'He lived an abstemious lifestyle.',pos:'adjective'},
    {w:'adumbrate',def:'To outline or indicate in a sketchy way; foreshadow.',ex:'The first chapter adumbrates the novel\'s themes.',pos:'verb'},
    {w:'anachronistic',def:'Belonging to a period other than that being portrayed.',ex:'A feudal system would be anachronistic today.',pos:'adjective'},
    {w:'antediluvian',def:'Extremely old-fashioned; of the time before the biblical flood.',ex:'His antediluvian views were out of touch.',pos:'adjective'},
    {w:'assiduous',def:'Showing great care and perseverance.',ex:'She was assiduous in her preparation.',pos:'adjective'},
    {w:'bifurcate',def:'To divide into two branches or forks.',ex:'The path bifurcated at the river.',pos:'verb'},
    {w:'calumny',def:'The making of false statements to damage someone\'\ 2 reputation.',ex:'The candidate was a victim of calumny.',pos:'noun'},
    {w:'chicanery',def:'The use of trickery to achieve goals.',ex:'The verdict exposed legal chicanery.',pos:'noun'},
    {w:'didactic',def:'Intended to teach, particularly with a moral lesson.',ex:'The play had an overly didactic tone.',pos:'adjective'},
    {w:'disingenuous',def:'Not candid or sincere; misleadingly frank.',ex:'His apology seemed disingenuous.',pos:'adjective'},
    {w:'ebullient',def:'Cheerful and full of energy.',ex:'Her ebullient personality lit up the room.',pos:'adjective'},
    {w:'effulgent',def:'Radiant; shining brightly.',ex:'The effulgent sunrise was breathtaking.',pos:'adjective'},
    {w:'encomium',def:'A formal speech or piece of writing praising someone.',ex:'The eulogy was a moving encomium.',pos:'noun'},
    {w:'ersatz',def:'Made or used as a substitute; not genuine.',ex:'Ersatz coffee became common during wartime.',pos:'adjective'},
    {w:'persiflage',def:'Light and slightly contemptuous talk or writing.',ex:'The meeting devolved into persiflage.',pos:'noun'},

};

const GRADE_INFO = {
  'K':{icon:'🐣',label:'Kindergarten-Grade 1',theme:'Early sight words and everyday vocabulary'},
  2:{icon:'🐥',label:'Grade 2',theme:'Building blocks vocabulary'},
  3:{icon:'🐤',label:'Grade 3',theme:'Elementary vocabulary and spelling'},
  4:{icon:'🦉',label:'Grade 4',theme:'Upper elementary vocabulary'},
  5:{icon:'🦅',label:'Grade 5',theme:'Pre-middle-school vocabulary'},
  6:{icon:'📗',label:'Grade 6',theme:'Foundation vocabulary for middle school'},
  7:{icon:'📘',label:'Grade 7',theme:'Advanced middle school words'},
  8:{icon:'📙',label:'Grade 8',theme:'Pre-high school vocabulary'},
  9:{icon:'📕',label:'Grade 9',theme:'Freshman year core words'},
  10:{icon:'📓',label:'Grade 10',theme:'SAT-level vocabulary'},
  11:{icon:'📔',label:'Grade 11',theme:'Advanced academic vocabulary'},
  12:{icon:'📒',label:'Grade 12',theme:'College-level & AP vocabulary'},
};

let state = {screen:'home', grade:null, mode:null, words:[], idx:0, score:0, missed:[], answered:false};

function getMastery(g) {
  const d = JSON.parse(localStorage.getItem('spelling_mastery')||'{}');
  return d[g] || 0;
}
function saveMastery(g, pct) {
  const d = JSON.parse(localStorage.getItem('spelling_mastery')||'{}');
  d[g] = Math.max(d[g]||0, pct);
  localStorage.setItem('spelling_mastery', JSON.stringify(d));
}

function render() {
  const app = document.getElementById('app');
  if (state.screen === 'home') app.innerHTML = renderHome();
  else if (state.screen === 'mode') app.innerHTML = renderMode();
  else if (state.screen === 'quiz') app.innerHTML = renderQuiz();
  else if (state.screen === 'results') app.innerHTML = renderResults();
}

function renderHome() {
  return `<div class="home-grid">${Object.entries(GRADE_INFO).map(([g,info])=>{
    const m = getMastery(g);
    return `<div class="grade-card" onclick="selectGrade(${g})">
      <div class="grade-icon">${info.icon}</div>
      <div class="grade-title">${info.label}</div>
      <div class="grade-sub">${info.theme}</div>
      <div class="grade-sub" style="margin-top:6px;color:var(--accent)">${WORDS[g].length} words</div>
      <div class="mastery-bar"><div class="mastery-fill" style="width:${m}%"></div></div>
      <div style="font-size:.72rem;color:var(--muted);margin-top:4px">${m}% mastered</div>
    </div>`;
  }).join('')}</div>`;
}

function selectGrade(g) {
  state.grade = g;
  state.screen = 'mode';
  render();
}

function renderMode() {
  const info = GRADE_INFO[state.grade];
  return `
    <div style="text-align:center;margin-bottom:20px">
      <button class="back-btn" onclick="state.screen='home';render()">← Back</button>
      <h2 style="margin-top:12px;font-size:1.3rem">${info.icon} ${info.label} — Choose Quiz Mode</h2>
      <p style="color:var(--muted);font-size:.85rem;margin-top:6px">${WORDS[state.grade].length} words · Pick your challenge</p>
    </div>
    <div class="mode-row">
      <div class="mode-btn" onclick="startQuiz('spell')">
        <span class="mode-icon">✍️</span>
        <strong>Spell It</strong><br>
        <span style="font-size:.75rem;color:var(--muted)">Type the word from its definition</span>
      </div>
      <div class="mode-btn" onclick="startQuiz('define')">
        <span class="mode-icon">📖</span>
        <strong>Define It</strong><br>
        <span style="font-size:.75rem;color:var(--muted)">Pick the correct definition (4 choices)</span>
      </div>
      <div class="mode-btn" onclick="startQuiz('fillin')">
        <span class="mode-icon">🔡</span>
        <strong>Fill in the Blank</strong><br>
        <span style="font-size:.75rem;color:var(--muted)">Complete the sentence with the right word</span>
      </div>
      <div class="mode-btn" onclick="startQuiz('match')">
        <span class="mode-icon">🔤</span>
        <strong>Word → Definition</strong><br>
        <span style="font-size:.75rem;color:var(--muted)">See the word, pick its meaning</span>
      </div>
    </div>`;
}

function startQuiz(mode) {
  state.mode = mode;
  state.words = shuffle([...WORDS[state.grade]]).slice(0, 10);
  state.idx = 0; state.score = 0; state.missed = []; state.answered = false;
  state.screen = 'quiz';
  render();
}

function shuffle(a) {
  for (let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function renderQuiz() {
  const word = state.words[state.idx];
  const pct = Math.round((state.idx / state.words.length) * 100);
  let body = '';

  if (state.mode === 'spell') {
    body = `
      <div class="word-display">
        <div class="word-def">${word.def}</div>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:4px">Part of speech: <em>${word.pos}</em></div>
        <button class="speak-btn" onclick="speak('${word.def}')">🔊 Hear Definition</button>
      </div>
      <div class="spell-input-wrap">
        <input class="spell-input" id="spellInput" type="text" placeholder="Type the word..." autocomplete="off" autocorrect="off" spellcheck="false" onkeydown="if(event.key==='Enter')checkSpell()"/>
      </div>
      <div class="feedback" id="feedback"></div>
      <button class="btn btn-primary" onclick="checkSpell()">✓ Check</button>`;
  } else if (state.mode === 'define') {
    const choices = makeChoices(word, 'def');
    body = `
      <div class="word-display">
        <div class="big-word">${word.w}</div>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:8px">(${word.pos})</div>
        <button class="speak-btn" onclick="speak('${word.w}')">🔊 Hear Word</button>
      </div>
      <div class="choices" id="choiceGrid">
        ${choices.map((c,i)=>`<button class="choice-btn" id="ch${i}" onclick="checkMC(this,'${c.w===word.w?'correct':'wrong'}','${word.w}')" ${state.answered?'disabled':''}>${c.def}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      ${state.answered?`<button class="btn btn-primary" style="margin-top:8px" onclick="nextWord()">Next →</button>`:''}`;
  } else if (state.mode === 'fillin') {
    const blank = word.ex.replace(new RegExp(word.w,'i'), '_____');
    const choices = makeChoices(word, 'w');
    body = `
      <div class="word-display">
        <div class="word-def" style="font-size:1.1rem;font-weight:600;">"${blank}"</div>
        <div style="font-size:.82rem;color:var(--muted);margin-top:8px">Hint: ${word.def}</div>
      </div>
      <div class="choices" id="choiceGrid">
        ${choices.map((c,i)=>`<button class="choice-btn" id="ch${i}" onclick="checkMC(this,'${c.w===word.w?'correct':'wrong'}','${word.w}')" ${state.answered?'disabled':''}>${c.w}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      ${state.answered?`<button class="btn btn-primary" style="margin-top:8px" onclick="nextWord()">Next →</button>`:''}`;
  } else { // match
    const choices = makeChoices(word, 'def');
    body = `
      <div class="word-display">
        <div class="big-word">${word.w}</div>
        <div style="font-size:.82rem;color:var(--muted);margin-bottom:8px">(${word.pos})</div>
        <button class="speak-btn" onclick="speak('${word.w}')">🔊 Hear Word</button>
      </div>
      <div class="choices" id="choiceGrid">
        ${choices.map((c,i)=>`<button class="choice-btn" id="ch${i}" onclick="checkMC(this,'${c.w===word.w?'correct':'wrong'}','${word.w}')" ${state.answered?'disabled':''}>${c.def}</button>`).join('')}
      </div>
      <div class="feedback" id="feedback"></div>
      ${state.answered?`<button class="btn btn-primary" style="margin-top:8px" onclick="nextWord()">Next →</button>`:''}`;
  }

  return `<div class="quiz-card">
    <div class="q-header">
      <button class="back-btn" onclick="state.screen='mode';render()">← Back</button>
      <div class="progress-wrap">
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="progress-text">${state.idx+1} of ${state.words.length} · Score: ${state.score}</div>
      </div>
    </div>
    ${body}
  </div>`;
}

function makeChoices(word, field) {
  const all = WORDS[state.grade].filter(w => w.w !== word.w);
  const wrong = shuffle(all).slice(0, 3);
  return shuffle([word, ...wrong]);
}

function speak(text) {
  if ('speechSynthesis' in window) {
    const u = new SpeechSynthesisUtterance(text);
    u.rate = 0.85;
    speechSynthesis.speak(u);
  }
}

function checkSpell() {
  if (state.answered) return;
  const inp = document.getElementById('spellInput');
  const word = state.words[state.idx];
  const val = inp.value.trim().toLowerCase();
  const correct = word.w.toLowerCase();
  const fb = document.getElementById('feedback');
  if (val === correct) {
    inp.classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `✅ Correct! <em>${word.w}</em> — ${word.def}`;
    state.score++;
  } else {
    inp.classList.add('wrong');
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `❌ The correct spelling is <strong>${word.w}</strong>`;
    state.missed.push(word);
  }
  state.answered = true;
  inp.disabled = true;
  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn btn-primary';
  nextBtn.style.marginTop = '12px';
  nextBtn.textContent = state.idx < state.words.length - 1 ? 'Next →' : 'See Results';
  nextBtn.onclick = nextWord;
  document.querySelector('.quiz-card').appendChild(nextBtn);
}

function checkMC(btn, result, correctWord) {
  if (state.answered) return;
  state.answered = true;
  const word = state.words[state.idx];
  const fb = document.getElementById('feedback');
  document.querySelectorAll('.choice-btn').forEach(b => b.disabled = true);
  if (result === 'correct') {
    btn.classList.add('correct');
    fb.className = 'feedback correct-fb show';
    fb.innerHTML = `✅ Correct! <em>${word.ex}</em>`;
    state.score++;
  } else {
    btn.classList.add('wrong');
    fb.className = 'feedback wrong-fb show';
    fb.innerHTML = `❌ Correct answer: <strong>${correctWord}</strong> — ${word.def}`;
    state.missed.push(word);
    // highlight correct
    document.querySelectorAll('.choice-btn').forEach(b => {
      if (b.textContent.trim() === word.def || b.textContent.trim() === word.w) b.classList.add('correct');
    });
  }
  render(); // re-render to show Next button
}

function nextWord() {
  state.idx++;
  state.answered = false;
  if (state.idx >= state.words.length) {
    const pct = Math.round((state.score / state.words.length) * 100);
    saveMastery(state.grade, pct);
    state.screen = 'results';
  }
  render();
  if (state.screen === 'quiz' && state.mode === 'spell') {
    setTimeout(() => { const inp = document.getElementById('spellInput'); if(inp) inp.focus(); }, 50);
  }
}

function renderResults() {
  const total = state.words.length;
  const pct = Math.round((state.score / total) * 100);
  const grade = pct >= 90 ? '🏆 Excellent!' : pct >= 75 ? '⭐ Great Job!' : pct >= 60 ? '✅ Good Effort' : '📚 Keep Practicing';
  return `<div class="results-card">
    <div class="score-big">${pct}%</div>
    <div class="score-label">${grade}</div>
    <div class="stat-row">
      <div class="stat"><div class="stat-num" style="color:var(--green)">${state.score}</div><div class="stat-name">Correct</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--red)">${total - state.score}</div><div class="stat-name">Missed</div></div>
      <div class="stat"><div class="stat-num" style="color:var(--accent)">${total}</div><div class="stat-name">Total</div></div>
    </div>
    ${state.missed.length ? `<div class="missed-list"><div style="font-size:.82rem;font-weight:700;color:var(--muted);margin-bottom:8px">Words to Review:</div>
      ${state.missed.map(w=>`<div class="missed-item"><strong>${w.w}</strong> — ${w.def}</div>`).join('')}</div>` : '<p style="color:var(--green);font-weight:700;margin-bottom:16px">Perfect score! 🎉</p>'}
    <div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap">
      <button class="btn btn-primary" onclick="startQuiz(state.mode)" style="flex:1">🔄 Retry</button>
      <button class="btn btn-outline" onclick="state.screen='mode';render()" style="flex:1">← Change Mode</button>
      <button class="btn btn-outline" onclick="state.screen='home';render()" style="flex:1">🏠 Home</button>
    </div>
  </div>`;
}

render();
</script>
<script src="/analytics.js">
// Cumulative spelling stats
var SPELL_STATS = 'ace_spelling_alltime';
function updateSpellingStats(correct, total){
  var stats = JSON.parse(localStorage.getItem(SPELL_STATS)||'{"sessions":0,"correct":0,"total":0,"best":0}');
  stats.sessions++;
  stats.correct += correct;
  stats.total   += total;
  var pct = total ? Math.round(correct/total*100) : 0;
  if(pct > stats.best) stats.best = pct;
  localStorage.setItem(SPELL_STATS, JSON.stringify(stats));
  renderSpellingStats();
}
function renderSpellingStats(){
  var el = document.getElementById('spellingAlltime');
  if(!el) return;
  var stats = JSON.parse(localStorage.getItem(SPELL_STATS)||'{"sessions":0,"correct":0,"total":0,"best":0}');
  var acc = stats.total ? Math.round(stats.correct/stats.total*100) : 0;
  el.innerHTML = `
    <div style="display:flex;gap:12px;flex-wrap:wrap">
      <div style="background:#0f172a;border:1px solid #ffffff;border-radius:10px;padding:12px 16px;text-align:center">
        <div style="font-size:1.3rem;font-weight:900;color:#6366f1">${stats.sessions}</div>
        <div style="font-size:.72rem;color:#64748b;font-weight:700">Quizzes</div>
      </div>
      <div style="background:#0f172a;border:1px solid #ffffff;border-radius:10px;padding:12px 16px;text-align:center">
        <div style="font-size:1.3rem;font-weight:900;color:#10b981">${acc}%</div>
        <div style="font-size:.72rem;color:#64748b;font-weight:700">Accuracy</div>
      </div>
      <div style="background:#0f172a;border:1px solid #ffffff;border-radius:10px;padding:12px 16px;text-align:center">
        <div style="font-size:1.3rem;font-weight:900;color:#f59e0b">${stats.best}%</div>
        <div style="font-size:.72rem;color:#64748b;font-weight:700">Best Score</div>
      </div>
      <div style="background:#0f172a;border:1px solid #ffffff;border-radius:10px;padding:12px 16px;text-align:center">
        <div style="font-size:1.3rem;font-weight:900;color:#8b5cf6">${stats.correct}</div>
        <div style="font-size:.72rem;color:#64748b;font-weight:700">Words Correct</div>
      </div>
    </div>`;
}

document.addEventListener("DOMContentLoaded", renderSpellingStats);
</script>
