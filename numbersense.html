<div class="container">

  <div class="card">
    <div class="tab-row">
      <button class="tab-btn active" onclick="setTab('place')" id="tabPlace">🔟 Place Value</button>
      <button class="tab-btn" onclick="setTab('line')" id="tabLine">📏 Number Line</button>
      <button class="tab-btn" onclick="setTab('fact')" id="tabFact">➕➖ Fact Fluency</button>
    </div>
  </div>

  <!-- PLACE VALUE -->
  <div class="card" id="placePanel">
    <div class="score-row"><span>🔟 Place Value</span><span>Score: <strong id="placeScore">0</strong> / <strong id="placeTotal">0</strong></span></div>
    <div style="margin-bottom:14px">
      <div class="chip-group" id="placeRangeGroup">
        <button class="chip active" data-val="2">Tens &amp; Ones (up to 99)</button>
        <button class="chip" data-val="3">Hundreds, Tens &amp; Ones (up to 999)</button>
      </div>
    </div>
    <div class="q-prompt" id="placePrompt">What number is shown?</div>
    <div class="blocks-box" id="placeBlocks"></div>
    <div class="opt-grid" id="placeOpts"></div>
    <div class="feedback" id="placeFeedback"></div>
    <button class="btn btn-primary btn-big" onclick="nextPlace()">🎲 New Question</button>
  </div>

  <!-- NUMBER LINE -->
  <div class="card" id="linePanel" style="display:none">
    <div class="score-row"><span>📏 Number Line</span><span>Score: <strong id="lineScore">0</strong> / <strong id="lineTotal">0</strong></span></div>
    <div style="margin-bottom:14px">
      <div class="chip-group" id="lineRangeGroup">
        <button class="chip active" data-val="10">0 to 10</button>
        <button class="chip" data-val="20">0 to 20</button>
        <button class="chip" data-val="100">0 to 100 (by 10s)</button>
      </div>
    </div>
    <div class="q-prompt" id="linePrompt">What number is marked?</div>
    <div id="lineDisplay"></div>
    <div class="opt-grid" id="lineOpts"></div>
    <div class="feedback" id="lineFeedback"></div>
    <button class="btn btn-primary btn-big" onclick="nextLine()">🎲 New Question</button>
  </div>

  <!-- FACT FLUENCY -->
  <div class="card" id="factPanel" style="display:none">
    <div class="score-row"><span>➕➖ Fact Fluency</span><span>🔥 Streak: <strong id="factStreak">0</strong> &nbsp;|&nbsp; <strong id="factScore">0</strong> / <strong id="factTotal">0</strong></span></div>
    <div style="margin-bottom:14px">
      <div class="chip-group" id="factRangeGroup">
        <button class="chip active" data-val="add10">Addition to 10</button>
        <button class="chip" data-val="add20">Addition to 20</button>
        <button class="chip" data-val="sub10">Subtraction within 10</button>
        <button class="chip" data-val="sub20">Subtraction within 20</button>
      </div>
    </div>
    <div class="fact-q" id="factQ">? + ? = ?</div>
    <input type="number" class="fact-input" id="factInput" autocomplete="off" onkeydown="if(event.key==='Enter')checkFact()">
    <div class="fact-feedback" id="factFeedback"></div>
    <div style="text-align:center;margin-top:14px"><button class="btn btn-primary btn-big" onclick="checkFact()">Check</button></div>
  </div>

<script>
// ═══════════════ SHARED HELPERS ═══════════════
function shuffle(arr){
  const a = arr.slice();
  for (let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }

function renderOptions(containerId, options, correctIdx, onAnswer){
  const container = document.getElementById(containerId);
  container.innerHTML = '';
  options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.textContent = opt;
    btn.onclick = () => onAnswer(i, btn, container);
    container.appendChild(btn);
  });
}
function lockOptions(container, chosenBtn, correctIdx){
  const btns = container.querySelectorAll('.opt-btn');
  btns.forEach((b,i) => {
    b.disabled = true;
    if (i === correctIdx) b.classList.add('correct');
    else if (b === chosenBtn) b.classList.add('wrong');
    else b.classList.add('dim');
  });
}

// ═══════════════ TABS ═══════════════
function setTab(t){
  ['place','line','fact'].forEach(id => {
    document.getElementById('tab'+id.charAt(0).toUpperCase()+id.slice(1)).classList.toggle('active', id===t);
    document.getElementById(id+'Panel').style.display = id===t ? 'block' : 'none';
  });
  if (t==='fact') document.getElementById('factInput').focus();
}

// ═══════════════ PLACE VALUE ═══════════════
let placeScore=0, placeTotal=0, placeRange=2, placeCurrent=null;

document.getElementById('placeRangeGroup').addEventListener('click', e => {
  if (!e.target.classList.contains('chip')) return;
  document.querySelectorAll('#placeRangeGroup .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  placeRange = parseInt(e.target.dataset.val);
  nextPlace();
});

function genPlaceNumber(){
  if (placeRange === 2) return rnd(10, 99);
  return rnd(100, 999);
}

function renderBlocks(num){
  const hundreds = Math.floor(num/100);
  const tens = Math.floor((num%100)/10);
  const ones = num%10;
  const box = document.getElementById('placeBlocks');
  box.innerHTML = '';
  if (hundreds > 0) {
    const g = document.createElement('div'); g.className = 'block-group';
    for (let i=0;i<hundreds;i++){ const b=document.createElement('div'); b.className='block-hundred'; g.appendChild(b); }
    box.appendChild(g);
  }
  if (tens > 0) {
    const g = document.createElement('div'); g.className = 'block-group';
    for (let i=0;i<tens;i++){ const b=document.createElement('div'); b.className='block-ten'; g.appendChild(b); }
    box.appendChild(g);
  }
  if (ones > 0) {
    const g = document.createElement('div'); g.className = 'block-group';
    for (let i=0;i<ones;i++){ const b=document.createElement('div'); b.className='block-one'; g.appendChild(b); }
    box.appendChild(g);
  }
  if (hundreds===0 && tens===0 && ones===0) box.innerHTML = '<span style="color:var(--muted);font-size:.8rem">—</span>';
}

function nextPlace(){
  const num = genPlaceNumber();
  placeCurrent = num;
  document.getElementById('placeFeedback').classList.remove('show');
  document.getElementById('placePrompt').textContent = 'What number is shown?';
  renderBlocks(num);

  const used = new Set([num]);
  const distractors = [];
  const max = placeRange===2 ? 99 : 999;
  const min = placeRange===2 ? 10 : 100;
  let guard = 0;
  while (distractors.length < 3 && guard < 300) {
    guard++;
    // plausible distractors: off by a ten, off by a one, digit-swap style
    const variants = [
      num + (placeRange===2 ? 10 : 100),
      num - (placeRange===2 ? 10 : 100),
      num + 1, num - 1,
      rnd(min, max)
    ].filter(v => v >= min && v <= max && v !== num && !used.has(v));
    if (variants.length) {
      const v = variants[rnd(0, variants.length-1)];
      distractors.push(v); used.add(v);
    } else {
      const v = rnd(min, max);
      if (!used.has(v)) { distractors.push(v); used.add(v); }
    }
  }
  const opts = shuffle([num, ...distractors].map(String));
  const correctIdx = opts.indexOf(String(num));
  renderOptions('placeOpts', opts, correctIdx, (i, btn, container) => {
    const isCorrect = i === correctIdx;
    placeTotal++; if (isCorrect) placeScore++;
    document.getElementById('placeScore').textContent = placeScore;
    document.getElementById('placeTotal').textContent = placeTotal;
    lockOptions(container, btn, correctIdx);
    const h = Math.floor(num/100), t = Math.floor((num%100)/10), o = num%10;
    const parts = [];
    if (h>0) parts.push(h+' hundred'+(h>1?'s':''));
    if (t>0) parts.push(t+' ten'+(t>1?'s':''));
    if (o>0 || parts.length===0) parts.push(o+' one'+(o!==1?'s':''));
    const fb = document.getElementById('placeFeedback');
    fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'bad');
    fb.innerHTML = (isCorrect ? '✅ Correct! ' : '❌ Not quite. ') + `The number is <strong>${num}</strong> — that's ${parts.join(', ')}.`;
  });
}

// ═══════════════ NUMBER LINE ═══════════════
let lineScore=0, lineTotal=0, lineRange=10;

document.getElementById('lineRangeGroup').addEventListener('click', e => {
  if (!e.target.classList.contains('chip')) return;
  document.querySelectorAll('#lineRangeGroup .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  lineRange = parseInt(e.target.dataset.val);
  nextLine();
});

function renderNumberLineMark(max, step, val){
  const wrap = document.createElement('div');
  wrap.className = 'numline-wrap';
  const track = document.createElement('div');
  track.className = 'numline-track';
  for (let v=0; v<=max; v+=step) {
    const pct = (v/max)*100;
    const tick = document.createElement('div');
    tick.className = 'numline-tick';
    tick.style.left = pct+'%';
    track.appendChild(tick);
    const lbl = document.createElement('div');
    lbl.className = 'numline-ticklbl';
    lbl.style.left = pct+'%';
    lbl.textContent = v;
    track.appendChild(lbl);
  }
  const marker = document.createElement('div');
  marker.className = 'numline-marker';
  marker.style.left = ((val/max)*100)+'%';
  marker.textContent = '▼';
  marker.style.color = '#fbbf24';
  track.appendChild(marker);
  wrap.appendChild(track);
  return wrap;
}

function nextLine(){
  document.getElementById('lineFeedback').classList.remove('show');
  const display = document.getElementById('lineDisplay');
  display.innerHTML = '';
  const useSequence = Math.random() < 0.4;

  if (!useSequence) {
    const max = lineRange;
    const step = lineRange===100 ? 10 : 1;
    const steps = max/step;
    const val = rnd(0, steps)*step;
    document.getElementById('linePrompt').textContent = 'What number is marked?';
    display.appendChild(renderNumberLineMark(max, step, val));

    const used = new Set([val]);
    const distractors = [];
    let guard=0;
    while (distractors.length < 3 && guard < 200) {
      guard++;
      const cand = rnd(0, steps)*step;
      if (!used.has(cand)) { distractors.push(cand); used.add(cand); }
    }
    const opts = shuffle([val, ...distractors].map(String));
    const correctIdx = opts.indexOf(String(val));
    renderOptions('lineOpts', opts, correctIdx, (i, btn, container) => {
      const isCorrect = i === correctIdx;
      lineTotal++; if (isCorrect) lineScore++;
      document.getElementById('lineScore').textContent = lineScore;
      document.getElementById('lineTotal').textContent = lineTotal;
      lockOptions(container, btn, correctIdx);
      const fb = document.getElementById('lineFeedback');
      fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'bad');
      fb.innerHTML = (isCorrect ? '✅ Correct! ' : '❌ Not quite. ') + `The marker points to <strong>${val}</strong>.`;
    });
  } else {
    const step = lineRange===100 ? 10 : 1;
    const maxStart = lineRange - step*3;
    const start = rnd(0, Math.max(0,maxStart));
    const seq = [start, start+step, start+step*2, start+step*3];
    const blankIdx = rnd(0,3);
    const answer = seq[blankIdx];
    document.getElementById('linePrompt').textContent = 'What number goes in the blank?';
    const row = document.createElement('div');
    row.className = 'numline-seq';
    seq.forEach((n,i) => {
      const item = document.createElement('div');
      item.className = 'numline-seq-item' + (i===blankIdx ? ' blank' : '');
      item.textContent = i===blankIdx ? '?' : n;
      row.appendChild(item);
    });
    display.appendChild(row);

    const used = new Set([answer]);
    const distractors = [];
    let guard=0;
    while (distractors.length < 3 && guard < 200) {
      guard++;
      let delta = rnd(-2,2);
      if (delta === 0) delta = 1;
      let cand = answer + delta*step;
      if (cand < 0) cand = answer + step*(distractors.length+1);
      if (cand >= 0 && !used.has(cand)) { distractors.push(cand); used.add(cand); }
    }
    const opts = shuffle([answer, ...distractors].map(String));
    const correctIdx = opts.indexOf(String(answer));
    renderOptions('lineOpts', opts, correctIdx, (i, btn, container) => {
      const isCorrect = i === correctIdx;
      lineTotal++; if (isCorrect) lineScore++;
      document.getElementById('lineScore').textContent = lineScore;
      document.getElementById('lineTotal').textContent = lineTotal;
      lockOptions(container, btn, correctIdx);
      const fb = document.getElementById('lineFeedback');
      fb.className = 'feedback show ' + (isCorrect ? 'ok' : 'bad');
      fb.innerHTML = (isCorrect ? '✅ Correct! ' : '❌ Not quite. ') + `The sequence is <strong>${seq.join(', ')}</strong>.`;
    });
  }
}

// ═══════════════ FACT FLUENCY ═══════════════
let factMode = 'add10', factScore=0, factTotal=0, factStreak=0, factCurrent=null;

document.getElementById('factRangeGroup').addEventListener('click', e => {
  if (!e.target.classList.contains('chip')) return;
  document.querySelectorAll('#factRangeGroup .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  factMode = e.target.dataset.val;
  nextFact();
});

function genFact(){
  if (factMode === 'add10') {
    const a = rnd(0,10);
    const b = rnd(0, 10-a);
    return { q: `${a} + ${b} = ?`, ans: a+b };
  }
  if (factMode === 'add20') {
    const a = rnd(0,20);
    const b = rnd(0, 20-a);
    return { q: `${a} + ${b} = ?`, ans: a+b };
  }
  if (factMode === 'sub10') {
    const a = rnd(0,10);
    const b = rnd(0,a);
    return { q: `${a} − ${b} = ?`, ans: a-b };
  }
  // sub20
  const a = rnd(0,20);
  const b = rnd(0,a);
  return { q: `${a} − ${b} = ?`, ans: a-b };
}

function nextFact(){
  factCurrent = genFact();
  document.getElementById('factQ').textContent = factCurrent.q;
  const input = document.getElementById('factInput');
  input.value = '';
  input.className = 'fact-input';
  document.getElementById('factFeedback').textContent = '';
  document.getElementById('factFeedback').className = 'fact-feedback';
  input.focus();
}

function checkFact(){
  const input = document.getElementById('factInput');
  const val = parseInt(input.value);
  const fb = document.getElementById('factFeedback');
  if (isNaN(val)) { fb.textContent = 'Type a number first!'; fb.className = 'fact-feedback err'; return; }
  factTotal++;
  const isCorrect = val === factCurrent.ans;
  document.getElementById('factTotal').textContent = factTotal;
  if (isCorrect) {
    factScore++; factStreak++;
    document.getElementById('factScore').textContent = factScore;
    document.getElementById('factStreak').textContent = factStreak;
    input.className = 'fact-input correct';
    fb.textContent = '✅ Correct!';
    fb.className = 'fact-feedback ok';
  } else {
    factStreak = 0;
    document.getElementById('factStreak').textContent = factStreak;
    input.className = 'fact-input wrong';
    fb.textContent = `❌ Not quite — the answer is ${factCurrent.ans}.`;
    fb.className = 'fact-feedback err';
  }
  setTimeout(nextFact, 1200);
}

// ═══════════════ INIT ═══════════════
nextPlace();
nextLine();
nextFact();
</script>
</body>
</html>
