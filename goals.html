<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<link rel="stylesheet" href="/ace-shared.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Goal Tracker — AcerAcademy</title>
<meta name="robots" content="noindex,follow">
<link rel="canonical" href="https://academyacer.com/goals.html">
<link rel="stylesheet" href="ace-theme.css">
<style>
:root{--bg:#f7f8fa;--card:#fff;--accent:#4f46e5;--accent2:#7c3aed;--text:#1e1b4b;--muted:#6b7280;--border:#e5e7eb;--green:#059669;--red:#dc2626;--amber:#d97706}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topnav{display:flex;align-items:center;gap:6px;padding:0 20px;height:54px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap;overflow-x:auto}
.logo{font-size:1.3rem;font-weight:800;color:var(--accent);text-decoration:none;margin-right:10px;white-space:nowrap}.logo span{color:var(--accent2)}
.nav-link{text-decoration:none;color:var(--muted);font-size:.82rem;padding:5px 9px;border-radius:7px;white-space:nowrap}.nav-link:hover{background:var(--bg)}.nav-link.active{color:var(--accent);font-weight:700}
.hero{text-align:center;padding:36px 20px 20px;background:linear-gradient(135deg,#059669,#047857);color:#fff}
.hero h1{font-size:1.9rem;font-weight:800;margin-bottom:6px}
.hero p{opacity:.85;max-width:520px;margin:0 auto;font-size:.95rem}
.container{max-width:900px;margin:24px auto;padding:0 20px}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;margin-bottom:20px}
.card h2{font-size:1rem;font-weight:700;margin-bottom:14px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:580px){.form-grid{grid-template-columns:1fr}}
.field{display:flex;flex-direction:column;gap:5px}
.field.full{grid-column:1/-1}
label{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
input,select,textarea{padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;color:var(--text);background:#fff;outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
.btn{padding:9px 22px;border-radius:9px;border:none;cursor:pointer;font-size:.88rem;font-weight:700}
.btn-primary{background:var(--green);color:#fff}.btn-primary:hover{background:#047857}
.btn-sm{padding:5px 11px;font-size:.76rem;border-radius:7px;border:1.5px solid var(--border);background:#fff;cursor:pointer;color:var(--muted)}
.btn-sm:hover{background:var(--bg)}.btn-sm.del{color:var(--red)}.btn-sm.del:hover{background:#fef2f2}

.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.goal-card{background:var(--bg);border:1.5px solid var(--border);border-radius:12px;padding:16px;position:relative}
.goal-card.completed{border-color:#6ee7b7;background:#f0fdf4}
.goal-card .title{font-size:.95rem;font-weight:700;margin-bottom:4px;padding-right:60px}
.goal-card .meta{font-size:.78rem;color:var(--muted);margin-bottom:10px}
.goal-card .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px}
.tag{padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:700}
.bar-track{background:#e5e7eb;border-radius:99px;height:8px;overflow:hidden;margin-bottom:6px}
.bar-fill{height:100%;border-radius:99px;background:var(--green);transition:width .4s}
.pct-label{font-size:.75rem;color:var(--muted);text-align:right;margin-bottom:10px}
.milestones{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}
.milestone{display:flex;align-items:center;gap:8px;font-size:.82rem;cursor:pointer}
.milestone input[type=checkbox]{width:16px;height:16px;accent-color:var(--green)}
.milestone.done span{text-decoration:line-through;color:var(--muted)}
.goal-card .actions{position:absolute;top:10px;right:10px;display:flex;gap:5px}

.milestone-builder{display:flex;flex-direction:column;gap:6px}
.milestone-row{display:flex;gap:6px;align-items:center}
.milestone-row input{flex:1}
.add-ms-btn{padding:6px 12px;border-radius:7px;border:1.5px dashed var(--border);background:#fff;cursor:pointer;font-size:.82rem;color:var(--muted);margin-top:4px;width:100%}
.add-ms-btn:hover{border-color:var(--accent);color:var(--accent)}
.empty{text-align:center;padding:40px;color:var(--muted)}

  input,select,textarea{background:#1a1a2e;color:var(--text);border-color:var(--border)}
  .topnav{background:#12121f;border-color:var(--border)}.btn-sm{background:#1a1a2e}.goal-card{background:#12121f}
}

[data-theme="dark"]{--bg:#0b1120;--card:#1a2540;--text:#e8edf5;--muted:#7a8fa8;--border:#2a3a55;--surface:#111827}
[data-theme="dark"] body{background:var(--bg);color:var(--text)}
[data-theme="dark"] .topnav,[data-theme="dark"] nav.topnav{background:#0f1a2e;border-color:var(--border)}
[data-theme="dark"] input,[data-theme="dark"] select,[data-theme="dark"] textarea{background:#1a2540;color:var(--text);border-color:var(--border)}
[data-theme="dark"] .card,[data-theme="dark"] .add-form{background:#1a2540;border-color:var(--border)}
[data-theme="dark"] .card-face{background:#1a2540;border-color:var(--border)}
[data-theme="dark"] .modal,[data-theme="dark"] .drawer{background:#1a2540}
[data-theme="dark"] .deck-btn{background:#1a2540;color:var(--muted);border-color:var(--border)}
[data-theme="dark"] .tab.active{background:#111827}
[data-theme="dark"] .school-table,[data-theme="dark"] .school-table th{background:#0f1a2e;color:var(--text)}
[data-theme="dark"] .school-table td{border-color:var(--border)}
.theme-btn{background:none;border:1.5px solid var(--border);border-radius:7px;padding:4px 9px;cursor:pointer;font-size:.85rem;color:var(--muted);margin-left:auto;flex-shrink:0}
.auto-badge{background:#dbeafe;color:#1e40af;font-size:.68rem;font-weight:800;padding:2px 8px;border-radius:10px;margin-left:6px}
.auto-progress{background:#eff6ff;border-radius:8px;padding:8px 10px;margin-bottom:10px;font-size:.8rem;color:#1e40af;border:1px solid #bfdbfe}
[data-theme="dark"] .auto-progress{background:rgba(37,99,235,.1);border-color:rgba(37,99,235,.3);color:#93c5fd}
[data-theme="dark"] .auto-badge{background:rgba(37,99,235,.2);color:#93c5fd}
</style>
<script src="theme.js"></script>

<style id="ace-mobile-fix">
@media(max-width:700px){
  header,nav.topnav,.ace-nav{padding:0 14px!important;height:56px!important;gap:10px!important}
  .tagline,.srch-wrap,.search-wrap{display:none!important}
  .brand-name,.logo{font-size:1rem!important}
  main,#mainContent,.main-content,.page-content{padding:14px 12px 80px!important}
  .card,.tool-card,.stat-card,.feature-card{border-radius:10px!important}
  h1{font-size:1.4rem!important}
  h2{font-size:1.1rem!important}
  table{font-size:.78rem}
  .grid-2,.grid-3,.grid-4{grid-template-columns:1fr!important}
  .flex-row{flex-direction:column!important}
}

<body>
<header class="ace-header">
  <a href="index.html" class="ace-brand">🎓 AcerAcademy</a>
  <a href="index.html" class="ace-nav-link">← Home</a>
  
  <div class="ace-spacer"></div>
  <a href="alltools.html" class="ace-nav-link">All Tools</a>
</header>
<div class="hero">
  <h1>🎯 Goal Tracker</h1>
  <p>Set academic goals with milestones and track your progress — one step at a time.</p>
</div>
<div class="container">
  <div class="card">
    <h2>➕ New Goal</h2>
    <div class="form-grid">
      <div class="field full">
        <label>Goal Title</label>
        <input id="g-title" placeholder="e.g. Score 90%+ on AP Calculus unit test">
      </div>
      <div class="field">
        <label>Goal Type</label>
        <select id="g-type" onchange="updateGoalFields()">
          <option value="custom">Custom (manual milestones)</option>
          <option value="score_target">Score Target (auto-tracked)</option>
          <option value="flashcard">Flashcard Mastery (auto-tracked)</option>
        </select>
      </div>
      <div class="field">
        <label>Subject</label>
        <select id="g-subj">
          <option>Math</option><option>Science</option><option>English</option><option>History</option>
          <option>CS</option><option>AP Calculus</option><option>AP Biology</option><option>AP Chemistry</option>
          <option>AP Physics</option><option>AP English</option><option>AP History</option><option>Languages</option><option>General</option>
        </select>
      </div>
      <div class="field">
        <label>Target Date</label>
        <input type="date" id="g-date">
      </div>
      <!-- Score Target fields -->
      <div class="field" id="scoreTargetFields" style="display:none">
        <label>Target Score (%)</label>
        <input type="number" id="g-score" placeholder="85" min="1" max="100">
      </div>
      <!-- Flashcard fields -->
      <div class="field" id="flashcardFields" style="display:none">
        <label>Deck / Tag</label>
        <input id="g-deck" placeholder="e.g. Vocabulary or AP Biology">
      </div>
      <div class="field" id="flashcardCountField" style="display:none">
        <label>Cards to Master</label>
        <input type="number" id="g-fcount" placeholder="50" min="1">
      </div>
      <!-- Custom milestones -->
      <div class="field full" id="milestonesSection">
        <label>Milestones (steps toward the goal)</label>
        <div class="milestone-builder" id="msBuilder">
          <div class="milestone-row"><input placeholder="Milestone 1 — e.g. Complete all unit flashcards"><button class="btn-sm del" onclick="this.parentElement.remove()">✕</button></div>
          <div class="milestone-row"><input placeholder="Milestone 2 — e.g. Score 80%+ on practice test"><button class="btn-sm del" onclick="this.parentElement.remove()">✕</button></div>
        </div>
        <button class="add-ms-btn" onclick="addMilestoneField()">+ Add milestone</button>
      </div>
    </div>
    <button class="btn btn-primary" onclick="addGoal()" style="margin-top:14px">🎯 Add Goal</button>
  </div>

  <div id="goalsSection">
    <div class="goals-grid" id="goalsGrid"></div>
  </div>
</div>

<script>
let goals = JSON.parse(localStorage.getItem('ace_goals')||'[]');
function save(){ localStorage.setItem('ace_goals', JSON.stringify(goals)); }

function updateGoalFields(){
  const type=document.getElementById('g-type').value;
  document.getElementById('scoreTargetFields').style.display=type==='score_target'?'':'none';
  document.getElementById('flashcardFields').style.display=type==='flashcard'?'':'none';
  document.getElementById('flashcardCountField').style.display=type==='flashcard'?'':'none';
  document.getElementById('milestonesSection').style.display=type==='custom'?'':'none';
}

function getAutoProgress(g){
  if(g.type==='score_target'){
    const tests=JSON.parse(localStorage.getItem('aceTestHistory')||'[]');
    const subj=(g.subj||'').toLowerCase();
    const relevant=tests.filter(function(t){
      const ts=((t.subject||t.subj||'')+'').toLowerCase();
      return subj==='general'||ts.includes(subj.split(' ').pop())||subj.includes(ts.split(' ').pop());
    });
    if(!relevant.length) return {pct:0,label:'No tests yet for '+g.subj};
    const best=relevant.reduce(function(mx,t){
      const p=t.pct||(t.correct&&t.total?Math.round(t.correct/t.total*100):0)||t.score||0;
      return p>mx?p:mx;
    },0);
    const target=g.targetScore||85;
    const pct=Math.min(100,Math.round(best/target*100));
    return {pct:pct,label:'Best: '+Math.round(best)+'% / Target: '+target+'%'};
  }
  if(g.type==='flashcard'){
    const fc=JSON.parse(localStorage.getItem('ace_flashcards_v2')||'{}');
    const cards=(fc.cards||[]);
    const deck=(g.deck||'').toLowerCase();
    const relevant=deck?cards.filter(function(c){
      return (c.deck||'').toLowerCase().includes(deck)||(c.tag||'').toLowerCase().includes(deck);
    }):cards;
    const mastered=relevant.filter(function(c){return (c.reps||0)>=3;}).length;
    const target=g.targetCards||50;
    const pct=Math.min(100,Math.round(mastered/target*100));
    return {pct:pct,label:'Mastered: '+mastered+' / '+target+' cards'};
  }
  return null;
}

function addMilestoneField(){
  const row = document.createElement('div');
  row.className='milestone-row';
  const n = document.querySelectorAll('.milestone-row').length+1;
  row.innerHTML=`<input placeholder="Milestone ${n}"><button class="btn-sm del" onclick="this.parentElement.remove()">✕</button>`;
  document.getElementById('msBuilder').appendChild(row);
}

function addGoal(){
  const title = document.getElementById('g-title').value.trim();
  if(!title){ alert('Enter a goal title.'); return; }
  const type=document.getElementById('g-type').value;
  const milestones = type==='custom'?[...document.querySelectorAll('.milestone-row input')]
    .map(i=>i.value.trim()).filter(Boolean)
    .map(text=>({text,done:false})):[];
  const goal = {
    id: Date.now(),
    title,
    type: type,
    subj: document.getElementById('g-subj').value,
    date: document.getElementById('g-date').value,
    targetScore: parseInt(document.getElementById('g-score').value)||85,
    deck: document.getElementById('g-deck').value.trim(),
    targetCards: parseInt(document.getElementById('g-fcount').value)||50,
    milestones,
    completed: false,
    ts: Date.now(),
  };
  goals.unshift(goal);
  save(); renderGoals();
  document.getElementById('g-title').value='';
  document.getElementById('g-date').value='';
  document.getElementById('g-score').value='';
  document.getElementById('g-deck').value='';
  document.getElementById('g-fcount').value='';
  document.querySelectorAll('.milestone-row input').forEach(i=>i.value='');
}

function toggleMilestone(goalId, msIdx){
  const g = goals.find(g=>g.id===goalId);
  if(!g) return;
  const wasCompleted = g.completed;
  g.milestones[msIdx].done = !g.milestones[msIdx].done;
  g.completed = g.milestones.length>0 && g.milestones.every(m=>m.done);
  if(g.completed && !wasCompleted){
    // 🎉 Goal just completed — fire confetti!
    if(typeof confetti !== 'undefined'){
      confetti({particleCount:120,spread:80,origin:{y:0.6},colors:['#6366f1','#ec4899','#f59e0b','#10b981','#a5b4fc']});
      setTimeout(()=>confetti({particleCount:60,spread:120,origin:{y:0.5},colors:['#6366f1','#ec4899','#f59e0b']}),500);
    }
    if(window.AceSound) AceSound.goalDone();
    if(window.AceCoins) AceCoins.earn(10,'Goal completed!');
    // Update goals-done stat
    const gDone = parseInt(localStorage.getItem('ace_goals_done')||'0')+1;
    localStorage.setItem('ace_goals_done', gDone);
    showGoalToast('🎉 Goal completed! +10 coins');
  }
  save(); renderGoals();
}

function showGoalToast(msg){
  var t=document.createElement('div');
  t.style.cssText='position:fixed;top:20px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#6366f1,#ec4899);color:#fff;font-weight:800;padding:13px 26px;border-radius:14px;z-index:99999;font-size:.95rem;box-shadow:0 8px 32px rgba(99,102,241,.5)';
  t.textContent=msg; document.body.appendChild(t);
  setTimeout(()=>{t.style.opacity='0';t.style.transition='opacity .5s';},3000);
  setTimeout(()=>t.remove(),3500);
}

function deleteGoal(id){
  if(!confirm('Delete this goal?')) return;
  goals = goals.filter(g=>g.id!==id);
  save(); renderGoals();
}

function fmtDate(d){ if(!d) return ''; return new Date(d+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }
function daysLeft(d){ if(!d) return null; const diff=new Date(d+'T00:00:00')-new Date(); return Math.ceil(diff/86400000); }

const SUBJ_COLORS = {
  Math:'#dbeafe',Science:'#d1fae5',English:'#ede9fe',History:'#fef3c7',
  CS:'#cffafe',General:'#f3f4f6',
};

function renderGoals(){
  const grid = document.getElementById('goalsGrid');
  if(!goals.length){ grid.innerHTML='<div class="empty" style="grid-column:1/-1">No goals yet. Add your first goal above!</div>'; return; }

  grid.innerHTML = goals.map(g=>{
    const autoP = getAutoProgress(g);
    const done = (g.milestones||[]).filter(m=>m.done).length;
    const total = (g.milestones||[]).length;
    const pct = autoP ? autoP.pct : (total>0 ? Math.round(done/total*100) : 0);
    const isAuto = g.type==='score_target'||g.type==='flashcard';
    const isCompleted = g.completed||(autoP&&autoP.pct>=100);
    const dl = daysLeft(g.date);
    const dlStr = dl===null?'':`${dl>0?dl+' days left':dl===0?'Today!':Math.abs(dl)+' days ago'}`;
    const dlColor = dl!==null&&dl<=3?'var(--red)':dl!==null&&dl<=7?'var(--amber)':'var(--green)';
    const color = SUBJ_COLORS[g.subj]||'#f3f4f6';
    const typeLabel = g.type==='score_target'?'📈 Score Goal':g.type==='flashcard'?'🃏 Flashcard Goal':'';
    return `<div class="goal-card${isCompleted?' completed':''}">
      <div class="actions">
        <button class="btn-sm del" onclick="deleteGoal(${g.id})">✕</button>
      </div>
      <div class="tags">
        <span class="tag" style="background:${color};color:#1e1b4b">${g.subj}</span>
        ${isCompleted?'<span class="tag" style="background:#d1fae5;color:#065f46">✅ Complete</span>':''}
        ${isAuto?`<span class="auto-badge">${typeLabel}</span>`:''}
      </div>
      <div class="title">${g.title}</div>
      <div class="meta">${g.date?`📅 ${fmtDate(g.date)} · `:''}${dlStr?`<span style="color:${dlColor};font-weight:700">${dlStr}</span>`:''}</div>
      ${autoP?`<div class="auto-progress">📊 ${autoP.label}</div>`:''}
      ${(autoP||total>0)?`
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
      <div class="pct-label">${autoP?pct+'% of target':done+'/'+total+' milestones · '+pct+'%'}</div>`:''}
      ${!isAuto&&total>0?`<div class="milestones">
        ${g.milestones.map((m,i)=>`
          <label class="milestone${m.done?' done':''}">
            <input type="checkbox" ${m.done?'checked':''} onchange="toggleMilestone(${g.id},${i})">
            <span>${m.text}</span>
          </label>`).join('')}
      </div>`:''}
    </div>`;
  }).join('');
}

renderGoals();
</script>
<script src="/analytics.js"></script>
