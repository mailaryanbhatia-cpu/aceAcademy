Vergil's Aeneid). Six feet per line; each foot is either a dactyl (long-short-short) or spondee (long-long)."},{"type":"mc","q":"The cum clause in Latin with the subjunctive typically indicates:","choices":["Time only (when)","Circumstantial, causal, or concessive meaning ('when/since/although')","Conditions","Result"],"correct":1,"exp":"Cum + subjunctive: circumstantial (when/as), causal (since), concessive (although). Cum + indicative: simple temporal (when). The subjunctive indicates the circumstance is part of the explanation."},{"type":"mc","q":"In the Aeneid, Book 4, Dido's tragedy results primarily from:","choices":["Her political failures","Her passion for Aeneas and his departure on Jupiter's command, leading to her suicide","A military defeat","Divine punishment for impiety"],"correct":1,"exp":"Book 4: Dido falls in love with Aeneas (Juno and Venus's plot). When Aeneas leaves following Jupiter's command, Dido's hope turns to fury and despair, ending in suicide."},{"type":"mc","q":"The passive voice in Latin is formed by:","choices":["Adding 'not' to the active","Changing personal endings (for present system) or using esse + perfect passive participle (for perfect system)","Using a separate auxiliary verb","Changing the word order"],"correct":1,"exp":"Latin passive: personal endings change (-r, -ris, -tur, -mur, -mini, -ntur for present). Perfect passive: perfect passive participle + esse (amatus est = was loved)."},{"type":"mc","q":"'Scansion' in Latin poetry refers to:","choices":["Translation of a text","Marking the long and short syllables to determine the metrical pattern of a verse","Identifying figures of speech","Analysis of word order"],"correct":1,"exp":"Scansion: analyzing Latin poetry by marking syllable quantities (long ¯ or short ˘) to identify the metrical feet (dactyls and spondees in hexameter)."},{"type":"mc","q":"Caesar crossed the Rhine into Germany (55 BCE) primarily to:","choices":["Conquer Germany","Demonstrate Roman power and intimidate Germanic tribes — a political/propaganda gesture","Trade with Germanic peoples","Escape an uprising"],"correct":1,"exp":"Rhine crossing (55 BCE): Caesar built a bridge in 10 days, crossed, stayed 18 days, then withdrew. More a show of Roman power (intimidation) than conquest — well documented in Gallic War."},{"type":"mc","q":"The literary device 'in medias res' (into the middle of things), used in the Aeneid, means:","choices":["The story begins at the end","The story begins in the middle of the action, with backstory revealed later","The story is told in reverse","The story has no beginning"],"correct":1,"exp":"In medias res: narrative technique — story opens in the middle of action (Aeneas's storm; Juno's wrath) and fills in background later. Standard in epic tradition from Homer."},{"type":"mc","q":"Which Latin construction uses an accusative subject with an infinitive?","choices":["Ablative absolute","Indirect statement (indirect discourse)","Purpose clause","Result clause"],"correct":1,"exp":"Indirect statement/discourse: accusative subject + infinitive after verbs of saying, knowing, thinking (dicit, credit, scit). Credo Aeneam esse pium = I believe Aeneas to be pious."},{"type":"mc","q":"The Trojan horse episode (from the perspective of the Trojans) is described by Aeneas in:","choices":["Book 1","Book 2 — Aeneas narrates the fall of Troy to Dido","Book 6","Book 4"],"correct":1,"exp":"Aeneid Book 2: Aeneas's first-person account of Troy's fall — the wooden horse, Sinon's deception, the Greeks' emergence, Priam's death, Aeneas's escape."},{"type":"mc","q":"In Latin, the dative of agent is used with:","choices":["Active voice verbs","The gerundive to indicate who must perform an action (Mihi liber legendus est = The book must be read by me)","Passive verbs in the perfect system","All passive constructions"],"correct":1,"exp":"Dative of agent: used specifically with passive periphrastic (gerundive + esse). Indicates obligation — who MUST perform the action. Mihi = by me / I must."},{"type":"mc","q":"Caesar's Helvetian campaign (Book 1) demonstrates his rhetorical strategy of:","choices":["Admitting Roman aggression openly","Justifying Roman military action as defensive response to barbarian threat and protection of allies","Praising Helvetian culture","Describing failure honestly"],"correct":1,"exp":"Caesar consistently frames Roman military action as defensive: the Helvetii threatened Roman allies/territory; Caesar was protecting the province. Rhetorical justification runs throughout."},{"type":"mc","q":"The AP Latin exam's essay section tests:","choices":["Only translation","Translation, analysis of literary devices, interpretation, and comparison of Vergil and Caesar passages in English","Grammar only","Latin composition (writing in Latin)"],"correct":1,"exp":"AP Latin exam: translation passages + essays analyzing literary style, themes, rhetoric. Compares Vergil and Caesar — both translation accuracy and literary interpretation matter."}]},{"title":"AP Spanish Language and Culture","questions":[{"type":"mc","q":"The AP Spanish Language and Culture exam is organized around which AP themes?","choices":["Grammar topics only","Global Challenges, Science and Technology, Contemporary Life, Personal and Public Identities, Families in Different Societies, Beauty and Aesthetics","Historical periods only","Literature and art only"],"correct":1,"exp":"AP Spanish: 6 themes — Global Challenges, Science and Technology, Contemporary Life, Personal and Public Identities, Families in Different Societies, Beauty and Aesthetics."},{"type":"mc","q":"The subjunctive in Spanish is required after which type of expression?","choices":["Statements of fact","Expressions of will, emotion, doubt, denial, impersonal expressions, and certain conjunctions (que, aunque, para que, a menos que)","All verbs","Future tense verbs"],"correct":1,"exp":"Spanish subjunctive (WEIRDO): Wishes, Emotion, Impersonal expressions, Requests/Recommendations, Doubt/Denial, Ojalá. Required in dependent clauses after these triggers."},{"type":"mc","q":"The difference between ser and estar in Spanish is:","choices":["Ser is singular, estar is plural","Ser expresses identity/permanent characteristics; estar expresses states/conditions/location","Ser is formal, estar is informal","They are interchangeable"],"correct":1,"exp":"Ser: origin, identity, characteristics (Es médico, Es de México). Estar: state, location, progressive (Está cansado, Está en casa). Same adjective with different verb changes meaning."},{"type":"mc","q":"The preterite (pretérito) tense in Spanish is used for:","choices":["Ongoing past states","Completed past actions with a clear beginning and end point","Habitual past actions","Future speculation"],"correct":1,"exp":"Preterite: completed actions (Fui ayer = I went yesterday). Imperfect: ongoing/habitual past (Iba todos los días = I used to go every day). Key contrast tested on AP exam."},{"type":"mc","q":"The AP Spanish Interpersonal Writing task (Email Reply) requires:","choices":["Translating an email into English","Writing a formal email in Spanish responding to a message, asking questions, and providing requested information","Writing a persuasive essay","Describing a cultural practice"],"correct":1,"exp":"Email Reply: read a Spanish email, respond formally — greet, answer questions, ask for more information. Demonstrate interpersonal writing in formal register."},{"type":"mc","q":"Por and para are both prepositions meaning 'for,' but they differ in that:","choices":["They are interchangeable","Por: cause/reason/exchange/duration/agent; Para: purpose/recipient/deadline/destination/opinion","Por is formal, para informal","Para is always about time"],"correct":1,"exp":"Por: motion through, cause, exchange, duration, means. Para: purpose, recipient, destination, deadline, contrast (para ser niño, habla bien). Crucial distinction in AP Spanish."},{"type":"mc","q":"Which country has the largest Spanish-speaking population?","choices":["Spain","Argentina","Mexico","Colombia"],"correct":2,"exp":"Mexico has the world's largest Spanish-speaking population (~130 million). Spanish is the language of 20+ countries; Mexico is the most populous."},{"type":"mc","q":"The AP Spanish Argumentative Essay requires:","choices":["Writing only personal opinion","A formal essay in Spanish arguing a position, using evidence from at least two of three provided sources (one audio)","Translating a Spanish article","Describing cultural differences"],"correct":1,"exp":"AP Spanish Argumentative Essay: take a position, cite at least 2 of 3 sources (2 written, 1 audio), acknowledge counterarguments, conclude. All in formal Spanish."},{"type":"mc","q":"The Spanish conditional tense (yo hablaría) is used to express:","choices":["Completed past action","What would happen — hypothetical situations and polite requests","Definite future","Commands"],"correct":1,"exp":"Conditional: 'would' — hypothetical (Si tuviera dinero, viajaría = If I had money, I would travel) and polite requests (¿Podría ayudarme? = Could you help me?)."},{"type":"mc","q":"In the AP Spanish Simulated Conversation, students are expected to:","choices":["Read from a prepared script","Respond spontaneously in Spanish to conversation prompts within the allotted time, using appropriate register","Write their responses first","Use English for difficult parts"],"correct":1,"exp":"Simulated Conversation: prompts play; students respond in real time in Spanish. Tests spontaneous interpersonal speaking — fluency, vocabulary range, and appropriate register."},{"type":"mc","q":"The Latin American 'Boom' literary movement (1960s-70s) features authors such as:","choices":["Cervantes and Lope de Vega","García Márquez, Vargas Llosa, Cortázar, and Fuentes — known for magical realism","Neruda and Paz only","Borges only"],"correct":1,"exp":"Latin American Boom: García Márquez (100 Years of Solitude), Vargas Llosa, Cortázar, Fuentes — experimental, magical realism, international acclaim. Transformed world literature."},{"type":"mc","q":"The imperfect subjunctive in Spanish follows the third person plural preterite. For hablar:","choices":["hablaría","hablara/hablase (from hablaron → hablaron → habl- + -ara)","hablaba","hablé"],"correct":1,"exp":"Imperfect subjunctive: take 3rd plural preterite, remove -ron, add -ra endings (or -se). Hablaron → habl- → hablara. Dudar → dudaron → dudara. Ser/ir: fueran → fuera."},{"type":"mc","q":"Which Spanish-speaking country had the 'Dirty War' (1976-1983) during which thousands were 'disappeared' by the military dictatorship?","choices":["Chile","Mexico","Argentina","Colombia"],"correct":2,"exp":"Argentina's Dirty War (Guerra Sucia): military junta (1976-1983) kidnapped, tortured, and killed 10,000-30,000 perceived opponents. Las Madres de Plaza de Mayo still seek justice."},{"type":"mc","q":"Code-switching in Spanish-English bilingual communities refers to:","choices":["Speaking only English","Alternating between Spanish and English within a conversation or even a sentence (common in US Latinx communities)","Incorrect Spanish","A type of translation"],"correct":1,"exp":"Code-switching: natural bilingual practice of moving between languages. Common in US Latinx communities (Spanglish). Linguistically sophisticated — not 'broken' language."},{"type":"mc","q":"The AP Spanish Cultural Comparison task requires:","choices":["A written report in English","A 4-minute oral presentation in Spanish comparing a cultural practice in a Spanish-speaking community to a similar practice in your own culture","A translation of a Spanish poem","A grammar recitation"],"correct":1,"exp":"Cultural Comparison (presentational speaking): 4-minute prepared speech in Spanish comparing a cultural product, practice, or perspective from a Spanish-speaking community to your own."},{"type":"mc","q":"'Magical realism' in Latin American literature is defined as:","choices":["Pure fantasy with no realistic elements","A narrative style that presents magical elements as a normal part of everyday realistic settings","Science fiction","A type of historical fiction"],"correct":1,"exp":"Magical realism (García Márquez, Isabel Allende): magical/supernatural elements presented matter-of-factly within an otherwise realistic setting. Reflects Latin American cultural worldview."},{"type":"mc","q":"In Spanish, the personal 'a' is used:","choices":["Before all direct objects","Before direct object nouns that are specific people or personified animals","Before all indirect objects","Before prepositions"],"correct":1,"exp":"Personal a: required before specific human/personified direct objects. Veo a María (I see María). Busco un médico (I'm looking for a doctor — non-specific, no personal a)."},{"type":"mc","q":"The Spanish Royal Academy (Real Academia Española) is responsible for:","choices":["Governing Spain","Setting standards for the Spanish language — maintaining the dictionary and grammar norms for Spanish worldwide","Publishing Spanish literature","Teaching Spanish abroad"],"correct":1,"exp":"Real Academia Española (RAE, 1713): the official institution regulating Spanish. Publishes the Diccionario de la lengua española and Gramática. Coordinates with academies from 22 Spanish-speaking countries."},{"type":"mc","q":"Which tense/mood combination is used in Spanish 'si' (if) clauses for unlikely/hypothetical situations?","choices":["Si + present indicative, present indicative","Si + imperfect subjunctive, conditional","Si + present subjunctive, future","Si + preterite, conditional"],"correct":1,"exp":"Contrary-to-fact conditionals: Si + imperfect subjunctive (si tuviera), conditional (viajaría). Si tuviera dinero, viajaría por el mundo (If I had money, I would travel the world)."},{"type":"mc","q":"The Day of the Dead (Día de los Muertos) is a Mexican cultural tradition that:","choices":["Is the same as Halloween","Celebrates the lives of deceased ancestors with altars (ofrendas), marigolds, and visits to cemeteries — a blend of indigenous and Catholic traditions","Is a period of mourning and silence","Is a government-created holiday"],"correct":1,"exp":"Día de los Muertos (Nov 1-2): pre-Columbian Aztec tradition merged with Catholic All Saints' Day. Families build ofrendas with photos, food, marigolds (cempasúchil) to welcome returning spirits."}]},{"title":"AP Spanish Literature and Culture","questions":[{"type":"mc","q":"The AP Spanish Literature and Culture exam covers literature from:","choices":["Spain only","Spain and Latin America — a wide range of periods, genres, and authors from both traditions","Latin America only","The 20th century only"],"correct":1,"exp":"AP Spanish Literature: canonical texts from Spain and Latin America spanning medieval to contemporary. Students read, analyze, and discuss literature in Spanish."},{"type":"mc","q":"'El Lazarillo de Tormes' (1554) is considered the first example of which genre?","choices":["Chivalric romance","The picaresque novel (novela picaresca) — a first-person account of a poor boy's service to various masters","Epic poetry","Baroque lyric poetry"],"correct":1,"exp":"Lazarillo de Tormes: anonymous picaresque novel — first-person narrator (pícaro = rogue) recounts survival serving corrupt masters. Critical of Spanish social hypocrisy and the Church."},{"type":"mc","q":"Don Quixote (Cervantes, 1605/1615) is often called the first modern novel because:","choices":["It is the longest Spanish novel","It features self-awareness about its own fictional nature (metafiction), complex characters, and undermines the chivalric romance tradition","It was the first novel printed in Spanish","It introduced realism to Spanish literature"],"correct":1,"exp":"Don Quixote: Cervantes creates the first metafictional novel — characters know they're in a book (part 2), multiple narrators, complex unreliable perspective. Also first psychological novel."},{"type":"mc","q":"The Generation of '98 in Spanish literature responded to:","choices":["The French Revolution","Spain's loss of its last colonies (Cuba, Philippines, Puerto Rico) in 1898 — a crisis of Spanish national identity","The Industrial Revolution","World War I"],"correct":1,"exp":"Generation of '98: writers like Unamuno, Machado, Valle-Inclán, Azorín — reflected on Spain's decline after 1898 colonial defeat. Questions of national identity, tradition vs. modernity."},{"type":"mc","q":"The literary movement 'Modernismo' in Latin America was led by:","choices":["José Martí","Rubén Darío — a renovation of Spanish-language poetry emphasizing beauty, exoticism, and musicality","García Márquez","Pablo Neruda"],"correct":1,"exp":"Modernismo (1880s-1910s): Rubén Darío (Nicaragua) — renovated Spanish poetry with French Symbolist influence, musicality, exotic imagery. Influenced all subsequent Latin American poetry."},{"type":"mc","q":"Pablo Neruda's early 'Veinte poemas de amor y una canción desesperada' (1924) exemplifies:","choices":["Avant-garde abstract poetry","Romantic love poetry with nature imagery and modernista influence","Epic historical poetry","Political revolutionary poetry"],"correct":1,"exp":"Twenty Love Poems: sensual, romantic poetry combining modernista elegance with heartfelt emotion. Made Neruda famous at 20. Later he moved to surrealism (Residencia) and political poetry."},{"type":"mc","q":"The concept of 'lo real maravilloso' (the marvelous real) by Alejo Carpentier differs from European surrealism because:","choices":["It is purely fantastic","The marvelous emerges naturally from Latin American reality and culture itself — not imposed by artistic will but inherent in the continent's history and landscape","It only applies to Caribbean literature","It rejects indigenous influences"],"correct":1,"exp":"Lo real maravilloso: Carpentier's concept — Latin America's history, indigenous/African/European mix IS inherently marvelous. The magical grows from real cultural soil, not artistic artifice."},{"type":"mc","q":"Federico García Lorca's 'La casa de Bernarda Alba' (1936) explores themes of:","choices":["Male honor and war","Repression, female sexuality, social conformity, and the conflict between freedom and social/familial oppression in rural Spain","Urban modernity","Political revolution"],"correct":1,"exp":"La casa de Bernarda Alba: Bernarda's tyrannical control of her daughters after her husband's death. Themes: oppression, desire, honor, social conformity. Written just before Lorca's assassination."},{"type":"mc","q":"Which poetic form, originating in medieval Spain, consists of 8-syllable lines with a specific rhyme scheme?","choices":["Sonnet","El romance (ballad) — an octosyllabic narrative poem with assonant rhyme in even lines","Free verse","The lira"],"correct":1,"exp":"Romance: the traditional Spanish ballad form — octosyllables (8 syllables), assonant rhyme in even lines. Medieval and Golden Age tradition. García Lorca revived it in Romancero gitano."},{"type":"mc","q":"Jorge Luis Borges is most associated with which literary style?","choices":["Realism","Magical realism and metafiction — labyrinths, mirrors, infinity, and philosophical puzzles","Naturalism","Political realism"],"correct":1,"exp":"Borges (Argentina): master of postmodern short fiction — 'The Garden of Forking Paths,' 'The Aleph.' Themes: time, identity, labyrinths, infinity. Foundational to postmodern literature worldwide."},{"type":"mc","q":"The AP Spanish Literature exam requires students to:","choices":["Only identify literary devices","Read and analyze literature in Spanish, write literary essays in Spanish, and make connections between texts and cultural contexts","Summarize plot only","Read in English and write in English"],"correct":1,"exp":"AP Spanish Literature: read canonical texts, write analytical essays in Spanish about themes, literary devices, historical context, and connections between works."},{"type":"mc","q":"The Baroque literary style in Golden Age Spain (Siglo de Oro) is characterized by:","choices":["Simple, direct language","Conceptismo (complex ideas, wordplay) and culteranismo (complex language/metaphor) — Góngora and Quevedo exemplify opposite poles","Romantic sentimentality","Realistic description of daily life"],"correct":1,"exp":"Spanish Baroque: Góngora (culteranismo — elaborate metaphor, Latin syntax), Quevedo (conceptismo — dense ideas, wordplay, satire). Both within the Siglo de Oro (16th-17th c.)."},{"type":"mc","q":"Isabel Allende's 'La casa de los espíritus' (The House of the Spirits, 1982) uses magical realism to:","choices":["Describe scientific phenomena","Chronicle four generations of a Chilean family against the backdrop of political upheaval, mixing the magical with political history","Write an autobiography","Critique indigenous culture"],"correct":1,"exp":"La casa de los espíritus: magical realist chronicle of the del Valle/Trueba family through Chile's political history (allusions to Pinochet's coup). Women's perspectives central to the narrative."},{"type":"mc","q":"'Bildungsroman' refers to a novel focused on:","choices":["War and conflict","The moral, psychological, and social development of the protagonist from youth to adulthood","Political revolution","Mystery and crime"],"correct":1,"exp":"Bildungsroman (German: 'novel of education/formation'): traces protagonist's development and coming-of-age. Applied to Spanish/Latin American novels like Lazarillo (picaresque as proto-Bildungsroman)."},{"type":"mc","q":"The literary term 'intertextuality' refers to:","choices":["Plagiarism","The relationship between texts — how one text references, responds to, or is shaped by other texts","Internal character development","A type of narrative frame"],"correct":1,"exp":"Intertextuality: how texts reference, echo, parody, or respond to other texts. Don Quixote's intertextuality with chivalric romances is a defining feature."},{"type":"mc","q":"Juan Rulfo's 'Pedro Páramo' (1955) is significant because:","choices":["It is a simple realist novel","It pioneered innovative narrative techniques (fragmented timeline, dead narrators, multiple voices) that influenced García Márquez and the Boom","It is the first Latin American novel","It focuses on political propaganda"],"correct":1,"exp":"Pedro Páramo: Rulfo's masterpiece — fragmented, poetic, with dead characters narrating. García Márquez said he could recite it from memory; it directly inspired 100 Years of Solitude."},{"type":"mc","q":"The AP Spanish Literature Literary Analysis essay asks students to:","choices":["Summarize the plot","Write in Spanish, developing an original argument about a text's literary devices, themes, and meaning — supported by textual evidence","Translate passages into English","Compare the text to an English work"],"correct":1,"exp":"AP Spanish Lit Literary Analysis: develop an original interpretive argument about a text, support it with specific textual evidence, analyze literary techniques. Written in Spanish."},{"type":"mc","q":"The Spanish Civil War (1936-1939) is thematically central to which author's work?","choices":["Neruda alone","García Lorca (killed 1936), Antonio Machado (died 1939, exile), and many writers of the Generation of '27 and '98","Cervantes","Borges"],"correct":1,"exp":"Spanish Civil War deeply affected Spanish literature: Lorca murdered by Nationalists, Machado died in exile, many writers chose sides. The war's trauma pervades 20th-century Spanish literature."},{"type":"mc","q":"'Costumbrismo' in Spanish and Latin American literature refers to:","choices":["Romantic poetry","Literary or artistic depiction of local customs, manners, and daily life of a particular region or social group","Epic historical narrative","Avant-garde experimentation"],"correct":1,"exp":"Costumbrismo: depicting local customs, folklore, and social manners — a literary and visual art movement. Common in 19th-century Spain and Latin America as regional identity was celebrated."},{"type":"mc","q":"The figure of 'la Malinche' in Mexican culture and literature is complex because:","choices":["She is universally celebrated as a hero","She represents both indigenous collaboration with the Spanish conquest and the violated indigenous woman — a contested symbol of cultural origins","She is an entirely fictional character","She is associated with the Aztec military"],"correct":1,"exp":"La Malinche (Malintzin/Doña Marina): Nahua woman who served as Cortés's interpreter/ally. Controversial — both traitor (malinchismo) and founding mother of mestizo Mexico. Complex cultural symbol."}]}],"capstone":[{"title":"AP Seminar","questions":[{"type":"mc","q":"The AP Seminar course is centered on developing which core skill?","choices":["Memorizing facts across disciplines","Research, analysis, evidence evaluation, and argument construction from multiple perspectives","Laboratory skills","Creative writing"],"correct":1,"exp":"AP Seminar: students learn to read across disciplines, analyze multiple perspectives, and construct evidence-based arguments on complex topics."},{"type":"mc","q":"The AP Seminar Individual Research Report (IRR) requires students to:","choices":["Write a five-paragraph essay","Conduct independent research on a topic of their choice and produce a 1,200-2,000 word paper arguing a well-supported position","Summarize a teacher-provided article","Work only in groups"],"correct":1,"exp":"IRR: 1,200-2,000 word research paper on a topic students choose. Must identify a research question, synthesize sources, and argue a position with evidence."},{"type":"mc","q":"In AP Seminar, what are the four types of claims students use?","choices":["Opinion, fact, inference, prediction","Claims of fact, value, policy, and consequence","Thesis, antithesis, synthesis, conclusion","Evidence, reasoning, counterargument, conclusion"],"correct":1,"exp":"AP Seminar claim types: Fact (Is it true?), Value (Is it good/significant?), Policy (What should be done?), Consequence (What will/did result?). Students identify and construct each type."},{"type":"mc","q":"The Team Multimedia Presentation (TMP) in AP Seminar requires:","choices":["Each student to present individually","A group presentation addressing a common topic from multiple disciplinary perspectives","A written report only","An art project"],"correct":1,"exp":"TMP: teams of 3-5 present on a shared topic from multiple perspectives. Each member defends their individual perspective while connecting to teammates' arguments."},{"type":"mc","q":"Which best describes the SIFT method for evaluating sources?","choices":["Scientific, Informative, Fair, Transparent","Stop, Investigate the source, Find better coverage, Trace claims to the original source","Summarize, Interpret, Find evidence, Test conclusions","Source, Information, Fact-check, Trust"],"correct":1,"exp":"SIFT: Stop (don't share before checking) → Investigate the source → Find better coverage → Trace claims upstream. A practical lateral reading strategy for source evaluation."},{"type":"mc","q":"In AP Seminar, 'synthesis' means:","choices":["Summarizing what each source says individually","Combining insights from multiple sources to construct an original argument or perspective","Paraphrasing the most important source","Quoting multiple sources"],"correct":1,"exp":"Synthesis: weaving evidence from multiple sources to develop an original argument. Sources serve your argument — not the other way around. You create something new from the combination."},{"type":"mc","q":"Which type of source is considered most credible in AP Seminar research?","choices":["Social media posts","Anonymous websites","Peer-reviewed academic articles and primary sources","News articles alone"],"correct":2,"exp":"Most credible: peer-reviewed scholarly sources (expert review, methods disclosed), primary sources (original data/documents). Secondary sources (journalism, textbooks) are useful but less authoritative."},{"type":"mc","q":"The Individual Written Argument (IWA) in AP Seminar (the AP Exam) requires:","choices":["Writing in 30 minutes with no sources","A timed argument essay written during the AP Exam using provided sources","Presenting orally","A group project"],"correct":1,"exp":"AP Seminar Exam (IWA): 2-hour timed argument essay. Students read provided sources and construct a written argument in response to a prompt, citing sources appropriately."},{"type":"mc","q":"A research question in AP Seminar should be:","choices":["Easily answered by a Google search","Specific, complex, arguable, and requiring evidence to address — not a yes/no question","Assigned by the teacher","Identical to the thesis"],"correct":1,"exp":"Good research question: complex, arguable, researchable with evidence, not factual/yes-no. 'How should schools address childhood obesity?' vs. 'Is obesity bad?' (too simple)."},{"type":"mc","q":"Acknowledging counterarguments in an essay:","choices":["Weakens the essay by introducing doubt","Strengthens the argument by demonstrating awareness of complexity and addressing potential objections","Is only required in debate, not writing","Should be placed only in footnotes"],"correct":1,"exp":"Counterargument acknowledgment shows intellectual honesty and strengthens credibility (ethos). Responding to the strongest objection makes your argument more persuasive."},{"type":"mc","q":"AP Seminar's 'multiple perspectives' approach requires:","choices":["Arguing only one side of an issue","Examining a topic through multiple disciplinary lenses (scientific, historical, ethical, economic, cultural)","Using only primary sources","Avoiding controversial topics"],"correct":1,"exp":"Multiple perspectives: AP Seminar texts are read through various disciplinary frames. A public health issue might be examined through economic, ethical, political, and scientific perspectives simultaneously."},{"type":"mc","q":"Proper citation in AP Seminar research papers is important because:","choices":["It is only a formality","It credits sources, enables verification, avoids plagiarism, and demonstrates engagement with the scholarly conversation","Citations are not graded","Only direct quotes need citation"],"correct":1,"exp":"Citation: gives credit, shows you've engaged with scholarship, allows readers to verify claims, and is an ethical obligation. Paraphrases, summaries, and ideas also need citation, not just quotes."},{"type":"mc","q":"The 'straw man' fallacy occurs when:","choices":["An argument is too strong to refute","A person misrepresents an opponent's argument in a weaker form to more easily attack it","Statistics are misused","Personal attacks replace logic"],"correct":1,"exp":"Straw man: distort opponent's position to something weaker/more extreme, then attack that distorted version. Unfair and logically invalid — you're not addressing the real argument."},{"type":"mc","q":"Which of the following is an example of a strong AP Seminar thesis?","choices":["This paper will discuss social media's effects.","Social media platforms' algorithmic design prioritizes engagement over user well-being, contributing to increased anxiety among teenagers by exposing them to social comparison content.","Social media is bad.","Many people use social media every day."],"correct":1,"exp":"Strong thesis: specific, arguable, complex, shows the 'so what.' Identifies the mechanism (algorithmic design), the effect (anxiety), and the cause-effect relationship. Not a fact or vague claim."},{"type":"mc","q":"'Ethos' in argumentation refers to appeals to:","choices":["Logic and evidence","The writer's credibility and trustworthiness","Emotion","Self-interest"],"correct":1,"exp":"Ethos: appeal to credibility/authority — expert credentials, unbiased analysis, fair representation of opposing views, appropriate citation. Builds the reader's trust in the author."},{"type":"mc","q":"In AP Seminar, the Team Written Argument (TWA) differs from the IRR because:","choices":["The TWA is shorter","The TWA addresses a shared team topic collaboratively, while the IRR is an individual in-depth investigation on a student's own chosen angle","TWA is graded by peers","TWA does not require sources"],"correct":1,"exp":"TWA: collaborative paper where the team argues together on a shared question. IRR: each student's independent investigation of their own angle on the team topic. Both are required."},{"type":"mc","q":"Which of the following best demonstrates 'depth' rather than 'breadth' in research?","choices":["Listing 20 different sources on different aspects","Thoroughly investigating one specific research question using varied, credible sources and analyzing them in depth","Covering a topic from A to Z","Using only one source"],"correct":1,"exp":"Depth vs. breadth: AP values deep investigation — thorough engagement with a specific question — over superficial coverage of many aspects. Quality of analysis over quantity of sources."},{"type":"mc","q":"An ad hominem fallacy in argumentation involves:","choices":["Providing strong evidence","Attacking the person making the argument rather than the argument itself","Using emotional appeals appropriately","Appealing to authority"],"correct":1,"exp":"Ad hominem: attacking the person (their character, background) instead of their argument. Invalid — even a flawed person can make a valid argument. Shifts focus away from evidence."},{"type":"mc","q":"The purpose of the 'oral defense' component in AP Seminar's TMP is to:","choices":["Allow students to memorize and recite their paper","Demonstrate understanding through Q&A — respond to questions from the teacher/evaluator about the research and argument","Re-read the written paper","Compare grades with classmates"],"correct":1,"exp":"Oral defense: after TMP presentation, team members respond to teacher questions. Tests depth of understanding — can students explain methodology, sources, reasoning, and defend their position?"},{"type":"mc","q":"Which approach to evidence is most valued in AP Seminar?","choices":["Using only emotional anecdotes","Triangulating across quantitative data, qualitative sources, and primary sources to build a comprehensive evidence base","Using only statistics","Relying on a single authoritative source"],"correct":1,"exp":"AP Seminar values diverse, credible evidence: statistics + qualitative analysis + primary sources. Multiple evidence types strengthen arguments and demonstrate thorough research."}]},{"title":"AP Research","questions":[{"type":"mc","q":"AP Research differs from AP Seminar primarily in that:","choices":["AP Research is shorter","AP Research requires a 4,000-5,000 word academic paper and oral defense based on original student research","AP Research has no written component","AP Research does not require sources"],"correct":1,"exp":"AP Research: year-long independent research project culminating in a 4,000-5,000 word academic paper + 15-20 minute oral defense. The most advanced AP Capstone experience."},{"type":"mc","q":"A strong AP Research question should be:","choices":["Answerable with a yes/no","Specific, researchable, original (filling a gap in existing scholarship), and significant","Identical to the teacher's question","Broad enough to cover an entire field"],"correct":1,"exp":"AP Research question criteria: specific, researchable with available methods, novel (addresses a genuine gap), and significant (matters beyond the student's classroom)."},{"type":"mc","q":"A literature review in AP Research serves to:","choices":["Summarize all books ever written on a topic","Map existing scholarship, identify what is known and unknown, justify the need for the study, and position the student's research within the scholarly conversation","List sources alphabetically","Prove the topic is important"],"correct":1,"exp":"Literature review: systematic review of existing scholarship — shows you know the field, identifies the gap your research fills, and provides theoretical context for your study."},{"type":"mc","q":"Which of the following is a qualitative research method?","choices":["Randomized controlled trial","Statistical regression analysis","In-depth interviews or ethnographic observation","Survey with Likert scale responses only"],"correct":2,"exp":"Qualitative methods: interviews, focus groups, ethnography, content analysis — explore meaning, experience, and context. Quantitative: numerical data, statistics. AP Research may use either or mixed methods."},{"type":"mc","q":"A research hypothesis differs from a research question in that:","choices":["They are identical","A hypothesis makes a specific, testable prediction about the expected relationship between variables","A question is always answered; a hypothesis is never answered","A hypothesis doesn't need evidence"],"correct":1,"exp":"Hypothesis: a specific, testable prediction (If X, then Y, because Z). Appropriate for experimental/quantitative research. Research questions are broader and more open-ended (appropriate for qualitative)."},{"type":"mc","q":"'Validity' in research refers to:","choices":["The consistency of results across repeated trials","Whether the study actually measures what it claims to measure","The size of the sample","The speed of data collection"],"correct":1,"exp":"Validity: does the instrument/study measure what it intends to measure? Internal validity: are the results due to the variable of interest? External validity: can results generalize?"},{"type":"mc","q":"'Reliability' in research refers to:","choices":["The accuracy of the conclusion","The consistency of measurements — the same method applied repeatedly produces similar results","Whether the research question is important","The quality of the sources"],"correct":1,"exp":"Reliability: consistency of measurement. A reliable instrument gives similar results under similar conditions. Can be reliable without being valid (consistent but measuring wrong thing)."},{"type":"mc","q":"IRB (Institutional Review Board) review is required when:","choices":["Conducting library research only","Research involves human participants — to ensure ethical treatment, informed consent, and protection from harm","Analyzing published data only","Doing a literature review"],"correct":1,"exp":"IRB: required for human subjects research. Ensures: informed consent, voluntary participation, confidentiality, minimized harm. Even AP Research projects involving surveys may require school IRB approval."},{"type":"mc","q":"The AP Research academic paper structure includes:","choices":["Introduction, summary, conclusion","Introduction (with research question/gap), Literature Review, Methodology, Findings, Discussion, Conclusion","Abstract, body, references only","Thesis, evidence, counterargument"],"correct":1,"exp":"AP Research paper: Introduction (context, question, gap, significance) → Literature Review → Methodology → Findings/Results → Discussion (interpretation, limitations) → Conclusion."},{"type":"mc","q":"'Triangulation' in research methodology means:","choices":["Drawing a triangle diagram","Using multiple data sources, methods, or researchers to cross-check findings and increase credibility","Interviewing three participants","A statistical technique"],"correct":1,"exp":"Triangulation: using multiple sources of evidence to corroborate findings. Method triangulation (interview + observation + document analysis) strengthens credibility and reduces bias."},{"type":"mc","q":"The discussion section of a research paper should:","choices":["List all sources used","Interpret findings, connect them to the literature review, address limitations, and suggest future research directions","Repeat the findings verbatim","Introduce new research questions not addressed in the study"],"correct":1,"exp":"Discussion: interpret what the findings mean (not just what they are), explain how they relate to prior scholarship, honestly address limitations, and suggest what research should come next."},{"type":"mc","q":"In quantitative research, a larger sample size generally:","choices":["Makes research harder","Increases statistical power and reduces margin of error, making results more reliable and generalizable","Has no effect on results","Reduces validity"],"correct":1,"exp":"Larger sample: more statistical power (ability to detect true effects), smaller confidence intervals, more representative of population. Key consideration in quantitative research design."},{"type":"mc","q":"The AP Research oral defense requires students to:","choices":["Recite the paper from memory","Present research and defend the methodology, findings, and conclusions in a Q&A with evaluators","Write an additional essay","Present to other students only"],"correct":1,"exp":"Oral defense: 15-20 minute presentation + Q&A with teacher-evaluator. Students must explain their choices, defend their methodology, respond to challenges, and demonstrate deep ownership of their research."},{"type":"mc","q":"A 'case study' research design is most appropriate when:","choices":["You need to generalize to a large population","You want to examine a specific phenomenon in depth within its real-world context","You need a control group","You want to establish causation"],"correct":1,"exp":"Case study: in-depth investigation of a specific case (person, organization, event, program) in its context. Best for 'how' and 'why' questions. Limited generalizability but rich in detail."},{"type":"mc","q":"Which section of an AP Research paper states explicitly why the study matters?","choices":["Methodology","Literature review","Significance statement (usually in the Introduction)","Findings"],"correct":2,"exp":"Significance: in the Introduction, you explain why this gap matters — what will be gained by answering this question? What contribution does it make to the field?"},{"type":"mc","q":"A primary source in research is:","choices":["A textbook summarizing research","Original, firsthand data or accounts (raw data, interviews, diaries, original experiments, artifacts)","A peer-reviewed review article","A news report about a study"],"correct":1,"exp":"Primary sources: original data, first-hand accounts. Secondary: analyze/interpret primary sources. Tertiary: compile secondary sources. AP Research values primary data when possible."},{"type":"mc","q":"When writing about research limitations, a student should:","choices":["Omit them to appear more credible","Honestly identify methodological weaknesses and explain how they might affect the conclusions","Blame outside factors only","List limitations in a footnote"],"correct":1,"exp":"Limitations: honest acknowledgment of methodological constraints (sample size, access, researcher bias, time). Shows intellectual integrity. Strong researchers identify limitations AND explain their implications."},{"type":"mc","q":"The conclusion of an AP Research paper should:","choices":["Introduce new evidence","Synthesize findings, restate significance, acknowledge limitations, and suggest specific directions for future research","Repeat the introduction verbatim","List unanswered questions with no synthesis"],"correct":1,"exp":"Conclusion: synthesize (don't just summarize) findings; reiterate significance; acknowledge limitations; point toward future research. 'So what?' and 'What's next?' are the key questions."},{"type":"mc","q":"Which research approach is most appropriate for understanding how students experience academic pressure?","choices":["Randomized experiment","Large-scale survey with Likert scales","Phenomenological qualitative study using in-depth interviews","Observation of test scores"],"correct":2,"exp":"Phenomenological study: explores lived experience and meaning. In-depth interviews reveal how students understand and make sense of academic pressure — a qualitative, interpretive approach."},{"type":"mc","q":"AP Research students demonstrate ownership of their research when they:","choices":["Follow the teacher's research plan exactly","Can explain every methodological choice, defend findings under questioning, and acknowledge the limits of their own conclusions","Cite the most sources","Complete the paper before the deadline"],"correct":1,"exp":"Ownership: deep understanding of every aspect of the research — why this question, why these methods, what the data shows, what it doesn't show. The oral defense tests this ownership directly."}]}]}};

  history: {label:"History",      icon:"🌍"},

  health:  {label:"Health & PE",  icon:"🏃"},
};


const AP_SUBJECTS = {
  math:      {label:"Mathematics (AP)",          icon:"📐"},
  science:   {label:"Science (AP)",              icon:"🔬"},
  ela:       {label:"English (AP)",              icon:"📚"},
  history:   {label:"History & Social Sci (AP)", icon:"🌍"},
  cs:        {label:"Computer Science (AP)",     icon:"💻"},
  arts:      {label:"Arts (AP)",                 icon:"🎨"},
  languages: {label:"World Languages (AP)",      icon:"🌐"},

};
let currentGrade = 6;
let currentTest = null; // {grade,subj,unitIdx}
let currentQuestions = []; // shuffled copy used for render + grading
const scores = {}; // key → score

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function scoreKey(g,s,u,part){ return part!=null ? `${g}-${s}-${u}-${part}` : `${g}-${s}-${u}`; }

function selectGrade(grade,btn){
  currentGrade = grade;
  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  clearTest();
  buildSidebar(grade);
}

function buildSidebar(grade){
  const activeSubjects = (grade === 'ap') ? AP_SUBJECTS : SUBJECTS;
  const sidebar = document.getElementById('sidebar');
  const gradeData = TESTS[grade];
  if(!gradeData){ sidebar.innerHTML='<p style="padding:20px;color:var(--muted);font-size:.85rem">No tests for this grade yet.</p>'; return; }
  let html = '';
  for(const [subj, meta] of Object.entries(activeSubjects)){
    const units = gradeData[subj];
    if(!units||!units.length) continue;
    const sId = `s-${grade}-${subj}`;
    html += `<div>
      <div class="subj-header" id="${sId}-h" onclick="toggleSubj('${sId}')">
        <span class="subj-icon">${meta.icon}</span>
        <span>${meta.label}</span>
        <span class="subj-arrow">▶</span>
      </div>
      <div class="subj-body" id="${sId}-b">`;
    units.forEach((unit,ui)=>{
      if(grade === 'ap'){
        // AP: clicking unit shows options panel (Part 1, Part 2, Full Test)
        const k0=scoreKey(grade,subj,ui,0), k1=scoreKey(grade,subj,ui,1), k2=scoreKey(grade,subj,ui,2);
        const anyDone = scores[k0]||scores[k1]||scores[k2];
        const allDone = scores[k0]&&scores[k1]&&scores[k2];
        html += `<div class="unit-item${allDone?' done':''}" id="ui-${grade}-${subj}-${ui}" onclick="showUnitOptions('${grade}','${subj}',${ui})">
          <span>${unit.title}</span>
          <span class="unit-badge">${allDone?'✓':anyDone?'⋯':'3 tests'}</span>
        </div>`;
      } else {
        const key = scoreKey(grade,subj,ui);
        const sc = scores[key];
        const done = sc !== undefined;
        const pct = done ? Math.round(sc.correct/sc.total*100) : null;
        const badge = done ? `${pct}%` : '20q';
        html += `<div class="unit-item${done?' done':''}" id="ui-${grade}-${subj}-${ui}" onclick="openTest('${grade}','${subj}',${ui})">
          <span>${unit.title}</span>
          <span class="unit-badge">${badge}</span>
        </div>`;
      }
    });
    html += `</div></div>`;
  }
  sidebar.innerHTML = html;
}

function toggleSubj(id){
  document.getElementById(id+'-h').classList.toggle('open');
  document.getElementById(id+'-b').classList.toggle('open');
}

function showUnitOptions(grade,subj,unitIdx){

      <h2 style="font-size:1.4rem;font-weight:800;color:var(--text);margin:0 0 4px">${unit.title}</h2>
      <div style="font-size:.82rem;color:var(--muted)">${unit.questions.length} questions total</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px">
      <div class="unit-option-card" onclick="openTest('${grade}','${subj}',${unitIdx},0)">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:44px;height:44px;border-radius:12px;background:rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">1️⃣</div>
          <div style="flex:1">
            <div style="font-size:1rem;font-weight:700;color:var(--text)">First Half</div>
            <div style="font-size:.8rem;color:var(--muted);margin-top:2px">${half} questions · Topics 1–${half}</div>
          </div>
          ${badgeFor(0)}
          <span style="color:var(--muted);font-size:1rem">›</span>
        </div>
      </div>
      <div class="unit-option-card" onclick="openTest('${grade}','${subj}',${unitIdx},1)">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:44px;height:44px;border-radius:12px;background:rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">2️⃣</div>
          <div style="flex:1">
            <div style="font-size:1rem;font-weight:700;color:var(--text)">Second Half</div>
            <div style="font-size:.8rem;color:var(--muted);margin-top:2px">${secondHalf} questions · Topics ${half+1}–${unit.questions.length}</div>
          </div>
          ${badgeFor(1)}
          <span style="color:var(--muted);font-size:1rem">›</span>
        </div>
      </div>

        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:44px;height:44px;border-radius:12px;background:rgba(99,102,241,.2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">📋</div>
          <div style="flex:1">
            <div style="font-size:1rem;font-weight:700;color:var(--text)">Full Unit Test</div>
            <div style="font-size:.8rem;color:var(--muted);margin-top:2px">All ${unit.questions.length} questions</div>
          </div>
          ${badgeFor(2)}
          <span style="color:var(--muted);font-size:1rem">›</span>
        </div>
      </div>
    </div>`;
}

// ── TEST TIMER ──────────────────────────────────────────────
let testStartTime = null, testTimerInterval = null;
function startTestTimer(){
  testStartTime = Date.now();
  if(testTimerInterval) clearInterval(testTimerInterval);
  testTimerInterval = setInterval(()=>{
    const el = document.getElementById('testTimerDisplay');
    if(!el){ clearInterval(testTimerInterval); return; }
    const s = Math.floor((Date.now()-testStartTime)/1000);
    const m = Math.floor(s/60), sec = s%60;
    el.textContent = `⏱ ${m}:${sec<10?'0':''}${sec}`;
    el.className = 'test-timer' + (s > 1800 ? ' warning' : '');
  }, 1000);
}
function stopTestTimer(){ clearInterval(testTimerInterval); return testStartTime ? Math.floor((Date.now()-testStartTime)/1000) : 0; }

function openTest(grade,subj,unitIdx,part){
  document.querySelectorAll('.unit-item').forEach(e=>e.classList.remove('active'));
  const el = document.getElementById(`ui-${grade}-${subj}-${unitIdx}`);
  if(el) el.classList.add('active');

  // Hide options panel
  document.getElementById('unitOptions').style.display='none';

  currentTest = {grade,subj,unitIdx,part};
  const unit = TESTS[grade][subj][unitIdx];
  // Slice questions based on part (for AP half-unit tests)
  let unitView = unit;
  if(part != null){
    const qs = unit.questions;
    const half = Math.ceil(qs.length / 2);
    const slicedQs = part === 0 ? qs.slice(0, half) : part === 1 ? qs.slice(half) : qs;
    const labels = ['Part 1', 'Part 2', 'Full Test'];
    unitView = Object.assign({}, unit, {
      title: unit.title + ' — ' + labels[part],
      questions: slicedQs
    });
  }
  renderTest(grade,subj,unitIdx,unitView,part);
}

function renderTest(grade,subj,unitIdx,unit,part){
  document.getElementById('emptyState').style.display='none';
  const wrap = document.getElementById('testWrap');
  wrap.classList.add('visible');

  const meta = ((grade === 'ap') ? AP_SUBJECTS : SUBJECTS)[subj] || {label: subj, icon: '📚'};

  // Build a fresh shuffled copy every time — questions in random order,
  // MC choices also shuffled (correct index updated to match).
  currentQuestions = shuffle(unit.questions.map(q=>{
    const copy = Object.assign({}, q);
    if(copy.type==='mc' && Array.isArray(copy.choices)){
      const correctText = copy.choices[copy.correct];
      copy.choices = shuffle([...copy.choices]);
      copy.correct = copy.choices.indexOf(correctText);
    }
    return copy;
  }));

  // Group by type
  const mcQs=[], saQs=[], swQs=[];
  currentQuestions.forEach((q,i)=>{
    if(q.type==='mc') mcQs.push({q,i});
    else if(q.type==='sa') saQs.push({q,i});
    else swQs.push({q,i});
  });

  let qNum = 0;

  function renderMC({q,i}){
    qNum++;
    const n = qNum;
    return `<div class="q-card" id="qc-${i}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="q-num" id="qnum-${i}">${n}</div>
        <span style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.06em">MULTIPLE CHOICE</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="choices" id="choices-${i}">
        ${q.choices.map((c,ci)=>`<label class="choice-label" id="cl-${i}-${ci}">
          <input type="radio" name="q${i}" value="${ci}" onchange="selectChoice(${i},${ci})"> ${c}
        </label>`).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    </div>`;
  }

  function renderSA({q,i}){
    qNum++;
    const n = qNum;
    return `<div class="q-card" id="qc-${i}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="q-num" id="qnum-${i}">${n}</div>
        <span style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.06em">SHORT ANSWER</span>
      </div>
      <div class="q-text">${q.q}</div>
      <input class="sa-input" id="sa-${i}" type="text" placeholder="Type your answer here…" autocomplete="off"/>
      <div class="feedback" id="fb-${i}"></div>
    </div>`;
  }

  function renderSW({q,i}){
    qNum++;
    const n = qNum;
    return `<div class="q-card" id="qc-${i}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="q-num" id="qnum-${i}">${n}</div>
        <span style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.06em">SHOW YOUR WORK</span>
      </div>
      <div class="q-text">${q.q}</div>
      <textarea class="sw-work" id="sw-work-${i}" placeholder="Show your work here…"></textarea>
      <div class="sw-ans-row">
        <span class="sw-ans-label">Final Answer:</span>
        <input class="sw-ans-input" id="sw-ans-${i}" type="text" placeholder="Write your final answer…" autocomplete="off"/>
      </div>
      <div class="feedback" id="fb-${i}"></div>
    </div>`;
  }

  qNum = 0;
  startTestTimer();
  let html = `<div class="test-header">
    <div class="test-breadcrumb">Grade ${grade} &rsaquo; <span>${meta.label}</span></div>
    <div class="test-title">${unit.title}</div>
    <div class="test-meta">
      <span class="tag">Grade ${grade}</span>
      <span class="tag">${meta.icon} ${meta.label}</span>
      <span class="tag">${currentQuestions.length} Questions</span>
      <span class="test-timer" id="testTimerDisplay">⏱ 0:00</span>
    </div>
    <div class="progress-bar-outer" style="margin-top:12px">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
  </div>
  <div id="scoreCard" style="display:none"></div>`;

  if(mcQs.length){
    html += `<div class="section-label">📝 Section A — Multiple Choice</div>`;
    mcQs.forEach(item=>{ html += renderMC(item); });
  }
  if(saQs.length){
    html += `<div class="section-label">✏️ Section B — Short Answer</div>`;
    saQs.forEach(item=>{ html += renderSA(item); });
  }
  if(swQs.length){
    html += `<div class="section-label">🔢 Section C — Show Your Work</div>`;
    swQs.forEach(item=>{ html += renderSW(item); });
  }

  html += `<div class="submit-row">
    <button class="submit-btn" id="submitBtn" onclick="gradeTest()">Submit Test</button>
    <span id="unansweredMsg" style="font-size:.85rem;color:var(--muted)"></span>
  </div>`;

  wrap.innerHTML = html;
  wrap.scrollTop = 0;
  updateProgress();
}

function selectChoice(qi, ci){
  document.querySelectorAll(`label[id^="cl-${qi}-"]`).forEach(l=>l.classList.remove('selected'));
  document.getElementById(`cl-${qi}-${ci}`)?.classList.add('selected');
  updateProgress();
}

function updateProgress(){
  const qs = currentQuestions;
  if(!qs || !qs.length) return;
  let answered = 0;
  qs.forEach((q,i)=>{
    if(q.type==='mc' && document.querySelector(`input[name="q${i}"]:checked`)) answered++;
    else if(q.type==='sa' && document.getElementById(`sa-${i}`)?.value.trim()) answered++;
    else if(q.type==='sw' && document.getElementById(`sw-ans-${i}`)?.value.trim()) answered++;
  });
  const pct = Math.round(answered/qs.length*100);
  const bar = document.getElementById('progressBar');
  if(bar) bar.style.width = pct+'%';
}

function normalize(s){ return String(s).trim().toLowerCase().replace(/[.,!?]/g,''); }
function numClose(a,b){ const na=parseFloat(a),nb=parseFloat(b); return !isNaN(na)&&!isNaN(nb)&&Math.abs(na-nb)<0.01; }

function gradeTest(){
  const {grade,subj,unitIdx} = currentTest;
  const qs = currentQuestions;
  let correct=0, total=qs.length;

  qs.forEach((q,i)=>{
    const card = document.getElementById(`qc-${i}`);
    const fb   = document.getElementById(`fb-${i}`);
    let isCorrect = false;

    if(q.type==='mc'){
      const sel = document.querySelector(`input[name="q${i}"]:checked`);
      const chosen = sel ? parseInt(sel.value) : -1;
      isCorrect = chosen === q.correct;
      // colour choices
      q.choices.forEach((_,ci)=>{
        const lbl = document.getElementById(`cl-${i}-${ci}`);
        if(!lbl) return;
        lbl.querySelector('input').disabled = true;
        if(ci === q.correct) lbl.classList.add('graded-correct');
        else if(ci === chosen && !isCorrect) lbl.classList.add('graded-wrong');
      });
    } else if(q.type==='sa'){
      const inp = document.getElementById(`sa-${i}`);
      if(inp){
        inp.disabled=true;
        const userVal = inp.value.trim();
        isCorrect = normalize(userVal)===normalize(q.ans) || numClose(userVal,q.ans) ||
                    normalize(q.ans).includes(normalize(userVal)) ||
                    normalize(userVal).includes(normalize(q.ans));
        inp.classList.add(isCorrect?'correct':'wrong');
      }
    } else { // sw
      const inp = document.getElementById(`sw-ans-${i}`);
      const work = document.getElementById(`sw-work-${i}`);
      if(inp){
        inp.disabled=true;
        if(work) work.disabled=true;
        const userVal = inp.value.trim();
        const expected = String(q.ans);
        isCorrect = normalize(userVal)===normalize(expected) || numClose(userVal,expected);
        inp.classList.add(isCorrect?'correct':'wrong');
      }
    }

    if(card){
      card.classList.add(isCorrect?'correct':'wrong');
      document.getElementById(`qnum-${i}`)?.classList.add(isCorrect?'correct':'wrong');
    }
    if(fb){
      fb.classList.add('show',isCorrect?'correct':'wrong');
      fb.innerHTML = isCorrect
        ? `✅ <strong>Correct!</strong> ${q.exp}`
        : `❌ <strong>Incorrect.</strong> ${q.exp} <br><em>Correct answer: ${q.type==='mc'?q.choices[q.correct]:q.ans}</em>`;
    }
    if(isCorrect) correct++;
  });

  // Stop timer and get elapsed
  const elapsed = stopTestTimer();
  const elapsedMin = Math.floor(elapsed/60), elapsedSec = elapsed%60;
  const timeStr = `${elapsedMin}:${elapsedSec<10?'0':''}${elapsedSec}`;

  // Previous best
  let prevBest = null;
  try{ const prev = JSON.parse(localStorage.getItem('aceTestScore_'+scoreKey(grade,subj,unitIdx))||'null'); if(prev) prevBest = Math.round(prev.correct/prev.total*100); }catch(e){}

  // Score card
  const pct = Math.round(correct/total*100);
  const wrongCount = total - correct;
  let grade_letter = pct>=90?'a':pct>=80?'b':pct>=70?'c':'d';
  let emoji = pct>=90?'🏆':pct>=80?'⭐':pct>=70?'👍':'📖';
  let msg = pct>=90?'Excellent work!':pct>=80?'Great job!':pct>=70?'Good effort — review the mistakes below.':'Keep studying — use the review below!';
  const prevNote = prevBest !== null ? (pct > prevBest ? `↑ Improved from ${prevBest}%` : pct === prevBest ? `Same as last time (${prevBest}%)` : `↓ Previous best: ${prevBest}%`) : 'First attempt!';

  const sc = document.getElementById('scoreCard');
  sc.style.display='block';

  sc.innerHTML = `<div class="score-card">
    <div class="score-ring ${grade_letter}">${emoji} ${pct}%</div>
    <div class="score-label">${correct} / ${total} correct — ${msg}</div>
    <div class="score-bars">
      <div class="score-bar-item"><strong>${correct}</strong>Correct</div>
      <div class="score-bar-item"><strong>${wrongCount}</strong>Incorrect</div>
      <div class="score-bar-item"><strong>${pct}%</strong>Score</div>
      <div class="score-bar-item"><strong>${timeStr}</strong>Time</div>
      <div class="score-bar-item"><strong style="font-size:.85rem;color:${pct>=(prevBest||0)?'var(--green)':'var(--red)'}">${prevNote}</strong>vs. Previous</div>
    </div>
    <div class="score-actions">
      <button class="btn-primary" onclick="openTest('${grade}','${subj}',${unitIdx})">🔄 Retake Test</button>
      ${wrongCount > 0 ? `<button class="btn-outline" onclick="reviewMistakes()">📋 Review ${wrongCount} Mistake${wrongCount>1?'s':''}</button>` : ''}
      ${grade==='ap' ? `<button class="btn-outline" onclick="showUnitOptions('${grade}','${subj}',${unitIdx})">← Back to Options</button>` : ''}
    </div>
  </div>`;
  sc.scrollIntoView({behavior:'smooth', block:'start'});

  // Update progress bar to 100%
  const bar = document.getElementById('progressBar');
  if(bar){ bar.style.width='100%'; bar.style.background = pct>=70?'var(--green)':'var(--red)'; }
  document.getElementById('submitBtn').innerHTML = `✅ Submitted — ${pct}%`;
  document.getElementById('submitBtn').disabled = true;

  // Store score & refresh sidebar badge
  const {part} = currentTest;
  scores[scoreKey(grade,subj,unitIdx,part!=null?part:null)] = {correct,total};
  // Persist score to localStorage for progress tracker
  try{
    const sk = 'aceTestScore_'+scoreKey(grade,subj,unitIdx);
    const entry = {correct,total,grade,subj,unitIdx,ts:Date.now()};
    localStorage.setItem(sk, JSON.stringify(entry));
    // Append to history log
    const hist = JSON.parse(localStorage.getItem('aceTestHistory')||'[]');
    hist.unshift(entry);
    localStorage.setItem('aceTestHistory', JSON.stringify(hist.slice(0,200)));
  }catch(e){}
  buildSidebar(grade);
  document.getElementById(`ui-${grade}-${subj}-${unitIdx}`)?.classList.add('active');
}

function reviewMistakes(){
  // Hide all correct cards, show only wrong ones
  const wrap = document.getElementById('testWrap');
  const alreadyReviewing = wrap.querySelector('.review-banner');
  if(alreadyReviewing){ alreadyReviewing.remove(); document.querySelectorAll('.q-card.correct').forEach(c=>c.classList.remove('hidden-correct')); return; }
  const wrongCards = [...document.querySelectorAll('.q-card.wrong')];
  if(!wrongCards.length){ alert('No mistakes to review!'); return; }
  document.querySelectorAll('.q-card.correct').forEach(c=>c.classList.add('hidden-correct'));
  const banner = document.createElement('div');
  banner.className='review-banner';
  banner.innerHTML=`📋 Reviewing ${wrongCards.length} mistake${wrongCards.length>1?'s':''} only &nbsp;<button onclick="reviewMistakes()" style="margin-left:auto;background:none;border:1px solid var(--red);color:var(--red);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.8rem">✕ Show All</button>`;
  wrap.insertBefore(banner, wrap.querySelector('.section-label')||wrap.firstChild);
  wrongCards[0].scrollIntoView({behavior:'smooth', block:'center'});
}

function clearTest(){
  document.getElementById('emptyState').style.display='';
  document.getElementById('unitOptions').style.display='none';
  const wrap=document.getElementById('testWrap');
  wrap.classList.remove('visible');
  wrap.innerHTML='';
  currentTest=null;
}

      oninput="saveNote();updateWordCount();updateBadge()"></textarea>

    </div>

<script>
(function(){
  const NOTE_TABS = [
    {key:'general',   label:'📓 General'},
    {key:'math',      label:'➕ Math'},
    {key:'science',   label:'🔬 Science'},
    {key:'ela',       label:'📖 ELA'},
    {key:'history',   label:'🌍 History'},
    {key:'cs',        label:'💻 CS'},
    {key:'health',    label:'❤️ Health'},
    {key:'languages', label:'🌏 Languages'},
  ];
  let activeTab = 'general';

  function noteKey(k){ return 'aceNotes_' + k; }

  function loadNote(k){
    try{ return localStorage.getItem(noteKey(k)) || ''; }catch(e){ return ''; }
  }
  function saveNote(){
    try{ localStorage.setItem(noteKey(activeTab), document.getElementById('notesTA').value); }catch(e){}
  }
  window.saveNote = saveNote;

  function buildTabs(){
    const container = document.getElementById('notesTabs');
    container.innerHTML = NOTE_TABS.map(t=>
      `<button class="np-tab${t.key===activeTab?' active':''}" onclick="switchTab('${t.key}')">${t.label}</button>`
    ).join('');
  }

  window.switchTab = function(k){
    saveNote();
    activeTab = k;
    buildTabs();
    const ta = document.getElementById('notesTA');
    ta.value = loadNote(k);
    ta.focus();
    updateWordCount();
    updateBadge();
  };

  window.toggleNotes = function(){
    const p = document.getElementById('notesPanel');
    p.classList.toggle('open');
    if(p.classList.contains('open')){
      document.getElementById('notesTA').value = loadNote(activeTab);
      updateWordCount();
      updateBadge();
      document.getElementById('notesTA').focus();
    }
  };

  window.updateWordCount = function(){
    const v = (document.getElementById('notesTA')?.value||'').trim();
    const words = v ? v.split(/\s+/).length : 0;
    const el = document.getElementById('npWordCount');
    if(el) el.textContent = words + (words===1?' word':' words');
  };

  window.updateBadge = function(){
    // Show badge if any tab has content
    const hasNotes = NOTE_TABS.some(t=> loadNote(t.key).trim().length > 0);
    const b = document.getElementById('notesBadge');
    if(b) b.style.display = hasNotes ? 'block' : 'none';
  };

  window.clearNote = function(){
    if(!confirm('Clear notes for this tab?')) return;
    try{ localStorage.removeItem(noteKey(activeTab)); }catch(e){}
    document.getElementById('notesTA').value = '';
    updateWordCount();
    updateBadge();
  };

  window.copyNotes = function(){
    const ta = document.getElementById('notesTA');
    if(!ta || !ta.value.trim()){ alert('No notes to copy!'); return; }
    navigator.clipboard.writeText(ta.value).then(()=>{
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = '✅ Copied!';
      setTimeout(()=>{ btn.textContent = orig; }, 1500);
    }).catch(()=>{
      ta.select();
      document.execCommand('copy');
    });
  };

  window.downloadNotes = function(){
    const allNotes = NOTE_TABS
      .map(t=>{ const c=loadNote(t.key).trim(); return c ? `=== ${t.label} ===\n${c}` : ''; })
      .filter(Boolean).join('\n\n');
    if(!allNotes){ alert('No notes to save!'); return; }
    const blob = new Blob([allNotes], {type:'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'aceAcademy-notes.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // Init
  buildTabs();
  updateBadge();

  // Close panel when clicking outside
  document.addEventListener('click', function(e){
    const p = document.getElementById('notesPanel');
    const b = document.getElementById('notesBtn');
    if(p && p.classList.contains('open') && !p.contains(e.target) && !b.contains(e.target)){
      p.classList.remove('open');
    }
  });
})();
</script>

    <label>min</label>

    <button class="tp-ctrl-btn tp-reset" onclick="resetTimer()">↺ Reset</button>
  </div>

    <span id="tpStatusText" style="color:#94a3b8;">Ready</span>
  </div>
</div>

<script>
(function(){
  const MODES = {
    work:  {label:'Focus Time',  color:'#059669'},
    short: {label:'Short Break', color:'#0891b2'},
    long:  {label:'Long Break',  color:'#7c3aed'},
  };
  let mode='work', running=false, remaining=25*60, total=25*60;
  let intervalId=null, sessions=0, longBreakMin=15;

  function getFocusMin(){ return Math.max(1,parseInt(document.getElementById('tpFocusMin')?.value||25)); }
  function getShortMin(){ return Math.max(1,parseInt(document.getElementById('tpShortMin')?.value||5)); }

  function modeSeconds(m){
    if(m==='work')  return getFocusMin()*60;
    if(m==='short') return getShortMin()*60;
    return longBreakMin*60;
  }

  window.updateTimerSettings = function(){
    if(!running){ total=modeSeconds(mode); remaining=total; updateDisplay(); }
  };

  window.setTimerMode = function(m){
    if(running) stopTimer();
    mode=m;
    total=modeSeconds(m);
    remaining=total;
    document.querySelectorAll('.tp-mode-btn').forEach(b=>b.classList.remove('active'));
    const ids={work:'tmWork',short:'tmShort',long:'tmLong'};
    document.getElementById(ids[m])?.classList.add('active');
    document.getElementById('timerArc').style.stroke=MODES[m].color;
    document.getElementById('timerBtn').style.background=MODES[m].color;
    document.getElementById('timerModeLabel').textContent=MODES[m].label;
    updateDisplay();
    document.getElementById('tpStatusText').textContent='Ready';
  };

  window.toggleTimer = function(){
    const p=document.getElementById('timerPanel');
    p.classList.toggle('open');
  };

  window.toggleTimerRun = function(){
    running ? stopTimer() : startTimer();
  };

  function startTimer(){
    if(remaining<=0) resetTimer();
    running=true;
    intervalId=setInterval(tick,1000);
    document.getElementById('timerStartBtn').textContent='⏸ Pause';
    document.getElementById('timerBtn').classList.add('running');
    document.getElementById('tpStatusText').textContent=mode==='work'?'Studying…':'Resting…';
  }

  function stopTimer(){
    running=false;
    clearInterval(intervalId);
    document.getElementById('timerStartBtn').textContent='▶ Start';
    document.getElementById('timerBtn').classList.remove('running');
    document.getElementById('tpStatusText').textContent='Paused';
  }

  window.resetTimer = function(){
    stopTimer();
    remaining=total=modeSeconds(mode);
    updateDisplay();
    document.getElementById('tpStatusText').textContent='Ready';
  };

  function tick(){
    remaining--;
    if(remaining<=0){
      remaining=0;
      updateDisplay();
      stopTimer();
      playBell();
      if(mode==='work'){
        sessions++;
        document.getElementById('tpSessionCount').textContent=sessions;
        // auto-switch to break
        const nextMode = sessions%4===0?'long':'short';
        setTimeout(()=>{ setTimerMode(nextMode); playBell(); },500);
        document.getElementById('tpStatusText').textContent='Session done! 🎉';
      } else {
        setTimeout(()=>{ setTimerMode('work'); },500);
        document.getElementById('tpStatusText').textContent='Break over!';
      }
      // open panel so user sees the notification
      document.getElementById('timerPanel').classList.add('open');
      return;
    }
    updateDisplay();
  }

  function updateDisplay(){
    const m=Math.floor(remaining/60), s=remaining%60;
    document.getElementById('timerDisplay').textContent =
      String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    const arc=document.getElementById('timerArc');
    if(arc){
      const pct = total>0 ? remaining/total : 1;
      arc.style.strokeDashoffset = String(Math.round(283*(1-pct)));
    }
    // Update page title while running
    if(running){
      document.title='⏱ '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+' — aceAcademy';
    } else {
      document.title = document.title.replace(/^⏱.*?—\s*/,'');
    }
  }

  function playBell(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [0,0.15,0.3].forEach((delay,i)=>{
        const osc=ctx.createOscillator(), gain=ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value=i===0?880:i===1?1046:1318;
        gain.gain.setValueAtTime(0.3,ctx.currentTime+delay);
        gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.6);
        osc.start(ctx.currentTime+delay);
        osc.stop(ctx.currentTime+delay+0.7);
      });
    }catch(e){}
  }

  // Close on outside click (avoid conflicting with notes panel)
  document.addEventListener('click',function(e){
    const p=document.getElementById('timerPanel');
    const b=document.getElementById('timerBtn');
    if(p&&p.classList.contains('open')&&!p.contains(e.target)&&!b.contains(e.target)){
      p.classList.remove('open');
    }
  });

  // Shift notes button up so they don't overlap
  const nb=document.getElementById('notesBtn');
  if(nb) nb.style.bottom='84px';
  const tp=document.getElementById('timerBtn');
  if(tp) tp.style.bottom='24px';
})();
</script>
