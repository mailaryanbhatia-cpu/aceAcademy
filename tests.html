echnique of 'sfumato' is associated with:","choices":["Michelangelo's frescoes","Leonardo da Vinci's soft, hazy transitions between light and shadow","Raphael's linear outlines","Dürer's printmaking"],"correct":1,"exp":"Sfumato (Italian: 'smoked'): Leonardo's technique of blending tones so subtly there are no harsh outlines — seen in the Mona Lisa."},{"type":"mc","q":"Iconography in art history refers to:","choices":["The study of icons in Eastern Orthodox art only","The visual symbols, attributes, and meanings associated with figures or subjects in art","The history of printing techniques","The biography of artists"],"correct":1,"exp":"Iconography: identifying and interpreting symbols and their meanings (e.g., a lamb = Christ; laurel wreath = victory)."},{"type":"mc","q":"The Aztec Sun Stone (Calendar Stone) primarily functions as:","choices":["A decorative architectural element","A cosmic diagram representing the Aztec universe and calendar cycles","A tribute record","A portrait of the emperor"],"correct":1,"exp":"The Aztec Sun Stone represents the five suns (world ages) and the current sun (Nahui Ollin), surrounded by calendar glyphs — a cosmological monument."},{"type":"mc","q":"Which term describes the medieval technique of painting on wet plaster so pigment bonds permanently with the wall?","choices":["Tempera","Fresco (buon fresco)","Oil painting","Encaustic"],"correct":1,"exp":"Buon fresco: painting on wet lime plaster. As plaster dries, pigment becomes part of the wall. Used by Michelangelo (Sistine Chapel), Raphael."},{"type":"mc","q":"The Romantic movement in art emphasized:","choices":["Reason and order","Emotion, nature, the sublime, individualism, and often the past or exotic","Industrial subjects","Classical restraint"],"correct":1,"exp":"Romanticism (early 19th century): emotion over reason, awe of nature, the sublime, individualism. Artists: Delacroix, Friedrich, Turner."},{"type":"mc","q":"Pop Art (1950s–60s) drew imagery from:","choices":["Abstract expressionism","Mass media, advertising, consumer culture, and popular imagery","Ancient mythology","Landscape painting"],"correct":1,"exp":"Pop Art (Warhol, Lichtenstein): used images from advertising, comics, and consumer products, questioning boundaries between fine and commercial art."},{"type":"mc","q":"Which African kingdom produced famous bronze sculptures depicting rulers and court life?","choices":["Kingdom of Mali","Benin Kingdom (modern Nigeria)","Kingdom of Kush","Great Zimbabwe"],"correct":1,"exp":"Benin bronzes (12th–19th c.): sophisticated lost-wax cast brass plaques and heads depicting Obas (rulers) and court scenes."},{"type":"mc","q":"Contextual analysis of art considers:","choices":["Only formal qualities","The historical, social, cultural, and political circumstances in which a work was created and received","Technical processes only","The artist's personal emotions"],"correct":1,"exp":"Contextual analysis: situates artwork in its historical, political, cultural, religious, and economic context to understand its meaning and function."}]},{"title":"AP Music Theory","questions":[{"type":"mc","q":"A major scale is built on the pattern of whole and half steps:","choices":["W-W-H-W-W-W-H","W-H-W-W-H-W-W","W-W-W-H-W-W-H","H-W-W-W-H-W-W"],"correct":0,"exp":"Major scale: W-W-H-W-W-W-H. C major: C-D-E-F-G-A-B-C (no sharps/flats)."},{"type":"mc","q":"The key signature with four sharps (F#, C#, G#, D#) is:","choices":["G major / E minor","D major / B minor","A major / F# minor","E major / C# minor"],"correct":2,"exp":"Four sharps = E major (or C# minor). Use the circle of fifths: each sharp key adds one sharp."},{"type":"mc","q":"A perfect fifth spans how many half steps?","choices":["5","6","7","8"],"correct":2,"exp":"Perfect fifth = 7 half steps (e.g., C to G). P5 is pure and consonant."},{"type":"mc","q":"In figured bass, the number '7' below a note indicates:","choices":["A major 7th chord","A seventh chord built on that bass note (dominant 7th in common practice)","The 7th scale degree","A minor 7th interval"],"correct":1,"exp":"Figured bass '7' indicates a 7th chord. In major keys, V7 (dominant seventh) uses 7 under the dominant bass note."},{"type":"mc","q":"Counterpoint is the technique of:","choices":["Writing chords vertically","Combining two or more independent melodic lines according to rules of consonance and dissonance","Orchestrating a melody","Improvising over a chord progression"],"correct":1,"exp":"Counterpoint: the craft of combining independent melodic lines. Bach's fugues are the pinnacle of contrapuntal writing."},{"type":"mc","q":"A fermata symbol indicates:","choices":["Play at a specific tempo","Hold the note or rest longer than its normal duration","Play staccato","A tempo marking"],"correct":1,"exp":"Fermata (𝄐): hold the note/rest at the performer's or conductor's discretion — duration is extended."},{"type":"mc","q":"The time signature 6/8 indicates:","choices":["Six beats per measure, each a whole note","Six eighth notes per measure, typically felt in two with each beat divided into three (compound duple)","Six quarter notes per measure","Three quarter-note beats per measure"],"correct":1,"exp":"6/8: compound duple meter — 2 main beats per measure, each divided into 3 eighth notes. Felt as 2, not 6."},{"type":"mc","q":"A tritone is an interval of:","choices":["4 half steps","5 half steps","6 half steps (augmented 4th / diminished 5th)","7 half steps"],"correct":2,"exp":"Tritone = 6 half steps (3 whole tones). Divides the octave exactly in half. Historically called 'diabolus in musica.'"},{"type":"mc","q":"Voice leading in four-part harmony should generally avoid:","choices":["Stepwise motion","Parallel fifths and parallel octaves between any two voices","Contrary motion","Doubling the root of a chord"],"correct":1,"exp":"Parallel 5ths and 8ths are avoided in common practice harmony because they weaken voice independence and create muddy sound."},{"type":"mc","q":"The dominant seventh chord (V7) in C major contains the notes:","choices":["C-E-G-B","G-B-D-F","F-A-C-E","D-F-A-C"],"correct":1,"exp":"V7 in C major: G (5th scale degree) + B + D + F. It creates strong tension resolving to I (tonic)."},{"type":"mc","q":"A deceptive cadence occurs when:","choices":["V resolves to I","V resolves to vi instead of I","IV resolves to V","I resolves to IV"],"correct":1,"exp":"Deceptive cadence: V → vi (or any chord other than I). 'Deceptive' because the expected tonic resolution is denied."},{"type":"mc","q":"Syncopation refers to:","choices":["Playing on the beat","Rhythmic emphasis on weak beats or off-beats, creating rhythmic surprise","A gradual slowdown","Regular metric pulse"],"correct":1,"exp":"Syncopation: accenting off-beats or weak beats. Creates rhythmic tension and forward energy (common in jazz, pop, Latin music)."},{"type":"mc","q":"The term 'modulation' means:","choices":["A change in dynamics","A change of key center within a piece","A gradual change in tempo","Ornamentation of a melody"],"correct":1,"exp":"Modulation: moving from one key to another. Common in classical and romantic music for contrast and development."},{"type":"mc","q":"A pentatonic scale has:","choices":["5 notes per octave","7 notes per octave","12 notes per octave","6 notes per octave"],"correct":0,"exp":"Pentatonic scale: 5 notes per octave. Major pentatonic: C-D-E-G-A. Common in blues, folk, East Asian music."},{"type":"mc","q":"The dynamic marking 'fortissimo' (ff) means:","choices":["Very soft","Moderately loud","Soft","Very loud"],"correct":3,"exp":"Dynamic markings: pp (pianissimo) = very soft, p = soft, mp = medium soft, mf = medium loud, f = loud, ff (fortissimo) = very loud."},{"type":"mc","q":"In sonata form, the development section:","choices":["States the main themes in the tonic key","Explores and manipulates themes through modulation and fragmentation","Restates themes in the original key","Is the same as the recapitulation"],"correct":1,"exp":"Sonata form: Exposition (state themes) → Development (manipulate themes, modulate) → Recapitulation (return to tonic). Common in Classical period."},{"type":"mc","q":"Which term describes a melody sung or played by one voice/instrument at a time with no accompaniment?","choices":["Homophony","Polyphony","Monophony","Heterophony"],"correct":2,"exp":"Monophony: single melodic line, no accompaniment (e.g., Gregorian chant). Homophony: melody + chordal accompaniment. Polyphony: multiple independent voices."},{"type":"mc","q":"The circle of fifths shows:","choices":["The relationship between all 12 major and minor keys by intervals of a perfect fifth","The 12 chromatic pitches arranged by half steps","A diagram of overtone series","Chord progressions in jazz"],"correct":0,"exp":"Circle of fifths: arranged so each adjacent key is a perfect fifth apart. Moving clockwise adds sharps; counterclockwise adds flats."},{"type":"mc","q":"A 'hemiola' is a rhythmic device in which:","choices":["Three beats are felt as two (or vice versa) by shifting emphasis","Tempo suddenly doubles","Two voices sing the same rhythm","Notes are held for three beats"],"correct":0,"exp":"Hemiola: 3-against-2 rhythmic grouping (e.g., two measures of 3/4 felt as three measures of 2/4). Common in Baroque and Latin music."},{"type":"mc","q":"Sight-singing requires:","choices":["Memorizing all pieces before performing","Reading and singing a melody at sight using solfege or letter names without prior practice","Playing by ear only","Transposing a melody"],"correct":1,"exp":"Sight-singing (sight-reading for voice): performing unfamiliar music accurately at first reading using pitch and rhythm skills."}]},{"title":"AP Studio Art: 2-D Art and Design","questions":[{"type":"mc","q":"The elements of art include:","choices":["Line, shape, form, color, value, texture, space","Balance, contrast, emphasis, movement, pattern","Perspective, proportion, unity","Saturation, hue, and brightness only"],"correct":0,"exp":"Elements of art: line, shape, form, color, value, texture, space. Principles of design: balance, contrast, emphasis, movement, pattern, unity, variety."},{"type":"mc","q":"In color theory, complementary colors are:","choices":["Colors adjacent on the color wheel","Colors directly opposite each other on the color wheel","Shades of the same hue","Primary colors"],"correct":1,"exp":"Complementary colors sit opposite each other (e.g., red/green, blue/orange). They create maximum contrast and can neutralize each other when mixed."},{"type":"mc","q":"Value in art refers to:","choices":["The monetary worth of a work","The lightness or darkness of a color or tone","The emotional meaning","The size of a work"],"correct":1,"exp":"Value: the lightness or darkness of a color. Adding white = tint; adding black = shade. Value creates contrast, form, and depth."},{"type":"mc","q":"The AP 2-D Portfolio Sustained Investigation should demonstrate:","choices":["15 works with no thematic connection","A coherent inquiry with evidence of experimentation, revision, and development around a central question or idea","Only technically perfect finished works","Works in multiple unrelated styles"],"correct":1,"exp":"Sustained Investigation: 15 images showing the process and development of an investigation — from concept through experimentation to resolution."},{"type":"mc","q":"Atmospheric (aerial) perspective creates depth by:","choices":["Overlapping shapes","Making distant objects lighter, cooler, and less detailed to simulate atmospheric haze","Drawing objects smaller","Using linear perspective only"],"correct":1,"exp":"Atmospheric perspective: distant objects appear lighter, cooler in color, and less distinct due to atmospheric interference. Mimics how the eye perceives depth."},{"type":"mc","q":"A monochromatic color scheme uses:","choices":["All colors of the spectrum","Variations (tints, shades, tones) of a single hue","Complementary colors","Only black and white"],"correct":1,"exp":"Monochromatic: all variations of one color. Creates unity and harmony, but can lack contrast if not managed carefully."},{"type":"mc","q":"Negative space in a composition refers to:","choices":["The darkest areas","The background or empty space around and between subjects","The foreground objects","Areas of high contrast"],"correct":1,"exp":"Negative space: the space around and between subjects (the 'empty' areas). Just as important as positive space in composition."},{"type":"mc","q":"Which printing technique creates an image by transferring ink from a carved block where raised areas print?","choices":["Intaglio","Screen printing","Relief printing (woodcut, linocut)","Lithography"],"correct":2,"exp":"Relief printing: ink applied to raised surface; recessed areas print white. Woodcut, linocut, letterpress are relief processes."},{"type":"mc","q":"Gestural drawing emphasizes:","choices":["Precise outlines and details","The energy, movement, and essential form of the subject captured quickly","Photographic accuracy","Geometric abstraction"],"correct":1,"exp":"Gestural drawing: rapid lines capturing movement, weight, and energy of a subject. Used to warm up and develop sensitivity to form."},{"type":"mc","q":"The rule of thirds suggests placing key compositional elements:","choices":["In the exact center","Along lines that divide the composition into thirds, and at their intersections","In the lower third only","Symmetrically"],"correct":1,"exp":"Rule of thirds: divide the frame into a 3×3 grid; place subjects and horizons at the intersections for dynamic, balanced composition."},{"type":"mc","q":"Simultaneous contrast occurs when:","choices":["Two colors are mixed","Adjacent complementary colors appear more vivid and intense when placed next to each other","Colors fade over time","A single color is used throughout"],"correct":1,"exp":"Simultaneous contrast (Chevreul): colors influence each other perceptually. Complementaries side-by-side appear more vibrant."},{"type":"mc","q":"Collage as an art technique was pioneered by:","choices":["Impressionists","Cubists (Picasso and Braque) in the early 20th century","Abstract Expressionists","Baroque painters"],"correct":1,"exp":"Picasso and Braque developed collage (papier collé) c. 1912, incorporating newspaper, wallpaper, and found materials into fine art."},{"type":"mc","q":"Encaustic painting uses:","choices":["Oil and turpentine","Pigment mixed with hot wax, fused to the surface with heat","Egg yolk as a binder","Acrylic polymer medium"],"correct":1,"exp":"Encaustic: pigment mixed with heated beeswax, applied and then heated to fuse layers. Ancient technique — used in Fayum mummy portraits."},{"type":"mc","q":"A color's saturation refers to:","choices":["Its lightness or darkness","Its intensity or purity — how vivid or muted it is","Its temperature (warm/cool)","Its position on the color wheel"],"correct":1,"exp":"Saturation (chroma): the intensity of a color. High saturation = vivid. Low saturation = muted, grayish. Distinct from value (light/dark)."},{"type":"mc","q":"In the AP 2-D portfolio, Selected Works (5 images) should demonstrate:","choices":["The widest variety of unrelated techniques","Your strongest, most skillful, and intentional work","Only works made in a single medium","Work from the first week of the course"],"correct":1,"exp":"Selected Works: 5 images of the highest quality showing skillful, intentional artmaking. Should reflect your best resolved pieces."},{"type":"mc","q":"The term 'chroma' is synonymous with:","choices":["Value","Hue","Saturation","Tint"],"correct":2,"exp":"Chroma = saturation = intensity. These terms are often used interchangeably to describe how pure or vivid a color is."},{"type":"mc","q":"Tenebrism, used by Caravaggio, is an extreme form of:","choices":["Sfumato","Impasto","Chiaroscuro — dramatic dark/light contrast with figures emerging from deep shadow","Pointillism"],"correct":2,"exp":"Tenebrism: extreme chiaroscuro where figures are dramatically lit against a very dark background. Caravaggio and his followers used this technique."},{"type":"mc","q":"Which of the following best describes a conceptual artwork?","choices":["A technically masterful still life","A work where the idea or concept is central to the work, sometimes more than its visual appearance","A photorealistic painting","A work following traditional academic rules"],"correct":1,"exp":"Conceptual art: the idea is primary. The execution may be simple; the meaning/concept drives the work (Duchamp, Joseph Kosuth)."},{"type":"mc","q":"Impasto refers to:","choices":["Thin, transparent layers of paint (glazing)","Thick application of paint that creates visible texture and brushstrokes","Painting on wet plaster","A type of printmaking"],"correct":1,"exp":"Impasto: thick, textured paint application — visible brushstrokes and palette knife marks. Used by Van Gogh, de Kooning."},{"type":"mc","q":"A critique in art education is designed to:","choices":["Grade work and rank students","Facilitate reflection, analysis, and dialogue about the work's strengths, intentions, and areas for development","Compare works to famous artists","Teach technical skills only"],"correct":1,"exp":"Art critique: structured discussion analyzing what works, why, what the artist intended, and how the work could develop. Essential for artistic growth."}]},{"title":"AP Studio Art: 3-D Art and Design","questions":[{"type":"mc","q":"The primary distinction between 2-D and 3-D art is:","choices":["Materials used","3-D art occupies actual space and can be viewed from multiple perspectives","3-D art requires more skill","Only scale"],"correct":1,"exp":"3-D art exists in actual three-dimensional space — it has height, width, and depth, and can be experienced from multiple viewpoints."},{"type":"mc","q":"'Subtractive' sculpture technique involves:","choices":["Building up material (clay, wax)","Carving away material from a solid block (marble, wood)","Casting molten metal","Welding pieces together"],"correct":1,"exp":"Subtractive: removing material (carving marble, wood). Additive: building up (clay modeling). Assemblage: combining found objects."},{"type":"mc","q":"Lost-wax casting (cire-perdue) is used to:","choices":["Create ceramic vessels","Create detailed metal sculptures by casting molten metal into a mold made from a wax original","Carve wood","Print on fabric"],"correct":1,"exp":"Lost-wax: wax model is coated in refractory material, wax melted out, molten metal poured in. Ancient technique — Greek bronzes, Benin bronzes."},{"type":"mc","q":"In 3-D design, 'positive' form refers to:","choices":["The lightest areas","The actual mass or solid volume of an object","Empty space around the object","Convex surfaces"],"correct":1,"exp":"Positive form: the solid mass. Negative space: the voids and openings within and around it. Interplay between both creates sculptural interest."},{"type":"mc","q":"Installation art typically:","choices":["Creates a single portable object","Transforms an entire space to create an immersive environment or experience for viewers","Uses only traditional materials","Is always hung on a wall"],"correct":1,"exp":"Installation art: site-specific, immersive work that transforms space. Viewers enter and experience the environment (e.g., Kusama, Turrell)."},{"type":"mc","q":"Which of the following is an example of an additive sculpture process?","choices":["Carving marble","Casting bronze","Building a clay figure from coils","Cutting wood"],"correct":2,"exp":"Additive sculpture: adding material — modeling clay, welding metal, papier-mâché. Subtractive: removing material."},{"type":"mc","q":"The term 'kinetic sculpture' refers to art that:","choices":["Depicts movement","Contains actual movement, powered by motors, wind, or the viewer","Is temporary","Is made of metal"],"correct":1,"exp":"Kinetic sculpture: contains actual motion. Alexander Calder's mobiles are iconic kinetic works — suspended forms balanced to move with air currents."},{"type":"mc","q":"Ceramic construction technique 'slab building' involves:","choices":["Throwing clay on a wheel","Rolling clay into flat sheets and joining them to create forms","Coiling ropes of clay","Carving dried clay"],"correct":1,"exp":"Slab building: clay rolled flat, cut, and joined to create angular or geometric forms. Allows for architectural shapes not possible on the wheel."},{"type":"mc","q":"The firing process that creates the final hardening of ceramic clay is called:","choices":["Bisque fire (first fire) and glaze fire","Annealing","Tempering","Sintering"],"correct":0,"exp":"Ceramics are fired twice: bisque fire (hardens greenware) and glaze fire (melts glaze). High-fire vs. low-fire determines vitrification and strength."},{"type":"mc","q":"Site-specific art is created:","choices":["In a studio and then displayed anywhere","In response to and for a particular location; it would lose meaning if moved","To be reproduced in multiples","Only outdoors"],"correct":1,"exp":"Site-specific art is conceived and created for a particular place. Its meaning is tied to that specific context (e.g., Christo's wrappings, Richard Serra's Tilted Arc)."},{"type":"mc","q":"Which material is most associated with modernist sculpture and industrial fabrication?","choices":["Marble","Bronze only","Welded steel (fabricated metal)","Clay"],"correct":2,"exp":"20th-century sculptors like David Smith used welded steel and industrial fabrication — reflecting modernity, technology, and abstraction."},{"type":"mc","q":"In ceramic art, 'greenware' refers to:","choices":["Glaze that is green in color","Unfired, dry clay that is fragile and not yet permanent","Clay after bisque firing","Finished glazed ceramics"],"correct":1,"exp":"Greenware: clay that has dried but not been fired. Very fragile — must be handled carefully before the bisque firing hardens it."},{"type":"mc","q":"The AP 3-D portfolio Sustained Investigation requires evidence of:","choices":["Only finished sculptures","Process, experimentation, revision, and development around a central investigative idea","Works in a single material only","Replicas of famous sculptures"],"correct":1,"exp":"Same as all AP Studio Art portfolios: the Sustained Investigation shows the artist's inquiry process, not just finished objects."},{"type":"mc","q":"Assemblage art incorporates:","choices":["Traditional sculpting materials only","Found objects and everyday materials combined to create sculpture","Only natural materials","Computer-generated forms"],"correct":1,"exp":"Assemblage: combining found, manufactured, or unconventional materials into 3-D works. Duchamp (readymades), Rauschenberg, Picasso's Guitar."},{"type":"mc","q":"The concept of 'mass' in 3-D art refers to:","choices":["Weight alone","The perceived weight and volume of a form — how solid and weighty it appears","The number of objects","The physical weight measured in kilograms"],"correct":1,"exp":"Mass in sculpture: the visual and tactile sense of weight and solidity. A form can appear massive or weightless depending on materials, texture, and context."},{"type":"mc","q":"Raku firing is a ceramic technique that:","choices":["Uses a standard electric kiln","Involves removing the piece from the kiln while red-hot and placing it in a container with combustible materials, creating unique unpredictable surfaces","Requires the longest firing time","Creates porcelain"],"correct":1,"exp":"Raku: hot pots removed from kiln, placed in reduction chamber (newspaper/sawdust). Smoke creates carbon blackening and metallic luster. Unpredictable and unique results."},{"type":"mc","q":"The 'armature' in sculpture is:","choices":["The outer surface","An internal support structure (wire, rod, pipe) that holds soft modeling material in place","The casting mold","The fired clay form"],"correct":1,"exp":"Armature: internal skeleton/support structure for clay, wax, or papier-mâché sculpture. Prevents the soft material from collapsing."},{"type":"mc","q":"Environmental or land art (Earth Art) differs from traditional sculpture in that:","choices":["It uses traditional gallery settings","It uses the earth itself as medium and is often too large to be contained in a gallery","It is always small-scale","It focuses on ceramics"],"correct":1,"exp":"Earth Art/Land Art (Smithson's Spiral Jetty, Goldsworthy): uses natural landscapes and materials; often site-specific and too large for galleries."},{"type":"mc","q":"Which term describes the intentional roughness or unfinished quality left by an artist to show the process of making?","choices":["Sfumato","Chiaroscuro","Non finito","Trompe l'oeil"],"correct":2,"exp":"Non finito (Italian: 'unfinished'): Michelangelo's term for works left intentionally incomplete, revealing figures struggling to emerge from stone — now valued aesthetically."},{"type":"mc","q":"The 'negative space' within a sculpture refers to:","choices":["The darkest areas","The voids, openings, and empty areas within and around the form that are as compositionally important as the solid mass","Areas that are textured","The back of a relief"],"correct":1,"exp":"Negative space in 3-D: the air and voids within/around a sculpture. Henry Moore's work deliberately exploits negative space as a compositional element."}]},{"title":"AP Studio Art: Drawing","questions":[{"type":"mc","q":"Gesture drawing is best described as:","choices":["Slow, detailed rendering of outlines","Quick drawing capturing the energy, movement, and essential form of a subject","Precise anatomical study","Copying photographs"],"correct":1,"exp":"Gesture drawing: rapid marks capturing the life and movement of a subject. Usually 30 seconds to 2 minutes. Builds observational and mark-making fluency."},{"type":"mc","q":"Cross-contour lines in drawing serve to:","choices":["Outline the edge of a form","Describe the volume and three-dimensional surface of a form by following its curves","Create patterns","Define negative space"],"correct":1,"exp":"Cross-contour lines follow the surface of a form (like latitude/longitude on a globe), describing its volume and three-dimensionality."},{"type":"mc","q":"Which drawing medium uses a dry stick that smudges easily and can be blended?","choices":["Ink","Graphite pencil","Charcoal or chalk pastel","Ballpoint pen"],"correct":2,"exp":"Charcoal and soft pastels are powdery, smudge and blend easily, and allow for rich tonal ranges and atmospheric effects."},{"type":"mc","q":"'Chiaroscuro' in drawing refers to:","choices":["Precise line work","The use of light and shadow to create the illusion of three-dimensional volume","Gestural marks","Decorative line patterns"],"correct":1,"exp":"Chiaroscuro: strategic use of light and dark values to model form and create depth. Renaissance and Baroque drawings feature this prominently."},{"type":"mc","q":"Contour drawing focuses on:","choices":["Interior textures and shading","The edges and outlines of a form, following its silhouette and interior edges","Quick gestural movement","Abstract pattern"],"correct":1,"exp":"Contour drawing: focused on edges — the outline (external contour) and interior lines where one plane meets another. Develops careful observation."},{"type":"mc","q":"The AP Drawing portfolio Sustained Investigation requires:","choices":["Only portraits","15 images showing an investigative process — from initial questions through experimentation to resolved work","Works only in graphite","Copies of master drawings"],"correct":1,"exp":"All AP Studio Art portfolios: Sustained Investigation = 15 images of process. Shows conceptual development, experimentation, risk-taking, and revision."},{"type":"mc","q":"One-point perspective is characterized by:","choices":["Two vanishing points on the horizon line","All parallel lines converging to a single vanishing point on the horizon","Three vanishing points","No vanishing points"],"correct":1,"exp":"One-point perspective: parallel lines converge to one vanishing point. Good for interior spaces and frontal views of objects."},{"type":"mc","q":"Value scale in drawing refers to:","choices":["The monetary value of materials","A range of tones from the lightest lights to the darkest darks within a drawing","The size of the work","The color temperature"],"correct":1,"exp":"Value scale: a systematic range from white through grays to black. Training the eye to see and render these values accurately is fundamental to drawing."},{"type":"mc","q":"'Foreshortening' in figure drawing is the technique of:","choices":["Drawing figures very small","Compressing the length of a form to create the illusion it is pointing toward or away from the viewer","Exaggerating proportions","Drawing from memory"],"correct":1,"exp":"Foreshortening: a perspective effect where forms appear compressed when viewed at an angle. A figure's arm pointing at you looks much shorter than its actual length."},{"type":"mc","q":"The three main tonal areas in a sphere lit from one side are:","choices":["Outline, interior, background","Highlight, midtone/halftone, shadow (core shadow, reflected light, cast shadow)","Line, shape, form","Foreground, middle ground, background"],"correct":1,"exp":"Lit sphere: highlight (brightest) → halftone → core shadow (darkest on form) → reflected light (ambient light bouncing back) → cast shadow."},{"type":"mc","q":"Hatching and cross-hatching are techniques for:","choices":["Creating texture with clay","Building tonal value through parallel and intersecting line systems","Printing on paper","Making gestural marks"],"correct":1,"exp":"Hatching: parallel lines to create tone. Cross-hatching: overlapping sets of parallel lines at angles to create darker tones and texture."},{"type":"mc","q":"Blind contour drawing (without looking at the paper) is primarily an exercise to:","choices":["Create finished artworks","Train the eye to slow down and observe edges more carefully; improve hand-eye coordination","Develop color sense","Practice perspective"],"correct":1,"exp":"Blind contour: forces careful observation of the subject rather than relying on 'symbols' we carry in our minds for how things look."},{"type":"mc","q":"The term 'ground' in drawing refers to:","choices":["The floor of the studio","The surface on which drawing is made (paper, toned paper, canvas, etc.)","The darkest value","Foreground elements"],"correct":1,"exp":"Ground: the drawing surface. Toned ground (gray or colored paper) allows artists to work both dark and light from a middle value."},{"type":"mc","q":"Alla prima drawing (or direct drawing) means:","choices":["Drawing in stages over multiple sessions","Drawing completed in a single session without reworking","Copying from photographs","Drawing with a grid"],"correct":1,"exp":"Alla prima (Italian: 'at once'): completing a drawing or painting in one session, working wet into wet or directly without layers."},{"type":"mc","q":"In a still life drawing, how does overlapping create the illusion of depth?","choices":["By making objects smaller","By placing one object partially behind another, establishing a spatial relationship","By using aerial perspective","By changing color"],"correct":1,"exp":"Overlapping: when one form obscures part of another, it establishes that the obstructing form is in front. A fundamental depth cue in 2-D art."},{"type":"mc","q":"The mark-making quality most associated with expressive, gestural drawing is:","choices":["Mechanical precision","Varied, energetic lines that convey speed, pressure, and emotional response","Thin, uniform lines","Erased and redrawn lines"],"correct":1,"exp":"Expressive mark-making: varied pressure, speed, and direction create lines full of energy and emotion. Central to artists like Schiele, Cy Twombly."},{"type":"mc","q":"Drawing from observation differs from drawing from imagination in that:","choices":["Observation-based drawing is easier","Observation requires careful looking and recording of what is actually seen, not symbols or conventions","Imaginative drawing has no value","They produce identical results"],"correct":1,"exp":"Observational drawing: training the eye to see and the hand to record actual visual information, overriding mental 'symbols' (e.g., drawing a real eye, not a symbol for an eye)."},{"type":"mc","q":"Which paper characteristic most affects how dry media (charcoal, pastel) adhere?","choices":["Color of the paper","Tooth (texture/roughness) — more tooth holds more pigment","Weight (thickness)","Acid-free quality"],"correct":1,"exp":"Tooth: the textured surface of paper that 'grabs' dry media. High-tooth paper holds more charcoal/pastel; smooth paper gives less grip."},{"type":"mc","q":"The 'Selected Works' section of the AP Drawing portfolio emphasizes:","choices":["Variety in subject matter","The highest quality, most skillfully executed work showing mastery of mark-making and composition","Only gestural drawings","Works made in the shortest time"],"correct":1,"exp":"Selected Works (5 images): your most resolved, technically skilled, and intentional drawings. Shows command of the drawing medium."},{"type":"mc","q":"Which of the following best describes 'tonal drawing'?","choices":["Drawing only with line, no shading","A drawing primarily built through the manipulation of light and dark values to create form and space","A drawing made only in black ink","Drawing that uses only one tone"],"correct":1,"exp":"Tonal drawing: value-based rather than line-based. Forms are described through gradations of light and dark rather than outlines."}]}],"languages":[{"title":"AP Chinese Language and Culture","questions":[{"type":"mc","q":"The Chinese writing system uses:","choices":["An alphabet of 26 letters","Logographic characters (hanzi) where each character represents a morpheme","A syllabic writing system","A phonetic script only"],"correct":1,"exp":"Chinese uses logographic characters (hanzi). There is no alphabet — each character represents a morpheme (unit of meaning). Pinyin romanization aids pronunciation."},{"type":"mc","q":"Which of the following is a feature of Mandarin Chinese tones?","choices":["Mandarin has two tones","Mandarin has four tones plus a neutral tone (1st: flat, 2nd: rising, 3rd: dipping, 4th: falling)","Tone does not change meaning","Tones only appear in formal speech"],"correct":1,"exp":"Mandarin has 4 tones + neutral: 1st (flat high), 2nd (rising), 3rd (dip-rise), 4th (falling). Different tones on the same syllable create completely different words."},{"type":"mc","q":"In the AP Chinese exam, which section tests your ability to read and understand authentic Chinese texts?","choices":["Interpersonal writing","Interpersonal speaking","Interpretive reading comprehension","Presentational speaking"],"correct":2,"exp":"Interpretive reading: reading authentic Chinese texts (articles, emails, signs) and demonstrating comprehension. No interaction required."},{"type":"mc","q":"The simulated conversation section of the AP Chinese exam is an example of:","choices":["Interpretive listening","Presentational writing","Interpersonal speaking","Presentational speaking"],"correct":2,"exp":"Interpersonal speaking: two-way communication. The simulated conversation plays prompts; you respond in real time."},{"type":"mc","q":"Which of the following is a major AP Chinese exam theme?","choices":["Ancient Greek civilization","Families in Different Societies","European colonialism only","Abstract mathematics"],"correct":1,"exp":"AP Chinese themes include: Families in Different Societies, Science and Technology, Contemporary Life, Global Challenges, Beauty and Aesthetics, Personal and Public Identities."},{"type":"mc","q":"Simplified Chinese characters differ from Traditional Chinese in that:","choices":["They have more strokes","They were introduced in the 1950s in mainland China and have fewer strokes","They are used in Taiwan and Hong Kong","They are newer than Traditional characters"],"correct":1,"exp":"Simplified characters: mainland China (PRC) standardized reduced-stroke forms in 1950s–60s. Traditional: used in Taiwan, Hong Kong, Macau, overseas communities."},{"type":"mc","q":"Which Chinese character component is most useful for understanding a character's general meaning?","choices":["The phonetic component","The radical (bushou) — the semantic component that often hints at meaning category","The stroke count","The tone mark"],"correct":1,"exp":"Radical (bushou): the semantic classifier in a character. 水 (water) radical appears in characters related to water (河 river, 海 sea, 游 swim)."},{"type":"mc","q":"The AP Chinese exam's Cultural Comparison task asks students to:","choices":["Translate a Chinese text","Compare an aspect of Chinese culture to their own culture using the target language (Chinese)","Describe a Chinese festival","Write a formal business letter"],"correct":1,"exp":"Cultural Comparison (presentational speaking): compare a cultural practice/concept from Chinese-speaking communities with a parallel in your own culture."},{"type":"mc","q":"Measure words (量词 liàngcí) in Chinese grammar are:","choices":["Optional in formal speech","Required between a number and a noun (e.g., 一本书 yī běn shū — one [volume] book)","Used only for animate nouns","The same as articles in English"],"correct":1,"exp":"Measure words (classifiers): required in Chinese between numerals and nouns. 一本书 (book), 一张纸 (paper), 一条鱼 (fish). Different nouns use different measure words."},{"type":"mc","q":"The concept of 'face' (面子, miànzi) in Chinese culture refers to:","choices":["Physical appearance","Social prestige, reputation, and dignity — maintaining face is crucial in interpersonal relationships","Directness in communication","Individual achievement"],"correct":1,"exp":"Miànzi (面子): social face — reputation, prestige, social standing. Causing someone to lose face (丢面子) is a serious social offense in Chinese culture."},{"type":"mc","q":"In Chinese grammar, the particle 了 (le) primarily indicates:","choices":["Future tense","Completed action or a change of state","Ongoing action","Conditional mood"],"correct":1,"exp":"了 (le): marks completed action (verbal aspect) or a change of state. Chinese does not conjugate verbs for tense — particles and time words indicate when."},{"type":"mc","q":"The Spring Festival (春节 Chūnjié) is the most important Chinese holiday and corresponds to:","choices":["January 1","The Lunar New Year (date varies; January or February)","The winter solstice","National Day (October 1)"],"correct":1,"exp":"Spring Festival (Lunar New Year): the most important Chinese holiday. Celebrated with family reunion, red envelopes (红包), firecrackers, and dragon dances."},{"type":"mc","q":"Which writing system is used for Mandarin romanization in mainland China?","choices":["Wade-Giles","Bopomofo (Zhuyin)","Pinyin","Cangjie"],"correct":2,"exp":"Pinyin: the official romanization system for Mandarin in mainland China, used for teaching pronunciation and input methods."},{"type":"mc","q":"The AP Chinese exam's Story Narration task requires:","choices":["Translating a written text","Creating an oral story based on a series of four images","Writing a formal email","Answering comprehension questions"],"correct":1,"exp":"Story Narration (presentational speaking): tell a complete story based on 4 images in a logical, culturally appropriate way in Chinese."},{"type":"mc","q":"In Chinese culture, the concept of 关系 (guānxi) refers to:","choices":["Family hierarchy","A network of relationships and social connections that facilitate business and social interactions","Academic achievement","Government authority"],"correct":1,"exp":"Guānxi (关系): the system of social networks and influential relationships that facilitate business dealings and social life in Chinese culture."},{"type":"mc","q":"Chinese characters are written in strokes that follow:","choices":["Any order the writer prefers","Standard stroke order rules (top to bottom, left to right, horizontal before vertical)","Right to left, bottom to top","Randomly based on character shape"],"correct":1,"exp":"Stroke order: standard rules ensure consistent, efficient writing. Top to bottom, left to right, horizontal before vertical — varies by character type."},{"type":"mc","q":"The AP Chinese exam assesses communication in which contexts?","choices":["Only formal, academic contexts","Both informal/interpersonal and formal/presentational contexts across multiple themes","Only written communication","Only business communication"],"correct":1,"exp":"AP Chinese: interpersonal (informal conversation, text messages) and presentational (formal speech, essay) — both spoken and written."},{"type":"mc","q":"Which of the following represents a key grammatical difference between Chinese and English?","choices":["Chinese has complex verb conjugation","Chinese has no grammatical gender, no articles, and verbs do not conjugate for tense or number","Chinese uses case endings","Chinese word order is verb-subject-object"],"correct":1,"exp":"Chinese grammar: no verb conjugation for tense, no articles (a/the), no plural markers on nouns, no grammatical gender. Meaning from context and particles."},{"type":"mc","q":"The Four Modernizations (四个现代化) refer to:","choices":["Cultural practices","China's goal to modernize agriculture, industry, national defense, and science/technology (1970s policy)","Four classical Chinese texts","Four major Chinese dynasties"],"correct":1,"exp":"Four Modernizations: Deng Xiaoping's program modernizing agriculture, industry, defense, and science/technology — key to China's economic reform era."},{"type":"mc","q":"To succeed in AP Chinese interpretive tasks, a key strategy is:","choices":["Translating every word before answering","Using context clues, cognates with other languages, and key words to understand main ideas even with unfamiliar vocabulary","Reading only familiar topics","Avoiding audio passages"],"correct":1,"exp":"AP interpretive strategy: use context, visuals, titles, and key words. You don't need to understand every word — focus on main ideas and key details."}]},{"title":"AP French Language and Culture","questions":[{"type":"mc","q":"The AP French exam assesses communication through:","choices":["Translation exercises only","Three modes: interpretive (reading/listening), interpersonal (conversation/email), and presentational (essay/speech)","Grammar tests only","Memorization of vocabulary lists"],"correct":1,"exp":"AP French: same three-mode framework as all AP language courses. Interpersonal, interpretive, and presentational communication assessed."},{"type":"mc","q":"The subjunctive mood in French is used after:","choices":["Verbs of certainty","Expressions of doubt, emotion, will, necessity, and certain conjunctions (que, bien que, pour que)","Simple statements of fact","Future tense verbs"],"correct":1,"exp":"French subjunctive: required after verbs of emotion (être heureux que), doubt (douter que), will (vouloir que), and conjunctions like bien que (although)."},{"type":"mc","q":"Which of the following is a feature of spoken informal French?","choices":["Dropping the 'ne' in negation is incorrect","Speakers often drop 'ne' in negation: 'Je sais pas' instead of 'Je ne sais pas'","All pronouns are always used","Subjunctive is never used"],"correct":1,"exp":"Spoken informal French: 'ne' in negation frequently dropped. Je sais pas, C'est pas vrai. This is incorrect in formal written French."},{"type":"mc","q":"The passé composé is used in French to express:","choices":["Habitual past actions","Completed past actions or events (in conversation and informal writing)","Ongoing past states","Future actions"],"correct":1,"exp":"Passé composé: completed actions in the past ('I did,' 'I have done'). L'imparfait: habitual/ongoing past states ('I was doing,' 'I used to')."},{"type":"mc","q":"La Francophonie refers to:","choices":["The French government","The community of French-speaking countries and regions around the world","French literature only","The French Academy"],"correct":1,"exp":"La Francophonie: the global community of French speakers — 29 countries have French as an official language. Includes France, Canada, Belgium, Switzerland, many African nations."},{"type":"mc","q":"In the AP French Persuasive Essay, students must:","choices":["Translate a French text","Write an essay in French arguing a position, using at least two of three provided sources (including an audio source)","Write only in English about French culture","Describe a French landmark"],"correct":1,"exp":"AP French Persuasive Essay (Argumentative Essay): takes a position on an issue using evidence from French-language sources (two print, one audio)."},{"type":"mc","q":"The French partitive article (du, de la, des) is used with:","choices":["Countable nouns only","Uncountable or unspecified quantities of a noun ('some': du pain, de l'eau, des légumes)","Definite nouns","Proper nouns"],"correct":1,"exp":"Partitive articles: express 'some' before uncountable nouns. Je mange du pain (some bread), de la salade, de l'eau. After negation: pas de."},{"type":"mc","q":"Which period of French literature featured authors like Voltaire and Rousseau writing about reason and individual rights?","choices":["Medieval period","Renaissance","Enlightenment (Les Lumières — 18th century)","Romanticism"],"correct":2,"exp":"French Enlightenment (18th c.): Voltaire, Rousseau, Montesquieu — reason, individual rights, critique of religion and monarchy. Influenced the French Revolution."},{"type":"mc","q":"The conditional tense in French (je ferais) expresses:","choices":["A completed past action","What would happen — hypothetical situations and polite requests ('I would do')","A definite future action","A command"],"correct":1,"exp":"French conditional: expresses 'would' — hypothetical (Si j'avais le temps, je lirais = If I had time, I would read) and polite requests (Je voudrais = I would like)."},{"type":"mc","q":"The concept of 'laïcité' in French society refers to:","choices":["Catholic tradition in schools","Strict separation of religion and state — France's principle of secularism","Multicultural integration policy","Regional identity"],"correct":1,"exp":"Laïcité: French secularism — strict separation of church/religion and state. Religious symbols forbidden in public schools; strong state neutrality on religion."},{"type":"mc","q":"Which of the following correctly uses the subjonctif?","choices":["Il est certain qu'il vient","Je veux qu'il vienne","Il est vrai qu'il vient","Il sait qu'il vient"],"correct":1,"exp":"Subjonctif: 'Je veux qu'il vienne' (I want him to come — vouloir triggers subjunctive). The other sentences use indicative because they express certainty/fact."},{"type":"mc","q":"The AP French Conversation simulation requires students to:","choices":["Read a text aloud","Respond spontaneously in French to a series of prompts in a simulated phone or in-person conversation","Write a formal letter","Translate spoken French"],"correct":1,"exp":"AP French Interpersonal Speaking: simulated conversation — prompts play; students respond within allotted time. Tests real-time communication in French."},{"type":"mc","q":"In French grammar, relative pronouns 'qui' and 'que' differ in that:","choices":["Both function identically","'Qui' is the subject pronoun; 'que' is the direct object pronoun in relative clauses","'Qui' refers only to people","'Que' is used for places only"],"correct":1,"exp":"Qui: relative subject (L'homme qui parle = the man who speaks). Que: relative object (L'homme que je vois = the man whom I see). Qui never elides; que elides to qu'."},{"type":"mc","q":"French Impressionism in art and music is associated with which French composers?","choices":["Bach and Handel","Debussy and Ravel","Berlioz and Bizet","Satie only"],"correct":1,"exp":"French musical Impressionism: Debussy (Clair de Lune, La Mer) and Ravel (Boléro) — evocative, atmospheric music paralleling Impressionist painting."},{"type":"mc","q":"The imparfait tense in French is used for:","choices":["Completed actions with clear beginning and end","Ongoing past states, habitual past actions, and background description in narrative","Future events","Commands"],"correct":1,"exp":"Imparfait: ongoing states (j'étais, il faisait), habitual actions (je mangeais toujours), and background in narrative. Passé composé: foreground events."},{"type":"mc","q":"Which French-speaking African country has French as an official language and a significant Francophone literary tradition?","choices":["Ethiopia","Senegal (with authors like Léopold Sédar Senghor and Aminata Sow Fall)","Tanzania","South Africa"],"correct":1,"exp":"Senegal: major Francophone African nation. Senghor (Négritude movement) was both a poet and first president. Rich tradition of Francophone African literature."},{"type":"mc","q":"The AP French Cultural Comparison (Presentational Speaking) requires:","choices":["Translating a French proverb","Comparing a cultural practice in a French-speaking community to a similar practice in your own community, spoken in French","Reading a French poem","Writing about the French Revolution"],"correct":1,"exp":"Cultural Comparison: 4-minute prepared speech comparing a cultural product, practice, or perspective from a French-speaking community to your own culture."},{"type":"mc","q":"The French Revolution's 'Liberté, Égalité, Fraternité' (Liberty, Equality, Fraternity) refers to:","choices":["Economic policy","The motto of the French Republic representing its foundational democratic values","A literary movement","Napoleon's military strategy"],"correct":1,"exp":"Liberté, Égalité, Fraternité: the motto of the French Republic, originating from the French Revolution (1789). Still the official national motto."},{"type":"mc","q":"Which strategy is most effective for AP French reading comprehension with an unfamiliar text?","choices":["Reading every word with a dictionary","Identifying the text type, skimming for main ideas using context and cognates, then reading specific sections for details","Translating word-by-word","Skipping difficult passages entirely"],"correct":1,"exp":"AP reading strategy: identify text type → skim for main idea → use context/cognates (French-English cognates are common) → locate specific answers."},{"type":"mc","q":"In formal French writing, which register is required?","choices":["Familiar 'tu' and colloquial vocabulary","Formal 'vous,' complete negation (ne...pas), subjunctive where required, and academic vocabulary","Abbreviations and text language","English terms for modern concepts"],"correct":1,"exp":"Formal French: vouvoiement (vous), complete grammar (ne...pas), subjunctive, sophisticated vocabulary. AP essays and formal letters require formal register."}]},{"title":"AP German Language and Culture","questions":[{"type":"mc","q":"German nouns are characterized by:","choices":["No grammatical gender","Three grammatical genders (masculine, feminine, neuter) that determine article forms","Two genders (masculine, feminine)","Gender only affecting pronouns"],"correct":1,"exp":"German nouns have three genders: der (masculine), die (feminine), das (neuter). Gender is grammatically assigned, often unpredictable, and must be memorized."},{"type":"mc","q":"The German case system has:","choices":["Two cases","Three cases","Four cases: nominative, accusative, dative, genitive","Six cases"],"correct":2,"exp":"German has four cases: nominative (subject), accusative (direct object), dative (indirect object), genitive (possession). Cases change article and adjective endings."},{"type":"mc","q":"The German perfect tense (Perfekt) uses which auxiliaries?","choices":["Only sein (to be)","Haben (to have) or sein (to be), depending on the verb","Only haben","A separate auxiliary nicht"],"correct":1,"exp":"Perfekt: most verbs use haben; verbs of motion/change of state use sein (ist gegangen, ist geworden). Perfekt is used in spoken German; Präteritum in written."},{"type":"mc","q":"Which of the following correctly uses the German subordinating conjunction?","choices":["Ich weiß, er kommt heute","Ich weiß, dass er heute kommt (verb goes to end in subordinate clause)","Ich weiß dass er kommt heute","Dass er heute kommt, weiß ich nicht"],"correct":1,"exp":"Subordinate clauses in German: verb moves to the END. 'Ich weiß, dass er heute kommt' (I know that he is coming today). Verb-final in all dependent clauses."},{"type":"mc","q":"The Konjunktiv II in German is used for:","choices":["Stating facts","Expressing hypothetical situations, polite requests, and indirect speech ('I would,' 'if I were')","Commands","Simple past actions"],"correct":1,"exp":"Konjunktiv II: wäre (would be), hätte (would have), würde + infinitive. Used for conditionals (Wenn ich Zeit hätte = If I had time), polite requests (Könnten Sie = Could you)."},{"type":"mc","q":"German compound nouns are formed by:","choices":["Using a hyphen between two nouns","Combining multiple words into one long word (Donaudampfschifffahrtsgesellschaft)","Using prepositions between nouns","Separating elements with spaces"],"correct":1,"exp":"German compound nouns: words combined into one (Handtuch = hand + cloth = towel). No limit on length. The last element determines the meaning and gender."},{"type":"mc","q":"The Berlin Wall (Berliner Mauer) fell in:","choices":["1961","1989","1991","1975"],"correct":1,"exp":"The Berlin Wall fell on November 9, 1989, leading to German reunification on October 3, 1990. Built in 1961 to prevent East Germans from fleeing to the West."},{"type":"mc","q":"AP German themes include families in different societies. Which cultural concept describes the German tradition of extended family gatherings?","choices":["Gemeinschaft","Kaffeeklatsch (informal social gathering over coffee and cake)","Wanderlust","Weltanschauung"],"correct":1,"exp":"Kaffeeklatsch: informal social gathering with coffee/tea and cake — a cultural tradition of relaxed socializing, particularly associated with older generations."},{"type":"mc","q":"Separable verbs (trennbare Verben) in German work by:","choices":["Keeping the prefix attached at all times","Splitting the prefix to the end of the clause in main clauses (anrufen → Ich rufe dich an)","Using a hyphen","Never separating"],"correct":1,"exp":"Separable verbs: prefix detaches in simple sentences (Ich rufe an; Er kommt zurück) but stays attached in infinitives and subordinate clauses."},{"type":"mc","q":"The German concept of 'Heimat' most closely means:","choices":["Homeland in a political sense","A deep emotional attachment to one's home region, landscape, and cultural roots","Nationalism","Urban living"],"correct":1,"exp":"Heimat: a complex concept of emotional belonging to a place — one's home, landscape, community, culture. Not simply 'homeland' but a deeper sense of rootedness."},{"type":"mc","q":"German word order in a main clause follows:","choices":["Subject-Object-Verb","The verb must be in second position (V2), with other elements before or after","Verb always first","Free word order with no rules"],"correct":1,"exp":"German V2 rule: in main clauses, the conjugated verb is always the second element. If an adverb starts the sentence: Heute gehe ich ins Kino (Today go I to the cinema)."},{"type":"mc","q":"The Grimm Brothers are best known for:","choices":["Political theory","Collecting and publishing German fairy tales (Märchen) and pioneering German linguistics","Romantic philosophy","Classical music composition"],"correct":1,"exp":"Jacob and Wilhelm Grimm: collected Kinder- und Hausmärchen (fairy tales: Cinderella, Snow White, Hansel and Gretel) and developed comparative Germanic linguistics."},{"type":"mc","q":"In the AP German exam, the Argumentative Essay requires:","choices":["Only personal opinion without sources","An argument supported by evidence from provided German-language sources","Translation of a German text","A summary of a listening passage"],"correct":1,"exp":"AP German Argumentative Essay: write in German taking a position, supporting it with evidence from provided sources (print and audio), and acknowledging counterarguments."},{"type":"mc","q":"German modal verbs (können, müssen, dürfen, sollen, wollen, mögen) are distinctive because:","choices":["They follow standard conjugation patterns","They are conjugated differently and take an infinitive at the end of the clause","They don't change meaning based on tense","They are identical to English modals"],"correct":1,"exp":"German modals: conjugated irregularly; send the dependent infinitive to end of clause. Ich kann Deutsch sprechen (I can speak German). Ich musste gehen (I had to go)."},{"type":"mc","q":"The German Romantic period (Romantik) was characterized by:","choices":["Industrial themes and urban life","Emotion, nature, mythology, folklore, and the supernatural in literature and music","Classical rationalism","Political realism"],"correct":1,"exp":"German Romanticism: Goethe, Schiller (late), E.T.A. Hoffmann, Novalis — emotion, nature, the supernatural, Volksgeist (folk spirit). Music: Schubert, Weber."},{"type":"mc","q":"Austria and Switzerland share German as an official language. Which German variety is spoken in most of Switzerland?","choices":["Hochdeutsch (Standard German) exclusively","Swiss German (Schweizerdeutsch) dialects in daily life, with Standard German for writing/formal use","French only","Austrian German"],"correct":1,"exp":"Switzerland: Swiss German dialects (Alemannic) used in daily conversation; Standard German (Hochdeutsch) for writing, education, and media. German is one of 4 official Swiss languages."},{"type":"mc","q":"The Abitur in Germany is:","choices":["A type of traditional bread","The university entrance qualification — a comprehensive exit exam from Gymnasium (academic secondary school)","A folk music tradition","A regional dialect"],"correct":1,"exp":"Abitur: Germany's university entrance exam, taken after 12-13 years of school (Gymnasium). Equivalent to A-levels or International Baccalaureate."},{"type":"mc","q":"The German dative case is used for:","choices":["The subject of the sentence","The indirect object (to/for whom), and after specific prepositions (mit, nach, von, zu, bei, seit, aus)","Possession","The direct object"],"correct":1,"exp":"Dative: indirect object (Ich gebe dem Mann das Buch = I give the man the book) and after dative prepositions: mit, nach, von, zu, bei, seit, aus, gegenüber."},{"type":"mc","q":"Which strategy helps most in AP German speaking tasks?","choices":["Speaking only simple, short sentences","Using varied sentence structures, discourse markers, and elaborating with examples even if imperfect","Avoiding all difficult vocabulary","Responding in English when unsure"],"correct":1,"exp":"AP German speaking: vary structure, use transitions (jedoch, außerdem, deshalb), elaborate with examples, accept imperfection — fluency and communication matter more than perfection."},{"type":"mc","q":"Germany's Grundgesetz (Basic Law) is:","choices":["A traditional code of conduct","The German constitution (1949), the foundation of Germany's democratic federal republic","A regional law for Bavaria","Napoleon's law code as applied to Germany"],"correct":1,"exp":"Grundgesetz (Basic Law): Germany's constitution since 1949. Establishes fundamental rights, the federal structure, and democratic governance. Notably protects human dignity as inviolable."}]},{"title":"AP Italian Language and Culture","questions":[{"type":"mc","q":"Italian is classified as which language family?","choices":["Germanic","Romance (derived from Latin)","Slavic","Celtic"],"correct":1,"exp":"Italian is a Romance language, descended from Latin. Other Romance languages: Spanish, French, Portuguese, Romanian."},{"type":"mc","q":"The Italian passato prossimo uses:","choices":["Only avere (to have) as auxiliary","Avere or essere (to be) depending on the verb — motion/reflexive verbs use essere","Only essere","A separate auxiliary verb non"],"correct":1,"exp":"Passato prossimo: most verbs use avere; intransitive motion verbs and reflexive verbs use essere (sono andato/a, mi sono alzato/a). Agreement with essere constructions."},{"type":"mc","q":"In Italian, adjectives must:","choices":["Remain the same regardless of the noun","Agree in gender and number with the noun they modify","Precede all nouns","Be placed after verbs only"],"correct":1,"exp":"Italian adjective agreement: un uomo alto (tall man), una donna alta, degli uomini alti, delle donne alte. Most adjectives follow the noun."},{"type":"mc","q":"The Italian Renaissance was centered mainly in:","choices":["Rome and Venice","Florence, with key centers in Venice, Rome, and Milan","Naples and Sicily","Northern Italy only"],"correct":1,"exp":"Renaissance began in Florence (14th-15th c.) — Medici patronage, Dante, Boccaccio, Brunelleschi, Botticelli, Leonardo. Spread to Venice, Rome, Milan."},{"type":"mc","q":"Which Italian literary work is considered the foundation of the Italian language and literary tradition?","choices":["The Decameron","Dante's Divine Comedy (La Divina Commedia)","Orlando Furioso","The Prince"],"correct":1,"exp":"Dante's Divina Commedia (1308-1321): monumental poem in Florentine vernacular (not Latin) — established the Italian literary language. Three canticles: Inferno, Purgatorio, Paradiso."},{"type":"mc","q":"The subjunctive (congiuntivo) in Italian is used after:","choices":["Verbs of certainty","Expressions of doubt, emotion, hope, fear, and certain conjunctions (benché, affinché, a meno che)","All verbs","Future tense only"],"correct":1,"exp":"Italian congiuntivo: used in subordinate clauses expressing subjectivity — doubt (dubitare che), emotion (essere felice che), will (volere che), and after conjunctions like benché (although)."},{"type":"mc","q":"AP Italian themes include Contemporary Life. Which cultural concept describes the Italian tradition of the evening stroll?","choices":["Pranzo","La passeggiata — the ritual evening walk for socializing and being seen","Siesta","L'aperitivo"],"correct":1,"exp":"La passeggiata: the Italian tradition of an evening stroll through town — a social ritual of seeing and being seen, central to community life in Italian towns."},{"type":"mc","q":"The Italian conditional tense (io farei) is equivalent to:","choices":["I did","I will do","I would do","I am doing"],"correct":2,"exp":"Condizionale: expresses 'would.' Io farei (I would do), vorrei (I would like). Used in hypothetical sentences: Se avessi tempo, leggerei (If I had time, I would read)."},{"type":"mc","q":"The concept of 'la bella figura' in Italian culture means:","choices":["A famous painting","Making a good impression — presenting oneself well in appearance, manner, and behavior","Italian haute couture","A beautiful landscape"],"correct":1,"exp":"La bella figura: the Italian value of making a good impression — in dress, manner, speech, and behavior. Its opposite, la brutta figura (embarrassment), is to be avoided."},{"type":"mc","q":"Italian opera was developed primarily in:","choices":["Vienna","France","Italy (late 16th century — Florence's Camerata), with major centers in Naples, Venice, and Milan","Spain"],"correct":2,"exp":"Opera originated in Florence c. 1600 (Camerata). Major traditions: Venetian opera, Neapolitan opera seria, Rossini, Verdi, Puccini — all Italian masters."},{"type":"mc","q":"In Italian grammar, the reflexive verb 'alzarsi' means:","choices":["To wake someone up","To get (oneself) up — the subject performs the action on themselves","To fall asleep","To put on clothes"],"correct":1,"exp":"Reflexive verbs: subject acts on itself. Mi alzo (I get up), ti lavi (you wash yourself), si veste (he/she dresses). Very common in Italian daily routine verbs."},{"type":"mc","q":"The Italian city most associated with fashion, design, and financial capital is:","choices":["Rome","Florence","Milan","Venice"],"correct":2,"exp":"Milan: Italy's fashion and financial capital. Hosts Milan Fashion Week (Prada, Versace, Gucci, Armani). Major business and design center of northern Italy."},{"type":"mc","q":"Which Italian Renaissance artist is known for the Sistine Chapel ceiling and the sculpture David?","choices":["Leonardo da Vinci","Raphael","Michelangelo Buonarroti","Botticelli"],"correct":2,"exp":"Michelangelo: Sistine Chapel ceiling (1508-1512), David (1501-1504), Pietà. Also an architect (St. Peter's Basilica dome). One of the greatest artists of all time."},{"type":"mc","q":"The Risorgimento was:","choices":["A Renaissance artistic movement","The 19th-century movement for Italian unification, achieved in 1861","A type of Italian cuisine","A school of Italian opera"],"correct":1,"exp":"Risorgimento (Italian: 'resurgence'): the political and social movement for Italian unification. Key figures: Garibaldi, Cavour, Mazzini. Kingdom of Italy unified 1861."},{"type":"mc","q":"In Italian, the double negative (non...niente, non...mai) is:","choices":["Grammatically incorrect","Standard and grammatically correct (unlike in English)","Used only in southern dialects","Considered vulgar"],"correct":1,"exp":"Italian double negatives are grammatically correct: Non ho niente (I don't have anything = I have nothing). Non vado mai (I never go). Standard in Italian."},{"type":"mc","q":"The AP Italian exam's Presentational Writing task (Argumentative Essay) requires:","choices":["Writing only in English about Italian culture","Writing an argumentative essay in Italian, using evidence from provided Italian-language sources","Translating a passage","Describing an Italian artwork"],"correct":1,"exp":"AP Italian Argumentative Essay: written in Italian, taking a position supported by evidence from provided sources (including audio). Same framework as other AP language exams."},{"type":"mc","q":"Italian dialects are:","choices":["Identical to Standard Italian","Mutually intelligible varieties","Often mutually unintelligible regional languages (Venetian, Sicilian, Neapolitan) historically distinct from Standard Italian","Only used in writing"],"correct":1,"exp":"Italian dialects: historically distinct regional languages — Venetian, Sicilian, Neapolitan, Lombard. Standard Italian based on Florentine Tuscan. Some dialects are mutually unintelligible."},{"type":"mc","q":"The Italian article system includes definite articles that change based on:","choices":["Only gender","The gender of the noun AND the first letter/sound of the following word (lo, il, la, l', i, gli, le)","Only the first letter","Only singular/plural"],"correct":1,"exp":"Italian definite articles: il (m.sg. consonant), lo (m.sg. before s+cons, z, ps), l' (before vowel), la (f.sg.), i (m.pl.), gli (m.pl. before vowel/s+c/z), le (f.pl.)."},{"type":"mc","q":"Which sauce from Bologna is correctly called 'ragù' in Italian?","choices":["Alfredo sauce","Carbonara","Bolognese meat sauce (ragù alla bolognese)","Pesto genovese"],"correct":2,"exp":"Ragù alla bolognese: the traditional meat sauce from Bologna — slowly cooked minced meat, soffritto, wine, tomato. 'Bolognese' is the Italian-American name."},{"type":"mc","q":"To do well on AP Italian speaking tasks, a key strategy is:","choices":["Avoiding complex grammar","Using discourse markers (inoltre, tuttavia, per esempio, d'altra parte) to organize your speech and elaborating on answers","Speaking only in present tense","Keeping responses very brief"],"correct":1,"exp":"AP Italian speaking: use connectors (inoltre=moreover, tuttavia=however, per esempio=for example), elaborate with examples, use varied tenses — show linguistic range."}]},{"title":"AP Japanese Language and Culture","questions":[{"type":"mc","q":"Japanese uses how many writing systems?","choices":["One (hiragana only)","Two (hiragana and katakana)","Three main systems (hiragana, katakana, kanji) often used together","Only kanji"],"correct":2,"exp":"Japanese uses three scripts: hiragana (native words/grammar), katakana (foreign loanwords/emphasis), kanji (Chinese-origin characters). Often combined in one sentence."},{"type":"mc","q":"Hiragana is primarily used for:","choices":["Foreign loanwords","Native Japanese words and grammatical elements (particles, verb endings)","Scientific terms","Proper nouns"],"correct":1,"exp":"Hiragana: the basic syllabic script for native Japanese words and grammatical elements. 46 basic characters, each representing a syllable (mora)."},{"type":"mc","q":"Katakana is primarily used for:","choices":["Native Japanese words","Foreign loanwords (gairaigo), foreign names, and emphasis (e.g., コンピューター = computer)","Classical Japanese","Religious texts"],"correct":1,"exp":"Katakana: syllabic script for foreign words/names (アメリカ = America, コーヒー = coffee), scientific terms, and onomatopoeia. Same sounds as hiragana, different shapes."},{"type":"mc","q":"The Japanese honorific system (keigo) includes:","choices":["Only one level of formality","Sonkeigo (respectful language for others' actions), kenjōgo (humble language for own actions), and teineigo (polite language)","Formal and informal only","No distinction based on social relationship"],"correct":1,"exp":"Keigo: complex system of speech levels. Teineigo (です/ます): general polite form. Sonkeigo: elevates others. Kenjōgo: lowers oneself to show respect to others."},{"type":"mc","q":"In Japanese grammar, the verb is typically placed:","choices":["At the beginning of the sentence","In the middle","At the end of the sentence (Subject-Object-Verb order)","After the subject only"],"correct":2,"exp":"Japanese word order: SOV (Subject-Object-Verb). Particles mark grammatical function regardless of position. Example: 私は日本語を話します (I Japanese-[obj] speak)."},{"type":"mc","q":"Japanese particles (じょし) function to:","choices":["Replace nouns","Mark the grammatical role of words in a sentence (は topic, が subject, を object, に location/direction, で means/location)","Indicate verb tense","Create compound words"],"correct":1,"exp":"Particles: postpositions marking grammatical function. は (topic), が (subject), を (direct object), に (indirect object/direction), で (location of action/means), の (possession)."},{"type":"mc","q":"The concept of 'wa' (和) in Japanese culture refers to:","choices":["The Japanese language","Harmony, peace, and group cohesion — a core Japanese cultural value","A traditional art form","A martial art"],"correct":1,"exp":"Wa (和): harmony — a foundational Japanese value emphasizing group cohesion, consensus, and avoiding conflict. Influences workplace culture, social interactions, and aesthetics."},{"type":"mc","q":"The AP Japanese exam's Conversation tasks test:","choices":["Only formal speech","Ability to respond spontaneously in Japanese to prompts, demonstrating interpersonal communication in polite register","Written Japanese only","Classical Japanese"],"correct":1,"exp":"AP Japanese Interpersonal Speaking: simulated conversation responding to prompts. Uses teineigo (polite form). Tests real-time communication ability."},{"type":"mc","q":"Which Japanese art form involves the arrangement of flowers according to specific aesthetic principles?","choices":["Origami","Ikebana (生け花) — the art of Japanese flower arrangement","Kabuki","Noh"],"correct":1,"exp":"Ikebana: Japanese flower arrangement — not just decoration but an art with specific principles (asymmetry, space, line, nature). Schools include Ikenobo, Ohara, Sogetsu."},{"type":"mc","q":"The Japanese writing system kanji is borrowed from:","choices":["Korean","Chinese characters, adapted for Japanese use","Sanskrit","An indigenous Japanese system"],"correct":1,"exp":"Kanji (漢字): Chinese characters adopted and adapted by Japan from the 5th century CE. Same characters, but often different pronunciations (on'yomi from Chinese, kun'yomi native Japanese)."},{"type":"mc","q":"In Japanese, the te-form (verb + て) is used for:","choices":["Simple past tense","Connecting actions (and), making requests (〜てください), and forming progressive (~ている)","Future tense","Negative commands"],"correct":1,"exp":"Te-form: multifunctional. Connects verbs (食べて飲む = eat and drink), makes requests (食べてください = please eat), and progressive/state (食べている = is eating)."},{"type":"mc","q":"The traditional Japanese concept of 'ichi-go ichi-e' (一期一会) means:","choices":["First meeting, first impression","'One time, one meeting' — treasuring each encounter as unique and unrepeatable","A formal greeting","A tea ceremony term for the host"],"correct":1,"exp":"Ichi-go ichi-e: 'once in a lifetime meeting' — the awareness that each moment and encounter is unique. Associated with the tea ceremony and Zen philosophy."},{"type":"mc","q":"Japanese counting uses different counter words depending on:","choices":["The color of the object","The shape or category of what is being counted (本 for long objects, 枚 for flat objects, 匹 for small animals)","The size of the object only","Whether the number is odd or even"],"correct":1,"exp":"Japanese counters: different counting words for different categories. 本 (hon) for long thin objects, 枚 (mai) for flat objects, 冊 (satsu) for books, 匹 (hiki) for small animals."},{"type":"mc","q":"The Meiji period (1868-1912) in Japan was characterized by:","choices":["Isolation from the West","Rapid modernization and westernization — Japan transformed from feudal to industrial nation-state","Military expansion into China","The dominance of Buddhism over Shinto"],"correct":1,"exp":"Meiji Restoration: Japan opened to the West, rapidly modernized (industry, military, education, legal system), adopted Western technology while preserving Japanese identity."},{"type":"mc","q":"The Japanese tea ceremony (茶道, sadō) is associated with which philosophical/aesthetic principles?","choices":["Speed and efficiency","Wabi-sabi (imperfect beauty), harmony, respect, purity, and tranquility","Western formal dining","Buddhist ritual prayer"],"correct":1,"exp":"Sadō (way of tea): based on Zen aesthetics — wabi-sabi (beauty of imperfection), wa (harmony), kei (respect), sei (purity), jaku (tranquility). A mindful, meditative practice."},{"type":"mc","q":"In the AP Japanese Cultural Comparison task, students:","choices":["Translate a Japanese text","Speak in Japanese comparing an aspect of Japanese culture to a similar aspect of their own culture","Write a formal essay in English","Describe a Japanese festival in English"],"correct":1,"exp":"Cultural Comparison (presentational speaking): 4-minute speech in Japanese comparing a cultural practice, perspective, or product from Japan with a parallel in your own community."},{"type":"mc","q":"Which aspect of Japanese grammar indicates the direction of giving/receiving?","choices":["Japanese has no such grammar","Verbs like あげる (give up), もらう (receive), くれる (give down to me) express social direction of action","Particles alone mark direction","Word order determines this"],"correct":1,"exp":"Japanese giving/receiving verbs: あげる (I/someone give to another), もらう (I receive from another), くれる (someone gives to me/in-group). Crucial to express social relationships accurately."},{"type":"mc","q":"The Japanese value of 'gaman' (我慢) refers to:","choices":["Physical strength","Perseverance, patience, and endurance — suffering without complaint","Intellectual achievement","Family hierarchy"],"correct":1,"exp":"Gaman: enduring hardship with patience and dignity, without complaint. A core Japanese value — demonstrated widely during natural disasters and adversity."},{"type":"mc","q":"Standard Japanese (標準語, hyōjungo) is based on the dialect of:","choices":["Kyoto (historical capital)","Osaka","Tokyo (former Edo)","Hiroshima"],"correct":2,"exp":"Standard Japanese (hyōjungo) is based on the Tokyo dialect and became the national standard during the Meiji period through education and mass media."},{"type":"mc","q":"To excel in AP Japanese interpretive tasks with unfamiliar kanji:","choices":["Skip any text with unknown kanji","Use furigana (kana above kanji), context, surrounding known words, and grammatical clues to infer meaning","Memorize all 2,000+ joyo kanji first","Request a dictionary"],"correct":1,"exp":"AP Japanese strategy: use context, surrounding words, grammar, and furigana (provided in exam materials) to infer the meaning of unfamiliar kanji and words."}]},{"title":"AP Latin","questions":[{"type":"mc","q":"AP Latin focuses primarily on which two Latin authors?","choices":["Cicero and Ovid","Vergil (Aeneid) and Caesar (Gallic War)","Horace and Livy","Tacitus and Pliny"],"correct":1,"exp":"AP Latin: Vergil's Aeneid (Books 1,2,4,6,10,12) and Caesar's Gallic War (selections from Books 1,4,5,6). Both require close reading and translation."},{"type":"mc","q":"The Latin case system has how many cases?","choices":["Three","Four","Five: nominative, genitive, dative, accusative, ablative (+ vocative)","Seven"],"correct":2,"exp":"Latin has 5 main cases: nominative (subject), genitive (possession), dative (indirect object), accusative (direct object), ablative (various functions: means, manner, place, time). Vocative for direct address."},{"type":"mc","q":"An ablative absolute consists of:","choices":["A main verb with a subject","A noun and participle both in the ablative case, expressing a circumstance ('with X having been done')","A genitive phrase","An accusative and infinitive"],"correct":1,"exp":"Ablative absolute: independent grammatical element — noun + participle in ablative. Caesar signo dato, milites progredi coeperunt (The signal having been given, the soldiers began to advance)."},{"type":"mc","q":"Indirect statement in Latin after verbs of saying/thinking/knowing uses:","choices":["Nominative subject + finite verb","Accusative subject + infinitive (present/perfect/future)","Dative subject + infinitive","Subjunctive alone"],"correct":1,"exp":"Indirect statement: Dicit Aeneam esse fortem (He says that Aeneas is brave). Accusative = subject of infinitive. Tense of infinitive is relative to main verb."},{"type":"mc","q":"The subjunctive mood in Latin is used in:","choices":["All main clauses","Purpose clauses (ut + subj), result clauses (ut + subj after tam/ita), indirect questions, cum clauses, and conditional sentences","Only indirect speech","Only with the verb 'to be'"],"correct":1,"exp":"Latin subjunctive: purpose (ut + subj), result (ita/tam...ut), indirect questions (quis esset), cum clauses, conditions (si + imperfect subj), fear clauses (ne + subj)."},{"type":"mc","q":"In Vergil's Aeneid, the main protagonist Aeneas embodies the Roman virtue of:","choices":["Individual glory and personal honor","Pietas — duty to the gods, family, and state above personal desire","Cunning and deception","Military aggression"],"correct":1,"exp":"Pietas: Aeneas's defining quality — devotion to duty. He leaves Dido (love) and follows fate/Jupiter's will to found Rome. The Aeneid celebrates Roman pietas and destiny."},{"type":"mc","q":"Caesar's Gallic War is written in which person and style?","choices":["First person, emotional","Third person, terse and matter-of-fact ('Caesar did this; the Romans advanced')","Second person","First person plural"],"correct":1,"exp":"Caesar's Commentarii: written in 3rd person (Caesar dixit; milites fecerunt) in a spare, clear, matter-of-fact style. Self-presentation as objective commander."},{"type":"mc","q":"A gerundive in Latin expresses:","choices":["A simple action","Obligation or necessity ('must be done / needing to be done') — the verbal adjective of obligation","Past passive action","Indirect speech"],"correct":1,"exp":"Gerundive: verbal adjective indicating obligation. Liber legendus est (The book must be read / is to be read). With dative of agent: Mihi liber legendus est (The book must be read by me)."},{"type":"mc","q":"The dactylic hexameter is the meter used in:","choices":["Latin prose","Epic poetry — the Aeneid and other Latin epics","Elegiac verse","Lyric odes"],"correct":1,"exp":"Dactylic hexameter: the meter of epic poetry (Homer's Iliad/Odyssey,
