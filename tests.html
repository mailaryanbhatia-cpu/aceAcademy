<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<link rel="stylesheet" href="/ace-shared.css">
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>AcerAcademy — Tests</title>
<style>
:root{
  --bg:#f7f8fa;--sidebar:#fff;--card:#fff;
  --accent:#4f46e5;--accent2:#7c3aed;
  --text:#1e1b4b;--muted:#6b7280;--border:#e5e7eb;
  --hover:#f0f0ff;--green:#059669;--red:#dc2626;--amber:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── NAV ── */
.topnav{background:#1a2540;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.topnav .logo{font-weight:800;font-size:1.15rem;color:var(--accent);text-decoration:none;letter-spacing:-.5px}
.topnav .logo span{color:var(--accent2)}
.topnav a.nav-link{font-size:.85rem;color:var(--muted);text-decoration:none;padding:4px 10px;border-radius:6px;transition:all .15s}
.topnav a.nav-link:hover,.topnav a.nav-link.active{background:var(--hover);color:var(--accent)}
.topnav .spacer{flex:1}
.topnav h1{font-size:1rem;font-weight:600;color:var(--text);margin-left:4px}

/* ── GRADE BAR ── */
.grade-bar{background:#1a2540;border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap}
.grade-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:#1a2540;color:var(--muted);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s}
.grade-btn:hover{border-color:var(--accent);color:var(--accent)}
.grade-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:290px;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:32px}

/* ── SIDEBAR ── */
.subj-header{display:flex;align-items:center;gap:8px;padding:9px 20px;cursor:pointer;font-size:.875rem;font-weight:700;color:var(--text);transition:background .12s;user-select:none}
.subj-header:hover{background:var(--hover)}
.subj-icon{font-size:1.1rem}
.subj-arrow{margin-left:auto;font-size:.7rem;color:var(--muted);transition:transform .2s}
.subj-header.open .subj-arrow{transform:rotate(90deg)}
.subj-body{display:none;padding-left:12px}
.subj-body.open{display:block}
.unit-item{padding:7px 16px;font-size:.82rem;color:var(--muted);cursor:pointer;border-radius:6px;margin:2px 4px;transition:background .12s;line-height:1.4;display:flex;align-items:center;gap:6px}
.unit-item:hover{background:var(--hover);color:var(--text)}
.unit-item.active{background:rgba(99,102,241,0.18);color:var(--accent);font-weight:600}
.unit-badge{font-size:.65rem;background:var(--border);color:var(--muted);padding:1px 6px;border-radius:8px;flex-shrink:0}
.unit-item.done .unit-badge{background:#d1fae5;color:var(--green)}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:400px;color:var(--muted);text-align:center;gap:12px}
.empty-state .icon{font-size:3rem}
.empty-state h2{font-size:1.2rem;font-weight:600;color:var(--text)}

/* ── TEST WRAP ── */
.test-wrap{display:none;max-width:820px}
.test-wrap.visible{display:block}
.test-header{margin-bottom:24px}
.test-breadcrumb{font-size:.8rem;color:var(--muted);margin-bottom:6px}
.test-breadcrumb span{color:var(--accent)}
.test-title{font-size:1.5rem;font-weight:800;margin-bottom:4px}
.test-meta{font-size:.85rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.tag{background:#f0f0ff;color:var(--accent);padding:3px 10px;border-radius:12px;font-weight:600;font-size:.78rem}

/* ── SECTION DIVIDER ── */
.section-label{font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:18px 0 8px;border-top:1px solid var(--border);margin-top:12px}
.section-label:first-child{border-top:none;padding-top:0}

/* ── QUESTION CARD ── */
.q-card{background:#1a2540;border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:14px;transition:border-color .2s}
.q-card.correct{border-color:var(--green);background:#f0fdf4}
.q-card.wrong{border-color:var(--red);background:#fef2f2}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--accent);color:#fff;border-radius:50%;font-size:.78rem;font-weight:700;margin-bottom:10px;flex-shrink:0}
.q-card.correct .q-num{background:var(--green)}
.q-card.wrong .q-num{background:var(--red)}
.q-text{font-size:.97rem;font-weight:500;line-height:1.6;margin-bottom:14px;white-space:pre-wrap}

/* MC */
.choices{display:flex;flex-direction:column;gap:8px}
.choice-label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);transition:all .15s;font-size:.9rem;line-height:1.5}
.choice-label:hover{border-color:var(--accent);background:var(--hover)}
.choice-label input{margin-top:3px;accent-color:var(--accent);flex-shrink:0}
.choice-label.selected{border-color:var(--accent);background:rgba(99,102,241,0.18)}
.choice-label.graded-correct{border-color:var(--green);background:#f0fdf4;font-weight:600}
.choice-label.graded-wrong{border-color:var(--red);background:#fef2f2}

/* SA */
.sa-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;transition:border-color .2s}
.sa-input:focus{outline:none;border-color:var(--accent)}
.sa-input.correct{border-color:var(--green);background:#f0fdf4}
.sa-input.wrong{border-color:var(--red);background:#fef2f2}

/* SW */
.sw-work{width:100%;min-height:80px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;resize:vertical;background:#fafafa;transition:border-color .2s}
.sw-work:focus{outline:none;border-color:var(--accent)}
.sw-ans-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.sw-ans-label{font-size:.82rem;font-weight:600;color:var(--muted);white-space:nowrap}
.sw-ans-input{flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;transition:border-color .2s}
.sw-ans-input:focus{outline:none;border-color:var(--accent)}
.sw-ans-input.correct{border-color:var(--green);background:#f0fdf4}
.sw-ans-input.wrong{border-color:var(--red);background:#fef2f2}

/* Feedback */
.feedback{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:.85rem;line-height:1.5;display:none}
.feedback.show{display:block}
.feedback.correct{background:#f0fdf4;color:#065f46;border-left:3px solid var(--green)}
.feedback.wrong{background:#fef2f2;color:#991b1b;border-left:3px solid var(--red)}

/* ── SUBMIT / RESULTS ── */
.submit-row{margin:28px 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.submit-btn{background:var(--accent);color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .15s}
.submit-btn:hover{background:var(--accent2)}
.submit-btn:disabled{background:#9ca3af;cursor:not-allowed}
.retake-btn{background:#1a2540;color:var(--accent);border:2px solid var(--accent);padding:12px 28px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .15s}
.retake-btn:hover{background:var(--hover)}

/* Score card */
.score-card{background:#1a2540;border:2px solid var(--border);border-radius:16px;padding:28px;margin-bottom:28px;text-align:center}
.score-ring{font-size:3rem;font-weight:900;margin-bottom:6px}
.score-ring.a{color:var(--green)}
.score-ring.b{color:#0ea5e9}
.score-ring.c{color:var(--amber)}
.score-ring.d{color:var(--red)}
.score-label{font-size:1rem;color:var(--muted);margin-bottom:16px}
.score-bars{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.score-bar-item{text-align:center;font-size:.8rem;color:var(--muted)}
.score-bar-item strong{display:block;font-size:1.1rem;font-weight:800;color:var(--text)}
.score-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.score-actions button{padding:10px 22px;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;border:2px solid var(--accent);transition:all .15s}
.score-actions .btn-primary{background:var(--accent);color:#fff}
.score-actions .btn-primary:hover{background:var(--accent2)}
.score-actions .btn-outline{background:transparent;color:var(--accent)}
.score-actions .btn-outline:hover{background:rgba(99,102,241,.1)}
/* Timer display */
.test-timer{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:8px;padding:4px 12px;font-size:.82rem;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.test-timer.warning{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:var(--red)}
/* Review mistakes mode */
.q-card.correct.hidden-correct{display:none}
.review-banner{background:rgba(239,68,68,.1);border:1.5px solid var(--red);border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:.85rem;color:var(--red);font-weight:600;display:flex;align-items:center;gap:8px}
/* Mobile sidebar toggle */
.sidebar-toggle{display:none;background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;margin:10px 16px}
@media(max-width:700px){
  .layout{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:0;overflow:hidden;padding:0;transition:max-height .3s ease}
  .sidebar.open{max-height:60vh;overflow-y:auto;padding:16px 0}
  .sidebar-toggle{display:block}
  .main{padding:16px}
  .test-wrap{max-width:100%}
  .grade-bar{padding:8px 12px;gap:6px}
  .grade-btn{padding:5px 10px;font-size:.75rem}
  .score-ring{font-size:2.2rem}
  .submit-row{flex-direction:column;align-items:stretch}
  .submit-btn,.retake-btn{width:100%;text-align:center}
}
.progress-bar-outer{height:8px;background:var(--border);border-radius:4px;margin-top:12px;overflow:hidden}
.progress-bar-inner{height:100%;border-radius:4px;background:var(--accent);transition:width .6s ease}
</style>

<script>
// Test bank data -- moved to /tests-data.js (loaded via <script src> just above)

const SUBJECTS = {
  math:    {label:"Mathematics",  icon:"📐"},
  science: {label:"Science",      icon:"🔬"},
  ela:     {label:"English / ELA",icon:"📚"},
  history: {label:"History",      icon:"🌍"},
  cs:      {label:"Computer Sci.",icon:"💻"},
  health:  {label:"Health & PE",  icon:"🏃"},
};


const AP_SUBJECTS = {
  math:      {label:"Mathematics (AP)",          icon:"📐"},
  science:   {label:"Science (AP)",              icon:"🔬"},
  ela:       {label:"English (AP)",              icon:"📚"},
  history:   {label:"History & Social Sci (AP)", icon:"🌍"},
  cs:        {label:"Computer Science (AP)",     icon:"💻"},
  arts:      {label:"Arts (AP)",                 icon:"🎨"},
  languages: {label:"World Languages (AP)",      icon:"🌐"},
  capstone:  {label:"AP Capstone",               icon:"🎓"},
};
let currentGrade = 6;
let currentTest = null; // {grade,subj,unitIdx}
let currentQuestions = []; // shuffled copy used for render + grading
const scores = {}; // key → score

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

function scoreKey(g,s,u,part){ return part!=null ? `${g}-${s}-${u}-${part}` : `${g}-${s}-${u}`; }

function selectGrade(grade,btn){
  currentGrade = grade;
  document.querySelectorAll('.grade-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  clearTest();
  buildSidebar(grade);
}

function buildSidebar(grade){
  const activeSubjects = (grade === 'ap') ? AP_SUBJECTS : SUBJECTS;
  const sidebar = document.getElementById('sidebar');
  const gradeData = TESTS[grade];
  if(!gradeData){ sidebar.innerHTML='<p style="padding:20px;color:var(--muted);font-size:.85rem">No tests for this grade yet.</p>'; return; }
  let html = '';
  for(const [subj, meta] of Object.entries(activeSubjects)){
    const units = gradeData[subj];
    if(!units||!units.length) continue;
    const sId = `s-${grade}-${subj}`;
    html += `<div>
      <div class="subj-header" id="${sId}-h" onclick="toggleSubj('${sId}')">
        <span class="subj-icon">${meta.icon}</span>
        <span>${meta.label}</span>
        <span class="subj-arrow">▶</span>
      </div>
      <div class="subj-body" id="${sId}-b">`;
    units.forEach((unit,ui)=>{
      if(grade === 'ap'){
        // AP: clicking unit shows options panel (Part 1, Part 2, Full Test)
        const k0=scoreKey(grade,subj,ui,0), k1=scoreKey(grade,subj,ui,1), k2=scoreKey(grade,subj,ui,2);
        const anyDone = scores[k0]||scores[k1]||scores[k2];
        const allDone = scores[k0]&&scores[k1]&&scores[k2];
        html += `<div class="unit-item${allDone?' done':''}" id="ui-${grade}-${subj}-${ui}" onclick="showUnitOptions('${grade}','${subj}',${ui})">
          <span>${unit.title}</span>
          <span class="unit-badge">${allDone?'✓':anyDone?'⋯':'3 tests'}</span>
        </div>`;
      } else {
        const key = scoreKey(grade,subj,ui);
        const sc = scores[key];
        const done = sc !== undefined;
        const pct = done ? Math.round(sc.correct/sc.total*100) : null;
        const badge = done ? `${pct}%` : '20q';
        html += `<div class="unit-item${done?' done':''}" id="ui-${grade}-${subj}-${ui}" onclick="openTest('${grade}','${subj}',${ui})">
          <span>${unit.title}</span>
          <span class="unit-badge">${badge}</span>
        </div>`;
      }
    });
    html += `</div></div>`;
  }
  sidebar.innerHTML = html;
}

function toggleSubj(id){
  document.getElementById(id+'-h').classList.toggle('open');
  document.getElementById(id+'-b').classList.toggle('open');
}

function showUnitOptions(grade,subj,unitIdx){
  // Highlight sidebar item
  document.querySelectorAll('.unit-item').forEach(e=>e.classList.remove('active'));
  const el = document.getElementById(`ui-${grade}-${subj}-${unitIdx}`);
  if(el) el.classList.add('active');

  currentTest = {grade,subj,unitIdx,part:null};

    </div>

          <div style="width:44px;height:44px;border-radius:12px;background:rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">1️⃣</div>
          <div style="flex:1">
            <div style="font-size:1rem;font-weight:700;color:var(--text)">First Half</div>
            <div style="font-size:.8rem;color:var(--muted);margin-top:2px">${half} questions · Topics 1–${half}</div>
          </div>
          ${badgeFor(0)}
          <span style="color:var(--muted);font-size:1rem">›</span>
        </div>
      </div>
      <div class="unit-option-card" onclick="openTest('${grade}','${subj}',${unitIdx},1)">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:44px;height:44px;border-radius:12px;background:rgba(99,102,241,.12);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">2️⃣</div>
          <div style="flex:1">
            <div style="font-size:1rem;font-weight:700;color:var(--text)">Second Half</div>
            <div style="font-size:.8rem;color:var(--muted);margin-top:2px">${secondHalf} questions · Topics ${half+1}–${unit.questions.length}</div>
          </div>
          ${badgeFor(1)}
          <span style="color:var(--muted);font-size:1rem">›</span>
        </div>
      </div>

      <div class="unit-option-card full" onclick="openTest('${grade}','${subj}',${unitIdx},2)">
        <div style="display:flex;align-items:center;gap:14px">
          <div style="width:44px;height:44px;border-radius:12px;background:rgba(99,102,241,.2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0">📋</div>
          <div style="flex:1">
            <div style="font-size:1rem;font-weight:700;color:var(--text)">Full Unit Test</div>
            <div style="font-size:.8rem;color:var(--muted);margin-top:2px">All ${unit.questions.length} questions</div>
          </div>
          ${badgeFor(2)}
          <span style="color:var(--muted);font-size:1rem">›</span>
        </div>
      </div>
    </div>`;
}

// ── TEST TIMER ──────────────────────────────────────────────
let testStartTime = null, testTimerInterval = null;
function startTestTimer(){
  testStartTime = Date.now();
  if(testTimerInterval) clearInterval(testTimerInterval);
  testTimerInterval = setInterval(()=>{
    const el = document.getElementById('testTimerDisplay');
    if(!el){ clearInterval(testTimerInterval); return; }
    const s = Math.floor((Date.now()-testStartTime)/1000);
    const m = Math.floor(s/60), sec = s%60;
    el.textContent = `⏱ ${m}:${sec<10?'0':''}${sec}`;
    el.className = 'test-timer' + (s > 1800 ? ' warning' : '');
  }, 1000);
}
function stopTestTimer(){ clearInterval(testTimerInterval); return testStartTime ? Math.floor((Date.now()-testStartTime)/1000) : 0; }

function openTest(grade,subj,unitIdx,part){
  document.querySelectorAll('.unit-item').forEach(e=>e.classList.remove('active'));
  const el = document.getElementById(`ui-${grade}-${subj}-${unitIdx}`);
  if(el) el.classList.add('active');

  // Hide options panel
  document.getElementById('unitOptions').style.display='none';

  currentTest = {grade,subj,unitIdx,part};
  const unit = TESTS[grade][subj][unitIdx];
  // Slice questions based on part (for AP half-unit tests)
  let unitView = unit;
  if(part != null){
    const qs = unit.questions;
    const half = Math.ceil(qs.length / 2);
    const slicedQs = part === 0 ? qs.slice(0, half) : part === 1 ? qs.slice(half) : qs;
    const labels = ['Part 1', 'Part 2', 'Full Test'];
    unitView = Object.assign({}, unit, {
      title: unit.title + ' — ' + labels[part],
      questions: slicedQs
    });
  }
  renderTest(grade,subj,unitIdx,unitView,part);
}

function renderTest(grade,subj,unitIdx,unit,part){
  document.getElementById('emptyState').style.display='none';
  const wrap = document.getElementById('testWrap');
  wrap.classList.add('visible');

  const meta = ((grade === 'ap') ? AP_SUBJECTS : SUBJECTS)[subj] || {label: subj, icon: '📚'};

  // Build a fresh shuffled copy every time — questions in random order,
  // MC choices also shuffled (correct index updated to match).
  currentQuestions = shuffle(unit.questions.map(q=>{
    const copy = Object.assign({}, q);
    if(copy.type==='mc' && Array.isArray(copy.choices)){
      const correctText = copy.choices[copy.correct];
      copy.choices = shuffle([...copy.choices]);
      copy.correct = copy.choices.indexOf(correctText);
    }
    return copy;
  }));

  // Group by type
  const mcQs=[], saQs=[], swQs=[];
  currentQuestions.forEach((q,i)=>{
    if(q.type==='mc') mcQs.push({q,i});
    else if(q.type==='sa') saQs.push({q,i});
    else swQs.push({q,i});
  });

  let qNum = 0;

  function renderMC({q,i}){
    qNum++;
    const n = qNum;
    return `<div class="q-card" id="qc-${i}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="q-num" id="qnum-${i}">${n}</div>
        <span style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.06em">MULTIPLE CHOICE</span>
      </div>
      <div class="q-text">${q.q}</div>
      <div class="choices" id="choices-${i}">
        ${q.choices.map((c,ci)=>`<label class="choice-label" id="cl-${i}-${ci}">
          <input type="radio" name="q${i}" value="${ci}" onchange="selectChoice(${i},${ci})"> ${c}
        </label>`).join('')}
      </div>
      <div class="feedback" id="fb-${i}"></div>
    </div>`;
  }

  function renderSA({q,i}){
    qNum++;
    const n = qNum;
    return `<div class="q-card" id="qc-${i}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="q-num" id="qnum-${i}">${n}</div>
        <span style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.06em">SHORT ANSWER</span>
      </div>
      <div class="q-text">${q.q}</div>
      <input class="sa-input" id="sa-${i}" type="text" placeholder="Type your answer here…" autocomplete="off"/>
      <div class="feedback" id="fb-${i}"></div>
    </div>`;
  }

  function renderSW({q,i}){
    qNum++;
    const n = qNum;
    return `<div class="q-card" id="qc-${i}">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="q-num" id="qnum-${i}">${n}</div>
        <span style="font-size:.72rem;font-weight:700;color:var(--muted);letter-spacing:.06em">SHOW YOUR WORK</span>
      </div>
      <div class="q-text">${q.q}</div>
      <textarea class="sw-work" id="sw-work-${i}" placeholder="Show your work here…"></textarea>
      <div class="sw-ans-row">
        <span class="sw-ans-label">Final Answer:</span>
        <input class="sw-ans-input" id="sw-ans-${i}" type="text" placeholder="Write your final answer…" autocomplete="off"/>
      </div>
      <div class="feedback" id="fb-${i}"></div>
    </div>`;
  }

  qNum = 0;
  startTestTimer();
  let html = `<div class="test-header">
    <div class="test-breadcrumb">${grade==='k'?'Kindergarten':'Grade '+grade} &rsaquo; <span>${meta.label}</span></div>
    <div class="test-title">${unit.title}</div>
    <div class="test-meta">
      <span class="tag">${grade==='k'?'Kindergarten':'Grade '+grade}</span>
      <span class="tag">${meta.icon} ${meta.label}</span>
      <span class="tag">${currentQuestions.length} Questions</span>
      <span class="test-timer" id="testTimerDisplay">⏱ 0:00</span>
    </div>
    <div class="progress-bar-outer" style="margin-top:12px">
      <div class="progress-bar-inner" id="progressBar" style="width:0%"></div>
    </div>
  </div>
  <div id="scoreCard" style="display:none"></div>`;

  if(mcQs.length){
    html += `<div class="section-label">📝 Section A — Multiple Choice</div>`;
    mcQs.forEach(item=>{ html += renderMC(item); });
  }
  if(saQs.length){
    html += `<div class="section-label">✏️ Section B — Short Answer</div>`;
    saQs.forEach(item=>{ html += renderSA(item); });
  }
  if(swQs.length){
    html += `<div class="section-label">🔢 Section C — Show Your Work</div>`;
    swQs.forEach(item=>{ html += renderSW(item); });
  }

  html += `<div class="submit-row">
    <button class="submit-btn" id="submitBtn" onclick="gradeTest()">Submit Test</button>
    <span id="unansweredMsg" style="font-size:.85rem;color:var(--muted)"></span>
  </div>`;

  wrap.innerHTML = html;
  wrap.scrollTop = 0;
  updateProgress();
}

function selectChoice(qi, ci){
  document.querySelectorAll(`label[id^="cl-${qi}-"]`).forEach(l=>l.classList.remove('selected'));
  document.getElementById(`cl-${qi}-${ci}`)?.classList.add('selected');
  updateProgress();
}

function updateProgress(){
  const qs = currentQuestions;
  if(!qs || !qs.length) return;
  let answered = 0;
  qs.forEach((q,i)=>{
    if(q.type==='mc' && document.querySelector(`input[name="q${i}"]:checked`)) answered++;
    else if(q.type==='sa' && document.getElementById(`sa-${i}`)?.value.trim()) answered++;
    else if(q.type==='sw' && document.getElementById(`sw-ans-${i}`)?.value.trim()) answered++;
  });
  const pct = Math.round(answered/qs.length*100);
  const bar = document.getElementById('progressBar');
  if(bar) bar.style.width = pct+'%';
}

function normalize(s){ return String(s).trim().toLowerCase().replace(/[.,!?]/g,''); }
function numClose(a,b){ const na=parseFloat(a),nb=parseFloat(b); return !isNaN(na)&&!isNaN(nb)&&Math.abs(na-nb)<0.01; }

function gradeTest(){
  const {grade,subj,unitIdx} = currentTest;
  const qs = currentQuestions;
  let correct=0, total=qs.length;

  qs.forEach((q,i)=>{
    const card = document.getElementById(`qc-${i}`);
    const fb   = document.getElementById(`fb-${i}`);
    let isCorrect = false;

    if(q.type==='mc'){
      const sel = document.querySelector(`input[name="q${i}"]:checked`);
      const chosen = sel ? parseInt(sel.value) : -1;
      isCorrect = chosen === q.correct;
      // colour choices
      q.choices.forEach((_,ci)=>{
        const lbl = document.getElementById(`cl-${i}-${ci}`);
        if(!lbl) return;
        lbl.querySelector('input').disabled = true;
        if(ci === q.correct) lbl.classList.add('graded-correct');
        else if(ci === chosen && !isCorrect) lbl.classList.add('graded-wrong');
      });
    } else if(q.type==='sa'){
      const inp = document.getElementById(`sa-${i}`);
      if(inp){
        inp.disabled=true;
        const userVal = inp.value.trim();
        isCorrect = normalize(userVal)===normalize(q.ans) || numClose(userVal,q.ans) ||
                    normalize(q.ans).includes(normalize(userVal)) ||
                    normalize(userVal).includes(normalize(q.ans));
        inp.classList.add(isCorrect?'correct':'wrong');
      }
    } else { // sw
      const inp = document.getElementById(`sw-ans-${i}`);
      const work = document.getElementById(`sw-work-${i}`);
      if(inp){
        inp.disabled=true;
        if(work) work.disabled=true;
        const userVal = inp.value.trim();
        const expected = String(q.ans);
        isCorrect = normalize(userVal)===normalize(expected) || numClose(userVal,expected);
        inp.classList.add(isCorrect?'correct':'wrong');
      }
    }

    if(card){
      card.classList.add(isCorrect?'correct':'wrong');
      document.getElementById(`qnum-${i}`)?.classList.add(isCorrect?'correct':'wrong');
    }
    if(fb){
      fb.classList.add('show',isCorrect?'correct':'wrong');
      fb.innerHTML = isCorrect
        ? `✅ <strong>Correct!</strong> ${q.exp}`
        : `❌ <strong>Incorrect.</strong> ${q.exp} <br><em>Correct answer: ${q.type==='mc'?q.choices[q.correct]:q.ans}</em>`;
    }
    if(isCorrect) correct++;
  });

  // Stop timer and get elapsed
  const elapsed = stopTestTimer();
  const elapsedMin = Math.floor(elapsed/60), elapsedSec = elapsed%60;
  const timeStr = `${elapsedMin}:${elapsedSec<10?'0':''}${elapsedSec}`;

  // Previous best
  let prevBest = null;
  try{ const prev = JSON.parse(localStorage.getItem('aceTestScore_'+scoreKey(grade,subj,unitIdx))||'null'); if(prev) prevBest = Math.round(prev.correct/prev.total*100); }catch(e){}

  // Score card
  const pct = Math.round(correct/total*100);
  const wrongCount = total - correct;

  // Award XP for completing this test -- base amount plus a bonus per
  // correct answer, so a stronger score earns more.
  if (window.AceXP) { try { AceXP.recordActivity(10 + correct*5, 'Test: ' + pct + '%'); } catch(e) {} }
  let grade_letter = pct>=90?'a':pct>=80?'b':pct>=70?'c':'d';
  let emoji = pct>=90?'🏆':pct>=80?'⭐':pct>=70?'👍':'📖';
  let msg = pct>=90?'Excellent work!':pct>=80?'Great job!':pct>=70?'Good effort — review the mistakes below.':'Keep studying — use the review below!';
  const prevNote = prevBest !== null ? (pct > prevBest ? `↑ Improved from ${prevBest}%` : pct === prevBest ? `Same as last time (${prevBest}%)` : `↓ Previous best: ${prevBest}%`) : 'First attempt!';

  const sc = document.getElementById('scoreCard');
  sc.style.display='block';

  sc.innerHTML = `<div class="score-card">
    <div class="score-ring ${grade_letter}">${emoji} ${pct}%</div>
    <div class="score-label">${correct} / ${total} correct — ${msg}</div>
    <div class="score-bars">
      <div class="score-bar-item"><strong>${correct}</strong>Correct</div>
      <div class="score-bar-item"><strong>${wrongCount}</strong>Incorrect</div>
      <div class="score-bar-item"><strong>${pct}%</strong>Score</div>
      <div class="score-bar-item"><strong>${timeStr}</strong>Time</div>
      <div class="score-bar-item"><strong style="font-size:.85rem;color:${pct>=(prevBest||0)?'var(--green)':'var(--red)'}">${prevNote}</strong>vs. Previous</div>
    </div>
    <div class="score-actions">
      <button class="btn-primary" onclick="openTest('${grade}','${subj}',${unitIdx})">🔄 Retake Test</button>
      ${wrongCount > 0 ? `<button class="btn-outline" onclick="reviewMistakes()">📋 Review ${wrongCount} Mistake${wrongCount>1?'s':''}</button>` : ''}
      ${grade==='ap' ? `<button class="btn-outline" onclick="showUnitOptions('${grade}','${subj}',${unitIdx})">← Back to Options</button>` : ''}
    </div>
  </div>`;
  sc.scrollIntoView({behavior:'smooth', block:'start'});

  // Update progress bar to 100%
  const bar = document.getElementById('progressBar');
  if(bar){ bar.style.width='100%'; bar.style.background = pct>=70?'var(--green)':'var(--red)'; }
  document.getElementById('submitBtn').innerHTML = `✅ Submitted — ${pct}%`;
  document.getElementById('submitBtn').disabled = true;

  // Store score & refresh sidebar badge
  const {part} = currentTest;
  scores[scoreKey(grade,subj,unitIdx,part!=null?part:null)] = {correct,total};
  // Persist score to localStorage for progress tracker
  try{
    const sk = 'aceTestScore_'+scoreKey(grade,subj,unitIdx);
    const entry = {correct,total,grade,subj,unitIdx,ts:Date.now()};
    localStorage.setItem(sk, JSON.stringify(entry));
    // Append to history log
    const hist = JSON.parse(localStorage.getItem('aceTestHistory')||'[]');
    hist.unshift(entry);
    localStorage.setItem('aceTestHistory', JSON.stringify(hist.slice(0,200)));
  }catch(e){}
  buildSidebar(grade);
  document.getElementById(`ui-${grade}-${subj}-${unitIdx}`)?.classList.add('active');
}

function reviewMistakes(){
  // Hide all correct cards, show only wrong ones
  const wrap = document.getElementById('testWrap');
  const alreadyReviewing = wrap.querySelector('.review-banner');
  if(alreadyReviewing){ alreadyReviewing.remove(); document.querySelectorAll('.q-card.correct').forEach(c=>c.classList.remove('hidden-correct')); return; }
  const wrongCards = [...document.querySelectorAll('.q-card.wrong')];
  if(!wrongCards.length){ alert('No mistakes to review!'); return; }
  document.querySelectorAll('.q-card.correct').forEach(c=>c.classList.add('hidden-correct'));
  const banner = document.createElement('div');
  banner.className='review-banner';
  banner.innerHTML=`📋 Reviewing ${wrongCards.length} mistake${wrongCards.length>1?'s':''} only &nbsp;<button onclick="reviewMistakes()" style="margin-left:auto;background:none;border:1px solid var(--red);color:var(--red);padding:3px 10px;border-radius:6px;cursor:pointer;font-size:.8rem">✕ Show All</button>`;
  wrap.insertBefore(banner, wrap.querySelector('.section-label')||wrap.firstChild);
  wrongCards[0].scrollIntoView({behavior:'smooth', block:'center'});
}

function clearTest(){
  document.getElementById('emptyState').style.display='';
  document.getElementById('unitOptions').style.display='none';
  const wrap=document.getElementById('testWrap');
  wrap.classList.remove('visible');
  wrap.innerHTML='';
  currentTest=null;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
buildSidebar(6);

// Auto-update progress as user types
document.getElementById('testWrap').addEventListener('input', updateProgress);
</script>

    <div class="np-foot-btns">
      <button class="np-foot-btn" onclick="copyNotes()">📋 Copy</button>
      <button class="np-foot-btn danger" onclick="clearNote()">🗑 Clear</button>
    </div>
  </div>
</div>

<script>
(function(){
  const NOTE_TABS = [
    {key:'general',   label:'📓 General'},
    {key:'math',      label:'➕ Math'},
    {key:'science',   label:'🔬 Science'},
    {key:'ela',       label:'📖 ELA'},
    {key:'history',   label:'🌍 History'},
    {key:'cs',        label:'💻 CS'},
    {key:'health',    label:'❤️ Health'},
    {key:'languages', label:'🌏 Languages'},
  ];
  let activeTab = 'general';

  function noteKey(k){ return 'aceNotes_' + k; }

  function loadNote(k){
    try{ return localStorage.getItem(noteKey(k)) || ''; }catch(e){ return ''; }
  }
  function saveNote(){
    try{ localStorage.setItem(noteKey(activeTab), document.getElementById('notesTA').value); }catch(e){}
  }
  window.saveNote = saveNote;

  function buildTabs(){
    const container = document.getElementById('notesTabs');
    container.innerHTML = NOTE_TABS.map(t=>
      `<button class="np-tab${t.key===activeTab?' active':''}" onclick="switchTab('${t.key}')">${t.label}</button>`
    ).join('');
  }

  window.switchTab = function(k){
    saveNote();
    activeTab = k;
    buildTabs();
    const ta = document.getElementById('notesTA');
    ta.value = loadNote(k);
    ta.focus();
    updateWordCount();
    updateBadge();
  };

  window.toggleNotes = function(){
    const p = document.getElementById('notesPanel');
    p.classList.toggle('open');
    if(p.classList.contains('open')){
      document.getElementById('notesTA').value = loadNote(activeTab);
      updateWordCount();
      updateBadge();
      document.getElementById('notesTA').focus();
    }
  };

  window.updateWordCount = function(){
    const v = (document.getElementById('notesTA')?.value||'').trim();
    const words = v ? v.split(/\s+/).length : 0;
    const el = document.getElementById('npWordCount');
    if(el) el.textContent = words + (words===1?' word':' words');
  };

  window.updateBadge = function(){
    // Show badge if any tab has content
    const hasNotes = NOTE_TABS.some(t=> loadNote(t.key).trim().length > 0);
    const b = document.getElementById('notesBadge');
    if(b) b.style.display = hasNotes ? 'block' : 'none';
  };

  window.clearNote = function(){
    if(!confirm('Clear notes for this tab?')) return;
    try{ localStorage.removeItem(noteKey(activeTab)); }catch(e){}
    document.getElementById('notesTA').value = '';
    updateWordCount();
    updateBadge();
  };

  window.copyNotes = function(){
    const ta = document.getElementById('notesTA');
    if(!ta || !ta.value.trim()){ alert('No notes to copy!'); return; }
    navigator.clipboard.writeText(ta.value).then(()=>{
      const btn = event.target;
      const orig = btn.textContent;
      btn.textContent = '✅ Copied!';
      setTimeout(()=>{ btn.textContent = orig; }, 1500);
    }).catch(()=>{
      ta.select();
      document.execCommand('copy');
    });
  };

  window.downloadNotes = function(){
    const allNotes = NOTE_TABS
      .map(t=>{ const c=loadNote(t.key).trim(); return c ? `=== ${t.label} ===\n${c}` : ''; })
      .filter(Boolean).join('\n\n');
    if(!allNotes){ alert('No notes to save!'); return; }
    const blob = new Blob([allNotes], {type:'text/plain'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'AcerAcademy-notes.txt';
    a.click();
    URL.revokeObjectURL(a.href);
  };

  // Init
  buildTabs();
  updateBadge();

  // Close panel when clicking outside
  document.addEventListener('click', function(e){
    const p = document.getElementById('notesPanel');
    const b = document.getElementById('notesBtn');
    if(p && p.classList.contains('open') && !p.contains(e.target) && !b.contains(e.target)){
      p.classList.remove('open');
    }
  });
})();
</script>

<button id="timerBtn" onclick="toggleTimer()" title="Study Timer">⏱</button>

<div id="timerPanel">
  <div class="tp-head">
    <h3>⏱ Study Timer</h3>
    <button class="tp-close" onclick="toggleTimer()">✕</button>
  </div>
  <div class="tp-mode-row">
    <button class="tp-mode-btn active" id="tmWork"  onclick="setTimerMode('work')">FOCUS</button>
    <button class="tp-mode-btn"        id="tmShort" onclick="setTimerMode('short')">SHORT BREAK</button>
    <button class="tp-mode-btn"        id="tmLong"  onclick="setTimerMode('long')">LONG BREAK</button>
  </div>
  <div class="tp-circle-wrap">
    <svg class="tp-svg" width="120" height="120" viewBox="0 0 100 100">
      <circle class="tp-circle-bg" cx="50" cy="50" r="45"/>
      <circle class="tp-circle-fg" id="timerArc" cx="50" cy="50" r="45"/>
    </svg>
    <div class="tp-circle-center" style="position:absolute;">
      <div class="tp-time-text" id="timerDisplay">25:00</div>
      <div class="tp-session-label" id="timerModeLabel">Focus Time</div>
    </div>
  </div>
  <div class="tp-settings-row">
    <label>Focus</label>
    <input class="tp-num" id="tpFocusMin" type="number" min="1" max="99" value="25" onchange="updateTimerSettings()"/>
    <label>min &nbsp; Short</label>
    <input class="tp-num" id="tpShortMin" type="number" min="1" max="30" value="5" onchange="updateTimerSettings()"/>
    <label>min</label>
  </div>
  <div class="tp-controls">
    <button class="tp-ctrl-btn tp-start" id="timerStartBtn" onclick="toggleTimerRun()">▶ Start</button>
    <button class="tp-ctrl-btn tp-reset" onclick="resetTimer()">↺ Reset</button>
  </div>
  <div class="tp-footer">
    <span>Sessions today: <span class="tp-sessions" id="tpSessionCount">0</span></span>
    <span id="tpStatusText" style="color:#94a3b8;">Ready</span>
  </div>
</div>

<script>
(function(){
  const MODES = {
    work:  {label:'Focus Time',  color:'#059669'},
    short: {label:'Short Break', color:'#0891b2'},
    long:  {label:'Long Break',  color:'#7c3aed'},
  };
  let mode='work', running=false, remaining=25*60, total=25*60;
  let intervalId=null, sessions=0, longBreakMin=15;

  function getFocusMin(){ return Math.max(1,parseInt(document.getElementById('tpFocusMin')?.value||25)); }
  function getShortMin(){ return Math.max(1,parseInt(document.getElementById('tpShortMin')?.value||5)); }

  function modeSeconds(m){
    if(m==='work')  return getFocusMin()*60;
    if(m==='short') return getShortMin()*60;
    return longBreakMin*60;
  }

  window.updateTimerSettings = function(){
    if(!running){ total=modeSeconds(mode); remaining=total; updateDisplay(); }
  };

  window.setTimerMode = function(m){
    if(running) stopTimer();
    mode=m;
    total=modeSeconds(m);
    remaining=total;
    document.querySelectorAll('.tp-mode-btn').forEach(b=>b.classList.remove('active'));
    const ids={work:'tmWork',short:'tmShort',long:'tmLong'};
    document.getElementById(ids[m])?.classList.add('active');
    document.getElementById('timerArc').style.stroke=MODES[m].color;
    document.getElementById('timerBtn').style.background=MODES[m].color;
    document.getElementById('timerModeLabel').textContent=MODES[m].label;
    updateDisplay();
    document.getElementById('tpStatusText').textContent='Ready';
  };

  window.toggleTimer = function(){
    const p=document.getElementById('timerPanel');
    p.classList.toggle('open');
  };

  window.toggleTimerRun = function(){
    running ? stopTimer() : startTimer();
  };

  function startTimer(){
    if(remaining<=0) resetTimer();
    running=true;
    intervalId=setInterval(tick,1000);
    document.getElementById('timerStartBtn').textContent='⏸ Pause';
    document.getElementById('timerBtn').classList.add('running');
    document.getElementById('tpStatusText').textContent=mode==='work'?'Studying…':'Resting…';
  }

  function stopTimer(){
    running=false;
    clearInterval(intervalId);
    document.getElementById('timerStartBtn').textContent='▶ Start';
    document.getElementById('timerBtn').classList.remove('running');
    document.getElementById('tpStatusText').textContent='Paused';
  }

  window.resetTimer = function(){
    stopTimer();
    remaining=total=modeSeconds(mode);
    updateDisplay();
    document.getElementById('tpStatusText').textContent='Ready';
  };

  function tick(){
    remaining--;
    if(remaining<=0){
      remaining=0;
      updateDisplay();
      stopTimer();
      playBell();
      if(mode==='work'){
        sessions++;
        document.getElementById('tpSessionCount').textContent=sessions;
        // auto-switch to break
        const nextMode = sessions%4===0?'long':'short';
        setTimeout(()=>{ setTimerMode(nextMode); playBell(); },500);
        document.getElementById('tpStatusText').textContent='Session done! 🎉';
      } else {
        setTimeout(()=>{ setTimerMode('work'); },500);
        document.getElementById('tpStatusText').textContent='Break over!';
      }
      // open panel so user sees the notification
      document.getElementById('timerPanel').classList.add('open');
      return;
    }
    updateDisplay();
  }

  function updateDisplay(){
    const m=Math.floor(remaining/60), s=remaining%60;
    document.getElementById('timerDisplay').textContent =
      String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');
    const arc=document.getElementById('timerArc');
    if(arc){
      const pct = total>0 ? remaining/total : 1;
      arc.style.strokeDashoffset = String(Math.round(283*(1-pct)));
    }
    // Update page title while running
    if(running){
      document.title='⏱ '+String(m).padStart(2,'0')+':'+String(s).padStart(2,'0')+' — AcerAcademy';
    } else {
      document.title = document.title.replace(/^⏱.*?—\s*/,'');
    }
  }

  function playBell(){
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [0,0.15,0.3].forEach((delay,i)=>{
        const osc=ctx.createOscillator(), gain=ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.frequency.value=i===0?880:i===1?1046:1318;
        gain.gain.setValueAtTime(0.3,ctx.currentTime+delay);
        gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+delay+0.6);
        osc.start(ctx.currentTime+delay);
        osc.stop(ctx.currentTime+delay+0.7);
      });
    }catch(e){}
  }

  // Close on outside click (avoid conflicting with notes panel)
  document.addEventListener('click',function(e){
    const p=document.getElementById('timerPanel');
    const b=document.getElementById('timerBtn');
    if(p&&p.classList.contains('open')&&!p.contains(e.target)&&!b.contains(e.target)){
      p.classList.remove('open');
    }
  });

  // Shift notes button up so they don't overlap
  const nb=document.getElementById('notesBtn');
  if(nb) nb.style.bottom='84px';
  const tp=document.getElementById('timerBtn');
  if(tp) tp.style.bottom='24px';
})();
</script>
