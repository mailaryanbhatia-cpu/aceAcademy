<!DOCTYPE html>
<html data-theme="dark" lang="en">

<title>aceAcademy — Tests</title>
<style>
:root{
  --bg:#f7f8fa;--sidebar:#fff;--card:#fff;
  --accent:#4f46e5;--accent2:#7c3aed;
  --text:#1e1b4b;--muted:#6b7280;--border:#e5e7eb;
  --hover:#f0f0ff;--green:#059669;--red:#dc2626;--amber:#d97706;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}

/* ── NAV ── */
.topnav{background:#1a2540;border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;gap:16px;height:56px;position:sticky;top:0;z-index:100;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.topnav .logo{font-weight:800;font-size:1.15rem;color:var(--accent);text-decoration:none;letter-spacing:-.5px}
.topnav .logo span{color:var(--accent2)}
.topnav a.nav-link{font-size:.85rem;color:var(--muted);text-decoration:none;padding:4px 10px;border-radius:6px;transition:all .15s}
.topnav a.nav-link:hover,.topnav a.nav-link.active{background:var(--hover);color:var(--accent)}
.topnav .spacer{flex:1}
.topnav h1{font-size:1rem;font-weight:600;color:var(--text);margin-left:4px}

/* ── GRADE BAR ── */
.grade-bar{background:#1a2540;border-bottom:1px solid var(--border);padding:10px 24px;display:flex;gap:8px;flex-wrap:wrap}
.grade-btn{padding:6px 16px;border-radius:20px;border:1.5px solid var(--border);background:#1a2540;color:var(--muted);font-size:.85rem;font-weight:600;cursor:pointer;transition:all .15s}
.grade-btn:hover{border-color:var(--accent);color:var(--accent)}
.grade-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

/* ── LAYOUT ── */
.layout{display:flex;flex:1;min-height:0}
.sidebar{width:290px;background:var(--sidebar);border-right:1px solid var(--border);overflow-y:auto;padding:16px 0;flex-shrink:0}
.main{flex:1;overflow-y:auto;padding:32px}

/* ── SIDEBAR ── */
.subj-header{display:flex;align-items:center;gap:8px;padding:9px 20px;cursor:pointer;font-size:.875rem;font-weight:700;color:var(--text);transition:background .12s;user-select:none}
.subj-header:hover{background:var(--hover)}
.subj-icon{font-size:1.1rem}
.subj-arrow{margin-left:auto;font-size:.7rem;color:var(--muted);transition:transform .2s}
.subj-header.open .subj-arrow{transform:rotate(90deg)}
.subj-body{display:none;padding-left:12px}
.subj-body.open{display:block}
.unit-item{padding:7px 16px;font-size:.82rem;color:var(--muted);cursor:pointer;border-radius:6px;margin:2px 4px;transition:background .12s;line-height:1.4;display:flex;align-items:center;gap:6px}
.unit-item:hover{background:var(--hover);color:var(--text)}
.unit-item.active{background:rgba(99,102,241,0.18);color:var(--accent);font-weight:600}
.unit-badge{font-size:.65rem;background:var(--border);color:var(--muted);padding:1px 6px;border-radius:8px;flex-shrink:0}
.unit-item.done .unit-badge{background:#d1fae5;color:var(--green)}

/* ── EMPTY STATE ── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;min-height:400px;color:var(--muted);text-align:center;gap:12px}
.empty-state .icon{font-size:3rem}
.empty-state h2{font-size:1.2rem;font-weight:600;color:var(--text)}

/* ── TEST WRAP ── */
.test-wrap{display:none;max-width:820px}
.test-wrap.visible{display:block}
.test-header{margin-bottom:24px}
.test-breadcrumb{font-size:.8rem;color:var(--muted);margin-bottom:6px}
.test-breadcrumb span{color:var(--accent)}
.test-title{font-size:1.5rem;font-weight:800;margin-bottom:4px}
.test-meta{font-size:.85rem;color:var(--muted);display:flex;gap:12px;flex-wrap:wrap;align-items:center}
.tag{background:#f0f0ff;color:var(--accent);padding:3px 10px;border-radius:12px;font-weight:600;font-size:.78rem}

/* ── SECTION DIVIDER ── */
.section-label{font-size:.75rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);padding:18px 0 8px;border-top:1px solid var(--border);margin-top:12px}
.section-label:first-child{border-top:none;padding-top:0}

/* ── QUESTION CARD ── */
.q-card{background:#1a2540;border:1px solid var(--border);border-radius:12px;padding:20px 22px;margin-bottom:14px;transition:border-color .2s}
.q-card.correct{border-color:var(--green);background:#f0fdf4}
.q-card.wrong{border-color:var(--red);background:#fef2f2}
.q-num{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;background:var(--accent);color:#fff;border-radius:50%;font-size:.78rem;font-weight:700;margin-bottom:10px;flex-shrink:0}
.q-card.correct .q-num{background:var(--green)}
.q-card.wrong .q-num{background:var(--red)}
.q-text{font-size:.97rem;font-weight:500;line-height:1.6;margin-bottom:14px;white-space:pre-wrap}

/* MC */
.choices{display:flex;flex-direction:column;gap:8px}
.choice-label{display:flex;align-items:flex-start;gap:10px;cursor:pointer;padding:10px 14px;border-radius:8px;border:1.5px solid var(--border);transition:all .15s;font-size:.9rem;line-height:1.5}
.choice-label:hover{border-color:var(--accent);background:var(--hover)}
.choice-label input{margin-top:3px;accent-color:var(--accent);flex-shrink:0}
.choice-label.selected{border-color:var(--accent);background:rgba(99,102,241,0.18)}
.choice-label.graded-correct{border-color:var(--green);background:#f0fdf4;font-weight:600}
.choice-label.graded-wrong{border-color:var(--red);background:#fef2f2}

/* SA */
.sa-input{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;transition:border-color .2s}
.sa-input:focus{outline:none;border-color:var(--accent)}
.sa-input.correct{border-color:var(--green);background:#f0fdf4}
.sa-input.wrong{border-color:var(--red);background:#fef2f2}

/* SW */
.sw-work{width:100%;min-height:80px;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;resize:vertical;background:#fafafa;transition:border-color .2s}
.sw-work:focus{outline:none;border-color:var(--accent)}
.sw-ans-row{display:flex;align-items:center;gap:10px;margin-top:10px}
.sw-ans-label{font-size:.82rem;font-weight:600;color:var(--muted);white-space:nowrap}
.sw-ans-input{flex:1;padding:9px 14px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;font-family:inherit;transition:border-color .2s}
.sw-ans-input:focus{outline:none;border-color:var(--accent)}
.sw-ans-input.correct{border-color:var(--green);background:#f0fdf4}
.sw-ans-input.wrong{border-color:var(--red);background:#fef2f2}

/* Feedback */
.feedback{margin-top:12px;padding:10px 14px;border-radius:8px;font-size:.85rem;line-height:1.5;display:none}
.feedback.show{display:block}
.feedback.correct{background:#f0fdf4;color:#065f46;border-left:3px solid var(--green)}
.feedback.wrong{background:#fef2f2;color:#991b1b;border-left:3px solid var(--red)}

/* ── SUBMIT / RESULTS ── */
.submit-row{margin:28px 0;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.submit-btn{background:var(--accent);color:#fff;border:none;padding:12px 32px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:background .15s}
.submit-btn:hover{background:var(--accent2)}
.submit-btn:disabled{background:#9ca3af;cursor:not-allowed}
.retake-btn{background:#1a2540;color:var(--accent);border:2px solid var(--accent);padding:12px 28px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;transition:all .15s}
.retake-btn:hover{background:var(--hover)}

/* Score card */
.score-card{background:#1a2540;border:2px solid var(--border);border-radius:16px;padding:28px;margin-bottom:28px;text-align:center}
.score-ring{font-size:3rem;font-weight:900;margin-bottom:6px}
.score-ring.a{color:var(--green)}
.score-ring.b{color:#0ea5e9}
.score-ring.c{color:var(--amber)}
.score-ring.d{color:var(--red)}
.score-label{font-size:1rem;color:var(--muted);margin-bottom:16px}
.score-bars{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.score-bar-item{text-align:center;font-size:.8rem;color:var(--muted)}
.score-bar-item strong{display:block;font-size:1.1rem;font-weight:800;color:var(--text)}
.score-actions{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.score-actions button{padding:10px 22px;border-radius:10px;font-size:.88rem;font-weight:700;cursor:pointer;border:2px solid var(--accent);transition:all .15s}
.score-actions .btn-primary{background:var(--accent);color:#fff}
.score-actions .btn-primary:hover{background:var(--accent2)}
.score-actions .btn-outline{background:transparent;color:var(--accent)}
.score-actions .btn-outline:hover{background:rgba(99,102,241,.1)}
/* Timer display */
.test-timer{display:inline-flex;align-items:center;gap:6px;background:rgba(99,102,241,.12);border:1px solid rgba(99,102,241,.3);border-radius:8px;padding:4px 12px;font-size:.82rem;font-weight:700;color:var(--accent);font-variant-numeric:tabular-nums}
.test-timer.warning{background:rgba(239,68,68,.12);border-color:rgba(239,68,68,.3);color:var(--red)}
/* Review mistakes mode */
.q-card.correct.hidden-correct{display:none}
.review-banner{background:rgba(239,68,68,.1);border:1.5px solid var(--red);border-radius:10px;padding:10px 16px;margin-bottom:16px;font-size:.85rem;color:var(--red);font-weight:600;display:flex;align-items:center;gap:8px}
/* Mobile sidebar toggle */
.sidebar-toggle{display:none;background:var(--accent);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-size:.82rem;font-weight:700;cursor:pointer;margin:10px 16px}
@media(max-width:700px){
  .layout{flex-direction:column}
  .sidebar{width:100%;border-right:none;border-bottom:1px solid var(--border);max-height:0;overflow:hidden;padding:0;transition:max-height .3s ease}
  .sidebar.open{max-height:60vh;overflow-y:auto;padding:16px 0}
  .sidebar-toggle{display:block}
  .main{padding:16px}
  .test-wrap{max-width:100%}
  .grade-bar{padding:8px 12px;gap:6px}
  .grade-btn{padding:5px 10px;font-size:.75rem}
  .score-ring{font-size:2.2rem}
  .submit-row{flex-direction:column;align-items:stretch}
  .submit-btn,.retake-btn{width:100%;text-align:center}
}
.progress-bar-outer{height:8px;background:var(--border);border-radius:4px;margin-top:12px;overflow:hidden}
.progress-bar-inner{height:100%;border-radius:4px;background:var(--accent);transition:width .6s ease}
</style>

nology","Impact = Population × Affluence × Technology","Income × Production × Area × Time","None of the above"],"correct":1,"exp":"I=PAT: environmental Impact = Population × Affluence × Technology."},{"type":"mc","q":"Biotic potential refers to:","choices":["The carrying capacity","The maximum reproduction rate under ideal conditions","The actual population growth rate","Competition between species"],"correct":1,"exp":"Biotic potential is the maximum reproductive rate when resources are unlimited."},{"q":"Producers in an ecosystem are:","choices":["herbivores","decomposers","photosynthetic organisms","carnivores"],"answer":"photosynthetic organisms","difficulty":"easy"},{"q":"The 10% rule in energy transfer means:","choices":["10% of organisms survive","only 10% of energy passes to the next trophic level","10% of species are endangered","ecosystems are 10% efficient"],"answer":"only 10% of energy passes to the next trophic level","difficulty":"medium"},{"q":"Biodiversity is HIGHEST in:","choices":["tundra","tropical rainforest","desert","polar ice"],"answer":"tropical rainforest","difficulty":"easy"},{"q":"A keystone species has:","choices":["the largest population","disproportionately large ecosystem impact","the most offspring","no predators"],"answer":"disproportionately large ecosystem impact","difficulty":"medium"},{"q":"Bioaccumulation refers to:","choices":["CO₂ buildup","toxins concentrating up the food chain","biodiversity accumulating over time","nutrient cycling"],"answer":"toxins concentrating up the food chain","difficulty":"medium"},{"q":"The nitrogen cycle includes which process converting N₂ to ammonia?","choices":["nitrification","denitrification","nitrogen fixation","ammonification"],"answer":"nitrogen fixation","difficulty":"hard"},{"q":"Eutrophication is caused by excess:","choices":["CO₂","nutrients (N and P)","sediment","heavy metals"],"answer":"nutrients (N and P)","difficulty":"medium"},{"q":"Primary succession begins on:","choices":["burned  occurs when restoring force is:","choices":["Constant","Proportional to displacement: F = -kx","Proportional to velocity","Equal to gravity"],"correct":1,"exp":"SHM: F = -kx. Acceleration is proportional to and opposite displacement."},{"type":"mc","q":"The period of a simple pendulum (small angles) depends on:","choices":["Mass of the bob","Length and gravitational acceleration: T = 2π√(L/g)","Amplitude of swing","Material of the string"],"correct":1,"exp":"T = 2π√(L/g). Period is independent of mass and amplitude (for small angles)."},{"type":"mc","q":"Gravitational potential energy between two masses is:","choices":["U = mgh","U = -GMm/r","U = GMm/r","U = -mgh"],"correct":1,"exp":"U = -GMm/r (negative because gravity is attractive). U → 0 as r → ∞."},{"type":"mc","q":"A satellite in circular orbit has speed determined by:","choices":["v = √(GM/r)","v = √(2GM/r)","v = √(gr)","v = GM/r²"],"correct":0,"exp":"For circular orbit: gravitational force = centripetal force → v = √(GM/r)."},{"type":"mc","q":"Impulse is defined as:","choices":["Force times distance","Change in momentum: J = Δp = FΔt","Work done by force","Force times acceleration"],"correct":1,"exp":"Impulse J = FΔt = Δp. Impulse equals change in momentum."},{"type":"mc","q":"In an elastic collision:","choices":["Only momentum is conserved","Both momentum and kinetic energy are conserved","Only kinetic energy is conserved","Neither is conserved"],"correct":1,"exp":"Elastic collisions conserve both momentum and kinetic energy. Inelastic conserve only momentum."},{"type":"mc","q":"The center of mass of a system moves as if:","choices":["All forces act at each particle","All external forces act on the total mass at that point","Internal forces determine its motion","It is always at the geometric center"],"correct":1,"exp":"r_cm = Σmᵢrᵢ/M. Net external force = Ma_cm; center of mass obeys Newton's 2nd law."},{"type":"mc","q":"For a spring-mass system, ω (angular frequency) equals:","choices":["√(m/k)","√(k/m)",  to 1/r²"],"correct":2,"exp":"By Gauss's law, a spherical shell has zero field inside (no enclosed charge)."},{"type":"mc","q":"The capacitance of a parallel-plate capacitor is:","choices":["C = εA/d","C = Q/V and for parallel plates C = ε₀A/d","C = Vd/Q","C = Q²/2U"],"correct":1,"exp":"C = ε₀A/d. Larger area or smaller separation increases capacitance."},{"type":"mc","q":"Kirchhoff's voltage law (KVL) states that:","choices":["Current at a junction sums to zero","The sum of potential differences around any closed loop is zero","Resistance increases with temperature","Power equals current squared times resistance"],"correct":1,"exp":"KVL: ΣV = 0 around any closed loop. Follows from conservation of energy."},{"type":"mc","q":"Kirchhoff's current law (KCL) states that:","choices":["Voltage at a node sums to zero","Sum of currents entering a junction equals sum leaving","Resistance is constant","EMF equals IR"],"correct":1,"exp":"KCL: ΣI_in = ΣI_out at any junction. Follows from conservation of charge."},{"type":"mc","q":"The time constant τ of an RC circuit is:","choices":["τ = R/C","τ = RC","τ = 1/(RC)","τ = L/R"],"correct":1,"exp":"τ = RC. After one time constant, a capacitor charges to (1 - 1/e) ≈ 63% of maximum."},{"type":"mc","q":"Ampere's law relates the magnetic field around a closed loop to:","choices":["Electric flux through the surface","The enclosed current: ∮B·dl = μ₀I_enc","The charge enclosed","The potential difference"],"correct":1,"exp":"Ampere's law: ∮B·dl = μ₀I_enc. Useful for symmetric current distributions."},{"type":"mc","q":"The magnetic force on a moving charge is:","choices":["F = qE","F = qv × B","F = qvB (always)","F = ma"],"correct":1,"exp":"F = qv × B. The force is perpendicular to both velocity and magnetic field."},{"type":"mc","q":"A long straight wire carrying current I produces a magnetic field at distance r of:","choices":["B = μ₀I/(4πr²)","B = μ₀I/(2πr)","B = μ₀Ir/(2π)","B = μ₀I"],"correct":1,"exp":"B = μ₀I/(2πr) for a long straight rom high to low potential."},{"type":"mc","q":"Energy stored in an inductor carrying current I is:","choices":["U = ½LI","U = LI²","U = ½LI²","U = L²I/2"],"correct":2,"exp":"U = ½LI². Analogous to ½mv² for kinetic energy and ½CV² for a capacitor."},{"type":"mc","q":"Which law relates a changing electric field to a magnetic field?","choices":["Faraday's law","Ampere-Maxwell law","Gauss's law for magnetism","Lenz's law"],"correct":1,"exp":"The Ampere-Maxwell law includes displacement current, linking changing E-field to B-field."},{"type":"mc","q":"Gauss's law for magnetism states that:","choices":["Magnetic flux through any closed surface equals the enclosed pole strength","The magnetic flux through any closed surface is zero (no magnetic monopoles)","B field follows inverse square law","Magnetic field lines begin at north poles"],"correct":1,"exp":"∮B·dA = 0. Magnetic field lines always close on themselves — no magnetic monopoles exist."}]}],"ela":[{"title":"AP English Language — Rhetoric & Argumentation","questions":[{"type":"mc","q":"An appeal to the audience's emotions is called:","choices":["Logos","Ethos","Pathos","Kairos"],"correct":2,"exp":"Pathos appeals to emotion; ethos to credibility; logos to logic."},{"type":"mc","q":"A rhetorical situation includes all EXCEPT:","choices":["Audience","Purpose","Occasion","Font size"],"correct":3,"exp":"Rhetorical situation: speaker, audience, purpose, context/occasion, and message."},{"type":"mc","q":"Anaphora is the repetition of:","choices":["End words","Beginning words or phrases","Sound patterns","A refrain in poetry"],"correct":1,"exp":"Anaphora repeats a word or phrase at the beginning of successive clauses (e.g., 'I have a dream...')."},{"type":"mc","q":"A concession in an argument:","choices":["Refutes the opposing side","Acknowledges a valid point of the opposition","Provides statistical evidence","Restates the thesis"],"correct":1,"exp":"A concession grants partial validity to the opposition before offering a rd"},{"q":"An author's purpose is best understood by examining:","choices":["only the title","the diction, structure, and rhetorical choices together","the publication date","word count"],"answer":"the diction, structure, and rhetorical choices together","difficulty":"hard"},{"q":"Pathos appeals to:","choices":["facts","the speaker's credentials","the audience's emotions","legal authority"],"answer":"the audience's emotions","difficulty":"easy"},{"q":"The rhetorical situation includes:","choices":["speaker, audience, purpose, context","thesis only","evidence and claims","genre and format"],"answer":"speaker, audience, purpose, context","difficulty":"medium"},{"q":"A rebuttal directly:","choices":["supports the main claim","addresses and counters a counterargument","introduces new evidence","summarizes the argument"],"answer":"addresses and counters a counterargument","difficulty":"medium"},{"q":"Parallel structure in argumentation creates:","choices":["emotional appeal","rhythm and clarity","a logical fallacy","a concession"],"answer":"rhythm and clarity","difficulty":"medium"},{"q":"An ad hominem fallacy attacks:","choices":["the argument's logic","the person making the argument","statistical evidence","the audience"],"answer":"the person making the argument","difficulty":"hard"},{"q":"Which best defines a nuanced argument?","choices":["one that ignores complexity","one that acknowledges complexity and qualifies claims","a simple yes/no stance","an emotional appeal"],"answer":"one that acknowledges complexity and qualifies claims","difficulty":"hard"}]},{"title":"AP English Literature — Literary Analysis","questions":[{"type":"mc","q":"A story within a story is called a:","choices":["Motif","Frame narrative","Allegory","Foil"],"correct":1,"exp":"A frame narrative encloses an inner story (e.g., The Canterbury Tales, Heart of Darkness)."},{"type":"mc","q":"Which of the following is an example of dramatic irony?","choices":["A character says one thing but means anothe ,"q":"An iron triangle involves:","choices":["President, Senate, House","Congress, executive agencies, and interest groups","Courts, media, and lobbyists","State, local, and federal governments"],"correct":1,"exp":"Iron triangles are stable policy relationships among congressional committees, agencies, and interest groups."},{"q":"The Bill of Rights consists of the first ___ amendments:","choices":["5","10","15","20"],"answer":"10","difficulty":"easy"},{"q":"Judicial review was established by:","choices":["the Constitution","Marbury v. Madison","Congress","the Bill of Rights"],"answer":"Marbury v. Madison","difficulty":"medium"},{"q":"The 1st Amendment protects:","choices":["right to bear arms","freedom of speech, religion, press, assembly, petition","due process","equal protection"],"answer":"freedom of speech, religion, press, assembly, petition","difficulty":"easy"},{"q":"Federalism divides power between:","choices":["the president and Congress","federal and state governments","courts and legislature","Republicans and Democrats"],"answer":"federal and state governments","difficulty":"easy"},{"q":"The Senate has ___ members:","choices":["100","435","535","50"],"answer":"100","difficulty":"easy"},{"q":"Which clause requires states to honor other states' laws?","choices":["Supremacy Clause","Full Faith and Credit Clause","Commerce Clause","Necessary and Proper Clause"],"answer":"Full Faith and Credit Clause","difficulty":"hard"},{"q":"An interest group primarily seeks to:","choices":["win elections","influence public policy","govern directly","represent all citizens equally"],"answer":"influence public policy","difficulty":"medium"},{"q":"The Electoral College elects the:","choices":["Congress","President","Supreme Court justices","Senate"],"answer":"President","difficulty":"easy"},{"q":"Due process rights are guaranteed by the ___ Amendment:","choices":["1st","4th","5th","14th"],"answer":"14th","difficulty":"hard"},{"q":"The filibuster is used in the:","choices":["House of Representatives","Senate","Supreme Court","White House"],"answer":"Senate","difficulty":"medium"},{"q":"Checks and balances ensure that:","choices":["one branch dominates","no branch has unchecked power","the president controls Congress","courts write laws"],"answer":"no branch has unchecked power","difficulty":"easy"},{"q":"The Commerce Clause allows Congress to regulate:","choices":["state elections","interstate commerce","the military only","tax rates"],"answer":"interstate commerce","difficulty":"medium"},{"q":"Political socialization is primarily shaped by:","choices":["the media alone","family, school, peers, and media","the government","interest groups"],"answer":"family, school, peers, and media","difficulty":"medium"},{"q":"Incorporation doctrine extends Bill of Rights protections to:","choices":["foreign nations","state governments via the 14th Amendment","federal agencies","Congress"],"answer":"state governments via the 14th Amendment","difficulty":"hard"},{"q":"Which best describes a unitary system of government?","choices":["power shared between central and regional governments","central government holds supreme power","states are sovereign","no central authority exists"],"answer":"central government holds supreme power","difficulty":"hard"}]},{"title":"AP Psychology — Behavior & Mental Processes","questions":[{"type":"mc","q":"Classical conditioning pairs a neutral stimulus with a(n):","choices":["Conditioned response","Unconditioned stimulus","Operant behavior","Punishment"],"correct":1,"exp":"Pavlov's classical conditioning associates a neutral stimulus with an unconditioned stimulus to elicit a response."},{"type":"mc","q":"According to Maslow's hierarchy, which need must be met first?","choices":["Esteem","Belonging","Safety","Physiological"],"correct":3,"exp":"Maslow's hierarchy: physiological → safety → belonging → esteem → self-actualization."},{"type":"mc","q":"The part of the neuron that receives signals is the:","choices":["Axon","Myelin sheath","Dendrite","Terminal button"],"correct":2,"exp":"Dendrites are branching extensions that receive signals from other neurons."},{"type":"mc","q":"In an experiment, the variable the researcher manipulates is:","choices":["Dependent variable","Control variable","Independent variable","Confounding variable"],"correct":2,"exp":"The independent variable is deliberately changed; the dependent variable is measured in response."},{"type":"mc","q":"Cognitive dissonance occurs when:","choices":["Two people disagree","A person holds contradictory beliefs or behaviors","Memory fails","A stimulus goes unnoticed"],"correct":1,"exp":"Festinger's cognitive dissonance: mental discomfort from holding conflicting cognitions, motivating change."},{"q":"Classical conditioning was demonstrated by:","choices":["Skinner","Watson","Pavlov","Freud"],"answer":"Pavlov","difficulty":"easy"},{"q":"In operant conditioning, reinforcement ___ a behavior.","choices":["decreases","eliminates","increases","has no effect on"],"answer":"increases","difficulty":"easy"},{"q":"The id, ego, and superego are concepts from:","choices":["behaviorism","cognitive psychology","psychoanalysis","humanism"],"answer":"psychoanalysis","difficulty":"easy"},{"q":"Long-term potentiation is associated with:","choices":["sleep disorders","memory formation","hormonal changes","perception"],"answer":"memory formation","difficulty":"hard"},{"q":"The fight-or-flight response is controlled by the:","choices":["parasympathetic nervous system","sympathetic nervous system","somatic nervous system","central nervous system only"],"answer":"sympathetic nervous system","difficulty":"medium"},{"q":"Which memory system holds information for seconds?","choices":["long-term memory","semantic memory","sensory memory","procedural memory"],"answer":"sensory memory","difficulty":"medium"},{"q":"The heritability of a trait tells us:","choices":["genes cause the trait","what proportion of variation in a population is due to genetics","the trait is entirely genetic","environment has no effect"],"answer":"what proportion of variation in a population is due to genetics","difficulty":"hard"},{"q":"Confirmation bias is the tendency to:","choices":["seek information that confirms existing beliefs","change beliefs readily","ignore prior knowledge","accurately assess evidence"],"answer":"seek information that confirms existing beliefs","difficulty":"medium"},{"q":"The DSM-5 is used for:","choices":["brain imaging","diagnosing mental disorders","prescribing medication","therapy techniques"],"answer":"diagnosing mental disorders","difficulty":"easy"},{"q":"Positive punishment involves:","choices":["adding something pleasant","removing something unpleasant","adding something unpleasant","removing something pleasant"],"answer":"adding something unpleasant","difficulty":"hard"},{"q":"Which perspective emphasizes unconscious drives?","choices":["behavioral","cognitive","psychodynamic","humanistic"],"answer":"psychodynamic","difficulty":"easy"},{"q":"The bystander effect states that people are less likely to help when:","choices":["they are alone","others are present","the situation is clear","they know the victim"],"answer":"others are present","difficulty":"medium"},{"q":"Maslow's hierarchy places ___ at the top:","choices":["safety","esteem","self-actualization","belonging"],"answer":"self-actualization","difficulty":"medium"},{"q":"Nature vs. nurture in psychology refers to:","choices":["genetics vs. environment","brain vs. mind","conscious vs. unconscious","learning vs. instinct"],"answer":"genetics vs. environment","difficulty":"easy"},{"q":"An fMRI measures:","choices":["electrical brain activity","brain blood flow and activity","neurotransmitter levels","hormone concentrations"],"answer":"brain blood flow and activity","difficulty":"medium"}]},{"title":"AP Comparative Government and Politics","questions":[{"type":"mc","q":"Which of the following is a unitary state?","choices":["United States","Germany","France","Canada"],"correct":2,"exp":"France is a unitary state — the central government holds sovereign power. The US, Germany, Canada are federal."},{"type":"mc","q":"A federal system differs from a unitary system in that:","choices":["Power is concentrated in the central government","Sovereignty is shared between national and subnational governments","There is no constitution","Elections are indirect"],"correct":1,"exp":"Federalism divides sovereignty between central and regional governments (states, provinces, Länder)."},{"type":"mc","q":"Which country has a parliamentary system where the executive is drawn from the legislature?","choices":["United States","Mexico","United Kingdom","Iran"],"correct":2,"exp":"The UK has a Westminster parliamentary system — the Prime Minister must command a Commons majority."},{"type":"mc","q":"A 'fusion of powers' characterizes which type of system?","choices":["Presidential","Parliamentary","Federal","Theocratic"],"correct":1,"exp":"Parliamentary systems fuse executive and legislative power; the Cabinet is drawn from Parliament."},{"type":"mc","q":"Which of the following best describes a rentier state?","choices":["A state that derives most revenue from taxation","A state that derives most revenue from natural resource exports (e.g., oil)","A state where rent control dominates policy","A state with strong civil society"],"correct":1,"exp":"Rentier states (e.g., Nigeria, Russia) rely on resource rents, reducing incentive for taxation and accountability."},{"type":"mc","q":"China's political system is best described as:","choices":["Multi-party democracy","Liberal democracy with one dominant party","Single-party authoritarian state led by the CCP","Federal republic"],"correct":2,"exp":"China is a one-party state led by the Chinese Communist Party with no meaningful electoral competition."},{"type":"mc","q":"The concept of 'legitimacy' in politics refers to:","choices":["A government's military strength","The right to rule — acceptance of authority as valid by the governed","The size of a state's territory","A state's economic output"],"correct":1,"exp":"Legitimacy: the belief that a government's authority is rightful and justified. Weber identified traditional, charismatic, and rational-legal types."},{"type":"mc","q":"Which country uses a proportional representation electoral system?","choices":["United Kingdom (House of Commons)","United States (House of Representatives)","Germany (Bundestag proportional seats)","Mexico (Senate majority seats)"],"correct":2,"exp":"Germany uses mixed-member proportional representation. UK and US use single-member plurality (first-past-the-post)."},{"type":"mc","q":"A majoritarian electoral system tends to produce:","choices":["Many small parties","Two dominant parties (Duverger's law)","Coalition governments","Proportional outcomes"],"correct":1,"exp":"Single-member plurality systems (first-past-the-post) produce two-party systems per Duverger's law."},{"type":"mc","q":"Civil society refers to:","choices":["Government institutions","The military and police","Organizations and associations independent of the state (NGOs, unions, media)","The civil service"],"correct":2,"exp":"Civil society: voluntary organizations between the state and individual — churches, unions, NGOs, independent media."},{"type":"mc","q":"Which country has a Supreme Leader who holds ultimate authority over elected officials?","choices":["Mexico","Nigeria","Russia","Iran"],"correct":3,"exp":"Iran's Supreme Leader (Ayatollah) is above the elected President and Parliament — a theocratic overlay on elected institutions."},{"type":"mc","q":"'Corporatism' in Mexico historically referred to:","choices":["Free market capitalism","State-organized incorporation of interest groups (labor, peasants) into the ruling party (PRI)","Military control of politics","Parliamentary government"],"correct":1,"exp":"The PRI's corporatist structure incorporated sectors of society into party structures, controlling opposition."},{"type":"mc","q":"Which of the following is a characteristic of a failed state?","choices":["Strong tax collection","Monopoly on legitimate use of force","Inability to control territory or provide basic services","High GDP per capita"],"correct":2,"exp":"Failed states cannot maintain security, enforce law, or provide basic services across their territory."},{"type":"mc","q":"The European Union is best described as:","choices":["A federal superstate","A supranational organization where members transfer some sovereignty to shared institutions","A military alliance only","A free trade zone with no political integration"],"correct":1,"exp":"The EU is supranational — member states transfer some sovereignty to EU institutions (Commission, Parliament, Court)."},{"type":"mc","q":"Nigeria's political system is best described as:","choices":["Unitary presidential","Federal presidential republic","Parliamentary monarchy","Single-party state"],"correct":1,"exp":"Nigeria is a federal presidential republic with 36 states, modeled partly on the US system."},{"type":"mc","q":"Which concept describes the tendency of authoritarian regimes to allow some democratic forms without democratic substance?","choices":["Consolidation","Hybrid regime / competitive authoritarianism","Polyarchy","Parliamentarism"],"correct":1,"exp":"Hybrid regimes (e.g., Russia, some Latin American states) hold elections but manipulate them to ensure the incumbent wins."},{"type":"mc","q":"In Russia, which institution holds the most political power in practice?","choices":["The Duma (legislature)","The Constitutional Court","The Presidency","The Federation Council"],"correct":2,"exp":"Russia's presidency dominates — the president controls government formation, security, and foreign policy under Putin's system."},{"type":"mc","q":"A 'state' in political science is defined by:","choices":["A national identity","Weber's criteria: permanent population, defined territory, effective government, sovereignty","A democratic government","Common language and culture"],"correct":1,"exp":"Weber's definition: state = monopoly on legitimate use of force within a territory. Montevideo Convention adds these four criteria."},{"type":"mc","q":"Political culture refers to:","choices":["Formal laws and institutions","Shared values, beliefs, and attitudes toward politics and government in a society","The culture of the political elite","Electoral rules and procedures"],"correct":1,"exp":"Political culture (Almond and Verba): the pattern of attitudes and values toward the political system in a society."},{"type":"mc","q":"Which country has a bicameral legislature where the upper house (Senate) is directly elected?","choices":["United Kingdom","China","Mexico","Iran"],"correct":2,"exp":"Mexico's Senate is directly elected. The UK's Lords is appointed; China and Iran have different structures."}]},{"title":"AP Human Geography","questions":[{"type":"mc","q":"The concept of 'sense of place' refers to:","choices":["The geographic coordinates of a location","The emotional and subjective meanings attached to a location","The physical characteristics of a site","The administrative boundaries of a region"],"correct":1,"exp":"Sense of place: the subjective, emotional attachment people develop to a place based on experience and meaning."},{"type":"mc","q":"The demographic transition model describes:","choices":["Migration patterns across countries","Stages of population change as societies industrialize (high birth/death → low birth/death)","Economic development phases","Urban growth patterns"],"correct":1,"exp":"DTM: Stage 1 (high birth/death) → Stage 2 (death rate drops) → Stage 3 (birth rate drops) → Stage 4 (low both)."},{"type":"mc","q":"'Push factors' in migration theory are:","choices":["Attractions of the destination","Conditions that drive people away from their origin (poverty, conflict, disaster)","Government policies promoting migration","Cultural ties to a new country"],"correct":1,"exp":"Push factors repel people from their origin; pull factors attract them to a destination."},{"type":"mc","q":"A primate city is one that:","choices":["Is the national capital","Is disproportionately large compared to the next-largest cities","Has the highest GDP","Is located at the geographic center of a country"],"correct":1,"exp":"Primate city: significantly larger than the second city. Common in developing countries (e.g., Bangkok, Buenos Aires)."},{"type":"mc","q":"The rank-size rule states that:","choices":["All cities are the same size","The nth-largest city is 1/n the size of the largest city","Cities grow geometrically","Population is evenly distributed"],"correct":1,"exp":"Rank-size rule: a country's cities follow a predictable size hierarchy where rank × population = approximately constant."},{"type":"mc","q":"Cultural diffusion refers to:","choices":["The extinction of cultural practices","The spread of cultural elements from one area to another","The preservation of indigenous culture","Migration of cultural groups"],"correct":1,"exp":"Cultural diffusion: spread of ideas, practices, and innovations across space through contact, migration, or media."},{"type":"mc","q":"'Sequent occupance' explains how:","choices":["Languages evolve over time","Successive waves of inhabitants leave their cultural imprint on a landscape","Political boundaries are established","Cities grow outward"],"correct":1,"exp":"Sequent occupance: landscapes are layered with the cultural traces of successive occupants (Native American → colonial → modern)."},{"type":"mc","q":"The von Thünen model of agricultural land use predicts:","choices":["Flat uniform plane with concentric rings of agricultural activity based on distance from market","All crops are grown uniformly","Mountain regions have different crops","Soil quality determines crop type"],"correct":0,"exp":"Von Thünen: uniform plain; market in center; rings of land use from intensive (dairy, market gardening) to extensive (grain, ranching) outward."},{"type":"mc","q":"Urbanization is primarily driven by:","choices":["Rural-to-urban migration and natural increase in cities","Declining birth rates","Government mandates","Deindustrialization"],"correct":0,"exp":"Urbanization results from rural-to-urban migration (economic opportunity) and natural population increase in cities."},{"type":"mc","q":"The concept of 'core-periphery' in world-systems theory describes:","choices":["Mountain vs. valley areas","Wealthy industrialized nations (core) exploiting developing nations (periphery)","Urban vs. rural areas","Northern vs. southern hemispheres"],"correct":1,"exp":"Wallerstein's world-systems theory: core nations extract resources and labor from peripheral nations, maintaining global inequality."},{"type":"mc","q":"Gentrification refers to:","choices":["Urban sprawl into rural areas","Renovation of deteriorated urban neighborhoods, often displacing lower-income residents","Decline of a city's population","Suburbanization of wealthier residents"],"correct":1,"exp":"Gentrification: renovation and influx of wealthier residents into working-class neighborhoods, raising property values and displacing residents."},{"type":"mc","q":"Which stage of the epidemiological transition is characterized by degenerative diseases?","choices":["Stage 1: Pestilence and famine","Stage 2: Receding pandemics","Stage 3: Degenerative and human-created diseases","Stage 4: Delayed degenerative diseases"],"correct":2,"exp":"Stage 3: chronic diseases (heart disease, cancer) replace infectious disease as leading causes of death as societies industrialize."},{"type":"mc","q":"A 'lingua franca' is:","choices":["A dying language","A common language used for communication between speakers of different native languages","A language spoken by an ethnic minority","A dialect of a major language"],"correct":1,"exp":"Lingua franca: a bridge language for communication between groups with different native tongues (e.g., English, Swahili, Mandarin)."},{"type":"mc","q":"The 'fertility rate' most important for population projections is the:","choices":["Crude birth rate","Total fertility rate (TFR) — average births per woman over her lifetime","Death rate","Infant mortality rate"],"correct":1,"exp":"TFR is the key measure: TFR > 2.1 = population growth; TFR < 2.1 = eventual population decline."},{"type":"mc","q":"Which factor most influences agricultural patterns according to modern commercial agriculture theory?","choices":["Climate alone","Market access, transportation costs, and technology","Soil type exclusively","Cultural preferences"],"correct":1,"exp":"Modern commercial agriculture is driven by market access (transportation, distribution networks) and technological inputs."},{"type":"mc","q":"'Irredentism' refers to:","choices":["Granting independence to a territory","A movement to unite ethnically related people in adjacent territories under one state","The merger of two sovereign states","Ethnic cleansing"],"correct":1,"exp":"Irredentism: a state's claim to territory in another country based on ethnic, historical, or cultural ties (e.g., Hungary's claims post-WWI)."},{"type":"mc","q":"The Burgess concentric zone model places the highest-income residents:","choices":["Nearest the CBD","In the outer rings / suburbs","In the transition zone","In industrial zones"],"correct":1,"exp":"Burgess model: CBD → transition zone → working class → middle class → commuter zone (outermost, highest income)."},{"type":"mc","q":"'Remittances' in the context of migration refers to:","choices":["Government payments to immigrants","Money sent by migrants back to their home country/family","Trade payments between countries","Foreign aid"],"correct":1,"exp":"Remittances: money transferred by migrants to relatives in their origin country — major income source for many developing nations."},{"type":"mc","q":"The concept of a 'boundary' vs. a 'border' in political geography distinguishes:","choices":["Large vs. small states","A legal line vs. the zone where two cultures/states meet","Maritime vs. land divisions","Democratic vs. authoritarian states"],"correct":1,"exp":"Boundary: the legal/political line. Border: the zone around it with cross-boundary activity, culture, and identity."},{"type":"mc","q":"'Centrifugal forces' in political geography are those that:","choices":["Unite a state and strengthen national identity","Pull a state apart — regional, ethnic, linguistic divisions","Attract foreign investment","Promote urbanization"],"correct":1,"exp":"Centrifugal forces (ethnic conflict, regional inequality, separatism) weaken state cohesion; centripetal forces (national identity, shared language) strengthen it."}]},{"title":"AP Macroeconomics","questions":[{"type":"mc","q":"GDP measures:","choices":["The total value of goods and services produced in a country in a given period","Total government spending","Total exports minus imports","The income of all citizens wherever they live"],"correct":0,"exp":"GDP = total market value of all final goods and services produced within a country's borders in a year."},{"type":"mc","q":"The business cycle describes:","choices":["Long-run economic growth trend","Short-run fluctuations in economic activity (expansion, peak, recession, trough)","Seasonal changes in prices","Government budget cycles"],"correct":1,"exp":"Business cycle: recurring patterns of expansion and contraction in economic output around the long-run trend."},{"type":"mc","q":"Aggregate demand is the total demand for:","choices":["Only consumer goods","All final goods and services in an economy at different price levels (C + I + G + NX)","Government services","Intermediate goods"],"correct":1,"exp":"AD = C + I + G + NX. It slopes downward because lower price levels increase purchasing power and competitiveness."},{"type":"mc","q":"Which of the following would shift aggregate supply to the right (increase AS)?","choices":["Rising oil prices","Decrease in productivity","Technological improvement that lowers production costs","Increase in wages"],"correct":2,"exp":"SRAS shifts right (increases) with lower input costs, improved technology, or increased productivity."},{"type":"mc","q":"The multiplier effect occurs when:","choices":["Government spending decreases tax revenue","An initial change in spending leads to a larger change in GDP","Prices rise with money supply","Interest rates fall with bond prices"],"correct":1,"exp":"Multiplier = 1/(1-MPC). Spending ripples through the economy as each round of income creates more spending."},{"type":"mc","q":"Contractionary monetary policy involves:","choices":["Increasing the money supply","Decreasing the money supply by raising interest rates or selling bonds","Cutting government spending","Lowering taxes"],"correct":1,"exp":"Contractionary monetary policy: Fed raises interest rates / sells bonds → reduces money supply → reduces inflation."},{"type":"mc","q":"The natural rate of unemployment includes:","choices":["Only cyclical unemployment","Frictional and structural unemployment (not cyclical)","All unemployment during a recession","Zero unemployment"],"correct":1,"exp":"Natural rate = frictional + structural. Cyclical unemployment is above the natural rate during recessions."},{"type":"mc","q":"The Phillips curve (short-run) shows:","choices":["A positive relationship between inflation and unemployment","A trade-off: lower unemployment is associated with higher inflation","A long-run relationship that is vertical","A positive relationship between GDP and unemployment"],"correct":1,"exp":"Short-run Phillips curve: inverse relationship between inflation and unemployment. Expansionary policy lowers unemployment but raises inflation."},{"type":"mc","q":"Which of the following is an example of automatic stabilizers?","choices":["Fed raising interest rates","Congress passing a stimulus bill","Unemployment insurance payments that increase during recessions","Discretionary tax cuts"],"correct":2,"exp":"Automatic stabilizers (unemployment insurance, progressive taxes) automatically cushion recessions without new legislation."},{"type":"mc","q":"Crowding out occurs when:","choices":["Government spending replaces private investment by raising interest rates","Taxes are cut during recessions","The Fed buys government bonds","Exports exceed imports"],"correct":0,"exp":"Crowding out: government borrowing raises interest rates, reducing private investment. This limits fiscal policy effectiveness."},{"type":"mc","q":"If the marginal propensity to consume (MPC) = 0.8, the spending multiplier is:","choices":["0.8","4","5","2"],"correct":2,"exp":"Multiplier = 1/(1-MPC) = 1/0.2 = 5. A $1 increase in spending increases GDP by $5."},{"type":"mc","q":"A current account surplus means a country:","choices":["Imports more than it exports","Has more government revenue than spending","Exports more than it imports (net lender to the world)","Has high inflation"],"correct":2,"exp":"Current account surplus: exports > imports. The country is a net lender — it sends goods and receives financial claims."},{"type":"mc","q":"The quantity theory of money (MV = PQ) implies that if velocity and output are stable:","choices":["Inflation equals money growth rate","Higher money supply reduces prices","Output grows with money supply","Velocity determines output"],"correct":0,"exp":"MV = PQ: if V and Q are constant, doubling M doubles P (price level). This is the monetarist view of inflation."},{"type":"mc","q":"Open market operations refer to the Fed:","choices":["Changing the required reserve ratio","Buying or selling government securities to change the money supply","Setting the federal funds rate target","Regulating bank capital requirements"],"correct":1,"exp":"OMO: Fed buys bonds → injects money (expansionary); Fed sells bonds → removes money (contractionary)."},{"type":"mc","q":"A budget deficit occurs when:","choices":["GDP falls","Government spending exceeds tax revenue in a given period","The trade balance is negative","Inflation exceeds unemployment"],"correct":1,"exp":"Budget deficit: G > T (government spending > tax revenues). Financed by borrowing (issuing bonds)."},{"type":"mc","q":"In the long run, the aggregate supply curve is:","choices":["Downward sloping","Horizontal","Vertical at the natural rate of output","Positively sloped"],"correct":2,"exp":"LRAS is vertical at potential GDP (full employment output). In the long run, price level doesn't affect output."},{"type":"mc","q":"Stagflation is characterized by:","choices":["High growth and low inflation","High inflation combined with high unemployment and slow growth","Low unemployment and high output","Deflation and recession"],"correct":1,"exp":"Stagflation (1970s): simultaneous high inflation and high unemployment — adverse supply shock shifts SRAS left."},{"type":"mc","q":"The loanable funds market determines:","choices":["The price level","The real interest rate through interaction of savings (supply) and investment (demand)","The money supply","Nominal GDP"],"correct":1,"exp":"Loanable funds: supply = saving; demand = investment borrowing. Equilibrium sets the real interest rate."},{"type":"mc","q":"Which measure best represents the standard of living?","choices":["Nominal GDP","Real GDP per capita","Total GDP","The trade balance"],"correct":1,"exp":"Real GDP per capita adjusts for inflation and population — the best single measure of average living standards."},{"type":"mc","q":"The Fisher effect states that:","choices":["Real interest rate = nominal rate + inflation","Nominal interest rate = real interest rate + expected inflation","Inflation causes unemployment","Exchange rates equal purchasing power"],"correct":1,"exp":"Fisher effect: nominal interest rate adjusts to expected inflation so that the real rate remains stable."}]},{"title":"AP Microeconomics","questions":[{"type":"mc","q":"The law of demand states that:","choices":["Higher prices lead to higher quantity demanded","There is an inverse relationship between price and quantity demanded, all else equal","Demand increases with income always","Supply determines demand"],"correct":1,"exp":"Law of demand: as price rises, quantity demanded falls (inverse relationship), ceteris paribus."},{"type":"mc","q":"Which of the following shifts the demand curve to the right?","choices":["A rise in the good's own price","A decrease in consumer income (for normal goods)","An increase in consumer income (for normal goods)","A fall in the price of a complementary good"],"correct":2,"exp":"Demand curve shifts right with: ↑ income (normal good), ↑ price of substitutes, ↓ price of complements, ↑ preferences."},{"type":"mc","q":"Price elasticity of demand measures:","choices":["How much quantity demanded changes with a change in supply","The responsiveness of quantity demanded to a change in price","The slope of the demand curve only","Consumer surplus"],"correct":1,"exp":"|PED| = % change in Qd / % change in P. Elastic demand (|PED|>1) means consumers respond strongly to price changes."},{"type":"mc","q":"If demand is inelastic, a price increase will:","choices":["Decrease total revenue","Increase total revenue (since quantity falls less than price rises)","Leave total revenue unchanged","Cause a surplus"],"correct":1,"exp":"Inelastic demand: price and total revenue move together. Elastic demand: they move oppositely."},{"type":"mc","q":"Marginal cost is:","choices":["Total cost divided by quantity","The change in total cost from producing one more unit","Fixed cost per unit","Average variable cost"],"correct":1,"exp":"MC = ΔTC/ΔQ. Marginal cost is the cost of producing the next unit."},{"type":"mc","q":"Profit is maximized when:","choices":["Price equals average total cost","Marginal revenue equals marginal cost (MR = MC)","Total revenue is maximized","Marginal cost is minimized"],"correct":1,"exp":"MR = MC is the profit-maximizing condition for all market structures (with MR < MC leading to loss on additional units)."},{"type":"mc","q":"A perfectly competitive firm in the long run earns:","choices":["Economic profit","Normal profit (zero economic profit) as entry/exit drives price to minimum ATC","Monopoly profit","Losses"],"correct":1,"exp":"Long-run competitive equilibrium: P = minimum ATC. Economic profit = 0. Firms earn normal (accounting) profit."},{"type":"mc","q":"Which characteristic distinguishes a monopoly from perfect competition?","choices":["Many buyers","Price-taking behavior","Single seller with barriers to entry and no close substitutes","Homogeneous products"],"correct":2,"exp":"Monopoly: one seller, barriers to entry, unique product, price maker. Perfect competition: many sellers, price takers."},{"type":"mc","q":"Deadweight loss in a monopoly results from:","choices":["The monopolist earning profit","Output being below the competitive level — mutually beneficial transactions do not occur","High prices alone","Consumer surplus transfer to producers"],"correct":1,"exp":"DWL: monopolist restricts output below efficient level (Q where P=MC), causing lost surplus for both consumers and producers."},{"type":"mc","q":"A natural monopoly exists when:","choices":["One firm has a patent","A firm is vertically integrated","One firm can produce the entire market output at lower average cost than multiple firms (due to economies of scale)","The government grants exclusive rights"],"correct":2,"exp":"Natural monopoly: declining LRATC over the entire market demand range — one firm is most efficient (utilities, infrastructure)."},{"type":"mc","q":"Price discrimination requires:","choices":["Identical prices for all buyers","Market power, separable markets, and inability of buyers to resell","Perfect competition","Elastic demand"],"correct":1,"exp":"Price discrimination: charge different prices to different groups. Requires market power + ability to segment markets + no arbitrage."},{"type":"mc","q":"The shutdown rule for a competitive firm in the short run is:","choices":["Shut down if P < ATC","Shut down if P < AVC (price doesn't cover variable costs)","Shut down if economic profit < 0","Shut down if TR < TC"],"correct":1,"exp":"Short-run shutdown: if P < AVC, firm loses more by operating than by closing. If P > AVC, operating reduces losses."},{"type":"mc","q":"An oligopoly is characterized by:","choices":["Many small firms","One dominant firm","A few firms with interdependence — each firm's decisions affect others","Free entry and exit"],"correct":2,"exp":"Oligopoly: few firms (e.g., airline, auto industry) with strategic interdependence. Studied with game theory."},{"type":"mc","q":"The prisoner's dilemma illustrates why:","choices":["Cooperation always results","Self-interest leads to outcomes worse than if players cooperated (Nash equilibrium is suboptimal)","Monopolies are inefficient","Price floors cause surpluses"],"correct":1,"exp":"Prisoner's dilemma: dominant strategy leads to mutual defection (worse outcome). Explains oligopoly cheating on cartels."},{"type":"mc","q":"Consumer surplus is:","choices":["Price minus marginal cost","The difference between what consumers are willing to pay and what they actually pay","Total revenue minus total cost","The area under the supply curve"],"correct":1,"exp":"Consumer surplus = willingness to pay − actual price paid. It's the area above price and below the demand curve."},{"type":"mc","q":"An excise tax on a good with inelastic demand will:","choices":["Be borne mainly by producers","Be borne mainly by consumers","Be split equally","Cause large quantity reductions"],"correct":1,"exp":"Inelastic demand: consumers can't easily reduce purchases, so they bear most of the tax burden."},{"type":"mc","q":"Externalities are:","choices":["Costs and benefits experienced only by the buyer and seller","Costs or benefits that spill over to third parties not in the transaction","Government interventions","Import tariffs"],"correct":1,"exp":"Externality: spillover effect on third parties. Negative (pollution) = overproduction; positive (education) = underproduction relative to social optimum."},{"type":"mc","q":"The Coase theorem states that:","choices":["Government must correct all externalities","If property rights are clearly defined and transaction costs are zero, private bargaining leads to efficient outcomes","Externalities always require taxation","Market failures are unavoidable"],"correct":1,"exp":"Coase theorem: well-defined property rights + zero transaction costs → private negotiation reaches efficiency regardless of initial assignment."},{"type":"mc","q":"Monopsony refers to:","choices":["A single seller","A single buyer with market power (e.g., a dominant employer in a labor market)","Government price control","A cartel of sellers"],"correct":1,"exp":"Monopsony: one buyer (market power on demand side). In labor markets, a monopsonist pays less than competitive wage."},{"type":"mc","q":"In the long run, all costs are:","choices":["Fixed","Variable — all inputs can be adjusted","Sunk","Marginal"],"correct":1,"exp":"In the long run, all costs are variable — firms can adjust all inputs, including capital/plant size. No fixed costs in LR."}]},{"title":"AP Psychology","questions":[{"type":"mc","q":"Which perspective emphasizes unconscious drives and childhood experiences?","choices":["Behavioral","Humanistic","Psychoanalytic/Psychodynamic","Cognitive"],"correct":2,"exp":"Freud's psychoanalytic theory: behavior is driven by unconscious conflicts, repressed memories, and early childhood experiences."},{"type":"mc","q":"A neuron transmits signals through:","choices":["Blood flow only","Electrical impulses along the axon and chemical neurotransmitters across synapses","Hormones only","Glial cell connections"],"correct":1,"exp":"Neurons: electrical signal travels down axon; neurotransmitters cross the synapse to receptor sites on the next neuron."},{"type":"mc","q":"Classical conditioning involves:","choices":["Learning through consequences (rewards/punishments)","Learning by associating a neutral stimulus with an unconditioned stimulus until it produces the same response","Observational learning","Cognitive restructuring"],"correct":1,"exp":"Classical conditioning (Pavlov): NS paired with UCS → NS becomes CS that produces CR. Stimulus substitution."},{"type":"mc","q":"In operant conditioning, a negative reinforcer:","choices":["Punishes unwanted behavior","Is removed after a behavior to increase the likelihood of that behavior","Is added after behavior to decrease it","Is the same as punishment"],"correct":1,"exp":"Negative reinforcement: removing an aversive stimulus to increase behavior (e.g., taking aspirin removes pain → you take it more). NOT punishment."},{"type":"mc","q":"The term 'long-term potentiation' (LTP) refers to:","choices":["Forgetting over time","Strengthening of synaptic connections with repeated activation — the neural basis of learning","Sensory adaptation","REM sleep"],"correct":1,"exp":"LTP: repeated stimulation strengthens synaptic connections. 'Neurons that fire together wire together.' Neural basis of memory."},{"type":"mc","q":"Maslow's hierarchy of needs places which need at the top (self-fulfillment)?","choices":["Safety needs","Esteem needs","Physiological needs","Self-actualization"],"correct":3,"exp":"Maslow's hierarchy: physiological → safety → love/belonging → esteem → self-actualization (reaching one's full potential)."},{"type":"mc","q":"The 'bystander effect' refers to:","choices":["People helping in emergencies due to proximity","Reduced likelihood of an individual helping when others are present (diffusion of responsibility)","Conformity to group norms","Obedience to authority"],"correct":1,"exp":"Bystander effect (Latané and Darley): as more bystanders are present, each feels less personal responsibility to intervene."},{"type":"mc","q":"In Piaget's theory, conservation refers to:","choices":["Protecting the environment","The understanding that quantity remains the same despite changes in shape or arrangement","Object permanence","Formal operational thinking"],"correct":1,"exp":"Conservation: understanding that volume/mass/number is unchanged despite perceptual changes (e.g., same clay, different shape). Develops in concrete operational stage."},{"type":"mc","q":"The DSM-5 is:","choices":["A test of intelligence","The Diagnostic and Statistical Manual — the standard classification system for psychological disorders","A personality inventory","A type of therapy"],"correct":1,"exp":"DSM-5 (Diagnostic and Statistical Manual, 5th ed.): classifies and defines psychological disorders by symptom criteria."},{"type":"mc","q":"Which sleep stage is characterized by rapid eye movements, vivid dreaming, and muscle paralysis?","choices":["Stage 1 NREM","Stage 3 NREM (slow wave)","REM sleep","Stage 2 NREM"],"correct":2,"exp":"REM (Rapid Eye Movement) sleep: vivid dreams, activated brain similar to waking, voluntary muscles paralyzed (sleep atonia)."},{"type":"mc","q":"A double-blind study controls for:","choices":["Sampling bias","Both participant and experimenter expectations/biases (placebo effect, experimenter effect)","Demand characteristics only","Random assignment"],"correct":1,"exp":"Double-blind: neither participants nor researchers know who received treatment vs. placebo, eliminating expectation biases."},{"type":"mc","q":"The fundamental attribution error is the tendency to:","choices":["Underestimate situational factors and overestimate dispositional (personality) factors when explaining others' behavior","Blame ourselves for failures","Attribute success to luck","Underestimate our own abilities"],"correct":0,"exp":"FAE: we over-attribute others' behavior to their character and under-attribute to the situation. Opposite for ourselves (actor-observer bias)."},{"type":"mc","q":"Cognitive dissonance occurs when:","choices":["Two people disagree","A person holds conflicting beliefs or acts contrary to beliefs, creating psychological discomfort","Memory fails","A stimulus generalizes to similar stimuli"],"correct":1,"exp":"Cognitive dissonance (Festinger): discomfort from inconsistent cognitions or actions/beliefs. Motivates attitude change to restore consistency."},{"type":"mc","q":"The heritability of a trait refers to:","choices":["How much genetics determine the trait absolutely","The proportion of variation in a trait within a population that is attributable to genetic differences","Whether a trait is genetic","The percent of the genome involved in a trait"],"correct":1,"exp":"Heritability: what proportion of the population's variation in a trait is due to genetic differences (not a statement about individuals)."},{"type":"mc","q":"Serotonin is most associated with:","choices":["Pain response","Mood regulation, sleep, and appetite — low levels linked to depression","Motor control only","Fight-or-flight response"],"correct":1,"exp":"Serotonin: mood, sleep, appetite, digestion. SSRIs (antidepressants) block serotonin reuptake, increasing synaptic serotonin."},{"type":"mc","q":"Which type of therapy focuses on identifying and changing maladaptive thought patterns?","choices":["Psychoanalysis","Humanistic therapy","Cognitive-behavioral therapy (CBT)","Behavior modification only"],"correct":2,"exp":"CBT: identifies distorted cognitions (e.g., catastrophizing) and replaces them with realistic thinking. Evidence-based for depression, anxiety."},{"type":"mc","q":"The Stanford Prison Experiment (Zimbardo) demonstrated:","choices":["That personality is fixed","The power of social roles and situational factors to shape behavior even in normal people","That obedience requires direct authority","The bystander effect"],"correct":1,"exp":"Zimbardo's study: randomly assigned 'guards' and 'prisoners' quickly adopted roles, showing how situations shape behavior."},{"type":"mc","q":"Retroactive interference occurs when:","choices":["Old memories block new learning","New learning disrupts retrieval of old memories","Two stimuli are confused","REM sleep prevents memory consolidation"],"correct":1,"exp":"Retroactive interference: new information interferes with retrieval of old information. Proactive: old interferes with new."},{"type":"mc","q":"Psychologists distinguish between crystallized and fluid intelligence. Crystallized intelligence:","choices":["Declines sharply after age 30","Consists of accumulated knowledge and skills; generally stable or increases with age","Is measured by reaction time","Is the same as IQ"],"correct":1,"exp":"Crystallized intelligence: knowledge/skills accumulated through experience (vocabulary, facts). Fluid intelligence: processing speed and novel problem-solving — declines with age."},{"type":"mc","q":"The concept of 'learned helplessness' (Seligman) explains:","choices":["Why people become overconfident","How repeated uncontrollable negative events lead to passive, depressed behavior — a model of depression","How rewards increase motivation","Classical conditioning of fear"],"correct":1,"exp":"Learned helplessness: after repeated inescapable aversive events, organisms stop trying even when escape becomes possible. Model of depression."}]}],"cs":[{"title":"AP Computer Science A — Java Programming","questions":[{"type":"mc","q":"In Java, which keyword is used to define a subclass?","choices":["implements","inherits","extends","super"],"correct":2,"exp":"The 'extends' keyword creates a subclass that inherits from a superclass."},{"type":"mc","q":"What is the output of: int x=5; System.out.println(x++);","choices":["6","5","4","Error"],"correct":1,"exp":"Post-increment x++ returns the original value (5), then increments x to 6."},{"type":"mc","q":"Which data structure uses LIFO order?","choices":["Queue","Stack","ArrayList","LinkedList"],"correct":1,"exp":"A Stack uses Last-In-First-Out — the last element pushed is the first popped."},{"type":"mc","q":"Binary search requires the array to be:","choices":["Unsorted","Sorted","Filled with integers","Of even length"],"correct":1,"exp":"Binary search divides the sorted array in half each step, requiring a sorted input."},{"type":"mc","q":"Polymorphism allows:","choices":["A class to have two constructors","Different classes to respond differently to the same method call","Variables to hold any data type","Recursive functions"],"correct":1,"exp":"Polymorphism (via method overriding) lets subclasses provide specific implementations of parent methods."},{"q":"In Java, which keyword creates an object?","choices":["class","new","static","void"],"answer":"new","difficulty":"easy"},{"q":"An array of size n has valid indices from:","choices":["1 to n","0 to n","0 to n-1","1 to n-1"],"answer":"0 to n-1","difficulty":"easy"},{"q":"Which is an example of inheritance in OOP?","choices":["Dog class extends Animal","int x = 5","for loop","array declaration"],"answer":"Dog class extends Animal","difficulty":"easy"},{"q":"What does 'static' mean for a method?","choices":["it can't be called","it belongs to the class, not instances","it returns nothing","it takes no parameters"],"answer":"it belongs to the class, not instances","difficulty":"medium"},{"q":"A recursive method must have:","choices":["no parameters","a base case to stop recursion","a loop inside","only integer returns"],"answer":"a base case to stop recursion","difficulty":"medium"},{"q":"Which Java type stores true/false?","choices":["int","String","boolean","char"],"answer":"boolean","difficulty":"easy"},{"q":"The ArrayList class differs from arrays in that:","choices":["it has fixed size","it can grow dynamically","it stores only primitives","it cannot be iterated"],"answer":"it can grow dynamically","difficulty":"medium"},{"q":"Polymorphism allows:","choices":["only one class to exist","a superclass reference to hold subclass objects","methods to be private","variables to be null"],"answer":"a superclass reference to hold subclass objects","difficulty":"hard"},{"q":"What is the output of System.out.println(10 % 3)?","choices":["3","1","0","2"],"answer":"1","difficulty":"medium"},{"q":"A constructor in Java:","choices":["returns a value","has the same name as the class","is always static","cannot take parameters"],"answer":"has the same name as the class","difficulty":"easy"},{"q":"Binary search requires the array to be:","choices":["unsorted","sorted","of even length","of odd length"],"answer":"sorted","difficulty":"medium"},{"q":"Which loop guarantees at least one execution?","choices":["for","while","do-while","enhanced for"],"answer":"do-while","difficulty":"medium"},{"q":"The keyword 'final' on a variable means:","choices":["it's a method","it cannot be changed after initialization","it's public","it's an array"],"answer":"it cannot be changed after initialization","difficulty":"hard"},{"q":"What does the toString() method do?","choices":["converts a number to int","returns a String representation of an object","deletes an object","compares two objects"],"answer":"returns a String representation of an object","difficulty":"medium"},{"q":"Big-O of O(n²) indicates:","choices":["constant time","linear time","quadratic time","logarithmic time"],"answer":"quadratic time","difficulty":"hard"}]},{"title":"AP Computer Science Principles — Digital Concepts","questions":[{"type":"mc","q":"What does 1101 in binary equal in decimal?","choices":["11","12","13","14"],"correct":2,"exp":"8+4+0+1=13. (1×8)+(1×4)+(0×2)+(1×1)=13."},{"type":"mc","q":"The 'internet' refers to:","choices":["A single server","A global network of interconnected networks","Only the World Wide Web","A programming language"],"correct":1,"exp":"The internet is a global infrastructure of interconnected computer networks using TCP/IP."},{"type":"mc","q":"Which of the following is an example of lossless compression?","choices":["JPEG","MP3","ZIP","MPEG"],"correct":2,"exp":"ZIP (and formats like PNG) use lossless compression — no data is lost on decompression."},{"type":"mc","q":"A public key encryption system:","choices":["Uses one shared secret key","Uses a public key to encrypt and a private key to decrypt","Is the same as a Caesar cipher","Requires direct physical exchange of keys"],"correct":1,"exp":"Asymmetric encryption uses a public key (encrypt) and a private key (decrypt)."},{"type":"mc","q":"A citizen science project that uses many computers to solve a large problem is an example of:","choices":["Machine learning","Crowdsourcing","Encryption","Abstraction"],"correct":1,"exp":"Crowdsourcing distributes computational tasks across many volunteer computers (e.g., SETI@home)."},{"q":"Binary uses base:","choices":["8","10","16","2"],"answer":"2","difficulty":"easy"},{"q":"The internet routes data using:","choices":["circuit switching","packet switching","analog signals","direct connections"],"answer":"packet switching","difficulty":"medium"},{"q":"Lossy compression:","choices":["preserves all data","discards some data to reduce file size","is used for text files","increases file size"],"answer":"discards some data to reduce file size","difficulty":"medium"},{"q":"An algorithm is:","choices":["a programming language","a step-by-step procedure for solving a problem","a type of data","a computer component"],"answer":"a step-by-step procedure for solving a problem","difficulty":"easy"},{"q":"Metadata is:","choices":["the main content of a file","data that describes other data","a type of encryption","program code"],"answer":"data that describes other data","difficulty":"medium"},{"q":"Crowdsourcing gathers contributions from:","choices":["a single expert","a large group of people","only paid employees","automated systems"],"answer":"a large group of people","difficulty":"easy"},{"q":"Which is NOT a benefit of open-source software?","choices":["free to use","community collaboration","proprietary restrictions","transparency"],"answer":"proprietary restrictions","difficulty":"medium"},{"q":"The domain name system (DNS) converts:","choices":["IP addresses to binary","domain names to IP addresses","emails to packets","HTTP to HTTPS"],"answer":"domain names to IP addresses","difficulty":"medium"},{"q":"A virus differs from a worm in that a virus:","choices":["spreads without user action","requires a host file to spread","is always harmful","only affects networks"],"answer":"requires a host file to spread","difficulty":"hard"},{"q":"Digital certificates are used for:","choices":["data storage","verifying website identity","compressing files","routing packets"],"answer":"verifying website identity","difficulty":"medium"},{"q":"Which describes a DDoS attack?","choices":["stealing passwords","overwhelming a server with traffic","encrypting files for ransom","phishing emails"],"answer":"overwhelming a server with traffic","difficulty":"medium"},{"q":"Abstraction in computing means:","choices":["adding more details","hiding complexity behind simple interfaces","deleting unused code","optimizing algorithms"],"answer":"hiding complexity behind simple interfaces","difficulty":"medium"},{"q":"Moore's Law predicted that transistors on a chip would:","choices":["decrease annually","double approximately every two years","remain constant","triple every decade"],"answer":"double approximately every two years","difficulty":"hard"},{"q":"Phishing attacks use:","choices":["malware directly","deceptive messages to steal information","network breaches","physical theft"],"answer":"deceptive messages to steal information","difficulty":"easy"},{"q":"Which is an example of creative commons licensing?","choices":["copyright — all rights reserved","public domain","proprietary software","trade secret"],"answer":"public domain","difficulty":"hard"}]}],"arts":[{"title":"AP Art History","questions":[{"type":"mc","q":"Formal analysis of a work of art focuses on:","choices":["The artist's biography","Visual elements like line, color, space, and composition — not meaning","Historical context only","The market value of the work"],"correct":1,"exp":"Formal analysis describes what you see: line, shape, color, space, texture, composition — before interpreting meaning."},{"type":"mc","q":"Which culture created the Venus of Willendorf (c. 28,000–25,000 BCE)?","choices":["Ancient Egypt","Paleolithic Europe","Ancient Greece","Mesopotamia"],"correct":1,"exp":"The Venus of Willendorf is a Paleolithic figurine from Europe, representing one of the earliest known examples of sculptural art."},{"type":"mc","q":"Contrapposto in sculpture refers to:","choices":["Symmetrical, rigid frontal stance","A naturalistic pose where the body twists slightly, with weight on one leg","Abstracted geometric forms","Shallow relief carving"],"correct":1,"exp":"Contrapposto (Italian: 'counterpose'): weight on one leg, causing the body to twist naturally. Developed in ancient Greece, revived in Renaissance."},{"type":"mc","q":"The Parthenon on the Athenian Acropolis was dedicated to:","choices":["Zeus","Aphrodite","Athena","Apollo"],"correct":2,"exp":"The Parthenon (447–438 BCE) was built as a temple to Athena Parthenos — patron goddess of Athens."},{"type":"mc","q":"Which architectural order features a plain capital?","choices":["Corinthian","Ionic","Doric","Composite"],"correct":2,"exp":"Doric order: simplest capital (plain disk). Ionic: scroll (volute). Corinthian: acanthus leaves."},{"type":"mc","q":"Byzantine art is characterized by:","choices":["Naturalistic portraiture","Flat, hieratic figures with gold backgrounds emphasizing spiritual over physical reality","Dramatic chiaroscuro","Secular subject matter"],"correct":1,"exp":"Byzantine art (e.g., mosaics, icons): flat, frontal, gold backgrounds, elongated figures — spiritual/otherworldly, not naturalistic."},{"type":"mc","q":"The term 'chiaroscuro' refers to:","choices":["A fresco painting technique","The use of strong contrasts between light and dark to create volume and drama","A type of printmaking","Geometric patterning"],"correct":1,"exp":"Chiaroscuro: Italian for 'light-dark.' Strong tonal contrasts creating three-dimensional form (Caravaggio, Leonardo)."},{"type":"mc","q":"Linear perspective was developed in the early Renaissance primarily by:","choices":["Michelangelo","Donatello","Filippo Brunelleschi","Raphael"],"correct":2,"exp":"Brunelleschi demonstrated linear perspective c. 1415. Alberti codified it theoretically. It uses a vanishing point to create the illusion of depth."},{"type":"mc","q":"The Baroque period is characterized by:","choices":["Simple, restrained classical forms","Dynamic movement, dramatic light, emotional intensity, and grandeur","Flat, two-dimensional representation","Pastel colors and intimate scale"],"correct":1,"exp":"Baroque (17th century): theatrical, dynamic, emotional. Artists include Caravaggio, Rembrandt, Bernini, Rubens."},{"type":"mc","q":"Which movement reacted against academic painting by depicting modern life and capturing the fleeting effects of light?","choices":["Romanticism","Realism","Impressionism","Surrealism"],"correct":2,"exp":"Impressionism (1860s–1880s): Monet, Renoir, Degas — painted outdoors, capturing light and movement through loose brushwork."},{"type":"mc","q":"Cubism, developed by Picasso and Braque, broke with tradition by:","choices":["Using only primary colors","Fragmenting subjects and showing multiple viewpoints simultaneously on a flat surface","Depicting dreams and the unconscious","Copying classical forms"],"correct":1,"exp":"Cubism: simultaneous viewpoints, fragmented forms, flattened picture plane. Les Demoiselles d'Avignon (1907) marks its beginning."},{"type":"mc","q":"Which of the following is a characteristic of Islamic visual art in sacred spaces?","choices":["Figural representation of the divine","Geometric abstraction and calligraphy (avoiding figural imagery)","Narrative biblical scenes","Portrait painting"],"correct":1,"exp":"Islamic sacred art avoids figural imagery; uses geometric patterns, arabesque, and calligraphy (Quranic text) instead."},{"type":"mc","q":"The t
