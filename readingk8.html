const gradeKeys = Object.keys(PASSAGES);
let currentGrade = null, currentPassageIdx = null, answered = {}, score = 0;

function renderGradeGrid(){
  document.getElementById('gradeGrid').innerHTML = gradeKeys.map(k => {
    const g = PASSAGES[k];
    return `<div class="grade-card" onclick="selectGrade('${k}')">
      <div class="grade-icon">${g.icon}</div>
      <div class="grade-name">${g.label}</div>
      <div class="grade-count">${g.passages.length} passages</div>
    </div>`;
  }).join('');
}
function showGrades(){
  document.getElementById('gradeSelectCard').style.display='block';
  document.getElementById('passageListCard').style.display='none';
  document.getElementById('readCard').style.display='none';
}
function selectGrade(k){
  currentGrade = k;
  document.getElementById('gradeSelectCard').style.display='none';
  document.getElementById('passageListCard').style.display='block';
  document.getElementById('passageListTitle').textContent = `${PASSAGES[k].label} — Choose a Passage`;
  document.getElementById('passageList').innerHTML = PASSAGES[k].passages.map((p,i) =>
    `<div class="passage-item" onclick="openPassage(${i})">📖 ${p.title}</div>`).join('');
}
function showPassageList(){
  document.getElementById('passageListCard').style.display='block';
  document.getElementById('readCard').style.display='none';
}
function openPassage(i){
  currentPassageIdx = i; answered = {}; score = 0;
  const p = PASSAGES[currentGrade].passages[i];
  document.getElementById('passageListCard').style.display='none';
  document.getElementById('readCard').style.display='block';
  document.getElementById('readTitle').textContent = p.title;
  document.getElementById('passageText').textContent = p.text;
  document.getElementById('resultArea').style.display='none';
  renderQuestions(p);
}
function renderQuestions(p){
  document.getElementById('questionsArea').innerHTML = p.questions.map((q,qi) => `
    <div class="q-block">
      <div class="q-text">${qi+1}. ${q.q}</div>
      ${q.options.map((o,oi) => `<button class="opt" data-qi="${qi}" data-oi="${oi}" onclick="answerQuestion(this,${qi},${oi})">${o}</button>`).join('')}
    </div>`).join('');
}
function answerQuestion(btn, qi, oi){
  if(answered[qi] !== undefined) return;
  const p = PASSAGES[currentGrade].passages[currentPassageIdx];
  const q = p.questions[qi];
  const ok = oi === q.correct;
  answered[qi] = ok;
  if(ok) score++;
  document.querySelectorAll(`.opt[data-qi="${qi}"]`).forEach(b => {
    b.disabled = true;
    if(parseInt(b.getAttribute('data-oi')) === q.correct) b.classList.add('correct');
  });
  if(!ok) btn.classList.add('wrong');
  if(Object.keys(answered).length === p.questions.length){
    setTimeout(showResult, 500);
  }
}
function showResult(){
  const p = PASSAGES[currentGrade].passages[currentPassageIdx];
  const total = p.questions.length;
  const pct = Math.round(score/total*100);
  document.getElementById('finalScore').textContent = `${score}/${total}`;
  document.getElementById('finalMsg').textContent = pct>=90 ? "Excellent reading and comprehension!" :
    pct>=70 ? "Great job understanding the passage!" :
    pct>=50 ? "Good effort — try rereading for the ones you missed." :
    "Keep practicing — rereading closely helps a lot.";
  document.getElementById('resultArea').style.display='block';
}

renderGradeGrid();
</script>
