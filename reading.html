<script>
const PASSAGES = [
  {
    grade:'k-5', subj:'science',
    title:'Busy Bees',
    text:`Bees are small insects that do a big job. They fly from flower to flower, drinking a sweet liquid called nectar. As a bee moves, tiny bits of yellow powder called pollen stick to its fuzzy legs.\n\nWhen the bee flies to the next flower, some of that pollen rubs off. This helps the flower make seeds and grow fruit. Without bees moving pollen around, many plants could not make new plants at all!\n\nBack at the hive, bees use the nectar they collected to make honey. Worker bees store the honey in small wax rooms called honeycomb cells. The honey gives the bees food to eat, especially in the winter when flowers are hard to find.\n\nBees live and work together in large groups called colonies. Each bee has a job — some search for flowers, some guard the hive, and one special bee, the queen, lays all the eggs. Bees may be small, but they help grow much of the food we eat every day.`,
    questions:[
      {q:'What is nectar?',choices:['A type of flower','A sweet liquid bees drink from flowers','A kind of bee','A tool beekeepers use'],a:1,exp:'The passage says nectar is "a sweet liquid" that bees drink from flowers.'},
      {q:'How does pollen help flowers?',choices:['It makes the flower smell better','It helps the flower make seeds and grow fruit','It scares away other insects','It makes honey'],a:1,exp:'The passage explains that pollen moving between flowers "helps the flower make seeds and grow fruit."'},
      {q:'Where do bees store honey?',choices:['In the flowers','In small wax rooms called honeycomb cells','Underground','In their legs'],a:1,exp:'"Worker bees store the honey in small wax rooms called honeycomb cells."'},
      {q:'What is a group of bees living together called?',choices:['A herd','A flock','A colony','A pack'],a:2,exp:'The passage states bees "live and work together in large groups called colonies."'},
    ]
  },
  {
    grade:'k-5', subj:'history',
    title:'Helpers in Our Community',
    text:`Every neighborhood has helpers who work hard to keep people safe and happy. These people are called community helpers, and each one has an important job to do.\n\nFirefighters put out fires and rescue people who are in danger. They wear special suits to protect them from heat and smoke. Police officers help keep neighborhoods safe by making sure people follow rules and by helping when someone needs assistance.\n\nDoctors and nurses take care of people who are sick or hurt. They work in hospitals and clinics, using their training to help patients feel better. Teachers help children learn to read, write, and understand the world around them.\n\nMail carriers deliver letters and packages to homes every day, rain or shine. Farmers grow the fruits, vegetables, and grains that end up on our dinner tables. Every community helper plays a part in making a neighborhood work well, and it takes many different jobs working together to keep a community running smoothly.`,
    questions:[
      {q:'What is a community helper?',choices:['A person who only helps their own family','A person who works to keep people safe and happy in a neighborhood','A type of building','A kind of pet'],a:1,exp:'The passage defines community helpers as people who "work hard to keep people safe and happy" in a neighborhood.'},
      {q:'What do firefighters wear to protect themselves?',choices:['Regular clothes','Special suits to protect from heat and smoke','Nothing special','Rain boots'],a:1,exp:'"They wear special suits to protect them from heat and smoke."'},
      {q:'According to the passage, what do mail carriers do?',choices:['They grow food','They fix cars','They deliver letters and packages','They teach children'],a:2,exp:'"Mail carriers deliver letters and packages to homes every day."'},
      {q:'What is the main idea of this passage?',choices:['Firefighters are the most important helpers','Many different community helpers work together to help a neighborhood run well','Only adults can be community helpers','Doctors work in schools'],a:1,exp:'The passage describes several different helpers and ends by explaining that it takes many jobs working together to keep a community running smoothly.'},
    ]
  },
  {
    grade:'k-5', subj:'literature',
    title:'The Tortoise Who Never Gave Up',
    text:`Once there was a tortoise named Pip who loved to explore the forest. One day, a quick young rabbit named Dash laughed at how slowly Pip walked. "You're so slow, Pip! I could run circles around you all day!" Dash teased.\n\nPip smiled and said, "Maybe so, but I always get where I'm going." Dash didn't believe him, so he challenged Pip to a race across the forest to the old oak tree.\n\nWhen the race began, Dash zoomed ahead and was soon far out of sight. Feeling very confident, Dash decided to stop and take a nap under a shady tree. "I have plenty of time," he thought. "Pip could never catch up now."\n\nWhile Dash slept, Pip kept walking, slow and steady, one careful step after another. He never stopped, even when the path grew rocky. By the time Dash woke up and rushed to the finish line, Pip was already there, resting happily under the old oak tree. Dash learned that day that being fast doesn't always win — sometimes trying your best and never giving up matters more.`,
    questions:[
      {q:'Why did Dash challenge Pip to a race?',choices:['Dash wanted to be Pip\'s friend','Dash thought he could easily beat slow-moving Pip','Pip challenged Dash first','They were both lost in the forest'],a:1,exp:'Dash teased Pip about being slow and was confident he could win easily, so he challenged him to a race.'},
      {q:'What mistake did Dash make during the race?',choices:['He ran the wrong direction','He stopped to take a nap because he felt too confident','He tripped over a rock','He forgot where the finish line was'],a:1,exp:'"Feeling very confident, Dash decided to stop and take a nap under a shady tree."'},
      {q:'What lesson does this story teach?',choices:['Rabbits are always faster than tortoises','Being fast is more important than trying hard','Trying your best and never giving up matters more than being fast','Napping is a bad idea'],a:2,exp:'The story ends by stating the lesson directly: "sometimes trying your best and never giving up matters more."'},
      {q:'How did Pip win the race?',choices:['He took a shortcut','He walked slowly and steadily without stopping','He asked a friend for help','He ran faster than Dash'],a:1,exp:'"Pip kept walking, slow and steady, one careful step after another. He never stopped."'},
    ]
  },
  {
    grade:'6-8', subj:'science',
    title:'The Water Cycle',
    text:`Water is constantly moving through the environment in a process known as the water cycle, or hydrological cycle. This cycle has no true beginning or end — water simply changes form and location continuously.\n\nEvaporation occurs when the sun heats water in oceans, lakes, and rivers, converting liquid water into water vapor. This vapor rises into the atmosphere where, as it cools, it undergoes condensation — forming tiny water droplets that make up clouds. When these droplets combine and grow heavy enough, precipitation occurs in the form of rain, snow, or hail.\n\nOnce precipitation reaches the ground, it may be absorbed into the soil through infiltration, run across the surface into streams and rivers, or collect in bodies of water to begin evaporating once again. Plants contribute to the cycle through transpiration, releasing water vapor through their leaves.\n\nUnderstanding the water cycle is essential for predicting weather patterns, managing freshwater resources, and understanding the effects of climate change on global precipitation.`,
    questions:[
      {q:'What causes evaporation in the water cycle?',choices:['Wind','Sunlight heating water','Cold temperatures','Precipitation'],a:1,exp:'The passage states: "Evaporation occurs when the sun heats water."'},
      {q:'What is another name for the water cycle?',choices:['Photosynthesis cycle','Hydrological cycle','Carbon cycle','Nitrogen cycle'],a:1,exp:'The passage says: "the water cycle, or hydrological cycle."'},
      {q:'Which process do plants contribute to the water cycle through?',choices:['Evaporation','Condensation','Transpiration','Infiltration'],a:2,exp:'"Plants contribute to the cycle through transpiration, releasing water vapor through their leaves."'},
      {q:'According to the passage, which of the following is NOT listed as a form of precipitation?',choices:['Rain','Snow','Hail','Fog'],a:3,exp:'The passage lists rain, snow, and hail as forms of precipitation. Fog is not mentioned.'},
      {q:'What is the main purpose of this passage?',choices:['To argue that the water cycle is endangered','To explain how the water cycle works','To persuade readers to conserve water','To describe rainfall patterns globally'],a:1,exp:'The passage is informational — it explains the stages and importance of the water cycle.'},
    ]
  },
  {
    grade:'9-10', subj:'history',
    title:'The Industrial Revolution and Its Social Impact',
    text:`The Industrial Revolution, which began in Britain in the late 18th century and spread throughout Europe and North America, fundamentally transformed human society. Mechanized production replaced skilled artisanal work, steam power drove factories and transportation, and urbanization accelerated as workers migrated from agricultural regions to industrial cities.\n\nWhile the revolution produced unprecedented economic growth, its social consequences were deeply contradictory. Child labor became widespread in mines and factories, where children as young as five worked dangerous twelve-hour shifts. Living conditions in urban slums were overcrowded and unsanitary, contributing to disease epidemics. Workers had no legal protections, no minimum wage, and no right to organize.\n\nIn response, labor reform movements gained momentum throughout the 19th century. Reformers like Robert Owen advocated for shorter workdays and humane conditions, while investigative journalists exposed factory abuses. Gradually, legislation such as the British Factory Acts limited child labor and improved working conditions. By the early 20th century, the labor union movement had established the eight-hour workday in many countries.\n\nThe Industrial Revolution thus illustrates how economic progress and social injustice can coexist — and how sustained reform efforts can eventually reshape the conditions created by rapid change.`,
    questions:[
      {q:'What does the author mean by the revolution\'s consequences being "deeply contradictory"?',choices:['The revolution happened very quickly','Economic benefits coexisted with severe social problems','Historians disagree about whether it happened','It affected different countries differently'],a:1,exp:'The author describes economic growth alongside child labor, dangerous conditions, and lack of workers\' rights — contradictory outcomes.'},
      {q:'Which of the following best describes the purpose of the final paragraph?',choices:['To celebrate the Industrial Revolution','To summarize child labor statistics','To draw a broader lesson from the historical example','To argue that progress is always harmful'],a:2,exp:'The final paragraph offers a broader interpretation: economic progress and injustice can coexist, and reform can follow.'},
      {q:'According to the passage, what role did investigative journalists play?',choices:['They wrote positive stories about factories','They exposed factory abuses to the public','They organized labor unions','They drafted the Factory Acts'],a:1,exp:'"investigative journalists exposed factory abuses" — they publicized problems.'},
      {q:'The word "unprecedented" (paragraph 2) most nearly means:',choices:['Expected','Temporary','Never seen before','Well-documented'],a:2,exp:'"Unprecedented" means having no previous example; "never before seen."'},
      {q:'Which of the following is the best title for this passage?',choices:['Why the Industrial Revolution Failed','Child Labor in Victorian England','Progress and Its Price: The Industrial Revolution\'s Social Legacy','Robert Owen and Labor Reform'],a:2,exp:'The passage covers both the social problems created by industrialization AND the reform movements that addressed them — making this the most comprehensive title.'},
    ]
  },
  {
    grade:'11-12', subj:'literature',
    title:'On the Nature of Ambition (adapted)',
    text:`Ambition is a peculiar force — it drives individuals to extraordinary achievement while simultaneously rendering them blind to the costs of pursuit. Great empires have been built on ambition; great lives have been destroyed by it. The ancient Romans gave us the word itself, derived from "ambitio" — the act of going around to solicit votes, a metaphor for self-promotion that carries within it the seed of excess.\n\nModern psychology distinguishes between intrinsic and extrinsic motivation. Those driven by intrinsic goals — mastery, purpose, growth — tend toward resilience and sustained satisfaction. Those driven primarily by external validation — status, wealth, the defeat of rivals — often achieve spectacular short-term success at considerable personal cost. The paradox is that the very drive that enables achievement can undermine the wellbeing that achievement is meant to produce.\n\nLiterature has long grappled with this tension. Macbeth's unchecked ambition transforms a brave soldier into a tyrant consumed by paranoia. Jay Gatsby's ambition for Daisy — which he conflates with the American Dream itself — destroys him precisely because he cannot recognize that his ideal is a fiction. In both cases, the authors suggest that ambition divorced from moral grounding is not a path to fulfillment but to tragedy.\n\nPerhaps the question is not whether to be ambitious, but what to be ambitious for — and what one is willing to forfeit in its pursuit.`,
    questions:[
      {q:'What does the author suggest about the relationship between ambition and achievement?',choices:['Ambition always leads to achievement','Achievement is impossible without ambition','Ambition enables achievement but can also undermine wellbeing','Achievement destroys ambition over time'],a:2,exp:'"The very drive that enables achievement can undermine the wellbeing that achievement is meant to produce."'},
      {q:'According to the passage, intrinsically motivated people tend to experience:',choices:['Greater fame but less happiness','Resilience and sustained satisfaction','More external validation','Spectacular short-term success'],a:1,exp:'"Those driven by intrinsic goals... tend toward resilience and sustained satisfaction."'},
      {q:'What literary examples does the author use, and what do they share?',choices:['Both examples show ambition leading to success','Both characters are villains who deserve their fate','Both illustrate ambition without moral grounding leading to tragedy','Both come from the same era of literature'],a:2,exp:'The author states both Macbeth and Gatsby illustrate "ambition divorced from moral grounding" leading to tragedy.'},
      {q:'The phrase "carries within it the seed of excess" (paragraph 1) most likely means:',choices:['The word ambition comes from farming terminology','The concept of ambition inherently contains the potential for going too far','Romans were obsessed with gardening','Excess ambition was common in ancient Rome'],a:1,exp:'A "seed" of something means a built-in, embryonic quality — the potential for excess is embedded in ambition itself.'},
      {q:'Which best describes the author\'s overall argument?',choices:['Ambition is destructive and should be avoided','All successful people are externally motivated','The nature and object of ambition matter as much as ambition itself','Macbeth and Gatsby were not truly ambitious'],a:2,exp:'The final paragraph poses the key question: not whether to be ambitious, but what to be ambitious for. The quality and direction of ambition is the central concern.'},
    ]
  },
  {
    grade:'ap', subj:'social',
    title:'Algorithmic Bias and the Limits of Neutrality',
    text:`The promise of algorithmic decision-making was seductive: replace the vagaries of human judgment with the consistency of code, eliminate prejudice by substituting data for intuition. If machines process applications, approve loans, and recommend sentences, surely the outcomes will be fairer. This assumption, however, rests on a fundamental misunderstanding of both algorithms and the social contexts in which they operate.\n\nAlgorithms learn from historical data. If that historical data encodes existing patterns of discrimination — in hiring, in lending, in criminal justice — then training a model on that data does not eliminate bias; it automates it, scales it, and launders it with a veneer of mathematical objectivity. The COMPAS algorithm, used in U.S. courts to assess recidivism risk, was found by ProPublica's 2016 investigation to assign higher risk scores to Black defendants than to white defendants with identical criminal histories, at nearly twice the rate. The algorithm was not programmed to be racist; it learned to be, from data generated by a racist system.\n\nDefenders of algorithmic systems often invoke statistical accuracy: the model's predictions correlate with outcomes in aggregate. But aggregate accuracy can mask systematic unfairness at the individual level. Moreover, accuracy and fairness turn out to be mathematically incompatible in certain configurations — a result known as the "impossibility theorem" of algorithmic fairness, which demonstrates that no model can simultaneously satisfy all common definitions of fairness.\n\nThe question, then, is not whether algorithms can achieve perfect neutrality — they cannot — but how their deployment should be governed, audited, and contested. Technical solutions are necessary but insufficient; they must be accompanied by institutional accountability and legal frameworks that protect those most harmed by automated decision-making.`,
    questions:[
      {q:'The author\'s central claim is best summarized as:',choices:['Algorithms should replace human judgment entirely','Algorithmic systems cannot be biased because they process data objectively','Algorithms reflect and amplify the biases in their training data, requiring governance','COMPAS is the only biased algorithm in use today'],a:2,exp:'The entire passage argues that algorithmic bias is real, systemic, and requires governance — not just technical fixes.'},
      {q:'The word "launders" in paragraph 2 is used to suggest that algorithmic systems:',choices:['Clean up unfair historical data','Make bias appear legitimate and neutral','Are financially motivated','Reduce the amount of discrimination over time'],a:1,exp:'"Launder" implies disguising something illegitimate as clean/legitimate — algorithms disguise inherited bias as objective math.'},
      {q:'What does the "impossibility theorem" of algorithmic fairness demonstrate?',choices:['Algorithms will always be biased against minorities','No model can satisfy all definitions of fairness simultaneously','Statistical accuracy is irrelevant to fairness','Algorithmic bias can be eliminated with better data'],a:2,exp:'The passage states: "no model can simultaneously satisfy all common definitions of fairness."'},
      {q:'Which of the following best describes the structure of the passage\'s argument?',choices:['Claim → counterexample → concession → revised claim','Problem → evidence → complication → prescription','Narrative → analysis → statistical evidence → conclusion','Historical overview → present comparison → future prediction'],a:1,exp:'The passage: (1) identifies the flawed claim, (2) provides evidence of bias (COMPAS), (3) addresses the defenders\' argument and the impossibility theorem complication, then (4) prescribes governance.'},
      {q:'The author\'s tone can best be described as:',choices:['Outraged and accusatory','Measured and analytically critical','Optimistic about technological progress','Neutral and purely descriptive'],a:1,exp:'The author presents evidence carefully, acknowledges counterarguments, and calls for governance — this is critically analytical but not emotionally outraged or purely neutral.'},
    ]
  },
  {
    grade:'6-8', subj:'history',
    title:'The Silk Road',
    text:`Long before the internet, there existed a network that connected civilizations across thousands of miles: the Silk Road. Spanning from China in the east to the Mediterranean Sea in the west, this ancient trade route carried far more than silk. Spices, glassware, paper, and ideas moved along its paths, shaping the cultures it touched.\n\nThe name "Silk Road" was coined by German geographer Ferdinand von Richthofen in 1877, though the routes themselves had existed for over a thousand years. At its peak, during the Tang Dynasty (618–907 CE) and later the Mongol Empire, the Silk Road was one of the busiest trade networks in the world. The Mongol rulers maintained safety along the routes, encouraging merchants and diplomats to travel across their vast territories.\n\nThe Silk Road was not a single road but a web of routes, including both overland and maritime paths. Merchants rarely traveled the entire distance themselves; goods passed through many hands and many cities — including Samarkand, Baghdad, and Constantinople — before reaching their destination.\n\nBeyond trade, the Silk Road transmitted religions, technologies, and diseases. Buddhism spread from India to China partly along these routes. Papermaking technology traveled westward from China. And in the 14th century, the Black Death spread rapidly along Silk Road trade networks, killing millions across Eurasia.`,
    questions:[
      {q:'What is the main idea of this passage?',choices:['The Silk Road only carried silk','The Silk Road was a single road connecting China to Rome','The Silk Road was a network that facilitated trade and cultural exchange','Ferdinand von Richthofen invented the Silk Road'],a:2,exp:'The passage emphasizes the broad cultural, religious, and technological exchanges along the Silk Road, not just silk trade.'},
      {q:'Who coined the name "Silk Road"?',choices:['Kublai Khan','A Tang Dynasty emperor','Ferdinand von Richthofen','Marco Polo'],a:2,exp:'"The name \'Silk Road\' was coined by German geographer Ferdinand von Richthofen in 1877."'},
      {q:'Which of the following was NOT mentioned as something spread along the Silk Road?',choices:['Buddhism','Papermaking technology','The Black Death','Democracy'],a:3,exp:'The passage mentions Buddhism, paper technology, and the Black Death. Democracy is not mentioned.'},
      {q:'Why did merchants rarely travel the entire Silk Road themselves?',choices:['It was too dangerous at all times','Goods passed through many hands and cities along the way','The roads were too narrow for caravans','Silk was too fragile to transport long distances'],a:1,exp:'"Goods passed through many hands and many cities... before reaching their destination."'},
    ]

let answered = {};
let current = null;

function loadPassage(){
  const grade = document.getElementById('r-grade').value;
  const subj = document.getElementById('r-subj').value;
  let pool = PASSAGES;
  if(grade!=='random') pool = pool.filter(p=>p.grade===grade||p.grade.includes(grade));
  if(subj!=='random') pool = pool.filter(p=>p.subj===subj);
  if(!pool.length) pool = PASSAGES; // fallback
  current = pool[Math.floor(Math.random()*pool.length)];
  answered = {};
  render();
}

function render(){
  const p = current;
  let html = `<div class="ace-card">
    <div class="passage-box">
      <h3>📄 ${p.title}</h3>
      ${p.text.split('\n\n').map(para=>`<p style="margin-bottom:12px">${para}</p>`).join('')}
    </div>
    <div id="scoreSum" style="display:none" class="score-summary">
      <div><div class="num" id="sc-n">0</div><div class="lbl">Correct</div></div>
      <div><div class="num" id="sc-t" style="color:var(--muted)">/ ${p.questions.length}</div><div class="lbl">Total</div></div>
      <div><div class="num" id="sc-p" style="color:var(--accent)">0%</div><div class="lbl">Score</div></div>
    </div>
    <div id="qs">
    ${p.questions.map((q,qi)=>`
      <div class="q-block" id="qb${qi}">
        <div class="q-text">${qi+1}. ${q.q}</div>
        <div class="choices">
          ${q.choices.map((c,ci)=>`
            <div class="choice" id="ch${qi}_${ci}" onclick="pick(${qi},${ci})">
              <span class="choice-letter">${'ABCD'[ci]}</span>
              <span>${c}</span>
            </div>`).join('')}
        </div>
        <div class="explanation" id="ex${qi}">💡 ${q.exp}</div>
      </div>`).join('')}
    </div>
  </div>`;
  document.getElementById('passageArea').innerHTML = html;
}

function pick(qi, ci){
  if(answered[qi]!==undefined) return;
  const q = current.questions[qi];
  answered[qi] = ci;
  document.querySelectorAll(`[id^="ch${qi}_"]`).forEach((el,i)=>{
    if(i===q.a) el.classList.add('correct');
    else if(i===ci && ci!==q.a) el.classList.add('wrong');
  });
  document.getElementById(`ex${qi}`).style.display='block';

  if(Object.keys(answered).length===current.questions.length){
    const correct = Object.entries(answered).filter(([qi,ci])=>current.questions[qi].a===ci).length;
    const total = current.questions.length;
    document.getElementById('scoreSum').style.display='flex';
    document.getElementById('sc-n').textContent=correct;
    document.getElementById('sc-t').textContent='/ '+total;
    document.getElementById('sc-p').textContent=Math.round(correct/total*100)+'%';
  }
}

loadPassage();

// ── localStorage ──────────────────────────────────────────────────────────────
const LS_READ_HIST = 'ace_reading_history';
function saveReadingResult(title, correct, total){
  const hist = JSON.parse(localStorage.getItem(LS_READ_HIST)||'[]');
  hist.push({title, correct, total, pct:Math.round(correct/total*100), date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric'})});
  if(hist.length>30)hist.shift();
  localStorage.setItem(LS_READ_HIST, JSON.stringify(hist));
  updateReadingStats(); renderReadingHistory();
}
function updateReadingStats(){
  const hist=JSON.parse(localStorage.getItem(LS_READ_HIST)||'[]');
  document.getElementById('st-passages').textContent=hist.length;
  if(!hist.length)return;
  const avg=Math.round(hist.reduce((s,h)=>s+h.pct,0)/hist.length);
  const perfects=hist.filter(h=>h.pct===100).length;
  document.getElementById('st-acc').textContent=avg+'%';
  document.getElementById('st-perfect').textContent=perfects;
}
function renderReadingHistory(){
  const hist=JSON.parse(localStorage.getItem(LS_READ_HIST)||'[]');
  const card=document.getElementById('historyCard');
  if(!hist.length){card.style.display='none';return;}
  card.style.display='block';
  document.getElementById('historyList').innerHTML=hist.slice().reverse().slice(0,10).map(h=>`
    <div class="hist-item">
      <div class="hp">${h.pct}%</div>
      <div class="hi"><div class="hs">${h.title}</div><div class="ht">${h.correct}/${h.total} correct · ${h.date}</div></div>
    </div>`).join('');
}
function clearReadingHistory(){if(!confirm('Clear reading history?'))return;localStorage.removeItem(LS_READ_HIST);updateReadingStats();renderReadingHistory();}
window.addEventListener('DOMContentLoaded',()=>{updateReadingStats();renderReadingHistory();});
// Patch pick to save when complete
const _origPick=pick;
function pick(qi,ci){
  _origPick(qi,ci);
  if(Object.keys(answered).length===current.questions.length){
    const correct=Object.entries(answered).filter(([i,c])=>current.questions[i].a===parseInt(c)).length;
    saveReadingResult(current.title,correct,current.questions.length);
  }
}

</script>
