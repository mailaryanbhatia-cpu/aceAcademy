<link rel="stylesheet" href="ace-theme.css">
<style>
:root{--bg:#f7f8fa;--card:#fff;--accent:#4f46e5;--accent2:#7c3aed;--text:#1e1b4b;--muted:#6b7280;--border:#e5e7eb;--green:#059669}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.topnav{display:flex;align-items:center;gap:6px;padding:0 20px;height:54px;background:#fff;border-bottom:1px solid var(--border);flex-wrap:wrap}
.logo{font-size:1.3rem;font-weight:800;color:var(--accent);text-decoration:none;margin-right:10px}.logo span{color:var(--accent2)}
.nav-link{text-decoration:none;color:var(--muted);font-size:.85rem;padding:6px 10px;border-radius:7px;white-space:nowrap}.nav-link:hover{background:var(--bg)}.nav-link.active{color:var(--accent);font-weight:700}
.spacer{flex:1}

.hero{text-align:center;padding:40px 20px 24px;background:linear-gradient(135deg,#4f46e5,#7c3aed);color:#fff}
.hero h1{font-size:2rem;font-weight:800;margin-bottom:8px}
.hero p{opacity:.85;max-width:520px;margin:0 auto}

.container{max-width:960px;margin:28px auto;padding:0 20px}
.controls{display:flex;gap:12px;flex-wrap:wrap;align-items:center;margin-bottom:24px}
select{padding:9px 14px;border:1.5px solid var(--border);border-radius:9px;font-size:.9rem;color:var(--text);background:#fff;outline:none;cursor:pointer}
select:focus{border-color:var(--accent)}
.btn{padding:9px 22px;border-radius:9px;border:none;cursor:pointer;font-size:.9rem;font-weight:700;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:#3730a3}
.btn-outline{background:#fff;color:var(--accent);border:1.5px solid var(--accent)}.btn-outline:hover{background:#eff6ff}

.sheet{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:28px}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.sheet-title{font-size:1.3rem;font-weight:800;color:var(--text)}
.sheet-sub{font-size:.85rem;color:var(--muted);margin-top:2px}

.section{margin-bottom:24px}
.section h3{font-size:.95rem;font-weight:700;color:var(--accent);border-bottom:2px solid var(--accent);padding-bottom:5px;margin-bottom:12px;text-transform:uppercase;letter-spacing:.05em}
.formula-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.formula-box{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:12px 14px}
.formula-box .formula{font-family:'Courier New',monospace;font-size:.95rem;font-weight:700;color:var(--accent2);margin-bottom:4px}
.formula-box .desc{font-size:.8rem;color:var(--muted);line-height:1.4}

@media print{
  .topnav,.controls,.btn{display:none!important}
  .sheet{border:none;box-shadow:none;padding:0}
  body{background:#fff}
}

  select{background:#1a1a2e;color:var(--text)} .btn-outline{background:#1a1a2e}
  .topnav{background:#12121f;border-color:var(--border)}
}
</style>

function buildSheet(){
  const g = document.getElementById('gradeSelect').value;
  const s = document.getElementById('subjectSelect').value;
  const data = (FORMULAS[g] || {})[s] || null;

  const gradeLabel = g==='ap'?'AP Courses':'Grade '+g;
  const subjectLabel = {math:'Mathematics',science:'Science',physics:'Physics',chemistry:'Chemistry'}[s]||s;
  document.getElementById('sheetTitle').textContent = gradeLabel+' ‚ÄĒ '+subjectLabel;
  document.getElementById('sheetSub').textContent = 'aceAcademy Reference Card ‚ÄĘ Print-ready';

  if(!data){
    document.getElementById('sheetContent').innerHTML = '<p style="color:var(--muted);padding:20px 0">Formula sheet for this combination coming soon. Try a different grade or subject.</p>';
    return;
  }

  document.getElementById('sheetContent').innerHTML = data.map(sec=>`
    <div class="section">
      <h3>${sec.section}</h3>
      <div class="formula-grid">
        ${sec.items.map(f=>`
          <div class="formula-box">
            <div class="formula">${f.f}</div>
            ${f.d?`<div class="desc">${f.d}</div>`:''}
          </div>`).join('')}
      </div>
    </div>`).join('');
}

// Populate subject options based on grade
document.getElementById('gradeSelect').addEventListener('change', function(){
  const g = this.value;
  const sel = document.getElementById('subjectSelect');
  const base = '<option value="math">Mathematics</option><option value="science">Science</option>';
  const extra = (g==='10'||g==='11'||g==='ap') ? '<option value="physics">Physics</option><option value="chemistry">Chemistry</option>' : '';
  sel.innerHTML = base + extra;
  buildSheet();
});

buildSheet();
</script>
<script src="/aceAcademy/analytics.js">
// Formula favorites + search history
var FAV_KEY  = 'ace_formula_favs';
var SRCH_KEY = 'ace_formula_searches';

function toggleFavorite(formulaId, formulaText){
  var favs = JSON.parse(localStorage.getItem(FAV_KEY)||'[]');
  var idx  = favs.findIndex(f=>f.id===formulaId);
  if(idx >= 0){ favs.splice(idx,1); }
  else { favs.unshift({ id: formulaId, text: formulaText, date: new Date().toLocaleDateString() }); }
  localStorage.setItem(FAV_KEY, JSON.stringify(favs.slice(0,30)));
  renderFormulaFavs();
  return idx < 0; // true = now favorited
}

function isFavorite(formulaId){
  var favs = JSON.parse(localStorage.getItem(FAV_KEY)||'[]');
  return favs.some(f=>f.id===formulaId);
}

function saveFormulaSearch(query){
  if(!query || query.length < 2) return;
  var searches = JSON.parse(localStorage.getItem(SRCH_KEY)||'[]');
  searches = searches.filter(s=>s!==query);
  searches.unshift(query);
  localStorage.setItem(SRCH_KEY, JSON.stringify(searches.slice(0,10)));
}

function renderFormulaFavs(){
  var el = document.getElementById('formulaFavs');
  if(!el) return;
  var favs = JSON.parse(localStorage.getItem(FAV_KEY)||'[]');
  if(!favs.length){ el.innerHTML='<div style="color:#475569;font-size:.82rem;text-align:center;padding:12px">Click ‚≠ź on any formula to save it here.</div>'; return; }
  el.innerHTML = favs.map(f=>`
    <div style="background:#0f172a;border:1px solid #1e293b;border-radius:10px;padding:10px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center">
      <div style="font-family:monospace;color:#a5b4fc;font-size:.85rem">${f.text}</div>
      <button onclick="toggleFavorite('${f.id}','${f.text.replace(/'/g,"\'")}');renderFormulaFavs()" 
        style="background:none;border:none;cursor:pointer;font-size:1rem;color:#64748b">‚úē</button>
    </div>`).join('');
}

document.addEventListener("DOMContentLoaded", renderFormulaFavs);
</script>
