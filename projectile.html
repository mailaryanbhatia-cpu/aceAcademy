<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<script src="/timer.js"></script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Projectile Motion Calculator — aceAcademy</title>
<link rel="stylesheet" href="ace-theme.css">
<style>
:root{--bg:#0b1120;--card:#1a2540;--accent:#6366f1;--accent2:#a5b4fc;--text:#ffffff;--muted:#b0bece;--border:#2a3a55;--green:#34d399;--red:#f87171;--amber:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
.topnav{display:flex;align-items:center;gap:6px;padding:0 20px;height:54px;background:#080e1c;border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto}.topnav::-webkit-scrollbar{display:none}
.logo{font-size:1.3rem;font-weight:800;color:#fff;text-decoration:none;margin-right:10px}.logo span{color:var(--accent2)}
.nav-link{text-decoration:none;color:var(--muted);font-size:.85rem;padding:6px 10px;border-radius:7px;white-space:nowrap;font-weight:600}.nav-link:hover{background:rgba(255,255,255,.07);color:#fff}.nav-link.active{color:var(--accent2)}
.spacer{flex:1}
.hero{text-align:center;padding:32px 20px 18px;background:linear-gradient(135deg,#06091a,#1a2080,#2d0d5c);border-bottom:1px solid var(--border)}
.hero h1{font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:6px}
.hero p{color:var(--accent2);font-size:.95rem}
.container{max-width:860px;margin:24px auto;padding:0 20px}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;margin-bottom:20px}
.card h2{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:14px}
.btn{padding:9px 20px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:.85rem;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.88}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:#fff}.btn-outline:hover{border-color:var(--accent)}
.btn-big{padding:12px 28px;font-size:.95rem;border-radius:12px}
label{font-size:.72rem;font-weight:800;color:var(--muted);display:block;margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
input[type=number]{width:100%;background:#111827;border:1.5px solid var(--border);border-radius:9px;padding:11px 14px;font-size:.95rem;font-family:inherit;color:#fff;outline:none;transition:border .15s}
input[type=number]:focus{border-color:var(--accent)}
.var-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:14px}
.var-unit{font-size:.68rem;color:var(--muted);margin-top:4px}
.example-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px}
.example-chip{padding:5px 12px;border-radius:16px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.75rem;cursor:pointer}
.example-chip:hover{border-color:var(--accent);color:#fff}
.error-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:10px;padding:12px 14px;color:#fca5a5;font-size:.85rem;margin-top:16px}
.result-grid{display:flex;gap:14px;flex-wrap:wrap;margin-top:16px}
.result-box{flex:1;min-width:120px;background:#111827;border:1.5px solid var(--accent);border-radius:10px;padding:14px;text-align:center}
.result-val{font-size:1.3rem;font-weight:900;color:var(--accent2)}
.result-lbl{font-size:.7rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-top:4px}
.step{font-size:.83rem;color:var(--muted);padding:8px 0;border-bottom:1px solid var(--border);line-height:1.6}
.step:last-child{border-bottom:none}
.step strong{color:#fff}
.steps-box{margin-top:16px;background:#0d1628;border-radius:10px;padding:14px 18px}
.graph-wrap{position:relative;background:#0d1628;border:1.5px solid var(--border);border-radius:12px;overflow:hidden;height:340px;margin-top:16px}
canvas{display:block;width:100%;height:100%}
</style>
</head>
<body>
<nav class="topnav">
  <a class="logo" href="index.html">ace<span>Academy</span></a>
  <a class="nav-link" href="index.html">Home</a>
  <a class="nav-link" href="alltools.html">All Tools</a>
  <a class="nav-link active" href="projectile.html">Projectile Motion</a>
  <div class="spacer"></div>
</nav>
<script src="auth-guard.js"></script>

<div class="hero">
  <h1>🎯 Projectile Motion Calculator</h1>
  <p>2D motion at an angle — enter launch speed, angle, and height to get range, max height, time of flight, and a trajectory plot.</p>
</div>

<div class="container">

  <div class="card">
    <h2>Launch Parameters</h2>
    <div class="var-grid">
      <div>
        <label>Initial Speed (v₀)</label>
        <input type="number" id="pjV0" step="any" value="20">
        <div class="var-unit">m/s</div>
      </div>
      <div>
        <label>Launch Angle (θ)</label>
        <input type="number" id="pjAngle" step="any" value="45" min="0" max="90">
        <div class="var-unit">degrees above horizontal</div>
      </div>
      <div>
        <label>Launch Height (h₀)</label>
        <input type="number" id="pjHeight" step="any" value="0" min="0">
        <div class="var-unit">m (0 = ground level)</div>
      </div>
    </div>
    <div style="margin-top:16px"><button class="btn btn-primary btn-big" onclick="solve()">🎯 Calculate</button></div>
    <div class="example-row" id="exampleRow"></div>
    <div id="output"></div>
    <div class="graph-wrap" id="graphWrap" style="display:none"><canvas id="trajCanvas"></canvas></div>
  </div>

</div>

<script>
const G = 9.8; // m/s^2

const EXAMPLES = [
  { label: 'Classic 45°', v0: 20, angle: 45, h0: 0 },
  { label: 'Cannon shot', v0: 50, angle: 30, h0: 0 },
  { label: 'Thrown from cliff', v0: 15, angle: 20, h0: 25 },
  { label: 'Basketball shot', v0: 8, angle: 55, h0: 2 },
];

document.getElementById('exampleRow').innerHTML = EXAMPLES.map((ex,i) =>
  `<button class="example-chip" onclick="loadExample(${i})">${esc(ex.label)}</button>`
).join('');

function loadExample(i) {
  const ex = EXAMPLES[i];
  document.getElementById('pjV0').value = ex.v0;
  document.getElementById('pjAngle').value = ex.angle;
  document.getElementById('pjHeight').value = ex.h0;
  solve();
}

function fmt(n) {
  if (n === null || n === undefined || isNaN(n)) return '—';
  return Math.round(n * 10000) / 10000;
}

function solve() {
  const v0 = parseFloat(document.getElementById('pjV0').value);
  const angleDeg = parseFloat(document.getElementById('pjAngle').value);
  const h0 = parseFloat(document.getElementById('pjHeight').value) || 0;
  const out = document.getElementById('output');
  const graphWrap = document.getElementById('graphWrap');

  if (isNaN(v0) || v0 <= 0) { out.innerHTML = `<div class="error-box">⚠️ Enter a positive initial speed.</div>`; graphWrap.style.display = 'none'; return; }
  if (isNaN(angleDeg) || angleDeg < 0 || angleDeg > 90) { out.innerHTML = `<div class="error-box">⚠️ Angle must be between 0 and 90 degrees.</div>`; graphWrap.style.display = 'none'; return; }
  if (h0 < 0) { out.innerHTML = `<div class="error-box">⚠️ Launch height cannot be negative.</div>`; graphWrap.style.display = 'none'; return; }

  const angleRad = angleDeg * Math.PI / 180;
  const vx0 = v0 * Math.cos(angleRad);
  const vy0 = v0 * Math.sin(angleRad);

  // time of flight: h0 + vy0*t - 0.5*g*t^2 = 0 -> 0.5*g*t^2 - vy0*t - h0 = 0
  const a = 0.5 * G, b = -vy0, c = -h0;
  const disc = b*b - 4*a*c;
  const t = (-b + Math.sqrt(disc)) / (2*a);

  const range = vx0 * t;
  const maxHeightAboveGround = h0 + (vy0 * vy0) / (2 * G);
  const timeToApex = vy0 / G;
  const vyImpact = vy0 - G * t;
  const speedImpact = Math.sqrt(vx0*vx0 + vyImpact*vyImpact);

  out.innerHTML = `<div class="result-grid">
    <div class="result-box"><div class="result-val">${fmt(t)} s</div><div class="result-lbl">Time of Flight</div></div>
    <div class="result-box"><div class="result-val">${fmt(range)} m</div><div class="result-lbl">Range</div></div>
    <div class="result-box"><div class="result-val">${fmt(maxHeightAboveGround)} m</div><div class="result-lbl">Max Height</div></div>
    <div class="result-box"><div class="result-val">${fmt(speedImpact)} m/s</div><div class="result-lbl">Impact Speed</div></div>
  </div>
  <div class="steps-box">
    <div class="step">v₀ₓ = v₀cos(θ) = ${v0}cos(${angleDeg}°) = <strong>${fmt(vx0)} m/s</strong> (constant throughout flight)</div>
    <div class="step">v₀ᵧ = v₀sin(θ) = ${v0}sin(${angleDeg}°) = <strong>${fmt(vy0)} m/s</strong></div>
    <div class="step">Time to reach apex: t = v₀ᵧ/g = ${fmt(vy0)}/${G} = <strong>${fmt(timeToApex)} s</strong></div>
    <div class="step">Max height: h₀ + v₀ᵧ²/(2g) = ${h0} + ${fmt(vy0)}²/(2×${G}) = <strong>${fmt(maxHeightAboveGround)} m</strong></div>
    <div class="step">Total time of flight (solving h₀ + v₀ᵧt − ½gt² = 0): <strong>${fmt(t)} s</strong></div>
    <div class="step">Range = v₀ₓ × t = ${fmt(vx0)} × ${fmt(t)} = <strong>${fmt(range)} m</strong></div>
  </div>`;

  graphWrap.style.display = 'block';
  drawTrajectory(vx0, vy0, h0, t);
}

function drawTrajectory(vx0, vy0, h0, tFlight) {
  const canvas = document.getElementById('trajCanvas');
  const wrap = canvas.parentElement;
  canvas.width = wrap.clientWidth;
  canvas.height = wrap.clientHeight;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1628';
  ctx.fillRect(0, 0, W, H);

  const PAD = 45;
  const points = [];
  let maxX = 0, maxY = h0;
  for (let i = 0; i <= 100; i++) {
    const t = (tFlight * i) / 100;
    const x = vx0 * t;
    const y = h0 + vy0 * t - 0.5 * G * t * t;
    points.push([x, Math.max(y, 0)]);
    if (x > maxX) maxX = x;
    if (y > maxY) maxY = y;
  }
  maxX *= 1.08; maxY *= 1.15;
  if (maxX === 0) maxX = 1;
  if (maxY === 0) maxY = 1;

  const toX = x => PAD + (x / maxX) * (W - PAD - 20);
  const toY = y => (H - PAD) - (y / maxY) * (H - PAD - 20);

  ctx.strokeStyle = '#2a3a55';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(PAD, 10); ctx.lineTo(PAD, H - PAD); ctx.lineTo(W - 20, H - PAD);
  ctx.stroke();
  ctx.fillStyle = '#b0bece';
  ctx.font = '11px Inter, sans-serif';
  ctx.fillText('Horizontal Distance (m) →', W - 190, H - PAD + 24);
  ctx.save();
  ctx.translate(16, PAD + 40);
  ctx.rotate(-Math.PI/2);
  ctx.fillText('Height (m) →', 0, 0);
  ctx.restore();

  ctx.strokeStyle = '#6366f1';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  points.forEach(([x, y], i) => {
    const px = toX(x), py = toY(y);
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  });
  ctx.stroke();

  // launch and landing markers
  ctx.fillStyle = '#34d399';
  ctx.beginPath(); ctx.arc(toX(0), toY(h0), 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#f87171';
  const last = points[points.length-1];
  ctx.beginPath(); ctx.arc(toX(last[0]), toY(last[1]), 5, 0, Math.PI*2); ctx.fill();
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

solve();
</script>
</body>
</html>
