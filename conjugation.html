:root{--bg:#0b1120;--card:#1a2540;--accent:#6366f1;--accent2:#a5b4fc;--text:#ffffff;--muted:#b0bece;--border:#2a3a55;--green:#34d399;--red:#f87171;--amber:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
.topnav{display:flex;align-items:center;gap:6px;padding:0 20px;height:54px;background:#080e1c;border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto}.topnav::-webkit-scrollbar{display:none}
.logo{font-size:1.3rem;font-weight:800;color:#fff;text-decoration:none;margin-right:10px}.logo span{color:var(--accent2)}
.nav-link{text-decoration:none;color:var(--muted);font-size:.85rem;padding:6px 10px;border-radius:7px;white-space:nowrap;font-weight:600}.nav-link:hover{background:rgba(255,255,255,.07);color:#fff}.nav-link.active{color:var(--accent2)}
.spacer{flex:1}
.hero{text-align:center;padding:32px 20px 18px;background:linear-gradient(135deg,#06091a,#1a2080,#2d0d5c);border-bottom:1px solid var(--border)}
.hero h1{font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:6px}
.hero p{color:var(--accent2);font-size:.95rem}
.container{max-width:900px;margin:24px auto;padding:0 20px}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;margin-bottom:20px}
.card h2{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:14px}
.btn{padding:9px 20px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:.85rem;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.88}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:#fff}.btn-outline:hover{border-color:var(--accent)}
.btn-big{padding:12px 28px;font-size:.95rem;border-radius:12px}

.chip-group{display:flex;flex-wrap:wrap;gap:6px}
.chip{padding:6px 15px;border-radius:20px;border:1.5px solid var(--border);background:transparent;cursor:pointer;font-size:.82rem;font-weight:600;color:var(--muted);transition:all .15s}
.chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
label{font-size:.72rem;font-weight:800;color:var(--muted);display:block;margin-bottom:8px;text-transform:uppercase;letter-spacing:.05em}

.tab-row{display:flex;gap:8px;margin-bottom:16px}
.tab-btn{flex:1;padding:10px;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-weight:700;font-size:.85rem;cursor:pointer}
.tab-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}

.verb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}
.verb-chip{background:#111827;border:1.5px solid var(--border);border-radius:10px;padding:10px 12px;cursor:pointer;transition:.15s;text-align:left}
.verb-chip:hover{border-color:var(--accent)}
.verb-chip.active{border-color:var(--accent);background:rgba(99,102,241,.15)}
.verb-inf{font-weight:800;font-size:.88rem;color:#fff}
.verb-meaning{font-size:.72rem;color:var(--muted);margin-top:2px}
.verb-reg{font-size:.62rem;font-weight:700;padding:1px 6px;border-radius:6px;margin-top:4px;display:inline-block}
.reg-yes{background:rgba(52,211,153,.15);color:var(--green)}
.reg-no{background:rgba(251,191,36,.15);color:var(--amber)}

table.conj-table{width:100%;border-collapse:collapse;margin-top:6px}
table.conj-table td{padding:10px 12px;border-bottom:1px solid var(--border);font-size:.88rem}
table.conj-table td:first-child{color:var(--muted);font-weight:600;width:40%}
table.conj-table td:last-child{color:var(--accent2);font-weight:700}

.quiz-prompt{text-align:center;padding:20px 0}
.quiz-verb{font-size:1.5rem;font-weight:900;color:#fff;margin-bottom:4px}
.quiz-meta{font-size:.85rem;color:var(--muted);margin-bottom:18px}
.quiz-input{width:100%;max-width:340px;margin:0 auto;display:block;background:#0d1628;border:1.5px solid var(--border);border-radius:10px;padding:12px 16px;font-size:1.1rem;color:#fff;text-align:center;outline:none;font-family:inherit}
.quiz-input:focus{border-color:var(--accent)}
.quiz-input.correct{border-color:var(--green);background:rgba(52,211,153,.1)}
.quiz-input.wrong{border-color:var(--red);background:rgba(248,113,113,.1)}
.quiz-feedback{margin-top:12px;font-size:.88rem;min-height:22px}
.feedback-correct{color:var(--green);font-weight:700}
.feedback-wrong{color:var(--red);font-weight:700}
.score-display{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:10px}
</style>
</head>

<div class="hero">

<div class="container">

  <div class="card">
    <label>Language</label>
    <div class="chip-group" id="langGroup">
      <button class="chip active" data-val="spanish">🇪🇸 Spanish</button>
      <button class="chip" data-val="french">🇫🇷 French</button>
      <button class="chip" data-val="german">🇩🇪 German</button>
    </div>
  </div>

    <label>Verb</label>
    <div class="verb-grid" id="verbGrid"></div>
  </div>

    <label>Tense</label>
    <div class="chip-group" id="tenseGroup"></div>
  </div>

  <div class="card" id="modeCard" style="display:none">
    <div class="tab-row">
      <button class="tab-btn active" id="modeTable" onclick="setMode('table')">📋 Reference Table</button>

    <div id="quizArea" style="display:none">

let lang = 'spanish';
let currentVerb = null;
let currentTense = null;
let mode = 'table';
let quizCorrect = 0, quizTotal = 0;
let quizAnswer = '';

document.getElementById('langGroup').addEventListener('click', e => {
  if (!e.target.classList.contains('chip')) return;
  document.querySelectorAll('#langGroup .chip').forEach(c => c.classList.remove('active'));
  e.target.classList.add('active');
  lang = e.target.dataset.val;
  currentVerb = null; currentTense = null;
  document.getElementById('tenseCard').style.display = 'none';
  document.getElementById('modeCard').style.display = 'none';
  renderVerbGrid();
});

function renderVerbGrid() {
  const grid = document.getElementById('verbGrid');
  const verbs = DATA[lang].verbs;
  grid.innerHTML = Object.keys(verbs).map(inf => {
    const v = verbs[inf];
    return `<div class="verb-chip${inf===currentVerb?' active':''}" onclick="selectVerb('${inf}')">
      <div class="verb-inf">${esc(inf)}</div>
      <div class="verb-meaning">${esc(v.meaning)}</div>
      <span class="verb-reg ${v.regular?'reg-yes':'reg-no'}">${v.regular?'regular':'irregular'}</span>
    </div>`;
  }).join('');
}

function selectVerb(inf) {
  currentVerb = inf;
  renderVerbGrid();
  document.getElementById('tenseCard').style.display = 'block';
  renderTenseGroup();
}

function renderTenseGroup() {
  const tenses = DATA[lang].tenses;
  const labels = DATA[lang].tenseLabels;
  const group = document.getElementById('tenseGroup');
  group.innerHTML = tenses.map((t,i) => `<button class="chip${i===0?' active':''}" data-val="${t}" onclick="selectTense('${t}',this)">${esc(labels[t])}</button>`).join('');
  currentTense = tenses[0];
  document.getElementById('modeCard').style.display = 'block';
  setMode(mode);
}

function selectTense(t, el) {
  currentTense = t;
  document.querySelectorAll('#tenseGroup .chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  setMode(mode);
}

function setMode(m) {
  mode = m;
  document.getElementById('modeTable').classList.toggle('active', m === 'table');
  document.getElementById('modeQuiz').classList.toggle('active', m === 'quiz');
  document.getElementById('tableArea').style.display = m === 'table' ? 'block' : 'none';
  document.getElementById('quizArea').style.display = m === 'quiz' ? 'block' : 'none';
  if (m === 'table') renderTable();
  else { quizCorrect = 0; quizTotal = 0; nextQuizQ(); }
}

function renderTable() {
  if (!currentVerb || !currentTense) return;
  const pronouns = DATA[lang].pronouns;
  const forms = DATA[lang].verbs[currentVerb][currentTense];
  const rows = pronouns.map((p,i) => `<tr><td>${esc(p)}</td><td>${esc(forms[i])}</td></tr>`).join('');
  document.getElementById('tableArea').innerHTML = `<table class="conj-table"><tbody>${rows}</tbody></table>`;
}

function nextQuizQ() {
  const verbKeys = Object.keys(DATA[lang].verbs);
  const inf = verbKeys[Math.floor(Math.random() * verbKeys.length)];
  const tenses = DATA[lang].tenses;
  const tense = tenses[Math.floor(Math.random() * tenses.length)];
  const pronouns = DATA[lang].pronouns;
  const pi = Math.floor(Math.random() * pronouns.length);
  const forms = DATA[lang].verbs[inf][tense];
  quizAnswer = forms[pi];
  document.getElementById('quizVerb').textContent = inf + ' — ' + DATA[lang].verbs[inf].meaning;
  document.getElementById('quizMeta').textContent = `${DATA[lang].tenseLabels[tense]} · ${pronouns[pi]}`;
  const input = document.getElementById('quizInput');
  input.value = '';
  input.classList.remove('correct','wrong');
  document.getElementById('quizFeedback').textContent = '';
  input.focus();
  document.getElementById('quizScore').textContent = `Score: ${quizCorrect} / ${quizTotal}`;
}

function normalize(s) {
  return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function checkAnswer() {
  const input = document.getElementById('quizInput');
  const val = input.value;
  quizTotal++;
  const correct = normalize(val) === normalize(quizAnswer);
  if (correct) {
    quizCorrect++;
    input.classList.add('correct');
    document.getElementById('quizFeedback').innerHTML = `<span class="feedback-correct">✓ Correct!</span>`;
  } else {
    input.classList.add('wrong');
    document.getElementById('quizFeedback').innerHTML = `<span class="feedback-wrong">✗ Answer: ${esc(quizAnswer)}</span>`;
  }
  document.getElementById('quizScore').textContent = `Score: ${quizCorrect} / ${quizTotal}`;
  setTimeout(nextQuizQ, 1600);
}

document.getElementById('quizInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') checkAnswer();
});

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

renderVerbGrid();
</script>
</body>
</html>
