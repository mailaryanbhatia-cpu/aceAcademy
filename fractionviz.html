<!DOCTYPE html>
<html data-theme="dark" lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Fraction Visualizer — aceAcademy</title>
<link rel="stylesheet" href="ace-theme.css">
<style>
:root{--bg:#0b1120;--card:#1a2540;--accent:#6366f1;--accent2:#a5b4fc;--text:#ffffff;--muted:#b0bece;--border:#2a3a55;--green:#34d399;--red:#f87171;--amber:#fbbf24;}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter','Segoe UI',sans-serif;background:var(--bg);color:#fff;min-height:100vh}
.topnav{display:flex;align-items:center;gap:6px;padding:0 20px;height:54px;background:#080e1c;border-bottom:1px solid var(--border);flex-wrap:nowrap;overflow-x:auto}.topnav::-webkit-scrollbar{display:none}
.logo{font-size:1.3rem;font-weight:800;color:#fff;text-decoration:none;margin-right:10px}.logo span{color:var(--accent2)}
.nav-link{text-decoration:none;color:var(--muted);font-size:.85rem;padding:6px 10px;border-radius:7px;white-space:nowrap;font-weight:600}.nav-link:hover{background:rgba(255,255,255,.07);color:#fff}.nav-link.active{color:var(--accent2)}
.spacer{flex:1}
.hero{text-align:center;padding:32px 20px 18px;background:linear-gradient(135deg,#06091a,#1a2080,#2d0d5c);border-bottom:1px solid var(--border)}
.hero h1{font-size:1.8rem;font-weight:800;color:#fff;margin-bottom:6px}
.hero p{color:var(--accent2);font-size:.95rem}
.container{max-width:820px;margin:24px auto;padding:0 20px}
.card{background:var(--card);border-radius:14px;border:1px solid var(--border);padding:22px;margin-bottom:20px}
.card h2{font-size:.95rem;font-weight:700;color:#fff;margin-bottom:14px}
.btn{padding:9px 20px;border-radius:9px;border:none;cursor:pointer;font-weight:700;font-size:.85rem;transition:all .15s;font-family:inherit}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.88}
.btn-outline{background:transparent;border:1.5px solid var(--border);color:#fff}.btn-outline:hover{border-color:var(--accent)}
.mode-row{display:flex;gap:8px;margin-bottom:18px;flex-wrap:wrap}
.mode-btn{flex:1;min-width:120px;padding:10px;border-radius:9px;border:1.5px solid var(--border);background:transparent;color:var(--muted);font-weight:700;font-size:.85rem;cursor:pointer}
.mode-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.frac-input-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:18px;flex-wrap:wrap}
.frac-box{display:flex;flex-direction:column;align-items:center;gap:6px}
.frac-stack{display:flex;flex-direction:column;align-items:center;gap:4px}
.frac-stack input{width:70px;padding:8px;text-align:center;font-size:1.3rem;font-weight:800;border-radius:8px;border:1.5px solid var(--border);background:#111827;color:#fff;outline:none}
.frac-stack input:focus{border-color:var(--accent)}
.frac-line{width:70px;height:3px;background:#fff;border-radius:2px}
.frac-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;font-weight:700}
.viz-area{display:flex;justify-content:center;gap:30px;flex-wrap:wrap;margin:20px 0}
.viz-box{text-align:center}
.viz-box .cap{font-size:.8rem;color:var(--muted);margin-bottom:8px}
.result-line{text-align:center;font-size:1.1rem;font-weight:700;color:var(--accent2);margin-top:10px}
.result-sub{text-align:center;font-size:.85rem;color:var(--muted);margin-top:4px}
.bar-seg{display:inline-block;height:36px;border:1px solid var(--border)}
.bar-seg.filled{background:var(--accent)}
.bar-seg.empty{background:#111827}
.compare-symbol{font-size:2rem;font-weight:900;color:var(--amber)}
.quiz-progress{font-size:.78rem;color:var(--muted);text-align:center;margin-bottom:10px}
.opt-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;max-width:420px;margin:16px auto 0}
.opt{padding:12px;border-radius:9px;border:1.5px solid var(--border);background:#111827;color:#fff;cursor:pointer;font-size:1rem;font-weight:700;font-family:inherit}
.opt:hover{border-color:var(--accent)}
.opt.correct{border-color:var(--green);background:rgba(52,211,153,.15)}
.opt.wrong{border-color:var(--red);background:rgba(248,113,113,.15)}
.score-display{font-size:.85rem;color:var(--muted);text-align:center;margin-bottom:10px}
.result-big{font-size:2.6rem;font-weight:900;text-align:center;color:var(--accent2);margin:6px 0}
</style>
</head>
<body>
<nav class="topnav">
  <a class="logo" href="index.html">ace<span>Academy</span></a>
  <a class="nav-link" href="index.html">Home</a>
  <a class="nav-link" href="alltools.html">All Tools</a>
  <a class="nav-link active" href="fractionviz.html">Fraction Visualizer</a>
  <div class="spacer"></div>
</nav>
<script src="auth-guard.js"></script>

<div class="hero">
  <h1>🍰 Fraction Visualizer</h1>
  <p>See fractions as pie slices and bar models. Build, compare, add, and quiz yourself on fractions visually.</p>
</div>

<div class="container">

  <div class="card">
    <div class="mode-row">
      <button class="mode-btn active" id="modeBuild" onclick="setMode('build')">🔧 Build</button>
      <button class="mode-btn" id="modeCompare" onclick="setMode('compare')">⚖️ Compare</button>
      <button class="mode-btn" id="modeAdd" onclick="setMode('add')">➕ Add</button>
      <button class="mode-btn" id="modeQuiz" onclick="setMode('quiz')">✅ Quiz Me</button>
    </div>

    <div id="buildArea">
      <div class="frac-input-row">
        <div class="frac-box">
          <div class="frac-stack">
            <input type="number" id="b-num" value="3" min="0" max="12" oninput="renderBuild()">
            <div class="frac-line"></div>
            <input type="number" id="b-den" value="4" min="1" max="12" oninput="renderBuild()">
          </div>
        </div>
      </div>
      <div class="viz-area">
        <div class="viz-box"><div class="cap">Pie Model</div><div id="b-pie"></div></div>
        <div class="viz-box"><div class="cap">Bar Model</div><div id="b-bar"></div></div>
      </div>
      <div class="result-line" id="b-result"></div>
      <div class="result-sub" id="b-simplify"></div>
    </div>

    <div id="compareArea" style="display:none">
      <div class="frac-input-row">
        <div class="frac-box">
          <div class="frac-stack">
            <input type="number" id="c-num1" value="1" min="0" max="12" oninput="renderCompare()">
            <div class="frac-line"></div>
            <input type="number" id="c-den1" value="2" min="1" max="12" oninput="renderCompare()">
          </div>
        </div>
        <div class="compare-symbol" id="c-symbol">?</div>
        <div class="frac-box">
          <div class="frac-stack">
            <input type="number" id="c-num2" value="3" min="0" max="12" oninput="renderCompare()">
            <div class="frac-line"></div>
            <input type="number" id="c-den2" value="8" min="1" max="12" oninput="renderCompare()">
          </div>
        </div>
      </div>
      <div class="viz-area">
        <div class="viz-box"><div class="cap" id="c-cap1"></div><div id="c-pie1"></div></div>
        <div class="viz-box"><div class="cap" id="c-cap2"></div><div id="c-pie2"></div></div>
      </div>
      <div class="result-line" id="c-result"></div>
    </div>

    <div id="addArea" style="display:none">
      <div class="frac-input-row">
        <div class="frac-box">
          <div class="frac-stack">
            <input type="number" id="a-num1" value="1" min="0" max="12" oninput="renderAdd()">
            <div class="frac-line"></div>
            <input type="number" id="a-den1" value="4" min="1" max="12" oninput="renderAdd()">
          </div>
        </div>
        <div class="compare-symbol">+</div>
        <div class="frac-box">
          <div class="frac-stack">
            <input type="number" id="a-num2" value="1" min="0" max="12" oninput="renderAdd()">
            <div class="frac-line"></div>
            <input type="number" id="a-den2" value="3" min="1" max="12" oninput="renderAdd()">
          </div>
        </div>
      </div>
      <div class="viz-area">
        <div class="viz-box"><div class="cap">Combined Bar Model</div><div id="a-bar"></div></div>
      </div>
      <div class="result-line" id="a-result"></div>
      <div class="result-sub" id="a-simplify"></div>
    </div>

    <div id="quizArea" style="display:none">
      <div class="score-display" id="quizProgress"></div>
      <div id="quizQCard"></div>
      <div id="quizResult" style="display:none">
        <div class="result-big" id="quizFinalScore"></div>
        <div style="text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:14px" id="quizMsg"></div>
        <div style="text-align:center"><button class="btn btn-primary" onclick="startQuiz()">Try Again</button></div>
      </div>
    </div>
  </div>

</div>

<script>
function gcd(a,b){ a=Math.abs(a); b=Math.abs(b); while(b){ [a,b]=[b,a%b]; } return a || 1; }
function simplify(n,d){ const g = gcd(n,d); return [n/g, d/g]; }

function svgPie(num, den, color){
  color = color || '#6366f1';
  const size = 120, r = 52, cx = size/2, cy = size/2;
  den = Math.max(1, den);
  num = Math.max(0, Math.min(num, den));
  let paths = '';
  for(let i=0; i<den; i++){
    const a0 = (i/den) * 2*Math.PI - Math.PI/2;
    const a1 = ((i+1)/den) * 2*Math.PI - Math.PI/2;
    const x0 = cx + r*Math.cos(a0), y0 = cy + r*Math.sin(a0);
    const x1 = cx + r*Math.cos(a1), y1 = cy + r*Math.sin(a1);
    const large = (a1-a0) > Math.PI ? 1 : 0;
    const fill = i < num ? color : '#111827';
    paths += `<path d="M${cx},${cy} L${x0.toFixed(2)},${y0.toFixed(2)} A${r},${r} 0 ${large} 1 ${x1.toFixed(2)},${y1.toFixed(2)} Z" fill="${fill}" stroke="#0b1120" stroke-width="2"/>`;
  }
  return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">${paths}</svg>`;
}

function htmlBar(num, den, color){
  color = color || 'var(--accent)';
  den = Math.max(1, den);
  num = Math.max(0, Math.min(num, den));
  const segWidth = Math.min(36, Math.floor(320/den));
  let html = '<div style="display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border)">';
  for(let i=0;i<den;i++){
    const cls = i < num ? 'filled' : 'empty';
    html += `<div class="bar-seg ${cls}" style="width:${segWidth}px"></div>`;
  }
  html += '</div>';
  return html;
}

function setMode(m){
  ['build','compare','add','quiz'].forEach(k => {
    document.getElementById('mode'+k.charAt(0).toUpperCase()+k.slice(1)).classList.toggle('active', k===m);
    document.getElementById(k+'Area').style.display = k===m ? 'block' : 'none';
  });
  if(m==='build') renderBuild();
  if(m==='compare') renderCompare();
  if(m==='add') renderAdd();
  if(m==='quiz') startQuiz();
}

function renderBuild(){
  let n = parseInt(document.getElementById('b-num').value)||0;
  let d = parseInt(document.getElementById('b-den').value)||1;
  if(d<1) d=1;
  if(n>d) n=d;
  document.getElementById('b-pie').innerHTML = svgPie(n,d);
  document.getElementById('b-bar').innerHTML = htmlBar(n,d);
  document.getElementById('b-result').textContent = `${n}/${d} = ${(n/d).toFixed(3).replace(/0+$/,'').replace(/\.$/,'')}`;
  const [sn,sd] = simplify(n,d);
  document.getElementById('b-simplify').textContent = (sn===n && sd===d) ? 'Already in simplest form' : `Simplified: ${sn}/${sd}`;
}

function renderCompare(){
  let n1 = parseInt(document.getElementById('c-num1').value)||0, d1 = parseInt(document.getElementById('c-den1').value)||1;
  let n2 = parseInt(document.getElementById('c-num2').value)||0, d2 = parseInt(document.getElementById('c-den2').value)||1;
  if(d1<1) d1=1; if(d2<1) d2=1;
  document.getElementById('c-cap1').textContent = `${n1}/${d1}`;
  document.getElementById('c-cap2').textContent = `${n2}/${d2}`;
  document.getElementById('c-pie1').innerHTML = svgPie(n1,d1,'#6366f1');
  document.getElementById('c-pie2').innerHTML = svgPie(n2,d2,'#a855f7');
  const v1 = n1/d1, v2 = n2/d2;
  const sym = Math.abs(v1-v2)<1e-9 ? '=' : (v1>v2 ? '>' : '<');
  document.getElementById('c-symbol').textContent = sym;
  document.getElementById('c-result').textContent = `${n1}/${d1} ${sym} ${n2}/${d2}`;
}

function renderAdd(){
  let n1 = parseInt(document.getElementById('a-num1').value)||0, d1 = parseInt(document.getElementById('a-den1').value)||1;
  let n2 = parseInt(document.getElementById('a-num2').value)||0, d2 = parseInt(document.getElementById('a-den2').value)||1;
  if(d1<1) d1=1; if(d2<1) d2=1;
  const lcd = (d1*d2)/gcd(d1,d2);
  const combNum = n1*(lcd/d1) + n2*(lcd/d2);
  document.getElementById('a-bar').innerHTML = htmlBar(Math.min(combNum,lcd), lcd, combNum>lcd ? '#f87171' : 'var(--accent)');
  const [sn,sd] = simplify(combNum, lcd);
  document.getElementById('a-result').textContent = `${n1}/${d1} + ${n2}/${d2} = ${combNum}/${lcd}`;
  document.getElementById('a-simplify').textContent = (sn===combNum && sd===lcd) ? '' : `Simplified: ${sn}/${sd}` + (combNum>lcd ? ` (= ${(combNum/lcd).toFixed(2)}, more than a whole!)` : '');
}

let quizQ = [], quizIdx = 0, quizScore = 0;
function rnd(a,b){ return Math.floor(Math.random()*(b-a+1))+a; }
function startQuiz(){
  quizQ = [];
  for(let i=0;i<8;i++){
    const d = rnd(2,8);
    const n = rnd(1,d-1);
    const distractors = new Set();
    while(distractors.size<3){
      const dd = rnd(2,8), dn = rnd(1,dd-1);
      const key = dn+'/'+dd;
      if(key !== n+'/'+d) distractors.add(key);
    }
    const opts = [`${n}/${d}`, ...distractors];
    for(let k=opts.length-1;k>0;k--){ const j=Math.floor(Math.random()*(k+1)); [opts[k],opts[j]]=[opts[j],opts[k]]; }
    quizQ.push({n,d,opts,correct:`${n}/${d}`});
  }
  quizIdx=0; quizScore=0;
  document.getElementById('quizResult').style.display='none';
  document.getElementById('quizQCard').style.display='block';
  renderQuiz();
}
function renderQuiz(){
  const q = quizQ[quizIdx];
  document.getElementById('quizProgress').textContent = `Question ${quizIdx+1} of ${quizQ.length} · Score: ${quizScore}`;
  document.getElementById('quizQCard').innerHTML = `
    <div style="text-align:center">${svgPie(q.n,q.d,'#6366f1')}</div>
    <div style="text-align:center;font-size:.9rem;color:var(--muted);margin:8px 0 4px">What fraction is shaded?</div>
    <div class="opt-grid">${q.opts.map((o,oi)=>`<button class="opt" data-idx="${oi}" onclick="answerQuiz(this,'${o}')">${o}</button>`).join('')}</div>
  `;
}
function answerQuiz(btn, val){
  const q = quizQ[quizIdx];
  const ok = val === q.correct;
  if(ok) quizScore++;
  document.querySelectorAll('#quizQCard .opt').forEach(b => {
    b.disabled = true;
    if(b.textContent === q.correct) b.classList.add('correct');
  });
  if(!ok) btn.classList.add('wrong');
  setTimeout(() => {
    quizIdx++;
    if(quizIdx >= quizQ.length) endQuiz();
    else renderQuiz();
  }, 900);
}
function endQuiz(){
  document.getElementById('quizQCard').style.display='none';
  document.getElementById('quizResult').style.display='block';
  const pct = Math.round(quizScore/quizQ.length*100);
  document.getElementById('quizFinalScore').textContent = `${quizScore}/${quizQ.length}`;
  document.getElementById('quizMsg').textContent = pct>=90 ? "Fantastic! You're a fraction pro." :
    pct>=70 ? "Great job — a bit more practice and you'll have it down." :
    pct>=50 ? "Good try! Keep practicing." : "Keep at it — fractions get easier with practice.";
}

renderBuild();
</script>
</body>
</html>
