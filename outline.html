<link rel="stylesheet" href="ace-theme.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
.hero{text-align:center;padding:36px 20px 20px;background:linear-gradient(135deg,var(--accent2),#a855f7);color:#fff}
.hero h1{font-size:1.9rem;font-weight:800;margin-bottom:6px}
.hero p{opacity:.85;max-width:520px;margin:0 auto;font-size:.95rem}
input,select,textarea{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.9rem;color:var(--text);background:var(--surface2);outline:none;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
textarea{resize:vertical;min-height:60px}
label{font-size:.78rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;display:block;margin-bottom:5px}
.field{margin-bottom:12px}
.btn-sm{padding:5px 11px;font-size:.76rem;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;color:var(--muted);font-family:inherit}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.del{color:#f87171;border-color:transparent}.btn-sm.del:hover{background:rgba(248,113,113,.1)}
.btn-sm.add{color:var(--accent);border-color:var(--accent)}.btn-sm.add:hover{background:rgba(99,102,241,.1)}
.outline-area{display:grid;grid-template-columns:220px 1fr;gap:0;border:1.5px solid var(--border);border-radius:12px;overflow:hidden}
.outline-sidebar{background:var(--surface2);border-right:1.5px solid var(--border);padding:14px}
.section-btn{display:block;width:100%;text-align:left;padding:8px 10px;border-radius:8px;border:none;background:none;cursor:pointer;font-size:.85rem;font-weight:600;color:var(--muted);margin-bottom:3px;font-family:inherit;transition:.15s}
.section-btn:hover{background:rgba(99,102,241,.12);color:var(--accent)}
.section-btn.active{background:rgba(99,102,241,.18);color:var(--accent)}
.outline-main{padding:18px;min-height:340px}
.sec-header{font-size:.95rem;font-weight:800;margin-bottom:12px;color:var(--accent);display:flex;justify-content:space-between;align-items:center}
.point-row{display:flex;gap:8px;margin-bottom:8px;align-items:flex-start}
.point-num{font-size:.75rem;font-weight:700;color:var(--muted);padding-top:10px;flex-shrink:0;min-width:18px}
.sub-point-row{display:flex;gap:6px;margin:4px 0 4px 28px;align-items:flex-start}
.drafts-list{display:flex;flex-direction:column;gap:8px}
.draft-item{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;background:var(--surface2);border-radius:10px;border:1px solid var(--border);cursor:pointer;transition:.15s}
.draft-item:hover{border-color:var(--accent)}
.di-title{font-size:.85rem;font-weight:700}
.di-meta{font-size:.72rem;color:var(--muted)}
@media(max-width:640px){.outline-area{grid-template-columns:1fr}.outline-sidebar{border-right:none;border-bottom:1.5px solid var(--border)}}
@media print{.ace-header,.hero,.ace-card:not(.preview-card){display:none!important}body{background:#fff;color:#000}}
</style>

<body>
<header class="ace-header">
  <a href="index.html" class="ace-brand">🎓 AcerAcademy</a>
  <a href="index.html" class="ace-nav-link">← Home</a>
  
  <div class="ace-spacer"></div>
  <a href="alltools.html" class="ace-nav-link">All Tools</a>
</header>
<div class="hero">
  <h1>🗂 Essay Outline Builder</h1>
  <p>Structure your essay with a clear outline — intro, body paragraphs, conclusion, with evidence and sub-points.</p>
</div>

<div class="ace-wrap">
  <!-- Setup -->
  <div class="ace-card" id="setupCard">
    <h2>Essay Setup</h2>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
      <div class="field" style="grid-column:1/-1"><label>Essay Title / Topic</label><input id="e-title" placeholder="The causes of the American Revolution"></div>
      <div class="field"><label>Essay Type</label>
        <select id="e-type" onchange="updateStructure()">
          <option value="argumentative">Argumentative</option>
          <option value="analytical">Analytical</option>
          <option value="expository">Expository</option>
          <option value="compare">Compare & Contrast</option>
          <option value="narrative">Narrative</option>
        </select>
      </div>
      <div class="field"><label>Number of Body Paragraphs</label>
        <select id="e-bodies" onchange="updateStructure()">
          <option value="2">2</option>
          <option value="3" selected>3</option>
          <option value="4">4</option>
          <option value="5">5</option>
        </select>
      </div>
      <div class="field" style="grid-column:1/-1"><label>Thesis Statement (optional — you can fill it in the outline)</label><textarea id="e-thesis" placeholder="Enter your thesis here or write it in the outline..." style="min-height:52px"></textarea></div>
    </div>
    <button class="ace-btn" onclick="buildOutline()" style="margin-top:4px">🗂 Build Outline</button>
  </div>

  <!-- Outline editor -->
  <div class="ace-card" id="outlineCard" style="display:none">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;flex-wrap:wrap;gap:8px">
      <h2 style="margin:0">📄 <span id="outlineTitle">Outline</span></h2>
      <div>
        <button class="ace-btn-ghost" onclick="copyOutline()">📋 Copy Text</button>
        <button class="ace-btn" onclick="window.print()">🖨 Print</button>
        <button class="btn-sm" onclick="resetOutline()" style="margin-left:4px">↩ Reset</button>
      </div>
    </div>
    <div class="outline-area">
      <div class="outline-sidebar" id="sidebarSections"></div>
      <div class="outline-main" id="mainPanel"></div>
    </div>
  </div>

  <!-- Print preview -->
  <div class="outline-preview card preview-card" id="printPreview"></div>
</div>

  <div class="ace-card" id="draftsCard" style="display:none">
    <h2 style="margin-bottom:14px">📋 Saved Drafts</h2>
    <div class="drafts-list" id="draftsList"></div>
  </div>

<script>
let sections = [];
let activeIdx = 0;

const TYPE_HINTS = {
  argumentative: {intro:['Hook','Background','Thesis (claim)'], body:['Topic Sentence','Evidence/Quote','Analysis','Transition'], conclusion:['Restate Thesis','Summary of Arguments','Call to Action / Broader Significance']},
  analytical: {intro:['Hook','Context','Thesis (analysis claim)'], body:['Topic Sentence','Textual Evidence','Analysis/Interpretation','Connection to Thesis'], conclusion:['Restate Thesis','Key Findings','Significance']},
  expository: {intro:['Hook','Background','Thesis (main idea)'], body:['Topic Sentence','Supporting Details','Examples','Transition'], conclusion:['Restate Thesis','Summary','Final Thought']},
  compare: {intro:['Hook','Introduce Both Subjects','Thesis (comparison point)'], body:['Aspect Being Compared','Subject A Point','Subject B Point','Analysis'], conclusion:['Restate Thesis','Overall Similarities/Differences','Final Evaluation']},
  narrative: {intro:['Setting the Scene','Introduce Characters','Inciting Incident'], body:['Event / Plot Point','Details & Description','Significance'], conclusion:['Resolution','Reflection','Lesson / Theme']},
};

function buildOutline(){
  const title = document.getElementById('e-title').value.trim()||'My Essay';
  const type = document.getElementById('e-type').value;
  const bodies = parseInt(document.getElementById('e-bodies').value);
  const thesis = document.getElementById('e-thesis').value.trim();
  const hints = TYPE_HINTS[type];

  document.getElementById('outlineTitle').textContent = title;

  // Build sections
  sections = [];
  // Intro
  sections.push({name:'I. Introduction', points: hints.intro.map((h,i)=>({text: i===2&&thesis?thesis:'', hint:h, subs:[]}))});
  // Body paragraphs
  for(let b=0;b<bodies;b++){
    const roman = ['II','III','IV','V','VI'][b];
    sections.push({name:`${roman}. Body Paragraph ${b+1}`, points: hints.body.map(h=>({text:'',hint:h,subs:[]}))});
  }
  // Conclusion
  sections.push({name:`${['III','IV','V','VI','VII'][bodies-1]}. Conclusion`, points: hints.conclusion.map(h=>({text:'',hint:h,subs:[]}))});

  activeIdx = 0;
  document.getElementById('setupCard').style.display='none';
  document.getElementById('outlineCard').style.display='block';
  renderSidebar(); renderPanel();
}

function renderSidebar(){
  document.getElementById('sidebarSections').innerHTML = sections.map((s,i)=>`
    <button class="section-btn${i===activeIdx?' active':''}" onclick="switchSection(${i})">${s.name}</button>
  `).join('');
}

function switchSection(i){ activeIdx=i; renderSidebar(); renderPanel(); }

function renderPanel(){
  const s = sections[activeIdx];
  let html = `<div class="section-header">${s.name}</div>`;
  s.points.forEach((p,pi)=>{
    html += `<div class="point-row">
      <span class="point-num">${pi+1}.</span>
      <textarea placeholder="${p.hint}" oninput="sections[${activeIdx}].points[${pi}].text=this.value">${p.text}</textarea>
      <button class="ace-btn-sm del" onclick="removePoint(${pi})">✕</button>
    </div>`;
    p.subs.forEach((sub,si)=>{
      html += `<div class="sub-point-row">
        <span style="color:var(--muted);font-size:.85rem;padding-top:9px">↳</span>
        <textarea placeholder="Sub-point..." oninput="sections[${activeIdx}].points[${pi}].subs[${si}]=this.value">${sub}</textarea>
        <button class="ace-btn-sm del" onclick="removeSub(${pi},${si})">✕</button>
      </div>`;
    });
    html += `<div style="margin:0 0 10px 28px"><button class="ace-btn-sm add" onclick="addSub(${pi})">+ sub-point</button></div>`;
  });
  html += `<button class="ace-btn-sm add" onclick="addPoint()" style="margin-top:6px">+ point</button>`;
  document.getElementById('mainPanel').innerHTML = html;
}

function addPoint(){ sections[activeIdx].points.push({text:'',hint:'New point',subs:[]}); renderPanel(); }
function removePoint(pi){ sections[activeIdx].points.splice(pi,1); renderPanel(); }
function addSub(pi){ sections[activeIdx].points[pi].subs.push(''); renderPanel(); }
function removeSub(pi,si){ sections[activeIdx].points[pi].subs.splice(si,1); renderPanel(); }

function copyOutline(){
  let txt = '';
  sections.forEach(s=>{
    txt += s.name+'\n';
    s.points.forEach((p,pi)=>{
      txt += `  ${pi+1}. ${p.text||p.hint}\n`;
      p.subs.forEach(sub=>{ if(sub) txt += `     - ${sub}\n`; });
    });
    txt += '\n';
  });
  navigator.clipboard.writeText(txt).then(()=>alert('Outline copied to clipboard!'));
}

function resetOutline(){
  if(!confirm('Start over?')) return;
  sections=[];
  document.getElementById('setupCard').style.display='block';
  document.getElementById('outlineCard').style.display='none';
}

// Print preview population
window.onbeforeprint = function(){
  let html = `<h2 style="margin-bottom:16px">${document.getElementById('outlineTitle').textContent}</h2>`;
  sections.forEach(s=>{
    html += `<div class="preview-section"><h3>${s.name}</h3>`;
    s.points.forEach((p,pi)=>{
      html += `<div class="preview-main-point">${pi+1}. ${p.text||p.hint}</div>`;
      p.subs.forEach(sub=>{ if(sub) html+=`<div class="preview-sub-point">↳ ${sub}</div>`; });
    });
    html += '</div>';
  });
  document.getElementById('printPreview').innerHTML = html;
};

// ── localStorage: auto-save outline drafts ───────────────────────────────────
const LS_OUTLINE = 'ace_outline_drafts';
let outlineAutoSaveTimer = null;

function autoSave(){
  if(!sections||!sections.length)return;
  clearTimeout(outlineAutoSaveTimer);
  outlineAutoSaveTimer = setTimeout(()=>{
    const title = document.getElementById('outlineTitle')?.textContent || 'Outline';
    const drafts = JSON.parse(localStorage.getItem(LS_OUTLINE)||'[]');
    const idx = drafts.findIndex(d=>d.id===currentDraftId);
    const draft = {id:currentDraftId, title, sections:JSON.parse(JSON.stringify(sections)), date:new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})};
    if(idx>=0)drafts[idx]=draft; else drafts.push(draft);
    if(drafts.length>5)drafts.shift();
    localStorage.setItem(LS_OUTLINE,JSON.stringify(drafts));
    renderDraftsList();
  }, 1500);
}

let currentDraftId = Date.now();

function renderDraftsList(){
  const drafts=JSON.parse(localStorage.getItem(LS_OUTLINE)||'[]');
  const card=document.getElementById('draftsCard');
  if(!card)return;
  if(!drafts.length){card.style.display='none';return;}
  card.style.display='block';
  document.getElementById('draftsList').innerHTML=drafts.slice().reverse().map(d=>`
    <div class="draft-item" onclick="loadDraft('${d.id}')">
      <div><div class="di-title">📄 ${d.title}</div><div class="di-meta">${d.sections?.length||0} sections · ${d.date}</div></div>
      <button class="btn-sm del" onclick="event.stopPropagation();deleteDraft('${d.id}')">✕</button>
    </div>`).join('');
}

function loadDraft(id){
  const drafts=JSON.parse(localStorage.getItem(LS_OUTLINE)||'[]');
  const draft=drafts.find(d=>d.id==id);
  if(!draft)return;
  currentDraftId=draft.id;
  sections=draft.sections;
  document.getElementById('outlineTitle').textContent=draft.title;
  document.getElementById('setupCard').style.display='none';
  document.getElementById('outlineCard').style.display='block';
  activeIdx=0; renderSidebar(); renderPanel();
}

function deleteDraft(id){
  if(!confirm('Delete this draft?'))return;
  const drafts=JSON.parse(localStorage.getItem(LS_OUTLINE)||'[]');
  localStorage.setItem(LS_OUTLINE,JSON.stringify(drafts.filter(d=>d.id!=id)));
  renderDraftsList();
}

// Patch renderPanel to add auto-save on text input
const _origRenderPanel=renderPanel;
function renderPanel(){
  _origRenderPanel();
  document.querySelectorAll('.outline-main textarea').forEach(ta=>{
    ta.addEventListener('input',autoSave);
  });
}

// Patch buildOutline to assign new draft id
const _origBuildOutline=buildOutline;
function buildOutline(){
  currentDraftId=Date.now();
  _origBuildOutline();
  autoSave();
}

window.addEventListener('DOMContentLoaded',()=>renderDraftsList());

</script>
<script src="/analytics.js"></script>
</body>
